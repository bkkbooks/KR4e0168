body:
  text: 少谷集巻六明鄭善夫撰五言律懐人客思苦作惡羙人長别離愁深九日菊夢飽故山芝刼火明天地秋聲入皷鼙銷魂仍病骨行止昩前知題黄隠君水居二首人境不肯住水居猶滄洲青山如對隠白髪本無愁春草詩魂合秋風樂事求鱸蓴興不淺聊定此生謀其二水居意自得海鷗來不妨老懐惟杖履秋事在林塘桂槳依漁父菱歌出女郎逃名非故爾但恐失滄浪釣臺文叔為天子先生顧釣磯故人一夜話星坐舊山歸嚴瀬無今古羊裘有是非瓣香臺下拜素志尚依違得閩中消息閩中久無雨百糓盡枯燋魃虐延諸郡農工豈一朝何時免凍餒吾邑更征徭避地翻愁思餘生不自聊對雪答太白山人天地忽改色六花風亂投因之翠袖薄加我草堂幽照水梅自媚啣泥燕有求一杯思共爾日暮問行舟哭龔道海内君知我閩中我失君雲霄劔在壁風雨榻揚塵龍見悲吾道烏飛念此身艱危有壯志南望重沾巾旅夕逢所親述懐乍見却悲歡相詢語夜闌數年罷道路諸弟泣饑寒井竈還多故親朋有永嘆自憐飄泊甚聞此屹憂端下瀬廻溪去似箭亂石簇如鎗下瀬扶招急凌湍蕩槳忙未妨臨灔澦翻喜得滄浪范蠡扁舟外風波更渺茫贈王雙林遊宦海門振鐸維揚去堂齋爼豆幽豈為蒼水使與度海門秋三鱣隨風至羣龍抱日遊山陽篴可聼展轉憶良儔送彭少叅進萬夀表離聲言可惡子去似登仙敬述諸侯職懽呼聖主年青雲纒禮服白浪静樓船錫爾天閑馬黄金臺下傳答方思道富陽見寄浙水浩天涯吳門意已乖三年方數字半世渺孤懐萍梗猶能合風塵未見偕富春霜雪裏却憶鳯喈喈木假山時行遊麥斜得斷木如山狀已幸脱煨燼漂零故不辭肌膚渾盡剥丰骨坐稱竒㟝嶁羞相學雲霞信所為從兹别林藪深結主人知宿七里潭無數灘皆惡安恬獨此潭泝流心共澹汲古味能甘永夜魚龍定空山鬼魅談髙秋進蕭䬃行役遍東南小野堂對菊小野堂前菊相逢滿意花諸君抱氷雪散地有煙霞傍月神猶整當歌影故斜異時追此夕蕭瑟向瑶華答曹仲禮見贈未暇曹劉體逍遥了嵗年聊應備土缶豈敢冐朱絃情性人俱得咸英世不傳從兹習喑啞作用在忘筌題程時言侍御和溪譜君家好喬木逺影鬰婆娑桂樹青霄上桃花駭浪多髙峰廻日月大地湧星河近閲篁墩譜燕山豈啻過題田給事一竹軒羡爾雲霄勢泠然氷玉姿空齋寄森爽獨立出喧卑尚阻瀟湘對終収淇澳詩幔亭霜雪盛應長鳯凰枝病居讀顧與新詩伏枕殊方客秋風嵗載隂錬形功不就抵病意何深稍出詞章網翻為著作淫頭風頓覺愈吾只愛陳琳林滄洲下第赴荆門憐君不得意歸鬢忽成絲更下荆門棹還聞巫峽悲禮嚴徐孺榻義重象山祠應念投竿客終為帝者師惠山酌第二泉惠山好泉品清切錫城隅松石隂堪結蓮蓉翠不孤寺虚流夜氣沙潤長秋菰笑挈二三子朔風近舞雩憶思道近憶棠陵子還朝定此時肯為黄歇客興在白雲司意氣吾能共江山君最竒夔龍格心事天意要人為讀備遺録神堯無信史誰紀革除年龍虎風雲上山河涕淚邊夷齊偏守死王魏總知權三復春秋傳微詞今不傳望鴈宕鴈宕青到眼天南秋復凉寜辭北山屐來傍水仙王越鳥隨風化甌童觸霧黄未須悲道路前是武陵鄉再哭近夫近夫吾益友失汝自吳江末世英雄短平生涕淚雙參乎眞悟道囘也未為邦不見牛刀試青田俗盡龎劉實夫静觀樓劉子吾邦秀髙樓元氣邊定心還到眼慧日正行天風物無拘礙江山且嵗年平生騰踏志終要九潘淵白將軍將軍出武威仗劍鎭東陲氣壓風雲陣秋生熊虎姿長揮白羽扇豈羡鋭頭兒數載傷多壘雲臺及盛時咄咄宿國清寺有懐徃事咄咄長廊下倡歌誰為聞世人皆夢寐之子獨風雲土浄菩提路天垂星斗文猶存頂神咒至語未曾分贈歐陽崇道使君廊廟器秪惜頴川名世事憂無盡吾邦兆已行况逢王者作要使海波平倘及莘中隠深耕自性情哭仲黙去年孫復死今復哭何休霄漢冥交盡嵩邙正氣収操戈吾豈敢懐寳爾終投秪益文章價年年照斗牛謁紫陽精舍山水竒如此乾坤氣所儲昔賢遺筍蜕異代儼門廬嵗晏芝苓長天髙風露餘蹉跎逐簮笏尚愧紫陽居三陟憐君憂思劇三上白雲山風樹吹無盡鴒原望不還堂階抱古恨松栢變秋顔莫以歌終曲人生涕淚繁春日懐京華諸友聞説神龍起羣賢一網提中原刑白馬南國且黄鸝夜楫誰同擊春江他自迷無能逐公子錫宴上林西寄容臺舊僚友上徳符元命南宫列雋才周王郊祀畢漢日辟雍開法駕新承幸芝壇定數陪百年大禮樂述作意悠哉秋日寄赤城諸友幾載不相見天台葉又飛行藏歸一是堯桀自相非江海完吾志星霜變客衣風期與雲㑹莫遣道心㣲夏雨南天春苦旱咎在嵗星沉四月禾苖歇三農雨望深油雲膚寸合一似雨黄金君王社稷主要識上天心張起溟得子聞得充閭慶青天眼不孤君猶倚桐樹此是鳯凰雛昔日三蘇出眉山萬木枯鄉書日暮至定報有嘉符元夕登鰲峰絶頂有序元夕余從海上與木虚子登鰲峰據竒石摩挲古檜樹忽聞峰頂瓦礫聲趨而從之見二老拄杖箕踞相顧一大笑乃引酌嘯歌月隠隠出雲際下觀萬井燈火星河倒浸陸海中余諸人者猶夢天然竒哉惜哉髙子王子逺莫可致沛夫泥俗招之不來也遂折古梅枝以貽懐者歸而北斗指寅矣遂作韻語以引諸子共爾尋芳酌復從鰲頂行風煙有元夕星漢下孤城石祖他年夢山公一笑迎髙歌倚梅樹瞻注有餘情哭張士孚同㑹今何在斯人天下無盛時看諫草何日奠生芻狐䑕私相慶衣冠勢益孤空餘青史上遺簡載名儒答陳鑑武原陳仲舉惠我古苔篇讀罷生隂籟知君𤣥又𤣥髙賢惠逺社歸客洞庭船何日尋芳約蓬山種玉田除夕二首忽忽屠蘇夕匆匆吳楚春嵗華無奈守酒盞可憐頻世短聊看斗時艱復問津劍文差不翳猶得慰情親喪亂滿天地風煙無古今吳門又除夕粤客未投簮燈暈他年夢椒花故國心翻憐癡兒女嬉笑夜堂深秋月初昏見秋月耿耿即西傾河漢留光景關山入杳㝠衆星森北向一鳥浩南征莫遣微雲起渠能穢太清吕梁又數載河為患悵然思禹功源從西極下水到吕梁雄天塹長淮北地維滄海東應悲箜篌曲宛轉意何窮王南渠隠居冠山龍卧處流水近滄洲形勝東南地堂齋烟雨秋諫書存事業逐客且林丘只看桐溪上星文動斗牛大田篇君王提一旅禮法用三驅木落鴻能矯天寒虎在嵎風塵収猛士騎射跼文儒鋭首誰家子人間大丈夫得友人書毎逢閩地客數問爾滄洲搖落意如此煙波去無繇傳楫還長擊髙柴未損憂因風寄幽獨蚤晩大刀頭再送李曲江曲江山水縣暇日好彈琴要將流水意遍作頴川唫王風周末異瘴色日南深更㸃分明處縣知令尹心懐思道聞君留闕里勾當未曾還五月過泗水何時登太山道存夫子室禮接魯生顔星駕飄飄去雲天逈莫扳寄小野倪侯隠南國食禄二千鍾誰識神仙骨長栖富貴叢梅花行嶺外鴈字過蠻中何日飛尋女而將黄鶴同五言排律劒州溪聲下黯淡山意㑹延平激漩當天險横霄極地形黄堂嚴上界㕓舍倚髙城龍劒眞能合虹橋本易成茶菰流土物稉秫得人生李子濂伊嫡劉滋卓魯勍士多通古學民不廢春耕何處深傳檄兹邦乃苦兵方將採竹箭奚暇糝藜羹正頼賢官府艱虞繫物情除夕二首百戰無寜日窮年作宦情故山惟夢到異域獨燈明氷雪淹公子風塵掩客星無家杜陵老經亂鄭康成北望關河固東遊嵗月更安危仗王室鼎食愧昇平三元今夕到羣盗幾時平河洛新流血齊梁日請兵羽書連樂國鞞鼔動神京大將眞無敵元兇未就烹地悲殺氣盛天苦嵗功成進退吾何據椒盤空復情送司徒孫公歸安陸五十韻國歩多艱日黄圖八葉時正人俱遜避㝠運莽推移在昔先皇世明公早典司菁華臨騕褭瞻聼下須彌徳業周王佐賢勞漢度支坐舒千里足遍察萬方眉時値中原擾頻徴北鄙師向非籌百萬安得活瘡痍理劇虛投刄囘淳重執規赤心醫國石白首向陽葵朝著留清望廷争抗直詞杜公良不忝樊子豈無竒禄秩方登俊兒童不免饑少焉看短鬂率爾問青芝懇切封中疏闐淤夢裏思王言溫莫挽傳馬去猶馳肱股定虚曠麒麟難繫羇韋年寜待暮常版却應誰允矣修初服忻然集故知養眞同在洛憂世類還睢蓽輅北宫子鹿裘榮啓期釣溪人罕識遊岳鶴長隨信是勞筋息其如柱石衰嵓堂喧燕雀城社保鼷狸黔首殱金氣旄頭直玉墀豈惟餘狡兒遽使有鴟夷浩蕩南溟徙差池北斗垂帝能忘反側天未欲雍熈前席追才子髙軒㳫健兒汾陽終復起囘紇定深疑世道今如此言余何所之狂􅀈通劍術憤激撤書帷猥作龍門客載歌淇澳詩未縁經品藻竊幸受鑪錘食忝侏儒粟才妨寢廟犧役形酬顧遇鏤骨為嘘吹永願參徒御猶希附鼎彛此心何覬豁人事竟離披貢禹情堪弔任安義匪疵幾能容傲吏奚止失師資悢悢悲鳴鋏奄奄嘆守雌肩隨遑㸃染影弔趣磷緇便作開籠鳥還慙掉尾龜即尋鷗鷺好甘與簿書辭采藥靈源洞紉蓀少谷陂静便粗布褐安穏小茆茨述作刑司馬冠纓薄李斯嵩髙塵不雜來挹九峰姿聞吾廷介避亂客死藁𦵏道隅識面胥臺夕論心滸墅時功名非爾軰文藻是吾師命薄長遺世才髙更忍饑天如産麟鳯王不夢熊羆久着東山屐頻歌濮水詞邴原明進退杜甫昩生涯已是哀黄髮仍兼䧟赤眉修身渾欲到得禍一何竒寂寞榱楹折荒蕪氣運衰人皆牖下死子有道傍疑叔寳時多惜嵇康我獨悲君門數行淚不但致吾私夀林大司馬四十韻當代論耆徳先生第一人行年老益壯浴已日猶新九牧衣冠胄三朝柱石臣時流立標凖前軰想丰神伊昔遭平世超然充大賔東寮注栁肅内史倒陳遵竒思過常調修能異等倫一生隨日馭十載在成均古學薰移俗名賢類受甄牽裾留短草啓事起枯鱗瓊珮辭仙仗金陵秉大鈞豈無雲錦線可補舜衣鶉鴻運丁天厭元龜卜世屯文狸翔粉堞玉玦下楓宸溫國言歸洛宣尼罷問津嵗功成者退初服誓當伸几杖蒼生慕松筠白髮親起居全矍鑠容色愈溫純不論臨卑幼都如飲酪醇達尊人代少幽意嵗華頻寄癖泉山麓移舟越水濵猶能作小楷亦稱戴髙巾奚用推洪範終然比大椿夀臨文彦博子得范純仁極北陳情切滇南税駕眞言將懽菽水不是憶鱸蓴臣父深思子臣兒願委身明王念勛舊溫語藹絲綸李宻近還蜀張良未謝秦銀魚綰房杜玉樹集陳荀萊綵偏宜晩潘輿毎及晨風吹緑野暮花發錦堂春刺史宣前烈春官振後塵品題惟鳯鳥圖畫必麒麟二月山川麗全閩氣象臻嵩乎鍾匪物甫也降兹辰度曲來鵷鶴稱盃拜縉紳龍門登尚忝驥尾附何因感激吾將仕沾濡俗到淳太平若有象早晩下蒲輪送周方伯入楚五十六韻南來日月淺歘作洞庭遊宦逹多離坼旌麾還阻修人情烏石雨仙路豫章舟樹直黄陵廟花明白鷺洲攀軒啼老少擁篲振王侯毒草祠能久濂溪井尚留賢聲望宰輔伊昔盛才猷八辟叅邦典羣疑反楚囚青蓮分黒白丹筆斡宸旒退食惟書巻攅眉視貴游坐兹不速化寜自向明投先帝需梁棟春官雜枓樛匪材隨鍳澈是嵗辱甄収分忝門生列知懸孺子酬青雲長契濶白帝正岣嵧公去安邊徼余歸滯故丘數年鱗杳杳两地髩颼颼諸葛綏西土文翁化益州夷酋逹禮樂武弁冠貔貅自古賢人逺殊方聖主諏朔風吹鳥道春雨下龍湫天共滇池逺人兼泮水幽两川思几杖六詔頼懐柔𤏡俗元來野華風今始流文鵷既翽翽鳴鹿亦􅊯􅊯欲見唐虞理何煩猿狖愁幾時卿月照復爾使星浮三晉悲歌切中原盗賊稠徬徨家室走感激嵗時遒道在無荆棘時艱任㓂讎終焉脱虎口直擬謝蝇頭天欲昌王室帝能追馬周風髙沙塞暮草歇鴈門秋十二事皆舉權豪勢不勾食芻無款叚出牧盡驊騮世待英雄急公宜物色求無諸所胙土馬亮載鳴騶玉節沾應得風謡採未休先聲靖強禦能事屬歌謳霄漢瞻洪翮泥塗非好仇狄籠充實忝徐榻下何綢願縳南山虎翻驚北海鷗倚風悲駘蕩望斗念傴僂貧貸鄰人粟寒披季子裘熱中聞䑛痔畢意避犧牛名位争相笑悲歌不自由誰能見客意何以解吾憂夜雨聼希曠春波轉繆悠大廷稽職業南服趣恩庥江漢雄藩鎭䕫龍注廟謀雙旌一以逺千里秪須摳即欲隨黄鵠終知愧禿鶖草深鸚鵡塜天逈岳陽樓范老端憂樂禰衡招咎尤獨醒心縷縷北靣意慺慺公若登三事須張竟野罘鉛山書事十二韻聞道坎山裏羣豪撓信州仇家縣膽在死士散金収趙厠機關重秦庭報復稠執言修大懟負固震諸侯落日閭閻恐悲風井逕愁撫綏須早計變亂未干休赤子元無罪紅巾揆所由至誠馴虎豹極處動貔貅六邑疲供應三農訟咎尤風塵將不靖土地爾何求即鑒前車覆母貽後事憂朝廷諱首惡賢相合深籌東遊已是閉關月漫遊何處邦北風帆勢直南紀嵗華妨負勝輕河嶽哀時挹伯王衣冠明𦵏處俎豆盛蠻方忽憶春秋際兼懐種蠡良圖王功己巳去國意茫茫萬事空搔首諸賢足斷腸東征効蘋藻大觀出𤣥黄雨蝕曹娥廟山疑謝傅堂洑波平憤懣舊燕落尋常忼慨吾能賦風流誰更狂飄飄王逸少磊磊賀知章眞帖蘭亭秘遺榮剡水光鑑湖秦望近雲寺若耶荒皓齒此溪女紫騮何郡郎隔花相問姓采菲欲遺芳未逐支公隠能無許掾藏雪舟行獨逺禹宂探尤長木客胡麻飯山䕫薜荔裳桃花源不昩野鳥恨難忘自此升台嶽騎驢過石梁仙風去若脱八極信翺翔即事赤縣山河在黄龍沙塞長秪憂邊部落不着舜衣裳驃騎年年没單于世世強僕姑寒射月􅓋篥夜含霜寳轂猶深入金矟或轉傷前車未為逺神武有英皇得家信未覺今為是田園報已荒蠻雲深結白朔日逈含黄社稷己如此公卿猶病狂冠裳風一變戰伐意何長爵可加天位勛兼擬法王甘泉久抗疏不得達明光野江為舒國裳父作徐穉藏身在南州卧不妨經年歌白石乘月下滄浪江抱洪都府堂開輞口庄藍田種有玉磻水釣惟璜㑹見蛟龍起俄驚鸛鶴翔無由相髙志把贈芰荷裳鄉人令叔吾兄弟仲容賢姪行宦情遊里閈人事近隂陽何路通閩徼中原入戰塲應憐起草石竟失浣花堂太乙長遷次攙搶轉耀芒山河醉眼底别爾思茫茫與思道叙别四十八韻憶昔勾吳日相逢雲水鄉于時最孤寂得汝共翺翔豈倦登臨費兼存藥石良三春謝氏屐十度逺公堂大石留腰𢃄陽山接羽觴秋風白蓮賦落日洞庭航坐聼吳趨曲行歌子夜央時時動星象處處有文章雨夕舟偏討公庭事不妨投膠情最宻麗澤意何長作賦相如病彈琴宓子臧君才當十倍為宰僅三霜備見嘉禾出胡云貝錦張邑皆懐范寗人只妬鄒陽日月難終掩聲名轉益揚幾時停谷鳥獨徃釣溪魴人事尤參錯兵戈逐喪亡爾歸頻灑血余去苦回腸百粤風塵色三衢荆棘塲棠陵居獨稳太末勢堪傷消息傳誰徤艱難到女旁鴻飛多不及豹隠但相望已分生無日何期此對牀精神寜少壯鬂髪各滄浪驟見猶疑夢翻思秪欲狂人情更憐並天意遂行藏妻子盡相信形骸眞所忘緇塵心少稱青眼慰多方管鮑平時義雷陳後代光曠懐卑藻飾素業略侯王葵藿元同志雷霆詎有常賜環憐是月持節向何邦太液秋風落桑乾木葉黄翛然改節物自此判參商向秀悲無奈杜陵憂未遑漢皇惟好武堯徳本垂裳欲折淮南馘行穿涿鹿楊迢迢思汲黯隠隠忌姚萇萬騎虚邊戍深宵引御幢恒山窮鳥獸上黨泣壺漿征伐名雖正廵遊志莫荒秪須移北極况已復南昌福徳知何處欃槍屢耀芒頓能憂絶域翻不備蕭牆儒術元迂濶華裾載禍殃申屠甘絶迹大邴尚為郎江漢情何極鱸蓴興可償歸期晩自計分手各茫茫臺上塞水波聲杳宫牆木葉深君王載戎服嵗晩過汾隂白纛風雲氣𤣥冥鴻鴈音稻粱猶有分軒冕竟何心秪放中原鹿翻田上苑禽憂時誰向道端合早投簮送人之金陵金陵吏隠去結綬興悠哉滄海東南奠長江巴蜀來白門萬栁樹嫋嫋接行杯晉室風流在猶傳謝傅才花繁佳麗地天近鳯凰臺秪憶鱸魚美鄉書旦暮回送李川父赴沔陽一杯燕市酒别爾意難平嵩嶽㝠棲客沅湘遊宦情南風吹錦斾遥度竟陵城吳楚兵初解鄒枚道自行如何歌郢曲秪以觸猿聲宣室思才子能無召賈生衛河集别去國心仍苦風塵病未休六飛淹嵗月八極想遨遊水動魚龍夕雲盤鸛鶚秋江山囘紫氣沙塞度青牛秪有簮萍戀聊為文字留遐心渺無盡寄與衛河流吳隠君山居吾慕漢隂老清修難具論兒童少機事麋鹿到柴門備見幽人吉還聞静者尊髙賢牀下拜龍虎鼎中喧古道日已逺仙風今罕存縣知出世意接手入湘源永陽方廣巖觀從兒戲入靈羊谷共有方巖志鳴橈入永陽山疑子午谷水是武陵鄉石室羅星漢風泉積混茫直尋前代迹多見昔人狂龍徳存幽側神功大晦藏㑹須乘白鹿莫倚過靈羊采秀青林杳看雲白業長儻逢蔡道者為彼出迷方贈鄭中丞二十韻皇道中興日關河氣鬰盤卿雲回栢殿麟趾出人間帝用徴良弼人今起謝安𤣥纁到滄海夫子罷黄冠眷注時難得才賢印不刓洪都開大府節鉞撫諸蠻舉目旬宣地知君涕淚繁囚梁脱虎口歸漢逺龍顔顚倒多方試悲悽九返丹匡廬留嶪屼彭蠡厭波瀾况値荆吳變何論土地殘主憂寜俟駕君出豈移山岊水思鈞候茶溪接露翰白頭吟不斷青眼逈猶看末分虚縣榻新詞議築壇同含九鯉日並考木蘭槃櫟社堪長棄龍沙㑹起蟠霞裾余獨引霄鬛爾難攀茅㧞多連茹時明且釣磻烟波去無極相報一綸竿送林待用司空四十韻海嶽開靈秘東南孕雋畸公才驚代出吾道要人為鸑鷟時希有珊瑚世共知郢斤森在手剛斧斫先枝王業尋常就天朝際㑹遲乃嬰喉下阨轉聼隴頭悲脉脉餐元命踆踆飾履綦經過盤錯遍展轉廟廊思直道淹黄髪餘生隨白鷖經綸一以巻霄漢欲何之霞外修靈氣槎邊立釣絲衆星還識斗百草秪如芝蜀道憂多壘王言召子儀星奔赴國難虚𢷬㧞梟旗雲鳥元相法風塵不自夷千秋誅白帝一笑下峨嵋物態疲衣狗年華變意鴯留侯乃辟糓尼父退修辭蘭渚煙波定雲莊嵗月馳寜云近耄耋忽漫致雍熈紫氣流金闕黄龍下玉墀君王是堯舜輔弼必臯夔三統収今日羣賢網在兹丹青得舟楫畋獵豈熊羆只簡先生去頻傳帝語來𤣥圭表錫望黔首視安危如此中興主那看後命推意成魚水合道在鳯麟羇鐘鼎人能鑄棟梁今不衰願聞歌帝力直擬察氓眉勲業青㝠潤文章後軰師眼青相見日心赤索居時魚綬身三傴龍泉手一提不成赴溝壑詎敢息鎡基岊水青陽逼滄溟錦䌫移永懐登藻鑑况惜别師資幽獨行將暮娉婷逈自怡長空古意澹落日壯心飛抱室誰同調彈冠此作期因風送黄鵠目盡五雲涯見蜚鴈凉風動沙磧朔鴈至紛紛為避隂山雪翻衝楚澤雲嗷嗷清作籟總總字成文意適稻梁得心驚弋彈聞時懸出塞夢肯妬下鞲勛逺媿青田鶴髙飛絶世氛寄戴仲鶡延平嗟爾投荒在十年歸鬂新豹文淹瘴癘龍節漸風雲徃事収殘淚清時録逺臣别深魚鴈濶迹久鳯麟馴余亦豐城物思君劍水濵客衣渾自浣不染洛陽塵寄時行憲副聞君靖百粤閒擁節旄遊鐃吹軍門静雲山開府幽飛書報谷口邀我入羅浮一自滄溟别長驚碧樹秋乾坤今始泰勛業爾應留儻遂丹砂計相尋海上洲書情十二韻毛生辭辟命王績遁人羣賢者詎可測醉鄉聊自云抗情干木石著論逼河汾而我風塵質依依愧所聞碧山隨舊業白日近浮雲殷道求伊傅周王化汝墳古風何契濶吾志底辛勤耻掉留侯舌羞稱管氏勛民窮思聖世身逺戀明君落日天西夢幽憂記不分龍蟠時必作鵬息氣方殷此意終難就吾將邁紫氛答人問滄海久作持竿客滄洲話獨眞潮聲雄度浙海勢側分閩星漢涵無地風雲變有神蜃樓開弱水鼇極斷河津失意歌漁父離羣憶古人惟應白鷗鳥浩淼得相親俠客行萬里金微道防秋世不同秦城時借㓂漢女嵗和戎落日吹楊栁沙塲恨未窮莫収張掖北復失酒泉東天子遑推轂將軍誓挂弓黄金装鴈轡白璧飾蛇􅪕覇氣天山雪邊聲瀚海風死生惟義激部曲總驍雄羌笛回青草燕歌感白虹營開月暈破戰勝賀蘭空直𢷬閼氏北横行沙塞中始知魏絳怯豈説貳師功洗甲蒲昌海揚兵苜蓿峰馳歸大宛馬一一渥洼龍賜邑連京洛圖形列上公男兒雪國耻不在藁街封寄題七峰隠居十韻棠陵書問至命我七峰歌我今雙鬂改其柰七峰何憶避吳趨㓂會遵孟瀆河眼深孫楚宅心激魯陽戈霜鏑干雲日霞居享薜蘿猶聞釣蛟蜃寜復畏湖波浩嘯蘇門誦名方海上科賢豪似爾少膏馥及人多芝菌盤霝洞山川抱曲阿吾將濟汝漢初路為經過岊山留别諸子握手情何盡為郎鬂已秋那為岊上别轉作秣陵遊賈傅狂唯甚王陽道必優時猶遇舜禹志竊慕伊周風斷黄金市雲愁白鷺洲從容赴散地一似卧林丘寳劍縁輕試明珠豈暗投經綸晩自計只漫釣魚舟哭朱侍御哭友魂初返兄今復訃音杞憂元不寐顔樂秪須尋江海投膠意乾坤攬轡心成言俱寂寞勝事竟銷沉邦國賢豪盡關河涕淚深瓣香與絮酒咫尺到山隂憶昔憶昔先皇帝黄金髙築臺劇辛自趙徃鄒衍復齊來今日風波事誰當砥柱材金雞還浩蕩黄雀總㳙埃久見文昌厄何論國士灾君看黨錮傳千古使人哀少谷集巻六
