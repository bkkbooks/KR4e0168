body:
  text: 少谷集卷二十一明鄭善夫撰論著一易論伏羲仰觀象于天俯觀法于地中觀人物真見得陽是實陰是虛故陽一畫中實隂二畫中虛乃見得天有日月之類是陽畫中自有陰陽地有山川之類是陰畫中亦自有陰陽日月山川之中復自有陰陽陰陽相生八卦成象衍為六十四卦天下萬有之理畢而無餘矣夫君子以趨吉避凶防微杜漸易其聖人至教也故曰君子用之小人勿用如姤之時五陽在上一陰在下小人雖微將盛之機也然其道未成其勢易剪時則必去之而後已杜其漸也至於二陰在下其惡已遂其勢已成在君子則有遁遁之時不可為也猶可去也至于三陰在下天地不交否之時君子將何逃乎亦惟守死善道完其志以俟命於天矣蓋聖人可完名則完其名可完身則完其身遇否則完其志而已如一陰在上五陽在下小人尊而無權君子盛而有助剪之易易矣五王不去武三思自為杌上之肉蓋不明於易之義矣堯舜最善用易堯舜盡聖人之權者也自羲黃以來相傳至堯舜物極必反之時也故丹朱商均皆不肖焉堯能祈天永命即禪之舜舜復能祈天永命即禪之禹以濟其否是分明奪天地造化而反之正者也故曰聖人贊天地之化育世道治常少亂常多謂何陽只一陰便有二五行之清氣本少濁氣本多今看一世天地山川之氣生賢才能有幾何顧是困知勉行成功則一人只是不學大抵是稟得精粹之人絶少也靜則觀其象而玩其辭象乾象也辭元亨利貞也動則觀其變而玩其占變變乾也占元亨利貞也邵子曰至哉文王之易其得天地之用乎故乾坤交而泰坎離交而既濟也乾生於子坤生於午坎終於寅離終於申應天之時也置乾於西北退坤於西南長子用事而長女代母坎離得位而兊艮為耦應地之方也震艮坎三男乃坤求乾各得一陽而成本皆坤體故多陰兊離巽三女乃乾求坤各得一陰而成本皆乾體故多陽乾下交坤於子坤上交乾於午是各反其所繇生也故再變為後天卦則乾退西北坤退西南不用震代父始事而發生於東方巽代母繼事而長養於東南也東者離之本位繇上而交坎於西再變為後天則退得乾位西者坎之本位繇下而交離於東再變為後天則退得坤位而少女兑少男艮為耦繇先天而後天此文王之易所以得天地之用也乾父也坤母也震長男也巽長女也坎中男也離中女也艮少男也兊少女也先天主乾父後天主震子統天莫如乾父主宰莫如長子羲文作易惟一陰陽也河圖之數一六二七三八四九五十相承者陰儀陽儀太極也主順行相生一六水生三八木三八木生二七火二七火生中央五十土五十土生四九金四九金生六一水洛書之數中五者參天兩地也戴九履一左三右七者陽數居四正也二四為肩六八為足者陰數居四隅也主逆行相尅一六水尅二七火二七火尅四九金四九金尅三八木三八木尅中央五十土五十土尅一六水此文王後天之圖以氣言坎離縱六卦橫流行之易易之用也帝出乎震震東方雷動萬物萬物出也齊乎巽巽東南風撓萬物萬物齊也相見乎離離南方火燥萬物萬物皆相見也致役乎坤地也萬物致養焉説言乎兊兊正秋也澤説萬物萬物咸説焉戰乎乾乾西北陰陽相薄也勞乎坎坎北方水潤萬物萬物歸之成言乎艮艮東北也萬物成始成終也洪範論洛書之圖戴九履一左三右七二四為肩六八為足中央之五謂之皇極天三地二圓故三方故二合而為五也一五生三故四方四維其數皆十五也天一生水地六成之地二生火天七成之天三生木地八成之地四生金天九成之天五生土地十成之此以才質言也若論五行則天初生水五行具矣生火者凡有開明處即火也天一三五七九則五為中地二四六八十則六為中地不言十者十即一之變也故洛書用九河圖用一各以三乘之積八十一則六千五百六十一之數具矣九九圓數配一年八節冬至在九九一一之間所以黃鍾之宫為中聲蓋陰陽始終合尖之處也二二立春三三春分四四立夏五五夏至六六立秋七七秋分八八立冬猶天左旋是以日行黃道二十八宿躔次皆因之與易圓圖相類易始一陽來復即九九一一之間也始震而離而兊而乾畫卦自乾至震今自震起所謂數往者順也由乾而巽而坎而艮而坤畫卦自巽而坤所謂知來者逆也洪範方數與易方圖亦相類皆陽起西北陰盡東南也闕八十一字前輩皆無解看來只是明時以七十二候分配八十一圖之中如潛次原守次潛信次守直次信之類而以墮終終之亦猶孔子序卦之意也理數闕微之起也理氣形微之顯也理數微於闕理氣微於形數生知所來死知所去者數之始終蔡子曰陰陽五行其體而用用而體者耶渾渾淪淪而出入異門繩繩井井而形色俱泯合之而異析之而同微之而顯充之而不窮夫變化者陰陽之屈伸消長也非二則不能久非一則不能神一者形氣之元也極也極無不中也一藏於二二藏於萬形氣則有偏也此所以有善惡失得之分吉凶禍福之著也河圖體圓而用方聖人以之畫卦洛書體方而用圓聖人以之敘疇卦者陰陽之象也疇者五行之數也象非耦不立數非奇不行奇耦之分象數之始也太玄以奇為象經世以耦為數多窒而難通矣象以耦為用也有應則吉數以奇為用也有對則吉象者靜而之動也數者動而之靜也成形者陽也成性者陰也陽者數之生陰者象之成陽以三至陰以倍乘生生不窮各以序升闕順性命之理也一為水而腎其德智也二為火而心禮也三為木而肝仁也四為金而肺義也五為土而脾信也順數知物之所以始逆數知物之所以終數物非二體始終非二致洛書數九而用十何也十數之成也數成而五行備也數非九不生非十不成九以通之十以節之九者變通之機十者五行之敘也方隅對待中五含而十數已具於九數之中矣以見圖書之相為經緯也朱子曰天數中於五地數中於六天有陰陽故二其五為一十合三與七一與九亦十也地有柔剛故二其六為十二合四與八二與十亦十二也十為干十二為支十干者五行有陰陽也十二支者六氣有剛柔也五行六氣實一氣也五行在天為五氣雨暘燠寒風也在地為五質水火金木土也天五氣雨暘質也地五質水火氣也天交於地而雨暘為質地交於天而水火為氣變者陰陽之正也三不變者陰陽之雜也洪範九疇解洪大也範法也疇類也言治天下大法有九類也一曰五行水火木金土此天之氣行於地者也二曰五事貌言視聽思此天地氣質畀於人也三曰農用八政食貨祀司空司徒司寇賔師農阜也四曰協用五紀嵗月日星辰歷數協合也日行不及天一度月行不及天十三度天無體以二十八宿為體日每至三十日不及天三十度月來會其下則月體無光故謂之晦朔蘇也月遲則漸有光故謂之朔每年會十二次會處謂之辰無星處為辰日晦十二辰十月晦在寅十一月晦在丑之類五曰皇建其有極皇極大而君臣父子小而事物細微皆是六曰又用三德正直剛克柔克又治也七曰明用稽疑明辨也兆為雨霽蒙驛克卦有貞悔貞事之始悔事之終陰陽皆少而無動則內卦為貞外卦為悔陰陽或老而有動則以遇卦為貞之卦為悔八曰念用庶徵雨暘燠寒風五氣有時不時為休咎也九曰嚮用五福威用六極嚮向也威畏也五福夀富康寧攸好德考終命六極凶短折疾憂貧惡弱九九相乘成八十一數共六千五百六十一一一至一九一一冬至二一至二九二二立春三一至三九三三春分四一至四九四四立夏五一至五九五五夏至六一至六九六六立秋七一至七九七七秋分八一至八九八八立冬九一至九九數始於一參於三成於八十一備於六千五百六十一數之大成也一數之周一歲之運也九數之重八節之分也一一陽之始五五陰之萌三三陽之中七七陰之中二二陽之長四四陽之壯五則陽極矣六六陰之長八八陰之壯九則陰極矣一九首尾為一者一歲首尾於冬至也此蔡子凖洛書之象起數也大數猶卦也小數猶爻也大小數之中各有大小數如大數一之一上一大數下一小數也小數亦然從卦數起爻數得時皆從吉字起以下圖加於上圖之上卦大數左而直卦小數右而橫如一之一上一字管小數之左一至九皆直看下一字管小數之右一至九皆橫看填吉凶災祥餘以類推五數不同自五一至五九左皆平者大數五字管攝之五得數之中也右同前惟五之五不同大小數皆得數之中也左直既平矣右橫如一吉則化九凶三祥則化七災八休則化二咎六悔則化四吝而為平也洪範數補敘範數也數者理之具也時之因也繫之辭焉所以告也定之吉凶所以斷也九疇者總其綱也九九者衍也六千五百六十一者數不可窮也八節之分也七十二候之備也嵗之終始也陰陽之迭運也年月日時者而各專其用也餘而闕也吉凶災祥休咎悔吝平者緘其變也所闕易有八卦九疇之符也九九者六闕者比其體也數者效乎爻也釋辭闕也者極于精不可窮者通乎變不可闕者妙乎神廣大悉備引伸觸長天下之能事畢矣蓋所以因二而濟民行也易更四聖而闕之數待九峰而著然釋數之詞缺而弗偹蓋開端而不竟余生後四百餘載貫于嵗月乃率辭揆方僭敘所得用蓋其缺辭盡而理無涯數定而意也不可語神而明之默而成之惟無沈心者得之嗚呼易傳而範不傳天地之數久藏其祕道蓋未昭也千古一心其有來世之俟焉序數傳二至者一嵗之樞紐陰陽之肇也萬物原於陽而終於陰冬至陽生萬物之原故原數始焉夫物之始其潛于下故受之以潛陽乃曰潛氣漸闕以漸長也濳藏也物藏不可不守故受之以守守不可不信故受之以信信者實也所守闕直則陷於偏邪故受之以直過直則闕故受之以蒙蒙者物之稚也稚物所當間故受之以間間闌也闌物必有所欲故受之以須須者須所欲也過欲必危故受之以厲知危懼則有成故受之以成物成而動故受之以沖沖動也動必振于外故受之以振振者奮也奮振必有求故受之以祈祈求也所求不可越其常故受之以常常者所當順也故受之以柔柔順也順常則不為苟難故受之以易平易近人然後可親故受之以親親者歡以相愛也相愛必文以相接故受之以華華文也文著見故受之以見既見則天下文明道無不獲故受之以獲獲者得也得人以相從故受之以從從則有交之道焉故受之以交既交必育故受之以育育長也既長必壯故受之以壯物壯而興故受之以興興起也物興起而欣欣然故受之以欣欣者情必舒故受之以舒舒徐也敘也敘必相比故受之以比物不可久比故受之以開既比闕晉故受之以晉晉進也進不苟故受闕一一者益也故受之以益益而後闕故受之以章章明也明則益以盈故受之以充充滿也充滿不可以自私故受之以鍚錫豫也益以錫豫則人心靡然故受之以靡靡偃也人心偃靡所從者衆故受之以庶庶不決則黨故受之以決衆決則恱故受之以豫豫恱樂也恱樂而升故受之以升升者進于上也陽之極也陽極于上無不中也陽已極而陰萌焉夏至時之中也故受之以中過中陰之伏也故受之以伏陰而曰伏氣漸于終道將否也伏匿也匿必有過故受之以過過愆也愆過則疑故受之以疑疑則失衆故受之以寡寡過則暗而日章章飾也故受之以飾飾文也文過必自戾故受之以戾戾必不情故受之以虛理虛則昧故受之以昧昧則有損故受之以損損過以用中故受之以用過用則退故受之以却却者退也退不可闕故受之以翕翕聚也聚以致逺故受之以闕不可不奮故受之以迅迅於逺不可闕故受之以懼有懼必當去故受之以除除闕必弱故受之以弱弱者氣失其平故受之以疾疾之不已必爭故受之以競競則必闕故受之以分分而失均必訟故受之以訟訟不可長故受之以收收斂也物斂則就實故受之以實實者誠也誠則能以禮下人故受之以賔賔而弗穆必危故受之以危危者自髙而懼也懼危則自堅故受之以堅堅剛也金剛則革故受之以革革以通天下之利故受之以報報者禮也禮必有所止故受之以止止亂莫如戎故受之以戎起戎者怨之結也故受之以結結聚也聚必有養故受之以養養以致用故受之以遇遇合也合而必勝故受之以勝勝者俘其囚也故受之以囚囚敵也勝敵則能任故受之以壬壬任也壬者水居萬物之歸陰之極也陰極闕固也故受之以固久固必遷故受之以遷闕墮故受之以墮墮復于下冬至之半闕終也故受之以終終焉蓋始終一歲之成也田制論賦稅之法所以出財以供國用也賦者所以給車馬兵甲士徒賜豫也稅者所以供郊廟社稷奉養祿食也十一而征則其供也易征及商賈與虞衡者抑浮食也宅不毛出里布地不耕出屋粟人無職事出夫稅家稅者罪其惰也嵗役不過三日者愛其力也禹畫九州制五服任土作貢畿內五百里曰甸服外五百里曰侯服外五百里曰綏服外五百里曰要服外五百里曰荒服殷分百里內曰畿以供官千里內曰甸以為御千里外曰流設方伯以為屬公田藉而不稅七中而助周分九畿方千里曰王畿外曰侯畿貢祀物又外曰畿甸貢嬪物又外曰男畿貢器物又外曰采畿貢服物又外曰衛畿貢材物又外曰蠻畿曰夷畿要服也貢貨物又外曰鎮畿曰藩畿荒服也一見貢寶玉周制任事有等任農以耕事貢九穀任圃以樹事貢草木任工以飭材事貢器物任商以市事貢貨賄任牧以畜事貢鳥獸任嬪以女事貢布帛任虞以山事任衡以澤事各貢其物又因其比鄰以五人為伍五伍為兩四兩為卒五卒為旅五旅為師五師為軍以起軍旅以作田役任土所以紀地宜也分五服設九畿所以别逺近也為伍所以知衆寡也因井廬以定賦稅農圃工商牧嬪虞衡之人皆因其所工不求其所拙也履畝紀于魯宣者履畝而稅也宣公無恩信於民民不助力於公田故履畝按行擇其善者稅之穀梁曰私田稼不善則非吏公田稼不善則非民稅畝雖十一悉其民矣魯成作邱甲者使邱出甲也周禮九夫為井四井為邑四邑為邱邱十六井出戎馬一匹牛三頭四邱為甸甸六十四井出長轂一乘戎馬四匹牛十二頭甲士三人步卒七十二人此甸所賦成公使邱出之重斂也魯哀用田賦者一井之田斂其財物也言用田賦者若漢家斂民錢以田為率矣公田不過十一軍賦十井不過一乘哀公外慕強吳空盡國儲故復用田賦過什一矣漢武置平糴立均輸起漕運興鹽鐡開鬻爵設𣙜酤收算緡納雜稅造錢幣雖經費獲湍民無聊矣散淳朴之風成貪叨之俗自此始矣租庸調之法嵗庸二十日既免其役日收庸絹户丁一尺夫庸者猶古嵗庸三日之名調户丁摹倣井田調發兵車之名然去古逺矣租者蓋屯田之法古者以逸制敵內無亡費之利外有守禦之備自漢昭遣人屯田張掖之復趙充國破先零屯浩亹鄧艾滅吳屯淮潁歷代因之皆得其利今之屯田其名雖存其法盡廢守屯之卒與農氓無異其官亦但知了賦稅而已更不知屯以用兵一旦有寇興師費財屯田實無補尺寸失古者屯田之意矣甚至爭民奪利祗為民害愚意屯田之法不復不如無屯九章乘除法乘者自尾而首歸除者自首而尾一曰方田以御田疇界域二曰粟布以御交質變易三曰衰分以御貴賤廩稅四曰少廣以御積羃方圓五曰商功以御功程積實六曰均輸以御逺近勞費七曰盈朒以御隱雜互見八曰方程以御錯揉正負九曰勾股以御髙深廣逺九歸法一歸不須歸其法故不立二歸二一添作五逢二進一十逢四進二十逢六進三十逢八進四十三歸三一三十一三二六十二逢三進一十逢六進二十逢九進三十四歸四一二十二四人遇一數每人得二十餘二未分寄下位四二添作五四三七十二逢四進一十逢八進二十五歸五一陪作二五二陪作四五三陪作六五四陪作八逢五進一十六歸六一下加四六二三十二六三添作五六四六十四六五八十二逢六進一十逢十二進二十七歸七一下加三七二下加六七三四十二七四五十五七五七十一七六八十四逢七進一十逢十四進二十八歸八一下加二八二下加四八三下加六八四添作五八五六十二八六七十四八七八十六逢八進一十逢十六進二十九歸各隨身下加逢九進一十問一萬二千三百四十五兩六錢七分八釐九毫二人分之各得幾何答曰每人得六千一百七十二兩八錢三分九釐四毫五絲二因還原問前數三人分之各得幾何答曰每人得四千一百一十五兩二錢二分六釐三毫三因還原問前數四人分之各得幾何答曰每人得三千八十六兩四錢一分九釐七毫二絲五忽四因還原問前數五人分之各得幾何答曰每人得二千四百六十九兩一錢三分五釐七毫八絲五因還原問前數六人分之各得幾何答曰每人二千五十七兩六錢一分三釐二毫五絲六因還原問前數七人分之各得幾何答曰每人一千七百六十三兩六錢六分八釐四毫不盡一絲不盡的不用因七因還原問前數八人分之各得幾何答曰每人一千五百四十三兩二錢九釐八毫六絲不盡二忽八因還原問前數九人分之各得幾何答曰每人一千三百七十一兩七錢四分二釐一毫九因還原右乘除總式問錢二萬五百二十文每米一石價四百五十文該米幾何答曰該米四十五石六斗右粟布法問四方田四靣各一百二十六步為田幾何每一步六尺每畝二百四十方步答曰得一萬五千八百七十六步該六十二畝一分五釐問畹田下周九十九步徑五十一步為田幾何答曰周徑相乘得五千四十九步四歸而得一該一千二百六十二步四分步之一以畝法二四歸除之得五畝二分五釐不盡二步四分步之一問四不等田東四十二步西五十六步南六十四步北五十八步為田幾何答曰得二千九百八十九步該十二畝四分五釐四毫一絲右方田法問勾股假令縣燈準日月于直路之南不知髙逺各幾何却就直路之北逺處設一木表髙一丈二尺得燈影一丈五尺又退近處設一木表得燈影一丈兩表之間地二丈五尺間北表燈影盡處至燈下地逺幾何燈縣去地幾何答曰逺九丈髙七丈二尺何也前影一丈五尺後影逺二丈五尺地只得一丈即以餘數五尺為法除之退三表位則前影盡矣又以表間地三丈乘之共七丈五尺并前影一丈五尺故曰逺九丈也逺既九丈矣以前影一丈五尺除之退六層表位而九丈盡却以表間一丈二尺六層乘之得七丈二尺故曰髙七丈二尺也餘以類推右勾股測天法演禽法角木蛟亢金龍在辰氐土貉房日心月狐在卯尾火虎箕水豹在寅右東方蒼龍七宿天之東陸也斗木獬牛金牛在丑女土蝠虛日鼠危月燕在子室火豬壁水㺄在亥右北方玄武七宿天之北陸也奎木狼婁金狗在戌胃土雉昴日雞畢月烏在酉觜火猴參水猿在申右西方白虎七宿天之西陸也井木犴鬼金羊在未栁土獐星日馬張月鹿在午翼火蛇軫水蚓在己右南方朱雀七宿天之南陸也日宿例一元虛二元奎三元畢四元鬼五元翼六元氐七元箕時宿例日月火水木金土虛鬼箕畢氐奎翼七元每元七曜移一位如一元日在虛是子時二元日在鬼三元日在箕也一元月在鬼是子時二元月在箕也餘以類推將星例甲子己卯甲午己酉活曜例凡起天禽實有從日烏月貉火狼中水蛇木鼠金羊上土宿常從箕上逢推時禽泊處吉凶例日午月未火寅水甲木亥金己土申乾支上順數山水田園井刀砧草岸風湯火占法二月十二日丙子宿值氐土貉他禽箕水豹他禽是翻禽所得他禽月將星三元甲子畢月烏辰時值翼火蛇我禽泊在子上角木蛟我禽是活曜所得天禽凡占看授時歷本日二十八宿值何宿即慿其宿看屬何禽七曜中何曜假如曜屬土憑土字就翼上起一元是翼二元是虛三元是鬼緣本日將星是三元故用鬼就子上起時鬼具一子時順數到辰時是翼火蛇是我禽也即將將星畢月烏就辰上順數尋時禽翼火蛇泊在子上就子上逆數至辰是箕水豹是他禽也又用時禽火字取活曜奎星就寅上逆數尋時禽至寅上是翼即翻倒順數至辰上是角木蛟是我禽也又推泊處吉凶時禽是火就寅上順數至泊子處是陽則泊不得其所也大要要時禽伏日禽天禽伏地禽為妙奇門遁甲法天有三奇乙丙丁六儀戊己庚辛壬癸人有八門一休二死三傷四杜五開六驚七生八景範數一吉九凶洛書之數也甲者太乙人君之象十干之首常隱於六儀之中故名遁甲天有九星一天蓬坎水二天內坤土三天衝震木四天輔巽木五天禽中土寄於坤位六天心乾金七天柱兊金八天任艮土九天英離火三奇者何蓋甲君象所畏者庚庚為七煞之讎也甲妹之乙妻於庚能救甲故為乙奇甲木生火男丙女丁火能尅金庚故丙為二奇丁為三奇奇以日月星名日為萬木之華陽精所成也乙屬木故曰日奇丙丁火俱南方離明之象月行南方中星考於南方故丙曰月奇丁曰星奇以其有照臨之德也五陽時者何甲位既尊戊位同之乙丙丁為三才故甲乙丙丁戊五陽時善神治事為吉也戊之同甲者如一圖甲在一位戊亦在一位二位亦在二位也九星配各方之色一貪狼白二巨門黑三祿存碧四文曲緑五亷真黃六武曲白七破軍赤八左輔白九右弼紫奇門十八局一局為一圖自冬至至芒種陽遁為九圖自夏至至大寒陰遁為九圖地盤安八門八卦九星三奇六儀其八門永為直使天盤九星三奇六儀其六甲為直符其六儀三奇為年月日時之干以直符加臨其上人盤八門為直使加臨太嵗月建正建寅日辰干支處又定有九天九地太陰六合玄武白虎騰蛇依直符加臨地盤不動天人等盤隨局轉移加臨既畢乃看圖之所載何方得吉門三奇得使不得使看星門反伏吟丙背庚格擊刑入墓門迫白虎騰蛇朱雀青龍等格不陷方可用陽遁冬至後十二節逆奇順儀陰遁夏至後十二節順奇逆儀皆主時干而論如陽之一局甲在一則乙丙丁三奇逆為九八七戊己庚辛壬癸六儀順為一二三四五六如陰之一局甲在九則乙丙丁三竒順為一二三戊己庚辛壬癸六儀逆為九八七六五四是竒儀之順逆而甲戊之同位可見矣十二宫一長生二沐浴三冠帶四臨官五帝旺六衰七病八死九墓十絶十一胎十二飬金木水火土甲子直符加三宫甲戌加二宫甲午加九宫甲辰加四宫甲寅加四宫皆是六儀刑擊乙加甲戌甲午丙加甲子甲申丁加甲寅甲辰為得使三竒遊旺地故乙天居未庫丙居戌庫丁屬火金居臨官宫接氣超神法神日神也氣節氣也詳見竒門歌衣上古穴處衣毛未有制度後代以麻易之先知為上以制其衣後知為下以制其裳衣裳始備黃帝堯舜垂衣裳蓋取諸乾坤故衣玄而裳黃旁觀翬翟草木之華乃染五色始為文章以表貴賤而天下理虞書曰豫欲觀古人之象日月星辰山龍華蟲作繢宗彞藻火粉米黼黻絺繡備十二章夏殷之代相襲無變冠上古衣冠帽皮後代聖人見鳥獸冠角乃作冠纓黃帝造旒冕始用布帛唐虞二代無文至周六冕章數始備黃帝作冕垂旒目不邪視也充纊示不聽讒言也却非冠却敵冠幍葛巾車上古聖人觀轉蓬而為輪輪行可載因物之生復為之輿輿輪相乘流運無極任重致逺以利天下考工記曰一器而工聚焉者車為多上蓋為規象天二十八橑象列宿方輿象地三十輻象一月前視則聼鑾和之響旁觀則睹四時之運等威既辨貴賤有序故書曰明試以功車服以庸人皇乘雲駕曰抵五龍氏乘龍上下以理黃帝作車少昊駕牛陶唐彤車虞鸞車夏鈎車殷大輅亦曰山車亦曰金根車周五輅一玉輅樊纓十二就建大常十二斿以祀二金輅樊纓九就建大旗以賔同姓三象輅樊纓七就建大赤以朝異姓四革輅樊纓五就建大帛以即戎五木輅亦五就建大麾以田秦滅典籍舊制多亡因金根車為帝軫玄旗皂斿以從水德紀里鼓車白鷺車鸞旗車辟惡車耕根車一曰芝車魏建赤旗以藉田鼓吹車上施層樓四角金龍銜流蘇羽葆凡鼓吹陸則樓車水則樓船在殿庭則書筍簴為數上有翔鷺棲烏梁制也象車黃鉞車豹尾車周制也象君子豹變尾言謙也軍正用之淮南子執豹皮以正其衆建華車少谷集卷二十一
