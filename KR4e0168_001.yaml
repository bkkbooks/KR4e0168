body:
  text: 少谷集卷一上明鄭善夫撰騷泛太湖望洞庭太湖風兮白波瞻望洞庭兮森雲蘿擷杜蘅兮水中吊范蠡兮山阿目盈盈兮不極美人逺兮奈何渺豫懷兮夕陽聽不可兮吳歌鳳山辭義興杭世卿厥父省齋厥母王將即于鳳山故宅為作鳳山辭一闋夫唯山之效美兮紛衆萬之淑祥有振振之令鳥兮絢采采之文章涓髙梧以營室兮口卒瘏而周皇殷九苞之未誕兮軒逺翥而求凰陸海邈其伏陰兮屏爾類以自臧大網結于中野兮二苞格而鳴岡徙阿閣于戾止兮披晨曦之耿光慨祿運之倐窮兮翳沖漠而遙翔奇氣宕于六天兮毛衣委于故邦羣鴟倨以自邁衆息下其如僵茍靈光之弗泯雖捐性其奚傷誶曰豫悲夫雲和之曲卒不續兮顧此鳥之永遺豈四靈之不有兮世蓋溷之以蝘蜓與螽斯賦大風賦繄大塊之噫氣兮駸獨藴此颶風蓬蓬而起於北海兮乃震蕩乎四窮硿礲礲如雷霆之行地兮萬鳥噪而不集神龍孽螭赫然怒兮霖雨沛其來下使海水而立雪山兮何舟楫之能持神禹之不可思兮令陽侯而不來崩龍門而亥峽兮浪滔天而不泄也天地忽而變此容色兮將何物而不拆也哀萬物之肅殺兮夫誰而能遁之何皇天之好生兮漠乎余將問之東園之樹兮爾自今其蕭條小者拆而大者傷兮豈天命之已當飛砂走石兮日慘慘而無光氣矇翳而不長兮余蓋疑此洪荒昔堯舜之在上兮乃令九年之洚水將聖明之撫運兮亦丁乎歷數之陽九惟德弭變兮念天心之至仁神武之誅暴兮氣至極必淜而四出凛霜冬沍兮中實藏此陽春余悲乎松筠與桂叢兮實余私之所鍾且日就于沮傷兮何時蓊鬱而余同亂曰天時有序君子之常君子齊德備此耿光分外之事余何計量修彼墻屋葺我室堂天下廣居猗爾樂康愍竹賦嘉靖癸未秋日載矇具風破條震蕩逾旬余桑苧園有竹數叢老幹新篁日見凋拆余甚悲之無是君子相殘之應也感而賦之余索居而寡儔兮卧桑梓於汭濵開三徑以候益兮洵有志于古之人感枤杜於周詩兮胡賢者之我親樹篔簹以終畝兮修孔氏之四鄰抱嶰谷之古音兮持至和以為度埀纍纍之懋實兮鵷苞式其來下篁翛以脫籜兮具衆美之攸同日比德而連類兮竊獨葆此歲寒何終風之戒木兮悵獨食此險艱繽衝條而折柯兮連宵昕其不伏何金玉之琅琅兮乃變此殺伐之餘酷皇天震怒茍罔不摧折兮松柏則介而獨留余悲夫同類之相攻兮况復值此凜秋麗洵美於三益兮遡前古而則爾吾清明之內懼兮蓋君子而相詆嗟芝蘭之難榮兮荆棘麗而附資縱向背之匪同好兮不愈於槿蒺之與菉葹誶曰皇天之罔攸好德兮自叢桂而伐之楩楠之十圍兮風拔之矧此懋節兮非濁世之好也豈細德之不可崇兮嗟未聞此道也四言古詩古戰場朝發汾河暮經白溝茫然戰場四時為秋黃雲厄關壯士不憂拔劍斫地戰骨無收風沙冥冥髑髏嘯歌鳥飛不下客行奈何世無凰麟龍虎鬬爭誰哉弄丸四海解兵菖歜二章贈孫太初山人菖歜蔥蔥在彼澗濵歲茁九花世人不紉祕之潁谷以俟雲君念彼菉葹蒼蒼廣津其二菖歜青青在彼原隰歲茹九節可以絶粒華滋寂寥爾乃獨立世無神皇鳳衰麟泣野田黃雀行􅛺􅛺黃雀集彼榛柯上有鷙鳥下有虞羅低飛不可髙飛奈何曷不去此野田有禾鵬雛搖搖隼則制之兔罝纎纎鴻則罹之龍潛在淵可以全身壤蠖不屈何以引伸朱鳳威垂稠羽是依鴟梟化之矰弋安施梁之石操上楊國老梁之山兮嶽嶽其砥石之磐磐興雲及雨膚合之施其誰弗被立天之中君子不匱天常西虧地亦東潰我不爾奠曷其有位大皇時行大浸時滋懷貞用敦君豫以幾夢井歌二章有引昨夢井水溢地上甘而泄列於荒墟心惻然也占曰井水溢施弗窮也甘而泄用適中也泄而不食道弗庸也明王已興而列諸荒已焉哉作夢井歌井之京京其出淵淵汔至不繘謂我叵泉甃如幕如我夢乘如寤懷載且維以永戲其二井之淵淵爰是用汲王明王明受此戩福泄而不食於井何傷君子之履不遷其方白泉二章贈汪希周湔湔流泉行彼地中燦為星宿麗爾雲空萬殊之母直遂涵𢎞賁以正本蒙以養功君子果行丕顯其逢其二湔湔流泉㶁㶁濫觴積為江漢博大以剛彼王者明受福無疆神龍所都厥澍載滂君子利用何往弗臧少谷集卷一上欽定四庫全書少谷集卷一下明鄭善夫撰五言古詩飛龍引採銅鑄寶鼎煉作九還丹服食壽長生長生千萬年白日跨飛龍宸遊上九天如何鼎湖路一去無時還君子貴返終仙術諒非難方士費論説彼心詎能安秦皇與漢武黃土髙巑岏遊莆中麥斜巗陵坡回燠風楸枰淨如沐戒言尋浩渺聊以散沈鬱况兹二月半芳草萋以緑青霞媚遙天烏巾入殊俗􅋂崎麥斜巗幽人有髙足懷賢招艾軒探真小樵谷世緣夙已斷碧嶺不可辱君看南昌尉去去從所欲其二麥斜何嶄嶄兹遊愜心魂石洞入窈窕不説桃花源白雲走平地崇岡亦崩奔松篁翳重陰境幽判寒暄天關手可摩始覺所歷尊赤城去不逺玉禾行當蕃相期馬子微於此採靈根登雲居山二首貪清不自愛歷歷疏逺目緬懷雲居勝駕言陟層曲樛枓遁斧斤岐徑積朴􅈪雲棧紛當心不敢輕落足捫枯驟戰兢披荆逾匍匐尫羸無奈何况復迷浚谷雖無夔莘警詎測蜒蚿伏少焉青霞深轉思白日速山海信偉觀何以慰彳亍我行孰驅迫自致窮途哭伯陽不出門世路了如燭願昭籛子誡或免華山辱其二摉奇頭欲改禹穴未得傍忽慕麥斜巗玄境足佳況連峰削芙容石門天下壯篔簹復修纎天聲落屏嶂雲居獨奇絶遐思愈飛揚以兹發髙蹤力欲排雲上百息徑嶮艱一眺極沆漭鵷鸞稅仙驂芝蓀洗凡狀試按山海圖一一皆不妄雖然羸瘵成已過平生望應悲蜉居子兀兀坐盆盎吾將從盧敖直與雲露抗西凌崑崙風東薄滄海浪前期邈悠悠拊膺以惆悵下何嶺雲居不可升塞型眇天上諷然下何嶺歘若墜青嶂數日愁險艱及此愛平曠林墟相維亘川原亦排蕩春容麗華滋百草不相放躊躇谷鳥喧坐失青藜杖山中勝事繁林叟重揖讓豈無山水癖筋力故莫強栗里在人境君子有末尚溪上南行遵溪滸流景何楚楚溪毛繡藻蘩遊魚聚相喣錦石亦參錯緑髮明可數小者如卧羊大者如伏虎飛湍所磨蕩兀兀自太古叢薄交深春不但蔚榛楛兹遊倦登陟到此一延佇況有令主人意氣不為忤擔囊輕百里一一適我所春花未終極豈即懷故土錦江非不佳人情薄如楮西遊杜陵老安得免愁苦復晴趨仙邑晴光蕩遊目一雨山逾碧翛然戒晨征乃爾騁雙屐修林靜宿氛故術沒行迹僕夫重逺路賤子有奇癖南循抵仙城北放蘭阪陌波嶺行有需朋曹意安極我生無漫遊允得就三益古意三首蓬門霜雪繁玉顔苦禁當稍識春風面春風轉斷腸其二蠶盛不理粧露采陌上桑但知織作緊不覺年貌傷其三寶鏡皎如月價值千黃金偏照可憐色不照可憐心井泉子客有羅浮君羽衣行翩翩長揖謝世事鍊性三十春沆瀣不滿口貌如藐姑神問道廣成子空同髙嶙峋挂瓢椅樹枝振舄天風門朅來弔延陵晤言東海濵示我紫尸術挺身入層雲誓將結瑶華引手長相親子夜吳歌九解贈殷近夫郎今落海濵儂亦可憐身不見昌陽草何曽生要津一解儂身不下堂郎居隔江水雖則隔江水思心日萬里二解昔别於何時十載參與商豈是無所見狼嘴夜夜張三解夜夜撫素琴惻惻生怨慕枯桐在膝上梧子在何處四解融融四五月婉婉采蓮女海上無芙渠誰則識蓮子五解低頭摘荷葉舉頭看月光歸來覔剪刀為歡製衣裳六解終日對海棠終夜不成寐何以不成寐花開儂獨自七解登樓看雙星蜘蛛在樓角綿綿腹中絲求匹不能得八解歡去一何久歡來一何晏來時何所贈雙雙雲錦段九解吳中吟二首出自吳東門遙望姑胥臺望久無所見回風慘蒿萊圖王志未就神木生劫灰三復春秋傳英雄使人哀其二越女進館娃楚囚落天涯二物不並立海水漂鴟夷湛盧南入郢神物竟先知吳宫八百年旦夕遊鹿麋緬晤喪亡主豈盡庸以􅀈冬日同顧九和殷近夫孫太初顧與成泛太湖震澤夫何如歲晏意自好天風吹玄冥雪浪入浩溔黿鼉浮山嶽白日搖晴昊洞庭渺林屋流水隔煩惱昔有緑毛翁於此採玄草風雲白石牀鬼物為持保聞兹長道念攜艫事幽討平生竹溪逸矧是同懷抱相從捫緑雲坐聽啓鴻寶終當吸沆瀣去去遊亭纛江上送殷二秀才覯子在逆旅失子在歲晏一似南飛鴻一似西歸燕繁露戾修林終風捷如箭過翼趨所期殊方卒相見物情異冷暖人事阻華面遲余玉門春子復冗梁殿元日東君御征轅玄冥迅回車溫風倐爾至古梅茁其葩桃户新受符蓼盤香團芽感此念故里兼之懷年華炙蠣洽弟兄問歲話桑麻二期走逋旅簪紱生嘆嗟坐兹失初服五內長負痾兔窟有冗狐凰木亦棲鴉悟機貴在蚤勿令負雲霞放舟荆溪尋張公洞不果歸至滆湖起步長橋望煙景放歌日晷于東馳羇人復北征鼓舠下荆溪言訪張道陵緣薄扼事艱意短回修程稠年戒襟素履兹荒志誠坐令紫霞居逺隔於青冥所賴滆湖好煙景疏天聲躞蹀騁瞻眺稍慰滄洲情青鏡不肯私金精幾時營寓形若流電空懷紫金經河上送鮑使君柔風協河洲回飈被泗瀆賢軺指玉衡過門不停軸結交何所將解我雙英瑴豈無錦繡段感彼並朽藗希君復自愛勿使輶出櫝貧女吟八解南陽有貧女抱甕立水澳趾短泥濘修挽衣以彳亍自言良家息淪躓類草木亦知奉壼範誰與周煢獨一解煢獨誰與周室中無儲遺閉户理機杼苦樂中自知揚聲度昏旦粃糟轉無時豈不愛綺羅乃有杼軸悲二解杼軸曷足悲感往思維谷三年喧格鬬肉骨不可贖非無好里閭處子有約束失時當告誰甘此守饘粥三解東鄰有嫠婦宵旦當户哭良人淹戍邊存否不可卜近聞邊釁起百萬化魚肉生離云有期死别竟何續四解西鄰亦送女夫壻輕薄兒朝捷忘歸矢暮挾青樓姬床頭合歡被桁上嫁時衣悠悠百年思采菲生怨咨五解南村有棄婦曩亦誡雍肅夫君心不同入闥轉見逐白頭且勿唱緑髮頓空谷榆蒲悴髙秋却怨飄風速六解北里多豪華服御紈與綺張幕集權貴炮熊炙文鯉妙舞雜燕趙徴歌遍梁楚豈無良蹇修妾心自不爾七解鳳凰棲梧桐下食青琅玕鴟鳶嚇腐鼠但識彼所歡人情競刀錐豈識達士賢庭槐鳴周周微音向誰宣八解義鳩篇端居肅元府永惟玄化機神理罔有忒衆萬詎能違翔植紛總總氣感率有知無論大聖狂咎休固其宜荆茂于義音烏馴以孝思細德亦鼓物而况鳳與麒戒言彼狡童胡自決德基達人上內植履祥復何疑贈黃肇三首終風徑柔條遊子返故鄉兄嫂糝藜羮慈母縫衣裳離觥載恓惻平旦天一方來忘楚塞逺去覺閩山長其二來如秋空鶚去似春泥蠖春泥何淤沮百足進復却人情鄉邦好歸客何蕭索室堂雍婉孌殊方信不惡旋飈掠檣烏骨肉臨當坼其三上林未揖讓廣莫進癘瘴大江不可踰坡陀莽翻蕩入門報所親何以慰惆悵庭萱𬎼有永塞鴈宛相望夏日闕庭見鶴景風薄梁殿銅雲遞玄虛侵星不櫛髮入直承明廬朅來雙白鶴蹌蹌下彤除竦身舞飛容揚音結長吁物情含所因悲鳴胡為乎曰余覽幽經靦爾情不舒霜毛麗藻質豈受泥水汚內飫土木氣外有金精敷盜泉非吾願腐鼠安足圖緬惟玄圃驂乃是青田雛言兹非世畜何以羈此都誤入燕雀網遂被樊籠拘委質太液池昻藏狎鷗鳬崇朝受餅餌向夕聽傳呼以兹抱懊惋寧復競盈餘冉冉積年歲􅢅􅢅向盆盂豈無四海心所惜六翮疏顧惟鷹犬坊豈乏耳目娛矜春有雪衣絶地復的盧終當返真性去去翔天衢一舉歷五嶽再舉遍九區翛然逐鳳凰下來瑞唐虞此意良不極流光倐于徂麟傷古亦然聊自遣煩紓夏日嘆長嬴何蒼涼大火不烘爆燭龍西北死踆烏東南蹙遲遲凌曽桑忽忽下蒙谷鈞天不敷華羣陰豈全伏金星似火赤未旰即動角應感陰沴盛轉訝日晷促羲和職業廢寒暑事反覆麥秋猶寒衣絺綌未即録雄風來蓬蓬慘怛蜚大屋揚霧清晝昏愈覺白日速迅雷不發榮虺虺振坤軸三時無雨澤何以升五榖蝝􅀈復不仁延禍到朴􅈪近聞河內外數載茹草木更兼豺虎繁死者十五六諸公樂安穩羣幸厭梁肉萬姓亦何罪坐使蒙螫毒以兹和氣乖無怪邊釁踧天人象已顯巖廟計須熟緬思𢎞治化歷歷在耳目燮理得所司氣侯有攸屬八風率順序五緯不愆轂草年宣重光萬國昭玊燭平路生廣庭箑脯出荒服所以覆幬下老不聞殺戮中遭屢更變美意尚可掬朂哉柱石翁𢎞治是龜卜狂夫不解事豈敢糜廩祿倉皇杞人憂凱切麥丘祝但願麗大明末光普曾曲題九峯書院圓象序興沒大道蔑消沈濓伊冥契後作者紛林林石鼓未榛莽嵩陽亦嶔崟九峰復何如夫子重幽尋結架雲霞交討求松竹陰探真破衆眩集虛嗣希音川注理有託物化情乃任鏘鏘廣陵散寫之龍脣琴閉閣綴道論永為後賢琛曰余早送誤捷徑坐滯淫竊睞無窮門浩蕩糾寸心眷言摳裳衣畢志遵所欽贈潘子四首俚子習巴唱佳人奏陽春懷仁出湘浦信美乃寡倫心期不自媚持以奉明君上絃協鳳吹下絃泣鬼神邊地霜霰繁剛風凜以辛但恐變商徴指詰不得伸躊躇廣廡下此意難重陳其二大道久湮閉王英改波瀾時流習玄默危言伏禍患君子守貞亮所貴殉世艱嚴霜被廣域朱葳駭前觀嘉卉亦摧頺而況莩與菅茂子竹柏意慰我樗櫟顔春華諒峭蒨表之在歲寒其三念昔與子别繁霜結崇榕猶懷烏石鑣復轉并州蓬昔也辰避參今兹燕離鴻羣生固無極百齡會有窮平時所交友昏晝誰則同蘭苕向披靡玄曜豈恆中子其保光惠逺行慰㤝㤝其四浮金肅叢薄黃落棲廣墟念子事孤往煩憂結不舒斥鷃足蓬蒿鳳凰則髙梧誼雅茍不易豈必均所趨志士貴努力丈夫行棄繻東海有一士東海有一士被服雲錦裳飢餐炎洲霞渴吸瑶池漿鶴馭何翩翩九垓一相羊朝發岡䍚野夕憩沈默鄉眷言與汗漫抗臂窮洪荒九州雖云大視之如室堂紛紛尺蠖徒看彼鴻鵠翔黃伯固黃郎遁世士抱影處空谷擷芳上木末采藻立水澳妙善難可鄰歲暮守幽獨懷姝匪自媚出門重結束風雲一撫念故術草豐蓐鄙夫附丘阿達者從所欲康樂營石門知章疏剡曲存道茍不二豈貽山靈辱秋夜遲王員外時行涼風升寒節切切充重幃堅氷戒時至鴻鴈明其幾春滋淨不處秋隼方髙飛鑒物沈幽志誰能不懷歸素月臨丘榛灼灼澄圓暉圓暉豈不愛零露沾我衣遲我同懷子濡滯尚安之呼琴為子鳴調苦使心違不恨歲載徂但恨知音稀盈縮本恆理傷哉生别離初離京邑留别諸同志四首陳車遵城闉振策導廣路仰盻孤雲征俯見流波泝感念平生歡豈以杯酒故羣居不自覺相失增怨慕川河引舟楫陵陸曠煙霧重覯難可尋努力敷襟素其二浮萍戀故波離鳥思故林故林既得期儔侣無遺音與子共朝夕奚堪更商參山河日以邈霜霰日以深鴻麟無時至安能訴幽襟晤好諒有時迅節忽載陰願言敦明德白首慰離心其三馳車太行坂北首入楚澤迷途不早悟困頓安所適爵服載憂患趨者何充斥流俗日向靡胡為重濡迹京塵復何長不見所緇白凡駘御文輿赤驥且辟易誰能違衆好共整東山屐其四長歌逾薊門凝眸眺崇京陵闕何崔嵬馬行令心怦雖云返鄉域不獲偕良朋勞鶻無徑翮斷鴻有離聲幽期莫可並沉慮獨拊膺見蜚鴈涼風動沙磧朔鴈至紛紛為避陰山雪翻衝楚澤雲嗷嗷清作籟總總字成文意適稻梁得心驚弋彈聞時縣出塞夢肻妬下鞲勛逺愧青田鶴髙飛絶世氛謁留侯祠吾慕張子房乃是紫霞客志士有苦心麟趾暫驅策功隳博浪沙折節下黃石談笑用漢祖畢志任所適神山逝朱鳳鷙鳥空纍百大雪行三茆山中解束悟服食營慮結山水比聞三峰秀賫歡一來此同雲布坤維六花漫不止升危滯遐蹤寓目殺髙志真源不可往罔蜮兼泥滓居凡殊所厭還丹亦難恃太虛本宅無彭殤同已矣安得莊生達相與析玄理遊煙霞洞天今我忽不樂駕言結遊駟遙望南山木鬱鬱有真意崖瀑埀素幢谷風擊繁吹洞幽無别蹤白雲藹而至狨啼修術暗猱閧樛枝墜山精緑羅衣見客宛自媚形遺物不違真存道匪二鑒兹浹心想去與衆俱棄贈何仲默何子生知姿弱齒咏鳳皇埀帷破墳籍一目能十行雅調走鮑謝雄才抗班揚黃鍾一徹虛絲管空鏗鏘陸沉金馬門卒歲泣麟傷賈生亦逢時杜甫終為郎古來聖哲士位細非所妨屼屼大復山後賢永相望贈近夫石川山東晶童稚只自樹昔探莊老窟終蹈宣尼矩學術通天人聲華照區宇中年𨽻宦籍志豈屑軒組挂冠四五載遜迹謝官府近因避虎豺復出圖三釡海邑方用兵庶務紛蚉聚才聞借冦恂已見思何武吾觀江河流喧豗惡足數發越州生無冠組分碌碌守迍邅越南十二月盡室復逺遷故國眇天末扁舟薄言旋閩中地氣暖可免絲與綿舊業雖荒蕪尚有一頃田他鄉困飢寒胡為重留連且聞江海熟已不憂荒年此州固信美旅寓豈其然盤餐未易遘薪水亦費錢雖得山水玩顧非貧士便素癖厭人事况乃居市廛毅然舍此去飄颻御風煙夜泊桐江雲放歌漁父篇朝登富春山釣臺兩髙懸如云迫遲暮頓覺忘憂煎行復經武夷真詮落吾緣引手向紫霞髙招控鶴仙沆瀣亦可飽安能逐鴟鳶局局禹迹裏裏情向誰宣嚴陵灘咄咄嚴子陵竟不能下爾迢迢富春山浼浼桐江水渺渺窮居士皇皇漢天子當年布衣交一旦君臣禮渭川罷釣綸莘野釋耒耜上賢尊天瑞所願贊天紀但非魚水會往往委泥滓明王久不作吾道長已矣憶李御史雲憶昔在吳會與子共昕夕劇談例百壺醉吒滄溟窄晨光倐不處人事轉凄惻豫復苦羇旅子已作逐客鄱陽波浪深南嶽瘴霧塞鴻冥天萬里帛書經歲得誰知消息來竟作幽明隔冥契既永逝今我何蕭摵曩時青蓮花持抱化為石回首靈源山雲際且屏迹故太傅于公謙太傅出南方眉宇天人表曩在英廟朝讜論多了了三邊正統末兵戈日俶擾先皇巡朔方敵騎伏潢沼黃雲厄塞垣仙仗迷周道法駕一蒙塵作意索金寶京城既搖動和議雜紛糾公時贊戎機決策截瀾倒告廟定儲君誓衆守隍堡耀兵向陰山直欲舉征討居庸扼咽喉鐵馬豈得搗坐令敵計窮食盡師遂老翠華果全歸黃屋免再造雖重獲罪戾社稷功非小功髙反殺身於古亦常有固由天威赫實為青蠅撓天日終輝輝即見是非瞭神衷啓後聖殊錫達幽眇憶昔靖康亂謀國何草草堂堂宋諸良唯唯遵和好甘心拜仇敵所以至絶島直書在史氏公節須皎皎贈方豪崑山天下士抗懷薄秋旻作詩接元白開口奔鬼神狂來放厥詞妙得造化真習尚罕時好結交必古人三年策仕版八口還憂貧民俗日向澆真欲回其淳尸名况疾惡所以讒柄新鄒陽固得譴鄭僑終見親迷途墮老洫誰辨玊與珉君看裳陵山萬古當嶙峋須溪除日兹夕乃何夕忽忽歲云徂南征歷寒溫猶滯天一隅去年闔閭城今年姑蔑墟風塵久未厭豈得念故都懷中兩女兒旦夕如長鳬出門初學語今能效屠蘇團欒豈慰意惻惻悲隙駒比鄰數知舊别後還有無爵服既不情鉛汞亦我誣九野天浩蕩奄奄正愁豫贈周用賔歸江郎五首岧岧三神山鬱鬱山上木叢株糝古雪雲際守幽獨附枝中梁桷匠石豈不欲寓形萬仞岡沆瀣空中浴其名曰冥靈千春葆芳躅桂樹亦葳蕤乃有斧斤辱其二衢陽何所有江郎兀南陲雲霞幻奇態萬古天為低飛鳥莫可上人迹將焉為上有珠貝宫神物光陸離吾將遊其樊薄言采玄芝其三翩翩黃鵠鳥頓足珠樹林誤入燕雀網稻梁非宿心羽毛日摧頺逝節已載陰終焉摩青天髙梧結珍禽秋風下木葉各奏世外音凡鳥空嘈嘈角鷹扇禍淫玄陰一解散求友意何深風翮或相及無忘寄幽襟其四昔我歸山中敬訪江郎石相逢草莽間意氣兩測識電露無恆期煙霞有真色黃泥天雞沒感子何所適葛洪以丹砂玄聖終沙磧通潛自天行達者固無窒贈子白雲篇心知詎宜默其五繁霜襲廣野怛怛失衆芳送子不及逺歲晏令心傷結交豈在故所貴旦暮遇曰余罹天韜尚爾界覺路青山何逶迤行子有所之異域雪霰盛勿使白鶴疑讀李質菴稿雅音失其傳作者隨風移於楚有屈宋漢則河梁詞曹劉氣軒軒逸文振哀悲兩晉一精工六朝遂陵遲角然尚色澤古風不成吹盧王號詞伯秪用綺麗為千年取正印乃有陳拾遺或不盡反朴朝代兼天資所以王李輩向道識所期大哉杜少陵苦心良在斯逺遊四十載而況經險巇放之黃鍾鳴斂之珠玉輝幽之鬼神泣明之雷雨垂變幻時百出與古乃同歸律詩自唐起所尚句字奇末流亦叫噪古意漫莫知歷兹六十紀識路良獨稀鳳鳥空中鳴衆禽反見嗤夜寒理危絃惻惻賞心違贈吾謹五首朅來潛元子偃息蒼雲根懷姝三十祀為亢遵世屯甸候翔虎貙鳳鳥乃孤鶱微榮曷足貴所貴至道尊粳籺鑄堯舜水虎伏玄門豈同曲轅櫟遁天得長存其二采蘭荒江陬繁芳被羅襦采采不自媚征途爰有需征途何遙遙波嶺爭洄紓宵旦判辰參卒歲焉可圖南州瘴霧塞狨蹄下城隅永言守沉晦去去寧君軀其三南服有佳人遺身在逺道上衣雲錦燦下裳花萼繞容華耀朝曦歲晏結芳草獨行誰與娛抱影心正搗豈無合歡被附托苦不早楚璞思一獻和氏莫復保世無良蹇修雌守以終老其四麟為希曠禎何以至魯藩大道久喪世麟趾在人間仲冬巨野風犺獍乃髙蹲合圍不孑遺靈物罹其樊虞人折爾足眩爾貂與貆豈但子鉏商魚視乃漫漫大鵬息南溟培風會髙摶紛紛枋榆鷃安知九霄翰其五京洛貴遊子結駟康莊衢前麾擁楚舞後驂雜吳歈結交盡侯門意氣陵上都玉食豺虎側暗者適所趨寧知窮巷士仄仄頓空廬冬裘不掩脛夕粟無斗儲厄抑曷足悲主者顧乘除神奇化臭腐榮盛可久居子雲草玄地千載名不渝雙劍篇贈毛汝厲雙劍在昆吾淬礪良獨勞年歲既已久況兹以鵜膏豐城古獄下閃閃星文髙雲逵一見收結珮事遊遨被以黃金鞘繫以赤玊縧霜鋒按月窟萬里風雷號一劍乃棄置埋照同鉛刀豈不愛光霽乖誃異所遭有時匣中吼魑魅皆遁逃神物卒當合世人那得操君看延平津糾糾雙龍交岊江送汝厲二首漂漂海上萍卒卒梁間燕與子結同心何意異鄉縣遊團散景光談討猥深眷眷兹朱旻際乃有此暌判川途何渺默年運復流轉豈無繾綣心王事不可緩君當翔要津我且守迍賤膏煎以自明璞辱以自衒願言沉光輝勿使暗者見其二西北日晼晼宫觀凝寒煙行子暮何之駕言北之燕前驂結良駟後徒控華旃中輿歌響發楚聲一何繁一闋逺别離再闋行路難薊門無清塵易水有急湍曠士懷明義天步故多艱賤子甘自營淪晦亦所歡乖期在昧旦且復敘涼暄容輝無時及表之英琅玕南山一株松南山一株松衣被何嬋嫣上焉絶雲氣下者抵流泉季秋零露沍百草乃棄捐修條抗回風況結霜霰緣附托一得所斤斧那得前所以保容華閲歲及百千紛紛蜉居子豈知有大年答毛汝厲侍御仲夏夜向短忽忽不得寐所思眇天未鴻鴈冉而至佳人隔湘波遺我雲錦字開緘珠貝光亹亹見深意綢繆梅劍言􅀈譩膠漆地時危先金甲儒服久淪弊感子情義重難以筆舌記念昔在京師邂逅意交質文章詎足傳偏愛無妬忌逢人説項斯益見君子誼我生豈土木嘖嘖賞風味頃來趣南方驄馬金絡轡侁侁表幹臣赫赫天子使始識豸繡衣已褫魑魅氣如何駕鼓車乃用此騏驥所幸日親炙慰我色憔悴公門數十尋不見所深邃俯心下微賤此輩一騰沸平生詩百篇繕寫入篋笥自愧交遊間何敢復當是鄙夫昧逢迎動輒得詈戾遽意遁樵漁橫逆莽復熾非子善解排何以控軒輊凝情外形骸奮舌略榮利豈無英乂者與我獨投契朱炎射北林檣烏蕩離思惻惻芋原屺悠悠岊江涘樓船忽復解我馬何當係江山一搔首天地雙揮淚君才萬夫敵偉矣瑚璉器富貴何可言勛名會多事九域悲風塵三埀更烽燧疏瓜莫華滋短狐暗窺伺先帝在天靈仗爾濟顛躓桓桓裴晉公彪炳於史氏王通雖鏟采戀闕心尚閟太平十二策寂寥昔曾試持危良獨難避色信所致古今賢達士用舍各行志贈子猛虎篇髙歌髮欲竪少谷山雜興輶車入城府不染市道塵買山水部巷石壁爭嶙峋嘉果自四時橘柚及棗榛樹木更茷􅀢梅竹逾精神茆亭覆石上風月為主賔藝軒矮且陋著書掩柴門褦襶非我朋心知逺見親神間多暇日棋局見本真雖居赤縣會每結青山雲鱗鱗十萬家刀錐忘夕昕兹山豈遙逺煙容自津津四郊願寧謐永作草茅臣逺離别近别不顧家朝往仍暮還逺别不顧家出門寧計年出門復入門兒女相牽攀鴻鵠懷四方豈受燕雀憐涼風動沙磧劍歌慘不歡拔劍莫割水悵此離别難同胞遍海岱所貴天綱全孔聖欲居夷老聃行度關意氣茍相安豈在華夷間逺别即當别懷土非上賢白雀詩有鳥曰嘉賔結意公院深族類分總總中有三珍禽毛羽白勝雪噦噦吐奇音卑尊與賤貴食宿明素心虞羅得之喜言是世所琛飼以香稻粒嬌愛輕黃金置以白玉樊鷙鳥不敢侵行將貢明主上林逝駸駸小鳴天地白大鳴徹古今化國彚振德修能無滯淫類此蓬室士懷美遵丘林一朝被爵命照耀巖巒陰永言復自愛野田有遺吟威鳳篇景風布南服晨曦射丹臺威鳳何契闊千載一徘徊聲響世不傳簫韶昔所諧虞庭既寂寞岐下亦蒿菜孔雀與野鳥朝代紛疑猜今時夫何如天未鳴喈喈乃有摶牛虻附托凌太階此曲不可竟九土方喧豗短歌行跨馬出郭門馬疾不俟鞭長跽挽君馬聽我歌一言涼風戒芳樹白露凄寒蟬君子有所思逺遊及幽燕在家人所愛去家人所憐朝饔不及飱豈得戀膝前下有黃口兒上有滄浪天今時何清亷盡室難逺遷但見被雲錦麻枲無棄捐獨行多辛苦加餐以延年寄惟可褰裳采杜若江水何瀰瀰借問采何為將以遺君子人心無終極天涯豈伊邇迅節易載陰往事更佌俿時危生計拙何以托疲薾桂枝有晚芳芙蓉在秋水非無歲寒姿亦逐江草萎櫟社神所祥永言葆玄理寄顧九和侍講昔在吳子國對君啓心懷朝遊太湖水暮宿姑胥臺狂吟各寫志醉倒黃金罍張衡賦四愁王粲興七哀同心而同調一嘯卑九垓翩翩海鶴舉颯颯天風來煙波忽相失各在天一涯君為九霄翰我似窮途埃音書阻嵗年泬漻隴間梅亦有芳菲草念子思悠哉遲暮不我顧零落同蒿萊送李道夫赴闕兼懷仲默強敵且搆患我友之朔方朔方萬餘里金門鬱煌煌下有避世士大隱而誕章十年風塵深寂寞中省郎食祿侏儒下修身思何長我有薜荔裳因子逺寄將一以存苦節一以昭不忘歲暮懷京華諸友憂思苦不徹歲暮登危岑關山百二重江水渺且深水深亦有涉山阻亦有臨念我諸同袍一息斷風音君為天上鳬我為水中魚飛潛自情性安能識盈虛遙望北斗星不見北斗城參辰俱在天牛女亦分明同域而相避何況異天地遊子篇眷彼不周風喟然思九夷九夷限波嶺遊子逝何之馳車越幽薊天路逾險巇齊州豈不戀嚴威剝人肌襜褕可禦冬所歡不豫貽在賤貴所忽在逺邇所遺子去華衣馬敦我慷慨詞贈道夫四首華輈戒昧旦之子赴北闕叢林無繁條天氣正十月中逵判綢繆豈不念鶼蟨贈子金琅玕呐呐心結愲京觀多緇塵終風永夕發修坂無逸軌知者備失蹶故家亦有歡浮榮亦有歇志士無間居國憂固臲卼持子東門行微言不堪説其二大道未底夷回飈無時起君子思致身小人亦踶踶結綏晨出門長道從兹始馬周一布衣埋迹殊無似常何出片言玄纁轉跕屣一旦白板扉光彩連州里拙哉孟浩然非無聖天子平生得意句濩落入泥滓咄咄歸南山悠悠謝朝市顯晦無賢愚自古靡不爾蘭苕言永懷忽逐春華萎其三頽風吹岊水飲子白玉杯意長酒力微日暮倚徘徊十年綈袍戀嵗杪起離哀咎愆孰與陳遊衍孰與偕故國不可居魯生行鑿壞金臺何崒嵂首山亦崔嵬茂子竹柏心餘陰及枯荄其四富貴苦相迫師徒多遁巡况當強盛時誰能分沈淪之子仗劍出舉足生煙雲河淮漫浩浩中有要路津豈忘風波恐壯士念委身陳霜沍修途落月經柍桭良友志異域此意難重陳欲扳時無何欲往道無因願為雙意而飛飛出城闉擬古勛名不可圖嘆彼時運乖佳人處幽谷心思日如摧未旰柴門閉盛年不克諧豈無合歡意蹇修孰與媒霜閨雲被寒玉顔暗中頽翹首孤飛鴈雍雍令心哀宿石竹巖寢痾坐情纍削迹離故家屆兹仲如月氣候清且嘉迢迢紫雲洞渺渺天一涯尋壑滯瀑流攀岑悟靈芽千峰遞生態百草互吐葩周覽蕩節物況乃凌紫霞神仙倣佛遇導我營丹砂丹砂未易營緇鬢早已華神理寓隱頥時變增感嗟至人有逸念存形非所多苦辛行貪清不自愛歷歷疏逺目緬懷雲居勝駕言陟曽曲樛枓遁斧斤岐徑積朴􅈪雲棧紛當心不敢輕落足捫枯驟戰兢披棘逾匍匐尫羸無奈何況復迷浚谷雖無夔莘恐詎測蜒蚿伏少焉青霞深轉訝白日速山海信偉觀何以慰彳亍我生孰驅迫自致窮途哭伯陽不出門世路了如燭願昭籛子誡或免華山辱王右軍右軍鸞鳳姿初齓寓隆想沉睡乃真覺坦卧亦疏朗臨池灑妙翰抗意風雲上籠鵝事偶然草經有攸往少谷集卷一下
