body:
  text: 少谷集卷十一明鄭善夫撰傳海仙人傳閩大方伯龔公𢎞吳人生而頴少能通古墳典剖疑圖徽隱東海蒲華塘賞幽自為將三十年抑而為舉子文字進士起家以經緯當世事又將二十年乃思當世之無以為也棄兩浙大參知歸海上日歌白雲篇疏南華經義上揖古人而與之游若真能拔世網而仙者嘗曰吾先代都官君祠部君再有隱德吾有水石痼吾嘗如有忝於二君子也時人稱為三隱先生云公處海上登年以載逆瑾宣熖玩大權杓化天下豪杰而馳之公一不為聞亦無戒日與窮島黃髮翁泛輕舸浮游震澤雲水間賦詠自怡或赤腳走海上峰觀蜃氣興沒龍吟蛟翔夜半日出咸池晶晶然長嘯大呌自以為世外竒觀及天地和均聖天子思得逸才以振葺踣弊乃復簡為今官時之人復稱為海仙人云鄭善夫曰吾嘗聞古之神仙往往有隸宦籍而皆豪杰輩為之故葆真寓形完天遁人聽其往也王喬之葉東方生之依隱玩世葛洪之勾漏蓋其真有所得正不執滯於通隱之分也是故隸圉不卑貂珥不亢拘餓不窮潛形不窒鋌刃不嬰視世間一切榮辱起伏生殺夀夭化萬有若劇戲然而隨之者彼何人也哉龔公其真有所得矣夫南湖三先生傳南湖三先生露公莊公淑公其先榮陽人也逺祖昭晉時為泉建刺史過莆口愛其風土因遷祖墳於南山昭固未家莆也三公舊譜云唐𤣥宗時人世居閩之侯官天寶二載避李承昭之難自侯官徙永泰又自永泰徙莆之南山以祖墳在也山下有湖是為南湖結講堂其上以修儒業莆古蠻俗六朝之間閴無聞士照諸載籍唐興將百年亦未聞有作者自三公入莆人始興學其後十室九書堂龍門半天下南湖之響振之也當稱為為南湖三先生云講堂在南山之麓因夢錫僧乞為菴遂捨為菴及改構其旁復遇金仙請為剎復捨為剎今城南五里廣化寺是也立寺之後移祖墳一十二丘於西峰之下莊公徙潯陽淑公徙仙遊惟露公居莆田是為三邑之祖凡稱南湖鄭氏者皆三先生之後也嗟夫三先生豪傑者也業儒於比屋未為儒之時而二林忠孝一方文武勛庸科第為天下甲雖其學力而開先者誰歟岷嶓積石河漢之始明者固有所推矣彼固無文王猶興者譜稱露為太府卿莊中郎將淑别駕皆無可考然是詎足為三先生重輕哉鄭顛公傳天祐公字君作淑公之後少磊落不羈知元運將革自負以豪傑之才耻與牛駑同皂處南湖塢中意灑然也是為南湖處士晚年世益亂上下溷賄上自達嚕噶齊下至邑子丞尉競為叨餮降其風而化之乃憤然有回淳反朴之志恤恤然賙貧鮮寡一物價平出納使世之貪鄙也銷後游四方齎餘資凡遇生物無大小貴賤即鬻而放之如是者十餘年人不能測其所藏咸呼之曰顛公云公嘗假三世田其價已盡後其子匱乃召而告曰而父所鬻田若未盡而值也給之至其孫匱復告曰而祖所鬻田若未盡而值也給如故晚年每辟火食日醉醇酒數勺微醺輒麻鞋散髮走道上暢歌屈原漁父篇以自况其志或勸之仕乃喟然漫答曰而不見飛亷氏馬乎其一朱鬛白毳龍駱鳯臆終日不釋轡卒以熱死其一垂頭昂尾駝頸駱膝踶齧善蹶棄諸野終年而肥古之達者固不茍潔以罹患不避穢以養精也兹蓋得之舊譜參之故老所傳云爾古之人有逃名佯狂裂冠毁冕而求自拓其所極者世未易知也埋蛇渡蟻近不在其身則惠應之於其子孫云南湖髙士傳昔人云澤中之蜥蝪不用則委蛇草莽間用則神變化為霖雨士或然哉髙士才氣英邁有大志傲睨一世若無難事而乃涪湛於時焉年四十就憲府辟三年入補尚書曹道莫有合者笑曰髮種種矣安能以一資一秩僕僕岐徑為哉去之南湖之畔菟裘葛巾據梧曵索與魚鳥為伍欿然若忘情者及其論經世大務即捭闔弛張洞視千古之上識者竒之間嘗語人曰士當用人勿為人所用又曰䝉莊巧愚竒而竒也大雅明哲正而竒也蓋抗髙志遏浮埃者晚尤好黃白之術及閲李道純中和集即飄飄然遁形智以往所謂道不偶乃自用以康其身者歟髙士平生極踽踽少合然與為冥契者又皆世令人如靈武王稱博陵林志漢孟吳航髙廷禮輩締文字之交云志嘗曰峭直狷介可以信董史佚蕩伉俠可以結朱孟其見所稱許如此髙士諱璠字仕琛鄭氏號曰純菴蓋守其黑云烈女輝傳烈女輝者五河令周應文之季女也其先姬姓末裔即國為氏散處方隅應文蓋居庸之世也輝生而含慧抱素七歲知女訓嘗論夏侯令女曰一死事便了何截髮斷鼻乃爾應文甚竒之時有張耀者將子也習業於應文雋爽絶於流輩應文亦甚竒之間遂以輝屬焉待年于歸大禮未就而耀以正德九年六月死時輝年十七禮不敢踰閾奔訃吞聲痛悼自廢其飲食應文憂之糾戚屬諭意不少變旬有二日遂自經於中堂中外聞者匪不嗟惜聲動山後先是耀之家買棺畢氏得巨木一本析而二之至兹遂以及輝唏天其偶然邪輝性嗜花草墀下自藝數十本英蘂繁膴日供采擷輝死一夕盡為之凋焉山後暑多蠅自輝之死輝之家蠅亦去類盡其次年乙亥所司部使者以事跡聞表其門曰節義越人鄭善夫聞之曰燕趙之風悲以壯其生人多慷慨奮躍有所激觸即輕舍其生自古然哉故感燕丹之義視死如赴者白虹遂為貫日往往有焉輝一女子也一念之至至感草木動天時是故城穨杞妻雷擊齊廷天人通貫之理古今一也吾嘗論燕趙之士使充以仁義道德顧但為俠客劍士之稱顯後世已邪輝之天資冲粹豈又不在學者歔夫應先生傳應先生昌者浙之仙居人也少讀書知大義即務為躬行中年以母老稍出干祿久次得為分宜縣尉常祿所入悉移致於母旁及於母兄自奉惟敝衣糲飯晏如也吾聞先生事母與母兄備極顛沛初自京師歸至台聞母兄疫台距仙居百餘里乘夜走山谷穿虎豹及門抱持日省侍兄愈而後即安在官時有術者談其母祿當盡即茹素自罰日不安其位託請歸寧徒步旬日至血其膚後居母喪又一一執禮時年已六十餘猶頓毁守墓側寢處苫塊衆止之曰奉几筵禮也中衰之年以死傷生恐非所以為孝乎由是族黨逺近上自大夫下及衆庶咸翕然稱之至有聞風而起者云先生平生急人之難有同閈者客死無依先生既為殯之且力還其喪焉其輕財仗義又如此在官數年亷慎以則恤民隱剔吏蠧凡數十事蔚然入於人心給事張文稱之曰安得似某者百人分布中外天下何憂不治太守朱華謂其操持出衆有儒者之風焉中丞韓邦問提學蘇葵王崇文咸亟稱之其子良今為翰林吉士相時謀道修先生之行云鄭善夫曰吾聞君子之事親也下任力中任勞其上不匱先生間關致養堅忍致敬禮而無忒慕以終身又能潔已惠人以成其志而享其令名所謂任力與勞而不匱者非邪孔子曰置本不固無務豐末比近不說無務修逺詩不云乎惟孝友于兄弟施於有政蓋言反本修邇者也先生之施顧有司之者而未大邪正德中善夫與良定交於吳越之間得先生之行故為之論次其事樗翁傳少谷子曰孔子曰小子何莫學夫詩學詩則多識於鳥獸草木之名夫識其名也非他也聖人取象以明理比類以成德咸取諸象也爾雅栲山樗其色小白生山中類漆樗散木也莊周之言曰商山有樗結駟千乘隱將芘其所賴然匠石去之不以為髙名之麗者以其散也嗟乎神人以此不材隂符云人知神之神不知不神之所以神樗翁西川洪雅人也張氏名某字某持釋書日以繕障盲為事又通堪輿之學達古今事變成虧福禍與天地之化經綸之文言之鑿鑿張而翕之闢而闔之放諸無用之地取諸樗也不龜手不用以洴澼絖豈樗之云乎翁昔居花溪去邑㑹再舍時文物在邑翁有子鵬頴脫囊中翁遷其處俾與賢士遊以成其德云蓋藏金於山藏珠於淵葆其全而用之天下者也鵬為侍御史遏權璫斥奸佞危言於朝不合則退合則進進則藎於其所事世蓋方之棟榱輪題與道消息云昔者眉山蘇明允隱居放言不位榮利後其子軾轍咸躋通顯翁得無類之然彼且著權書以示可用而軾轍又止以文章顯夫示諸無用者豈真無可用哉又况不為軾轍者其上下何如也樗翁寓神於散合志於空將無以儒者之道為風歸邪或曰釋氏之學古賢知者多之蓋其𤣥化自止直寄之以定其情焉爾矣雙節傳閩參議鄭子毅一旦過鄭子善夫言曰毅宗數竒曾大母祝大母劉以節傳以有毅之身線如也述二母之履命善夫言善夫相世自廢久亡有言者也以毅故以二母故故言而傳之傳曰先鄭氏信州大氏鄭氏二節婦曰祝氏曰劉氏劉祝亦大氏故二婦非恆婦也祝歸孔貫生騏騏六歲而孔貫卒時祝年二十有六騏婦劉生潤潤十歲而騏卒時劉年三十有三先孔貫之父雅簿楚安鄉母劉氏留家祝事之百爾慎甚劉賢之雅聞而亦賢之及孔貫疾革謂曰吾竒嗣子稚呱呱爾吾死之後汝少汝若何祝泣曰無二敢忘夫子卒全貞傍孤抵有成立及劉之事祝肅雍靜一猶乎祝也其於騏於潤亦猶祝於孔貫於騏也其寡之年祝較少姑婦辛苦卒昌鄭氏堂有竹樹有羣鳥來巢有攸馴止鄉之人竒其事同知陳綱欲表其節不果知縣董綸江源相繼給其家厥後踐祉各以壽終潤子毅成𢎞治已未進士守資兵曹今為右參議云鄭善夫曰上古亡節中古勵於節後世不風節故亦亡節氣使之然也不風無率不率不風二婦蓋得之天均者豐也豐乃無矯吾嘗怪今史之不足徴也力贍者乃克致致者未必真吾嘗恨逸者吾不見美也雖然古亦有然少谷子傳少谷子南鄙野人性極拙且懶少居貧不識榮利以親故竊食公家持論迂濶不切時務不能更故態不得於今之人好古書不能讀讀亦不能析疑義年及三十而一無所成分必為棄物近復得丘壑痼疾藥不能療行將解脫束縛著道履短衣登岱宗望東海歷江淮浮震澤訪石橋窮㑹稽鴈宕諸山而後歸廬於武夷與所謂少谷者閉關息焉守其𤣥而葆其真云少谷集卷十一
