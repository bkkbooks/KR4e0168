body:
  text: 少谷集卷二十明鄭善夫撰書四與梁日孚别後凡數寄書再不得吾兄消息杜門索居無他念慮一則日望太平使吾輩山林之下得以穩睡一則恐離羣日久學業就荒矣聞應石門已南歸近亦有書來知吾子居京師亦頗持獨興懷興懷又聞白浦在西江與虞佐少有言白浦執言忠良㑹事古今多少賢達秪為區區血氣所驅使害了一生此事果爾不敢為白浦長也近况如何關河許逺音問稀闊不識繼此再得如往時否也苦心相聞不盡所欲語答思道西湖别後得嘉興手札宦况今如何或出或處或久或速君子惟其是而安耳方今政治更始正吾輩行志時節先甲後甲理亂緒幹父蠱端在諸賢得時最難時難得而易失時非髙爵厚祿之云也古人往往寧蓬纍而行者謂何際遇難也今天下百務極矣生民之苦未有甚於此時者矣事極而反常數也今海內豪傑之士皆有彈冠之志欲行其學但不忍辱其身矣吾兄珍重珍重善夫日來無他喜好近結草堂於湖曲日對田叟牧竪談村鄙中事仕進之念已索然無餘所餘者望治矣面晤末由臨風悵惜答平崖海濱杜門屢得動定甚欲吾子同隱今皇帝道化維新吾輩草茆荒僻莫不有茹連之志何者行義達道本吾儒性分內事吾輩羇縻廩祿相率引去者非好為孤潔之行也苦於上下不交也致君堯舜今其時乎時不可失天下第一等事莫讓與他人做去孔子三月無君則皇皇其志非以求富貴利達也萬萬自此堅忍其志伯子云一命之士茍存心愛物於人必有所濟百司庶職莫不有經濟存焉勿曰吾未當其位未得盡行其所學也善夫病苦彌年煙霞之疾未瘳徒有耿耿耳拭目以俟同志者不備答倪小野善夫啓曲江使人至李公衡至兩拜書兼以公衡口所稱述慰慰以南雄之小以吾兄為之非是了公家事便為稱職也况今聖明在上切切求太平太平事業何所始何所終四時之氣自一心而推之萬方之政自一郡而大之是已吾兄珍重珍重善夫自抵家削迹荒村與野老無别近哭先皇帝一進城耳又家食朝饘暮粥飲水甚甘也家孥輩不知吾輩安身處覺其局促勞苦耳夫子云邦有道貧且賤焉恥也士君子欲自愛其身不為枉尺直尋則亦安往而辭貧賤焉勞兄逺念漫及心事天下將太平吾輩耕巖釣海何適不樂秋末天台諸友欲往少谷遂為羅浮之行非漫說也答道夫價來承惠草堂資此時正窘促甚為得力曲江新政甚有精神喜慰喜慰吾兄知剛柔內外之道乎孔子云禮以行之孫以出之外柔內剛剛柔相濟而不相勝者萬事之所以成也况一邑乎蒞事貴精勤又貴簡靜精勤而不簡靜則羣小易欺簡靜而不精勤則衆務多廢二者貴相須而不可偏有者也近聞吾兄甚精勤恐未必簡靜簡靜最難事必須學力學力非窮經博古詞章記誦之云也吾兄幼時曾熟讀大學與中庸今但舉二首篇細思而力行之是耳方今聖天子求治甚切吾輩幸丁其時在外則堯舜其民百里雖小最近民者也非求大學問安有大事業吾兄鄭重善夫自廢彌年矣古人幼學壯行上有聖君故不忍枉己以出也不然作堯舜巢由歌誦太平如何明嵗過羅浮經曲江欲作太山孫明復乞俸錢耳添丁之信如何懸念懸念七月五日善夫頓首答戴宗道考功近拜三月四日手書教愛良深所喻放浪山水間以有限之嵗月供無窮之耳目意思大好再三把玩以為藥石也走年來於山水之興不覺頓減非有所長進而恐喪志者想亦精氣短少自然有不逮然也自渡江即聞孫太初之死一往吳興稍致死生交誼再又與應黃二子有夙諾遂過天台與居月餘而後竟趨武夷摩挲數日慨然有卜居之志實非為山水濡滯也今者易寒暑杜門荒村兀坐一室而已近哭先皇帝始一至城當路了不知有僕也今聖天子在上賢士幽側以次彚征而不肖貧賤如此恥也但人處淡泊內視平平耳吾兄司人物衡鑑聖天子如此求治而吾閩尚苦酷吏奈何昔孝廟時有君而無臣至今為恨非無臣也位不當人人不當位上下頗也善夫徒有其志山林無預願以此為足下獻答朱守中侍御計兄是行必得㑹陽明必大有所得致知之說大好數年同志所講明所用力豈外得此物但舊說雜沓於胸臆不能脫然篤信而力行之也凡人挾其所有語之以所無則惑守其故常語之以所異非惟惑也且羣然而議之耳善夫比歸惟杜門溫習舊得靜中時時紬繹始覺得此心大是難捉縳的物方見古人下死工夫處孔門由賜而下人物未可輕議也陽明先生立此大功業今又遭值聖明善夫日聽其大行不加意思以為法程末由侍履門下心欿如也素翁隱志甚堅山齊已在行松崖伯固想當膺命而赴草野薄劣貧賤惟甘日惟祝吾君聖壽萬年以致雍熙之治矣所以答兄之知如此而已奉晤何時想憶極切答蔡廷彛九月朔杭邸相聚惜無幾時念賢甥器識良可逺到妙年便試此大邑適承頽敝之後又正是盤錯時節今之所謂逺到者能文章取聲名作好官取榮貴已焉矣今看文章與貴權畢竟於心身上何所禆益惟吾甥試思之繁劇勞苦要須有簡靜者為之主一如明鏡何曽不鑑物鑑而不留則身自不勞矣人能常清淨天地悉皆歸况宰一邑乎學問只有一源無夷險靜閙無中夏無夷蠻無窮約無宦達若說忙裏廢工夫然則閒時用甚工夫孔門學問是箇仁仁是箇愛今為民父母愛便是本中間抑強扶弱興利除害大憲大辟皆自愛上推去勿作德念勿作功念此便是學問今之為吏者多行其意氣意氣蒞事能有幾時意氣重在名則狥名重在利則舍名而狥利意氣者害真之本也是以君子貴知學惟吾甥珍重善夫力薄躬行徒有空言敬為吾甥盡之如何病中草草答林茂貞近拜名篇教言珍重林下諷詠真意何日忘之善夫杜門已無復仕進之念才微命薄雖退處閒廢尚恐不獲死所何幸今者再睹天日故雖窮約得為太平遺逸萬分俱足矣近林克相書報吾茂貞中興一疏切中時政若一一依據而行真足以復黃虞之治足驗吾兄所養之大索居離羣時事多不及聞諌草幸寄下一紙以慰岑寂至望至望吾兄日用更作何功夫廷尉事得稍行所學否古人夷險靜閙皆致力之地也善夫比來精力覺得疲頓纍鞭策不起日用驚懼過此時節便是衰頽之境也有警語萬無惜以次相聞慰慰伯固兄行草草未盡與吳德翼歐陽崇道論恤典事宜讀嘉靖維新録竊想新天子仁聖痛念海內久罹毒苦而曰自今與民更始所以收天下之心者何物財者民之心也曰十五年以前盡行蠲免又曰已徴在官者准作下年該納之數又曰嘉靖元年以十分為率俱減五分伏玩恤典是三年之內赦民財賦者半也何者十五年全免十六年全徴元年減半此恤典正意也全免之中有已徴者若不准作下年全徴之數未免是狡猾者稱幸也蓋以十五年民知有赦故狡猾之徒或徴而不納或納而不全或三分或七分今將十五年隨其已納多寡兑入下年全徴之數納三分者徴其七分納七分者徴其三分使其十五十六二年皆如元年民受五分之惠方稱至意乃今當事者或以十四年以前俱有已徴與逋負者將准作下年該納之數一􅍁一置弗論殊不知十四年以前民安知有赦夏楚之下其有逋負者豈得已哉廟議此􅍁甚有斟酌但曰已徴在官本指十五年也却不明言十五年准作下年之數本指十六年也又不明言十六年此蓋一時言不盡意處致使當事者疑似遷就不即將順其美近者全徴之命或者上傷聖天子之仁下傷萬民之心乎且僕聞之君子貴從厚有此聖天子在上切切求治正吾輩行志達道時節縱有聖意未及處就如長孺之發粟亦得而行之况恤典顯然如是乃以文法疑似之際反使民重困乎若以處置軍儲為計二年之內尚有五分之徴倘以諸色已徴未解者奏補亦何不可只據一項掣過餘鹽嵗可八九千以補軍儲亦何不得竊以全徴之意豈不以進貴之變乎進貴之變其㫖未全在軍儲向與見素公反覆極論致亂之由有數端焉必不得已而去於斯二者何先曰去食食盡去而民不亂其本謂何若以三月失糧便足致亂則三邊健兒當先變矣三邊之卒至有三年無食云何不變况八閩軍士征戰日少且有生涯若處置得宜雖逋之十年保無變也今但談虎變色而不探其致亂之本僕恐全徴之事舉行不但傷萬民之心也昔孝廟朝有君無臣憂世者傷之今天子仁聖正賴諸賢翊贊將順共成雍熙之治千載一時也首先一事便使朝廷失信於天下僕恐有志之士不能無致憾如孝廟時也僕自還山已分填委溝壑何幸復睹明世有所見聞敢不為知己者盡之倘賜采行不勝幸甚與歐陽崇道徴糧事宜使君處置甚停當十六年今竟全徴乎下民洶洶又聞十五年以前蠲除者今欲悉徴之果爾善夫有蹈東海死矣如朝廷天下何士君子窮居讀聖賢書便說欲兼濟天下及既得志為冨貴所乘便諉之曰時不可為今上有聖天子大賚四海吾輩時命既得何為而不獲一無所諉乃故為怫戾以行其血氣奈何奈何使君何等人品何等力量部下之民皆使君兒女也陽城政拙至今照耀人耳目大丈夫當立名萬古眼前得失不足視也非托至知不敢如此直率幸亮之里役事近聞奸宄往往漁獵嚇錢此事恐須册定後靣定庶杜此弊水利呈敬再上答歐陽崇道手教云云使君為百姓之心極盛矣縣家誠不知使君至意知人任使最難今百姓戴使君真過是父母故愛之無不至慮之無不深每使君行一好事惟恐其不勝復恐其未終竟以去也真切真切并圖水利二事䝉行縣俱未發出萬乞利導之倘有來言不便者皆私意也秋糧事百姓未得明降日受縣杖併猶豫如有所待又以十五年全納者十六年分一納在官倘准下年之數决無退還之理公議作何處分使君曷不揭一榜明開緣由以喻之民惟待使君一言僕不欺也懷安雖稍完民其無如矣使君試聞其怨懟之聲何如今之能官古之何如也饒舌饒舌與宗道客夏拜篇翰情誼深厚至今在心膂旋有報書山林况味大槩具陳矣世道嚮明賢人君子以次在位喜慰何可言善夫自揣不肖實未足為世用獨守愚拙甚安也或者又以善夫尚掛名仕籍遭值聖明乃似進非進似退非退經年閉門不無疑於終南之捷者善夫立腳未穩亦不能不動心於或者之云今自度既非用世物料只是求一明白使得一意山林讀書談學教授弟子名教內當做事尚多功名事業莫須有宿緣在善夫覺得無此分命也惟執事實知之何以教我瞻佇瞻佇鄭鹿門劉函山正欲作書素翁行迫不及也致此意至願至願與平崖未入道以前連得詞翰邇來所養益深矣繼得上執政書一一切中興漏略處此後經綸可占也久不見報近送素翁至西禪得閲新政數大事人恆言山林草野之士嘗過憂易曰履霜堅氷至春秋防微杜漸謹之於始詩靡不有初鮮克有終古聖人之意深矣深矣善夫江湖邱壑望治之念如執熱者欲濯清風極真極切茍得小康雖終身為逸民死甚樂也素翁行當又為世道一卜吾兄身居言責凡平日所講明所欲言請先舉其大者要者不特職分內事三十是立腳田地四十是不惑田地七尺之軀寸寸是可愛惜者既不為利害所軋此外無足慮者萬萬為天下珍重切望切望素翁行迫匆匆寄囑不及起居與歐陽崇道善夫啓西禪幸再挹尊範江湖耿耿所欲言未得從容盡為知已者一發愧負愧負水利事深欲留念曩時向執事陳說此事只為一郡民便熟計執事斷能信而行之也不意一落縣家遂如石沈水就僕一里再三陳訴竟不得遣官一視遂使執事美政頓成虛文矣今齎上批結一紙求覽若如此發行執事以為行得否也僕亦知郡邑公務實繁瑣視此等事真若迂逺不切時務然召信臣守南陽民呼為召父史只稱其勸農桑開溝瀆起堤閼晦翁提舉浙東歷窮山長谷鈎訪民隱首治四明黃岩涇堰以為民本蓋民無食詨訐盜賊皆自此起究竟此事雖今之迂逺實古之切務也僕誠不以今之能吏待執事猥辱知待遂首有此獻又私計晦翁是舉請給公帑動數萬貫今此又百姓自為特假上人威權以齊一其力耳較前欵若易易也一落縣家反若是之難目今暇時已過農務將起想成罷休矣水利與併圖二事本是深耕薄斂表德王政至要也近聞併圖事亦委之縣家徑申僕恐又成畫餅矣行此等事下民雖云至願至便然安習困苦寧是坐以待斃實不知出脫之方只在在上者指其迷而利導之譬如黃口赤子困疴瘵但知啼號而已豈能理㑹其病源所在而求以救療之耶今願執事視部下百姓即如赤子一般看聽其啼號之聲充其惻隱之心則所以按其病而投其藥者自不能已矣藥之不愈顧且日夜旁皇遍求明劑决不坐待其斃也此實七情之正中發出性分內事也僕自病歸無所與於世事乃有芻蕘之論懇迫於執事實以執事志行相同自量言之必猶出諸執事之心也隔面忉忉不勝勤綣萬惟終鑒在部下幸甚三與平崖素翁行後再發一啓專為素翁議廟號事大臣以道事君不合則去素翁一出只以成事不合以去天下其謂何若不合而不去自處其謂何今世道雖有太平之望然天下人心望治之機譬如隻力挽陷車之輪才轉動依然復故處也且看近來一二事識者已占其未然矣大抵天下事多是吾輩自壞三代以還其人才氣數乃縣絶如此可嘆可嘆崖老近來有建白否治天下有本議天下事有要今上聖明要在親賢士養德性經筵進講亦不在多言只把大學中庸誠意誠身上著實開說務在躬行要見二帝三王盛德大業皆由此進日養夕息自然充拓光大聖德一固凡百機務自此中推出决無悖謬矣凡人氣質不大相逺今世學術不明槩用其氣質變小人為君子變君子為小人只是箇風之化公看劉瑾時多少才雋皆受變一畨孝廟朝亦即是此人才非天又别生一畨人也此豈不是風之化崖老在言路要只去其太甚者微瑕寸朽值此聖明要皆可化為忠以贖前過如何如何走蠢拙無比近來意向在行止之間元無拘著飲水食粥中不惡也順報便人去迫信筆云云百惟為道自愛答湛甘泉近拜韶州手翰并大學中庸測古小學訓規連日披誦吾兄之冲養深矣善夫無大器局天機甚淺竊有志於是氣力卑弱而舉千鈞未見其勝者幸藉師友夾持至此今又去之窮海之濱閉門靜求尚覺或存或亡日用驚惕實未能伏得此心安帖乃今始知聖學之若是艱也向與應黃二子期到西樵後二子不果來閩自擬是春獨往今又不果矣近得宗賢與守中書備述陽明先生有玊成至意實切摳趨但以出處未甚分明故遲遲矣大祗是向道之念未有如好好色惡惡臭之真也素翁正月離省下聞中途尚有辭本尊翰今附去人早晚想聚京師也叔賢近况若何敬問百惟為道自愛不宣答石龍自東陽一書後再不得消息前素翁去匆卒草草數字相聞而已不知何時到京師吏曺以何地相處爾今上冲年百無玩好一味恭默誠堯舜之資也今日所㥯者知學之臣以講明古帝王執中之傳使聖德日新月盛然後可以責成唐虞之治耳今日四方徴召多是邱林冲養君子今日所闕又非尋常百執事如先生者直宜處以論思之地勿泥常格更得一二元臣鼓動其間使舉朝皆相信附使有道君子得安其位行其志積之嵗年不患先王至治不見於今日也素翁去意却欲徐徐或者多以為君命召不俟駕竊想素翁意思正以近世大臣去就太輕故所就亦多茍且故堅卧而强起強起而濡滯者且審人生注用之果如何耳此老若當軸直是要幹古人事業實大難得甘泉兄過韶有手書并諸新得見寄連日閲過儘多啓發處此時想聚論京師有不一處幸與商量務歸大同至慰至慰南洲兄起否久不相聞矣前領東陽至意平日所學何事得時行志吾輩一大心事然君子蓋有自處者走不為自便也未面俟再詳與應南洲兄久闕聲問矣聞石龍竹江俱已就道甘泉此時亦已抵京不知兄何日出門也先朝廢置者率已登用諸賢一時同朝實太平之一大機㑹也竊以興致太平自有先後緩急之序要須識得小貞大貞之理自古君子在位能有幾時往往為喜名好事者將好機㑹失却兄見林茂貞應詔一本否議論得極正大處置得極縝密但其言語太峻急無涵蓄後來遂生出許多支節不相下氣只就君子一邊便不能得其同心共濟矣吾黨最患是分黨相治則凡乘間而伺吾之隙者何所不至此事稍覺轉動良可深慮兄其體念之近得甘泉兄訓規大學中庸測分折條件覺得窒塞費氣力相見幸與明辨之善夫識淺近答書未敢論也上孫九峰大司徒善夫癸酉秋獲送道斾南歸旋以疾去之海上侍履無由每瞻嵩南九峰鬱鬱而朝廷之柱石在焉自我公去國十年而十年內之風物氣象何如也今上聖明應運御天而我公實起而輔之是今日聖君賢相一時同潜於襄漢之表今日飛龍在天而應之者固冝有九二見龍之大人也於乎不圖漢唐宋而後復見堯舜為君臯夔為臣而同廷合席也蒼生世道何其大幸哉公之一出一處實朝廷安危之係天下治亂之凖也信非以一節自止者可比方其萬一也今日斡轉元化整齊綱紀非公其誰也先朝之弊甚矣今者其後甲三日也一動移間就可黃虞其天下使萬物各得其所願良在此一大機㑹中萬萬不可失也善夫踈凡迂拙自知當齟齬一世謬充我公昔日藥籠中下品在教養徐議之列銘深肺膂奉違十載中間稍出為先人贈典隨衆獲罪以不死餘軀復解去草野荒落竟不能時達其私情隆想天人愧負門下多矣遭際明時正好執鞭為大君子御又以病居不得聆謦咳於萬一情其謂何昔溫公謂元城先生曰知所以相薦否曰獲從公遊舊矣曰非也光居閒足下時節問訊不絶光位政府足下獨無書此光所以相薦也善夫於公視元城於溫公迹實相反敢自避其斧鉞之誅哉顧自原其望台之私實無間顯晦希曠之迹有難以言語自文者因吳德翼之便敬此布下悃伏望益為天下加愛不宣答楊叔亨宗道至始得吾叔亨動定云各係公事亦不頻相見日來切磋何人詞藻之學視往日較不動意否恨團聚日淺猥辱相與至意實未有毫分禆益愧負可言容色音問之闊又將三載矣善夫此歸只為求所以立者閒居靜守追其病痛所在日用應接為所障礙處甚多不見長進計今犬馬之齒去四五十直咫尺間耳因念入仕將草載分內事未有一件成就此身負陶鑄多矣周勤可所附來書是今日到拜教拜教前寄去口義多出一時應答不足觀近稍看過儘有未更定處纍欲抄去求吾叔亨評改且未能述而自歸以後無有從講者未曽上紙大抵四子六籍只是一致但尋得源頭分曉萬軸破竹矣口義原不為著述第使聽者備不忘耳大學明德中庸性道教作何理㑹若苦去書本上搜求該博一旦年力衰莫却於何處安泊易理今頗見得幾分比舊說較濶大未敢謂斷然是如此行將與吾叔亨面論之春秋元是舉業上工夫今幸已不記憶大假倣佛得聖人意思未暇攻矣象山語録大槩在鳴寃録今人學象山如鳴寃之名可作口實耳古聖賢立言只是發明這一件事若讀書得法更不消許多朱子精義象山廣大俱不外此學者只管較量朱陸同異恐反被異端揶揄也吳德翼去促草率布此德敷克相俱無書幸引賤名與思道自去夏拜緘後續奉三狀不知盡得達否倉卒為别又是幾畨物候耳日月如流吾二人者皆是四十左右不知更有四十年於世更得幾畨離合也學問未成事業未建善夫此身愧負於君父朋友多矣今雖處散地畢竟吾輩平生所講明何事及時致用自是明體者所不忍失善夫庸劣迂拙兄實知之其平生自揣實不敢過望其所以自待亦不忍自薄得一僻邑而治之鞭策駑蹇日不越百里容或有濟顧此官階似非可下而出宰者當此聖明善夫顧矯而為髙耶近士夫中多勸善夫可速出善夫私念出處决不可輕窮達斷自有命前此僕僕道途旅進旅退於君親未補毫分而身心所失奚止尋丈倘不我録顧當安諸命焉已矣惟兄其教之吳德翼謂必致書山東燈下草草答歐陽崇道承下問求民安瘼之念藹然可掬以公之賢明進無似於忘形之地善夫顧忍隱情惜已自同寒蟬耶坊里事據善夫耳目所及儘見公溥寄報職役人户者改正甚多百姓至愚而至神孶孶求奸反受其棼看來百姓儘為恩威所囿轉移之速而不忍欺不敢欺者又在於揭日月之外也慰慰其首報未盡者又聞開自新之路其一二未平者又聞開自直之門可謂盡其情平其政矣但鏤版一事善夫敢盡其愚人情彼此勢均收除之際於升合計便宜自有許多難處處里里如此草册甚至有抄舊管者非其緩急得已之罪也聽審間第不失以正對耳若一一刻定百姓十年受其縣拏勢必至於更易更易一多公忍盡誅之耶其法只在於部省府縣四冊一時俱了則自無弊矣鄙見如此望惟髙明更裁之山林迂腐恐不足以窺公妙用未敢便以為是也答王應時承手教綣綣至意深悉别後動定執事行益髙學益邃而取善益廣善夫不及也天下多故則小人攻君子及稍無事則君子自相攻天下事最患是分黨既已分黨决無有相成於是非之同以共濟天下者是國家之大疚也執事其念之善夫久居荒寂日思海內故人人各有長皆是善夫師表追憶教言恨不得縮地未止是聞足音而喜也出山尚未有期奉晤無時幸為道自愛以慰遐念答張昆侖平崖歸領教言且詢動止吾子以宏博之才加以恆嵩河漢之助宏大幽邃無不有之矣善夫入山日深矣何日得與吾子共談天地古今之變以究出世之論也馬江二子復得合并知吾豫甚樂也夢澤竟遭此摧抑過剛則折吾輩亦當自尤也聞擁車者通州足以見夢澤之素矣閩浙之行莫是謾語否待待太初槀奉去此走批㸃者此刻出之徽人徽人好事而畏禍多將原題易以已名又將涉時事者削去可恨可恨今此盡行塗去更有潯陽歌十首在汪希周處取入之煩再刪過看與鄙意同否至望所惠書甚佳拜貺拜貺上陽明先生善夫䝉天不棄癸酉嵗得假毗陵之謁猥承至教奈以天質凡下無有其地因循嵗年幸再私淑諸人稍知向道是雖未及先生之門然竊念先生之恩信與生我者同死不忘也第恨立志不堅時作時輟比來業不加修病不加少恐一旦即死與草木同朽不及終志門下不無負無涯之憾矣去秋擬出門再沮於大病至今未復區區摳趨寸忱未有一日放下也子莘往敬布下意萬兾不棄絶於門下不勝幸甚答張起溟適作書寄去程丞且至彼此相念一而已矣讀教札悉公已造髙明地位生此天地得為人為男子復備此聰明不求實作用以了此生良負覆載學問無處非致力之地所謂厭喧就寂避繁入簡去冨貴以樂貧賤舍山林以混市朝凡有意必皆非也公根器大佳求所以安身立命處甚無難事辭章技能奚啻笱屣也善夫資禀駁雜鞭策不起無以答知已秋冬不免一出隨世遷就非其志也承委作尊翁壽文於公有愛哉善夫自永感後不忍作此項文字今敬為樗翁傳如何文思蹇澀亦須旬月可辦當有以復也未盡與朱白浦近聞兄出視齊魯嵗裏一啓恐不及矣平崖此行與兄同地凡百敷張自身而推者日與講明沛然中正矣喜慰喜慰善夫自得杭州書旋得南洲石龍二緘承三兄誨掖深恩何可喻之去秋滿擬弔楓山即謁陽明奈瘧疾纒糾至仲冬百病增劇今五閲月矣尚面無人色精神血氣不及往時多矣近與平崖訂約異日過魯謁孔林當移兄為㑹以罄所未言功名之論最其後者聞子積子謙小野皆坐詘其有以取之耶惜哉惜哉寓岊上布此不盡與陳天游方伯善夫寡劣幽塞行不逮志百無及於人人謬承君子過與不在遐斥之别乃不獲領光霽於謦咳之下以增未能豈所謂入山舍玊入海而不探珠耶良愧良愧善夫自去冬病厄至今形骸盡死所餘者殘喘耳功名事恐非樵牧之徒可以幸取近䝉有勸駕之命中賜過楊反身自觀豈勝皇汗且自揆才力實不堪事事兼以平生數竒百病相代自分得穩卧於聖明之世數年以死萬念俱足矣善夫何德以承君子之辱昔陳仲舉薦徐稚稚雖不出感念深矣病未愈莫拜堂下敬以狀致悃唯察其所存幸甚答季明德春間得見懷之作備聞起居緬惟草堂促席話言常在懷抱也此時官理想得行所學學官一而已近見時禁所指將有紹興慶元之憂人心世事乃如此諒真見道君子必不為所變也此道在天地更有何同異諸君子莫是血氣異之也血氣愈用去道愈逺矣可嘆可嘆善夫自冬徂夏純在病中今雖去體然尫憊甚矣餘情甚長俟相見日盡之未一一答魏子才近南海李令書來始訪取得手教并三訓規服玩不去手敬拜嘉言承發示三端其提掇之意深矣深矣善夫譾劣少不聞至教沉溷文字伏匿空虛者殆十許年中賴朋友相麗稍因此中有末見然志不堅忍依違汩沒又將十許年今髮已種種矣自視實未有毫分植立好善不如好好色惡惡不如惡惡臭即是無實知見故無此真好惡日用夾雜者又何限日唯驚惕將終為小人之歸矣此不敢自欺不敢欺人承諄諄至意實未有以答君子之辱也鶴峰在此頗獲相觀摳侍何時天向肅惟君子體之不宣與應南洲春間得越中二手教繼得顯仁濟上種痘事近又得二兄宦蹟皆好音也善夫入秋病稍去體然神思大減眼就花齒半搖動百年未中而衰颯如此不肖可言耶白下之命於病軀散才甚稱且得以暇日求吾斯未信處竊自慰也石龍兄此時想履任相聚之喜良莫可喻兄在京師近况如何閲邸報氣象甚見逼促今日須得一二元老休休有容兼收並蓄化小人為君子勿太黑白使此輩不自安漸漸整頓將去或有可望士大夫誰非可用之材今日用人只是不當位故俱不得其效處欲言甚多相見在何時勞心忉忉與林平崖宗文知未回平崖序容另寄林廷光嵗裏到徐未敢前進今復送家小回世事可知走踪跡只在江湖之間矣少谷集卷二十
