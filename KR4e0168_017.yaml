body:
  text: 少谷集卷十七明鄭善夫撰書一答殷近夫袁青田人來拜手書方履知吾兄日不忘情於區區也纍書教我誠意核切非尋常學問工夫誠以愛我至不覺其望之過也走何人哉年來汨沒愈益荒蕪書已不能讀處荒村尚覺忙擾身已不能靜且敝鄉無大好尚所見者舉業所足者科第孤立一身兼以下人天分復疏且懶恐畢竟作流俗中人耳逺拜知己之辱北往何日思道服闋亦在此時仲默在京邸三人聚首所得可言幸毋忘惠愛之及不盡所欲言與鄭汝華方伯論氏族承示宗譜歸而再三校讐竊疑東漢以前恐非夾漈所訂者且如去疾乃穆公之子子産乃成公少子而譜皆遺之鄭莊歷官俱在漢武之世終汝南太守以死而譜云建元二年封太尉何據也𤣥和之系尤為謬妄按漢書鄭𢎞漢元時御史大夫鄭𤣥漢獻時大司農前漢僕射崇八世孫冲之孫與鄭太同時𢎞𤣥相去二百餘年而系𤣥為𢎞之父此豈魚魯之誤或者名偶相同而淺儒修譜不考年代差異乃謬以康成行履實之以華其先不自覺其訛舛至此與走意以崇𤣥自為世若與鄭莊同𣲖莊固名流而漢書所載何不云莊幾世孫而獨舉崇與冲且崇祖以訾父賔弟立俱不見譜冲雖見譜世次復不類又按鄭太對董卓云東州鄭𤣥學該古今莊太河南開封人崇𤣥北海髙密人太與𤣥實同時其云東州則其自為世也甚明矣莊𢎞亦各自為世𢎞太山剛人代韋𤣥成為御史大夫傳記不云為莊之後且地亦不同而譜以為莊曽孫何哉鄭莊之後鄭興之前史傳皆無可考莊卒武帝世興光武時大中大夫相去二百餘年遂有二十三世之從似此類豈能強而通邪興生衆衆生安世按漢書安世子亮順帝時除為郎又云太大司農衆之曾孫而譜系太乃為五世孫又按夾漈譜序後漢計掾熙生二子長太次渾居西河見譜者十五世以世次計之則熙當為安世之别子今譜不系亮而系琳輔熙為三世必有以兄弟為父子祖孫者矣夫莊𢎞𤣥興衆太皆著汗青者夾漈平生最長於考較豈有後先舛錯至此哉夾漈所訂莫始於渡江乎否永嘉以還亦有舛錯如平與弟昭隨父過江至義熙元年已百餘年而云是年遷東陽年九十三卒于官亦已駁矣陟顧莊露淑三公八世祖也三公既為天寶時人則陟安得登天寶進士而陟子廣安得為開元將軍太和後天寶將百年而淑弟潛安得登太和進士此類豈足為傳疑意者夾漈之訂無此爵號或乃後人附㑹反以亂其真者當斷以大義削之豈可更因其舊以惑後人邪伏讀傳疑辨甚辨甚然以三公斷為梁陳時人恐未必然按舊譜三公並居侯官天寶二載因李承昭叛避難徙永太再徙莆南湖而家焉後兩捨地為寺移祖墳十二丘於寺後西峰此非夾漈所訂乎夾漈復云吾祖實出榮陽過江入閩皆有源流者非是譜上之世次乎今據俊民所述自三公而下四世遂至五季其支分𣲖别爵位林墓了然明曉耒老重修亦皆依夾漈所訂者夾漈讀書極多是譜信其所訂則三公為𤣥宗時人無疑也而黃滔所述陳永定二年之說不知何據竊以年世計之自庠至三公已一十八世自永嘉至永定方二百五十餘年不應世代如是之速也自三公至良士只四世自永定至唐景福已三百四十餘年不應年考如是之長也若曰𤣥宗時人則世紀年數上下俱相䝉矣且舊譜數家合一不差必皆夾漈所定者其有差者直好事者欲華其衣冠之盛不據理勢之有無妄添科第官爵而已以致真贋混淆莫能卒辨反悉以為僞耳又按耒老所稱仁儒譜云逺祖任閩刺史道由莆境見南湖聳峙盤拱葬祖墳一十二丘于山之陽實永定二年也曰逺祖為刺史似為昭也曰永定二年似為三公也而吳源述露公事跡乃云昭以永嘉入莆愛其南山遷祖墳葬焉梁陳間露與弟莊淑廬護墓側因而卜居永定中以夢捨地為寺遷祖墳一十二丘於西峰之下則仁儒所載刺史所遷墓十二丘似為昭也昭過江第二世而曰十二丘必河南遷來者河南之孫子有無姑且勿論然則懷愍之間竄身不暇豈遑遷墓于此之多之逺乎且昭未曾家莆遊宦其地遂遷墓以從於人情似大有不通者而吳源所述復持兩端焉既曰昭以永嘉入莆遷祖墳葬焉又曰三公遷墓十二丘廬護墓側細究前後紀載俱是以訛傳訛捕風捉影無有真知灼見破千載之惑者且舊譜捨地事跡只云昔時或曰得之傳聞實無永定之說也而曰三公梁陳時人不過因廣化寺碑堙沒釋子重立撰出無稽年號引以久逺其事使其後世子孫不得恃此為擾矣三公豈真梁陳間人哉且謬以戊寅為庚申其情可識也舊譜夾漈所訂既不盡信乃援廣化一碑遂嘵然而從之三公以上世數既不能信三公以下世數歷歷可證計之何如也執事以天寶之際為近而易知而廣化之碑誠足徴邪以郡乘亦載其為梁陳時人邪就耒老上遡臯筠臯筠五代人也歷世不過八九而所捨田地尚堙沒不可知而碑牌祠堂盡為釋子毁拆則廣化寺之創安知其非天寶時邪閩自開元以前儒學衣冠閴然無聞三公自天寶之世為儒學開先而後林藻歐陽詹諸人始聞見於世此世所共明者而郡乘梁陳之說安知其不緣廣化之碑之謬乎管窺如此所謂校讐惟其是耳其有乖誕處尚幸聞之答近夫靖江人至拜手教已悉别後動履將有他出不及面詢所欲聞為恨走到京數日只聞青田之調青田在他人號難理在君則隨所之而無其難者但責處賢者傷明耳維益自努力毋損平生志向毋以彼我之賢否位之上與下權於心古人有安之勉之有終不能遣於懷者性資學問限之也君何如人哉自愛自愛李自石已調泉州絶無芥蒂於心且甚樂亦嘗觀其所忽非素有養者未或如是吾輩不能也走行止尚未能决日抱苦心家人皆以歸必受饑餒為勸畢竟吾人不官而即貧死邪以此進止實自皇赧室人病血輒不育兒女事不可力致奈何豫冦在開化久久不得思道家消息方母櫬在庭故為其負戚耳衢處風力易相聞幸以相聞餘惟加飱毋廢藥物不一一與近夫五月得邸報兄在首録再閲七月報兄以黃門南行慰甚慰甚當國得人賢而隱於下位者以次録用兄固其先也重可為天下賀自逆瑾首禍讒幸盈廷其法毛政網雖稍革去而飾奸文佞者固未盡除也不去恐終亂政昔司馬公再相識者謂其不去元豐之惡人遂有後來之紛紛也今日之事兄睹之也兄望重言信且司言職吾君相方汲汲求言補罅塞漏之時也以身任天下之事非吾輩其誰萬萬為天下自重走行藏尚未能自决今雖杜門不能盡棄人事為虛名所纍逐日酬應轉見勞苦世情尚同勢復不敢自異而逸也兄以我無朝參簿書之役為得受用歟年來索居愈益落莫意欲圖一出暫避旦夕饑餒顧癖性終不可改口復不能容惡在散地雖每怫人或亦無大禍若隨羣逐隊能免於意料不及耶今時雖未太平然朝有賢人亦非有大不可者必若畢志漁樵則有處分矣顧今名在宦籍兄弟妻子所仰給而存者實未終忘意進取也今不可出遲暮歲年乃欲彈冠夜行識者不為也如何如何明年春作意遊衡山順流當到留都圖一相見領所以教草疏之暇能不忘教我如昔時是為大幸人去疾草草布此新寒手縮所為詩文未及録寄與三房論祠堂事祠堂祖宗大事善夫力薄而圖難識淺而謀大日夜營思不勝驚怖猝聞三房子孫欲代而為之祖宗大幸善夫亦大幸祖宗餘澤鍾於三房獨厚三房子孫能自顧其田宅之盛財帛之贍皆曰祖宗之澤也思念祖宗久無有棲止自為之固宜矣第不知堂成之後亦許各房子孫入門而拜乎冬至之日各房子孫亦得陪祭於始生之祖乎如此則祖宗地下必喜曰吾三房子孫富而能義義而能公他族聞之固㰴吾大家之和之美也若但支分汝我任氣而行之祖宗恐亦不享乎范文正云宗族雖疏逺自其初視之皆我祖宗之子孫也况吾族澤尚未斬乎必欲任氣而私之恐復為祖宗僨事之子孫矣昔年聞有此舉聞亦垂成矣中間僨事者誰乎三房欲自立之固其素也然使祖宗神無所依今又許年矣善夫力甚薄識甚淺固知不克負荷上念祖宗餘澤濫及於不肖使有今日而祖宗反無所倚焉內誠不自安也以事關宗族之公裒資于衆善夫不過供役其間上代族長之勞耳非敢有所私也亦非敢有要以為功也而三房子孫乃不鑒其情而顧梗之亦何視之不廣也諺曰財多氣粗某某實主其謀乎不然吾未見仗義之易也萬惟髙明勿為後生輩所移善夫固無私善夫實無要惟日夜悚懼之至答戴仲鶡一自廢歸杜門削迹不知當世乃爾紛紛霄漢故人亦彼此不相聞别執事已三年矣執事以言廢名在朝野而入於善夫之耳顧未久也丁原德再至始得其真伏讀手書逺拜君子之辱大丈夫既出而不為祿仕要著實地正如執事之所也蠻夷瘴海困頓鞠窮隨其所之而安之然亦毋曰此固仕宦之捷徑也前代以直言得譴者他日公論一定每起為美官而天下人士亦以此多而侈之近世士大夫亦每效之以矯美名於一時及其貶竄遷則皆慰之曰是何傷哉固仕宦之第一籌也是豈臣子者之所以事君與士君子之所以立心哉執事俊頴百倍凡輩必能體此不惑毫髮之差奚啻千里之謬也勉之勉之增城之僻陋執事之窮厄固甚不堪者聞湛元明兄在家朝夕晤語亦可慰志君子固有窮時也眠食惟善自愛上周公儀方伯易時不奉教言詹賞風味未敢暫息使至拜五月二日手書備審别後湖南動履并示所未聞頓增戴戀善夫何似被䝉知待如此竊計之當代巨公於后進之士未有並者深愧墨呆少不勤行長不競時不能少答所期待比來百憂恂志愈益濩落室人與幼子相繼奄棄雖稍自裁抑然終不能忘情也復得肺腑疾不時舉發不能久視視久則即暈眩移時經傳筆硯不得不屏去今已久矣承喻以百尺竿頭莫惜進步誠犾我手之鶉者今者熒魂既枯乃欲擲埴以索塗而善夫豈其人哉逺拜大君子之辱出處一事未敢輕擬功名古人所熱中者方今後生輩各執其巧其或出位亢言身遭貶竄則曰讀書之能事畢矣不死則希越常格不幸而死亦收忠義之名學勇退者則揭日月而行以取捷徑沉冥數載反如烈火之攻中惡在其養之髙也古之人立身事君而顧如是哉善夫最傷不能自檢剬不能事人病日加益復不能事事乃自廢以歸深恐坐此譏誚故一切不敢通故人書兀兀至今日處荒村對樵夫俚子語古士耻之今雖窮厄然心實無所要也必不得已則當以仕易耕大君子以為如何近來隴西吕仲木最為真正而何粹夫魏子才王元凱輩次之然亦未知其心之所安也因愛中不覺縷縷饒舌荆湖大方政務計倍他省公暇望毋替藥物為國自愛心事千里悠悠善夫謹狀與殷黃門善夫啓石川都諫契兄走聞之揚雄君子在治若鳳在亂若鳳鷦明遴集食其潔者矣李善感之諫也人稱之曰鳳鳴不知鳳之於治亂也以鳴乎以顯晦其文乎聖人之言曰邦有道穀邦無道穀不知食其潔者有道穀乎非歟又曰邦無道危行言孫不知言之孫也將朝隱以保其身歟抑并其跡而冥之山林之間歟惟聖人為能舉權自賢人以下茍為祿仕則固有成訓也夫茍不為祿仕則入山惟恐其不深入林惟恐其不密耳竊惟吾石川之賢天下實知之其官曰諫官而天下實望之方今菉薋盈庭豺狼在邑走聞黃門之為職也為天子之耳目别不以簿書雜而煩之使專其視聽朝夕論列以匡王不逮不聽則以身從之如知其不可則有去而已實非如仗馬之職於不鳴也今石川之職是官也亦已再易時歟而顧默默然者將朝隱以保其身乎而黃門顧非孫言之官也將顯晦其文不必拘於治亂之時乎食其潔乎抑欲冥其跡而勢不由己乎大若實必宏若聲顧將有所待而大鳴國家之盛乎而但為祿仕乎反覆思惟不能得吾石川之所也石川抱不世之才希奇之珍其出其處所關甚重萬非瑣瑣者可以茍焉者也君子所為或定有出於恆情之見而在走思識之外者惟不吝相聞是為慰走年來重罹憂患春夏之交妻子相繼淪沒哀感浸疾未便能出門相從㑹敘無由臨風忉忉所命録三子詩具别楮善夫再拜上邵二泉先生善夫聞之韓退之曰士之享大名顯當世者莫不有先達之士負天下之望者為之前焉士之能埀休光照後世者亦莫不有後進之士負天下之望者為之後焉又曰下之人多負其能不肯諂其上上之人多負其位不肯顧其下故髙材多戚戚之窮盛位無赫赫之光嘗竊卑之曰退之不過為名之士也夫名者實之客造物者所忌知者避之者也而可以故故取耶閣下負希世之材軼代之文潔身於緇塵勇退於急流以忠孝為天下先而立於獨雖三尺童子皆知誦邵二泉之名也非退之所謂垂休光照後世者其人歟然而赫赫之光豈賴於後進負天下之望者為其後耶躬吐握以收豪杰之士於門下豈有意於贊盛德取名譽於豪杰之口耶而豪杰之士賞望光儀惟恐不出於大賢門下豈有所希冀自淪於諂諛之歸以取憐其戚戚之窮耶善夫無似䝉不以衆人相視非不知摶牛之虻得附鸞尾則一翥千里顧身雖窮戚實不肯效諂求薦以傷大君子之明也竊嘗論之退之亦古之所謂豪杰者其上宰相書至曰蹈於窮餓之水火大聲疾呼而望其憐之而不以為諂焉退之豈但為為名之士哉君子之仕行其義也非以謀食也而曰仲尼皇皇然則陳蔡之間詎至於大聲疾呼而望人之憐之耶遂令後世之進取者莫不曰退之豪杰者也猶上書求薦以取其名附托物勢以成其便風天下以為凖焉由是薦舉為市矣昔人有求薦章於韓持國者程正叔曰大賢居位却不求人乃使人求已是甚道理竊以朝廷設官因其才而授之任使下之人皆不求則庶寮百執事之位終歲而虛乎上之人視朝廷之官為公器不使恩自已出必求能者賢者充之則一材一藝之士豈皆遺而不用乎愚意以奔競之風實始於吾輩而貪叨欺負之徒顧有所藉口而為之者也平居長執此論以過韓退之不敢以語人恐遭失言之責敬三熏三沐而陳之大髙明之前萬一不以為狂妄惟俯埀教焉不勝幸甚答姚元肖吏部辱書教以不逮諄諄然所謂啓其聾而豁其聰浚其源而導其所歸者也走童子時即好為文辭每讀大人上林諸賦愛其窮髙極眇鏗金戞玉奮然希剽其餘聲晚過王伯安于毗陵相語數日始計之心曰雕蟲篆刻壯夫不為也乃始改念捆托羣書而求其鍵于今三年矣蒼蠅紅紫未之有别者也深愧知已之辱深愧知已之辱然曰林居有俯仰之纍謂走必須一來固也走家素貧入仕十餘年而不家食者才一年比來八口愈不自支豈故欲為希僻不情之行孑孑然慕巢許之髙哉顧以病骨不可一日留闕庭得歸甚快初不計其來之時與勢也方今事例凡起廢者必親致詞於州縣省司上下凡三衙門四鄰里正與醫學凡三覆結而後得達于銓曹復待命幾月而始得一職也久卧者思起而乃艱其來者非所謂門有噬狗乎今天下好進之士不為少矣其多才善能之集于京師而矯首拲足者亦不為不多矣大臣之隨材任役分布內外四方亦豈乏一荒逺曠莽之墟處麋鹿斷聲息沉溺枯槁之士而皇皇然如恐遺之者哉沉溺枯槁之士不可謂盡不欲仕也仕亦不可以為全為祿也置之百執事之列亦不可謂無毗庶政而但蝗梁黍也走之進退界在兩難之間耳昔者韓退之三上宰相書汲汲求進嘗竊鄙之而三不報至有周公之說跡其事又不能無悲其心也如其不為祿而有憂天下之心雖孔孟亦嘗皇皇焉耳走實匪材而貧乃甚之狂又甚之以退之之賢至於三上書而不報焉不待慧者知時宰之未必賢如周公也今上有周公而走獨守株其拙又甚之雖有憂天下之心無怪其頓於萬里之外也因閒論徑情及此似乎有所要而言之也皇悚皇悚北地早霜惟眠食為道加愛不宣答曾東石正郎辱書承念及枯槁教以習忘使神完氣壯意思甚佳走鄙性最困鈍劬書成癖每至於族必怵然搆思必得而後滿志然實無著地工夫隨得隨忘非所謂習於忘也思苦則神昏神昏則有隂陽之患比歸三年病不加少自計勛名事業當低頭於豪杰之士而豈在我輩疲薾之夫哉伏誦教言誠切膏肓敢不祗服情厚近來文字已不多作非故為是荒懶也力實有不逮者謬蒙比名於仲􅘬之列皇恐皇恐楚人得山雞其鳴近鳳也其文采近鳳也而語人曰鳳凰鬻于市得千金焉山雞之被厚名而賈重價也能不愧於心乎真鳳過之能不撫掌而笑乎謂白近緗緗近黃黃近朱朱近紫紫近紺紺近黑而曰白類黑非倫矣擬人當必於其倫實不副則訾咎深走豈敢當是哉邇來深自晦藏去之萬里之外三年之久平生故人漫不復相聞竊喜已漸不為人所識而執事遽為是言是固愛我偏不覺其言之過與相失時久每賞光澤無時少替時事如何心事如何風中惟不妨相告以慰念慕不備與德緒易節不奉教音知郎署多事猶乎在山者之未靜也而彼此係戀或有時而廢乎遐荒幽僻之鄉窮獨棲遲寂寥而生感顧不間時而忘情於執事也比來作意出山相從兼以謀食不圖天譴不德室人與次子相繼棄捐辛酸崩迫不自禁當命之蹇剝乃一至於此也且聞起廢事例甚與志意相違讀書仗氣節處今世之道稍不至於凍餒切身有甘心自絶與猿狖同侣而弗悔者顧無田無桑十口所仰賴以衣與哺恤恤然必須一出而其途乃如此且奈何哉泉山先輩纍纍以先人未受封相讓竊以此事顧有數存焉非心之所能必者歟道宗此行甚非其得已令弟已分門其母皤然於北堂之上士處此有難用情者矣隔越時久勞心忉忉眠食惟致和宣滯為道自愛不一一與陳職方德英芋原奉别轉眼裘葛屏跡海上不能無萬里合散之感也續聞動止佳勝且有職方之復大臣用才必欲當其任如是哉深慰卑望竊計吾鄉同年八九人十餘年間榮辱進退存亡之迹歷歷在目中如吾職方信不多得也小弟最為沉滯然每以死者自况中甚安之近築一畝草房於小華之陰杜門自屏惟與貧賤時一二知已者還往糲飯藜羮甚覺適便伏覩起廢數事已絶北轅之想耳近來親故稍以早出為勸未敢便論達觀譬如尚是一不第秀才亦安往以辭貧賤哉其况愈下則其心愈安也秋事方殷百惟為道自愛復周方伯公儀使至拜手書教所未聞且示近夫事跡前此數日張道宗書來云聞近夫厭世駭怖悲辛不能為懷者信宿然又以常理推之此必無是事近夫為人稍執不肯近細人或者有忌者肆為無損益之謗以疑人之傳訛也善夫平生亦曽兩遭此故不以為信爾及讀尊諭輒潸然涕零肆近夫之文行乃止一黃門給事以死其平生歷履莫非險艱登籍以來即遭禍變杜門者五年一出即外補非深山即逺海然而皆敝邑坎坷蹭蹬者又五年稍進一足即以天死近夫平生匿德藏光多聞內植有銅鞮伯華之美而不居或曰文人多窮豈其然哉夫所謂先器識而後文藝者又未可深據而論也方今朝廷方切論列而近夫有言之責不及為朝廷一吐其平生雖濟濟多士固不乏一近夫然正人君子日以淪謝無亦關係於世道此又不可止論近夫之身之窮也善夫平日取友如近夫者不能數人比廢歸輒見凋喪落魄可言師弟子恩義相通敢縷縷饒舌左轄之轉慰甚擬作衡山髙為贈數日以近夫之故懷抱作惡不能發奇句就當寄上近詩凡三十六首附呈倘賜覽觀亦見其志之所存不宣上林見素中丞嚮得挹道容詹跂益深館遇之隆詩文之賜感愧萬倍小子何幸得借聲於先達之與增重萬倍執事大仁人大君子也嘗與同輩論當世人物至執事則僉曰第一流使居相位其勛業所止豈處韓范冨歐下哉善夫不佞竊以四公行業在汗青可數也執事平生自許於四公何如時命際㑹且勿論其大節視四公何如韓富無文章歐差優於范其體格意氣槩不能達唐人上一等執事所為文自視於二公何如竊嘗求執事之平生所至毁淫祀佛像汲引善類陶淬後進皆是古人絶好處繼曉之攻姚州之遣時中外翕然即以唐介擬之每讀執事之疏雖與日月爭光可邪介足以盡執事邪比者巴蜀之役命下即起赴國憂如歸首黜公孫以戮賊於千載之上祀諸葛以自表其素而後誓師卒靖藍曹其行事磊磊落落如此不知韓范陜西延慶之績有是否也及甫畢事即復引去去即杜門著書絶不敘西鄙勛伐無少疑滯焉不知四公於出處關竅上果盡如執事信道不惑否也魏公歐陽公濮王之議不免微瑕之玷冨彥國居洛朝廷待以裴晉公之禮三命而三不起一僧開堂片紙招之即赴焉此類尤可以比方執事之大者但可與智者道未可與俗人言耳凡人貴耳賤目彼見四公之重係當時後來宋名相無及者而執事落落三十年不一日立于朝今遽曰配四公而齊之孰不愕然而眩者且執事自謂能如四公之得君邪使如四公之得君不能為其事業邪四公事業顧别有大於史傳所載者隱而不見邪就今日而論執事事業不足以表天下照後世邪此執事獨明之而善夫獨信之也然此豈一時之言哉世之人率執一代不如一代之說槩曰古今人不相及然則後世果無聖人出邪賢人盡春秋之世邪六朝文氣大壞之後何以有濓洛關閩諸大儒平居有此一種妄議不欲逐衆人常談執事以為何如也幸進而教之林釴秀才一經品題便作佳士就敝地後進實無出其右者志古瘡疾盡去體否念念族譜敘向曾面請惟終惠以慰卑望侍門末由百惟若時為吾道自重復林見素公小僕遣二日而大製且至捧誦再四有甚連城之獲善夫何幸得附以不亡于後也此素心也道里遙逺復即有行役力不克躬輸悃門下奈何地震陰為陽行春秋主權幸侵君將動有所變且主兵事吾閩閹竪執制小人犯君子連歲干戈不旋踵此其徵也春秋地震必日之日者一日也今此以月月以時恐更有隱憂者矣天變决不虛作必不止此詩選序敢輕率為哉須得途間擺脫去雜慮靜思半月方敢應所命顧恐佛頭上纍糞矣孟太府事狀已附上山林立言道體最宜以時加愛不宣畣城中諸友數日裏方作書寄時勉是一好便也元旦髙宗哲至得書宗吕復遭此內艱辛苦中何堪崩裂璚州之行回期在何時冒此萬里長途凌厲風波恐莊公寒氊能如范希文之濟寒士乎太山孫明復時之未通其何堪其何堪崖老之不利於文也中無釋然乎走自别來坐孤悶無一日好懷到杭幸遇周用賔孫太初作天目赤城之遊日料理山水事頗覺心源澄徹復與黃宗賢應元忠參究聖學又是一大痛快回思二十年所下工夫皆是一場罔兩自今以往視世間一切真如密虻與空花也近來復體驗得洪範九數較分曉看來天地間一理既通百理皆徹既識得箇主人翁面目其餘不足辨也諸君子才器十倍曹丕幸當於此大事上一尋究定須有大了悟處如何時勉去甚促作書草草亮之亮之與孫太初鴈山歸即欲遣問得之人言皆云元宵左右即復返西湖嗣是或傳在湖州或傳在蘇州或云尚在嘉興莫得山人蹤跡坐是契闊近得手教甚感指示迷途行藏事走有三不可姑且逐風塵以去未敢論也先見不真後慮不逺不能學箕山頴水奈何周用賔吳惟可聞即來就至今未見到近得口報用賔是月初離江山惟可此數日離開化早晚當聚首湖上山人一春强半在湖州登髙眺遐有過於西湖煙景乎其與遊者有如吾儕者乎擕杖屣來同海內故人聚散甚可惜留念留念詩敘久已脫稿情辭殊不能盡然才力止此矣不敢為山人惜也與城中諸友别來八閲月彼此書問雖未嘗廢然視往時歡好邈若山河矣客途念身事時事絶無好懷抱雖以大道理自遣然淵明至詠荆軻自不覺其露出本色矣逢南弟復得生相見天涯骨肉團圞始一大開懷道路乖艱顧自安矣朝廷邊事似無大故但內外合八家用事聖駕輕出無時腹心之病不知往後竟作何結絶矣隱憂隱憂滄灣平崖安穩如何百竹往墓所習靜果能降伏其心否世亨公衡沛夫得廪否木虛文輝文旭時復相聚否此皆所欲聞也聞作古文㑹固是美事第作意為此亦害心且不能不招物議耳㑹晤末由心緒縷縷惟端居守晦以觀時變不一寄林見素中丞㑹志道伯固備審動履康勝時善夫初到京而志道已在行間不敢草草奉狀不接光範久矣去歲重九前即别鄉土有是行實一念功名降伏不下留杭甚久細思身事顧未有的然必往者因乘間入天台與委羽黃綰居小有洞中數月于時意向即欲終其身作山谷逸民矣比歸占範數且云年命甚促乃熟計前進效世俗所謂顯親者了事即歸耳倘未即死當木蘭侍几杖聞所以委心立命處是所深願近來時事益不可言聖駕此度北征京師人心十倍皇悚盜賊僞稱行幸者充斥州縣城隍守禦廢弛無餘倘一旦難作為將奈何楊石翁堅卧不起縉紳諸公雖有謀國美意此時權不在手大家挨時日以俟運於天矣近聞江淮之間往往龍鬬殺人漁陽各處六七月氷雹殺菽雲中大將軍亂鳴此是何等災變陰盛之極勢必至於陽爭者矣可畏可畏慈聖太后祔廟之夜駕出而雹冊封傳制之夜駕出而雨滿朝衣冠兩在流漓之中天垂象見吉凶古之達人當此時尚食祿喣喣為哉今天下之憂大率在邊防且如吾閩之變才缺數月之食而已今計邊儲動乏數年而宫車在邊資費百萬加以誅求無度上下離心外患且至恐有不忍言者矣閩中近事固是天意參之人事當路諸公亦不能辭其責且延平首禍其原實自萬同知萬君為人立意偏陂全不識大體平日作事動結軍士怨讟及其告乏復不肯少借聲色一以威詐臨之既結以怨復絶以威人心最易動者也是誰激之使變哉及既鼓噪為亂却又倉皇給錢穀守姑息隨其脅滿其欲而竟不能申國法誅首惡以弭亂階此風既長更復何所畏忌哉繼是建寧邵武福州諸衛如相授受然樹將壇奪鎖鑰厲戈鋋掠財物迫長吏向曾與同志逆論已料其必至此也今日論奏復欲守小信而不處首惡者以聞是猶以草菅伏火欲求頃刻未然恐燎原之勢又當不止今日也吾閩自古避兵之地看來元元赤子詎安敢為變耶今之論事者苦於狥目前而不揣其本而救時者大率顧近利而不慮其後安得而不至此哉明公望重道尊言出而人必信服似此類正當明示當路者議而行之安息一方固吾輩仁民愛物的本意使以利害計之其陰德亦甚溥也萬毋以身處江湖自阻如何如何方松崖鄭山齊年力精鋭而早就閒散讀書求道當必有自得處起居幸毋惜為聞摳衣末由惟若時葆和為道自愛不宣少谷集卷十七
