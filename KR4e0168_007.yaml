body:
  text: 少谷集巻七明鄭善夫撰七言律亭上少谷峰頭草亭好清秋原衍争繁芬石上昌陽盡九節笋根稚子皆此君放言何求了物意惱世不徹叅天文平生最愛陶𢎞景青山百年怡白雲從扈嶼沿溪陸行抵義江陳職方留讌山中扈嶼迤迤連紫臺瀬江曲曲罷喧豗漁人釣艇沿溪泊野老柴門傍水開樹底巧通仲蔚宅𤣥中殊愧子雲才南遊兼得酬佳節黄菊青山共舉杯寄近夫黄門憶自吳門再相見風波希闊兩年餘天邊此日歌鳳鳥海上何時烹鯉魚巢父掉頭終已矣士元展足近何如秣陵雲樹三千里未得從君賦卜居九日憶近夫忽憶齊州殷給事經年不見使人來往時皂㡌真能落此日黄花何意開南國眼深鴻鴈字暮雲天逺鳳凰臺泰山梁甫輸心地報汝璚瑶清夢廻泰陵千林松檜鬱相廻永夜風生瀚海哀萬國昔曾瞻氣象五雲空復䕶崔嵬古來鳳鳥長難至天上龍髯定不囘苦憶焚香賜第日報恩真愧濟時才放艇白龍江上放孤艇青草洲前乘早潮觀水欲窮滄海賦看山虚憶白雲謡舟航惡少妨漁父風雪殘年淨獨苖散地生涯轉疎濶南州人事已蕭條金粟臺秋望鼇峰烏石宛相對越王城中亦壯哉正堪乘興黄花節况得消憂金粟臺斜日逺天寒鴈到緒風髙樹暮蟬哀芙蓉冷落秋江淨故國驚心白髪催五日遊道山同宗吕木虚仲夏五日簫鼓競薛老峰前舟可憐水下九龍江意逺山廻五虎地維偏故情幸不遺髙適豪論能無屈傅𤣥萬事糺紛人代裏聊為酩酊答風煙小至小至風煙催氣候南州雲物變乾坤城頭梅栁青春早海上魚龍白浪昏萬事艱難悲故國三年戎馬閉柴門小山梁苑多才子漢水襄陽猶隠淪白湖送陳比部雲山悵望八千里兄弟相看十二年清路音塵長阻絶白湖風雨重縈牽江梅古調當離思渚鴈春心亂逺天金馬碧雞思共汝周南蹤跡尚茫然夢出少谷先生白玉簪秋風欲别小華隂傍人鸂鶒機初動驚眼芙蓉花正深未有行藏關世道是何夢卜合人心東山逺志誰驅使小邴官階自滯淫溪上即事二月松花春欲深九溪石室晝長隂獨行罔兩還相避並汎鳬鷖好自尋人事儻逢圯下履道情先寄廣陵琴丹臺玉冊真㝠漠息影忘機漫陸沉登厚坡鄭氏樓溪上青楓髙十尋隠君樓閣晝隂隂未妨磬折隨人事却為飛花動客心南靖祲氛征馬困北山風雨斷猿吟鼇峰金粟茅堂在留滯王孫芳草深汎木蘭木蘭山下陂水清南洋北洋風日晴慣乘舴艋中流穩頗愛棠梨兩岸明石塹沙堤廻海勢鵁鶄鸂鶒亂春聲漫向雲荘望莆口更從壺頂看滄瀛嚢山留别黄後峰王蘗谷莆城東畔嚢山逺黄子茅堂碧樹深千里獨尋雞黍約九峯同寄水雲心僧前麋鹿看人慣春後桄榔委地隂石壁題詩芳蘚合虎溪分手暮猿吟西園讌集座上得移字烏山秀色平臨水中使園池事事竒斜日亭臺朱夏薄晩風簫鼓畫船移魚驚舞䄂翻深浪鳥訝歌筵出下枝金谷銅駝那比數幾回吟嘯憶明時岊縣故城夜泊井邑蕭疎角正悲河隍猶帶舊城陴大江夜氣繁星動南國秋風落木遲長路且須防失足他家未肯但餔糜欃槍滿眼公車少囘首東山有所思九日飲延平蕭氏莊省郎園林秋色深今日何日此登臨廻溪魚鴈各自適細路籐竹紛交侵可憐風草四方動不廢瓶甖終日斟滿挿茱茰應佳節時危嵗華容易隂答林貞孚且嘲作西湖東道主用韻且喜郎君騎苑馬追攀無奈暮途遥柴門反鎻將疎濶物態相看坐􅀈㵳萍水幸逄長至月蘭橈漫趂浙江潮西湖載酒誰能爾斜日空聞吹洞簫越中不周風動越王城天姥峰隂氷雪生黄道祲氛䨇闕暝滄溟波浪一鷗輕西廵未返雲臺仗南顧猶煩瘴海兵大事安危頼元老小臣茹草望昇平㑹稽寄董太史文玉太史東歸着錦衣白魚青笋傍庭闈十年芸閣春秋定五月錢塘燕鷁飛乘興偶過安道宅憂時未息漢隂機小舟嵗暮將行李報爾看山到㑹稽汎西崦宿光福寺西崦山前飛白鷗東洙江上春事休已無梅花刺我眼頼有太湖消客愁獨愛老僧眠水寺為尋芳芷歩汀洲風塵豺虎匝江漢西望長安生隱憂同夏赤城遊國清寺侵曉布袍沿澗入黄蒿古殿雨濛濛頓能自拄蒼玉杖便擬分眠紫極宫二子空筌霾草色五峰芳樹散雲容春來病骨一杯足未植蓮花煙火中大風雪投宿赤城盧氏樓朔雪邉風吹嵗昏赤城今去宿誰村孤城自照煙霞色獨夜難招土木䰟短世客星真落落髙樓賔榻亦言言天涯兒女催歸思勝子椒花非故園至日長陵陪祀長陵西接黄花鎮白雪蒼巖夜色遥隂殿衮龍猶在目往時松柏已干霄總聞一怒風塵起想見千官遷次朝悵極兩京興廢事小山何意起漁樵題金司宼芙蓉溪草堂綿州城東涪江北芙蓉溪水逼髙寒人今未向草堂卧花更何年駟馬看雲錦娟娟臨嵗暮白鷗欵欵並風湍漢庭近事須君子黄髪髙歌承露盤塞上沙黄草白雲色寒漢主追兵青海灣後命連催羽林騎前軍飛度玉門關南郊禮樂終難廢北狩旌旗何日還李牧昔時惟自守暮年牧馬到隂山南郊改卜陪陳司馬視牲南苑春風吹暮寒月華光湧紫芝壇上卿劍履中宵出大祀牛羊隔歲看早報簡書囘萬乘竟何齋沐散千官圜丘想像天威切沗列鵷行夾道觀不見年來不見孫明復布褐綸巾何處山長日著書元自得早時譚劍有餘閒吳門霅水風塵上麟閣雲臺天地間未返初衣重憶女釣竿何日共潺湲天寧寺送林德緒赴武當襄陽使君今欲東優鉢花下行相逢西山爽氣祗自好秣陵羽書猶未通征伐亂傳車駕出沅湘亦在風塵中馮良乗馬如可棄傍爾南州桂樹叢汪希周料兵淮楚白馬清秋出上京勾陳光照亞夫營中原天子親提劍南國樓船逺募兵消息秪愁千里草逋逃新恨九江城漢家厯數元無極吳楚猖狂終自平曉入左掖禁城萬木下蕭蕭海霧隂連金水橋七廟衣裳還紫氣九重宫闕自丹霄喜聞行部風雲陣轉憶先皇鵷鷺朝海内何人憂社稷邇來賢士困漁樵長安漁陽上谷古幽州王業千年易水流邉騎逺窺青海月秦城長建白龍斿總愁關塞生多壘未道蕭牆隱百憂日短時艱衰病旱幾回簪笏夢滄洲冬日遊翠微至香山晩歸更酌湖上日暮羣山生彩霞草黄湖白見天涯關河北繞皇輿壯胡隴西連狹道斜共愛樓䑓穿錦樹兼看鳬鶩亂晴沙南冠未遂滄洲計榔葉鷗羣近釣槎順門曉直城上清鐘散御墀曙鴉聲動萬年枝天廻閣道星辰逈雲捧乾清歲月遲内省尚承東闕㫖從官稀見早朝儀羈孤愁斷周南目仙仗新傳到具茨雪中遊報國寺雪裏經過報國寺燕京氣候欲冬深樓臺近引山河色風日初含松檜林並擬散愁聊出郭那堪痛飲益沾襟南廵輅馬今何處百萬貔貅行路心南宫對雪南宫雪深朝未稀氷㕔映日還輝輝天寒野鳥濕不下風急靈鶴今何歸袁安閉閣自進退揚雲著書猶是非束帶栖栖豈余志數年朝士俱戎衣人日人日堂階春雪飛齋居閉門生事㣲仙家栢葉那復有燕市椒花仍自違久病坐看時序轉倦遊漸覺故人稀閩山越岫堪攜枝猶向風塵緇敝衣送徐登州問爾今出守東牟國余尚依依鵷鷺羣宛洛竟縣髙士榻瑯琊真待子虚文沙門瑶草秪何日海市珠宫空暮雲只恐飛帆逐仙去蓬莱迢逓不相聞漫興龎公擬向鹿門隱元亮翻為孺子謀千里青山妨墨綬幾年滄海弄漁舟堞樓日斷風沙暮省樹天廻關塞秋嵗晩朝班終觧去偶耕隨地得巖丘贈夏公謹芳洲桂樹好自攀山人未歸鵷鷺班天香暗結黄金粟嵗嵗飛花霄漢間煙霞秪弄丘園色風雨長過龍虎山草碧淮南定憶汝雲臺錦石喜人還南歸過姚氏園雲霞深䕶芳樹村門巷隂連流水源童子青衿應賔客丈人黄髪對丘園池間鸂鶒囘翔好沙上蘼蕪空翠繁濩落新從栗里去問予松菊舊柴門上妙髙臺雲海冥冥望不廻鯨波東蹴巨靈開中天樓閣虚無裏南國風煙江漢來世短動經多事日愁長况上望京臺白門金鼓維揚卒落日空傳黄竹哀汎舟遊宜興山水將入張公洞柬杭氏兄弟尋仙直探山水窟脱屣何須書畫船逺岫髙雲行落日平蕪大澤失炎天總聞蔣詡求羊逕未分嵇康服食緣翠幘平生最浩蕩來遊五嶽頓能便西湖過孫山人舊隱昔曽與太初用賔月下歩六橋令僧人弄笛嘯歌為和回首往事黯然陳迹矣荒迷更踏西湖路露舄雲裳空六橋涕淚翻悲竹林宴笛聲月色傍中宵醉歌亂詫魚龍出此地爭傳麟鳳標今日孤山最孤寂梅花桂樹頓蕭條讀太初潯陽歌青春寄我潯陽曲長路思君鸚鵡洲此日江湖須逺志浮雲西北有髙樓嵇康竟少神仙分尚子仍牽兒女憂居洛何曽定蹤跡終南渭水入鄉愁訪遂初宿南髙峰下天末逢秋驚客心只看商意動髙林修篁細葉迎風亂翠栝繁條傍石隂江上釣緡青眼底年來淨葉碧山深東歸喜有王摩詰輞口柴門許獨尋登御校塲下望故宫萬峰雲木鬱蒼蒼古壘仍存閲武塲南渡關河䨇眼盡中原風物百憂傍尚傳草莽開黄屋想見龍蛇繞御牀往事只今俱灑淚兩階干羽意何長勝果寺秋懐山寺行逢紅槿花江南風物望中賖棘雲蘿月同秋思鴻鴈鶖鶬亦嵗華多病茂陵仍去國長貧杜曲尚無家白袍黄㡌從吾好歸去滄洲問釣槎秋夜偕應天彛黄宗賢宿靈巖天柱峰大雷雨作日落風廻天柱隂峰前雲木正蕭森古堂衾枕秋燈浄永夜雷霆山雨深漠北不聞麟鳳信海濵空寄蕨薇心結廬欲擬南陽卧抱膝長歌梁甫吟鴈宕山中丹崖側疊窺欲頽拊石捫蘿鳥道廻滄海客心長自逺錦溪秋色是重來靈湫水激風雲濕昧谷春生鴻鴈囘更上南山望䨇闕葱葱雲氣䕶蓬萊謝安石江左爭傳謝傅風蕭條猶記薜蘿叢東山第宅遥相問青海音容逈不同目斷中原深戰伐天囘淝水失英雄最憐棊墅荒蕪甚獨望新亭意不窮九日登釣臺冨春山下嚴陵瀬九日風光興不違白石滄波元自好鳴鷖飛鶩早知歸南陽文叔求賢逺相府侯生識面稀王業帝謨俱莫問百年江海有漁磯雨後登天遊觀幽探尚愛天遊觀石磴髙盤松栝林鶴馭虹橋今斷絶黄冠紫屐此登臨千峰雨過𤣥冥濕列洞雲囘元氣深便欲垂綸釣魚石鸕鷀立滿九溪潯夜訪建溪歸宗巖宿聼泉閣葛巾隨地留芳跡翠壁清林把燭行山接幔亭多紫氣夜來蓬閣動泉聲名都合有滄洲勝冬日還知桂樹榮白首子真終不改看雲坐石得吾生贈林中丞矯矯中丞三輔賢投簮滄海意猶仙髙冠大帶囘蠻俗緑醑黄花照暮年勲業不談延慶役兒童唯唱太康篇紛紛授簡梁園客未道枚生賦獨傳歲晩入鳳陽山治田幽棲已傍鳳山遠長日看雲意獨深溔溔海濤喧永夜冥冥蘿月散青林田園春近存生事鵰鶚天髙寄遠心避地休歌飯牛曲驚風落木歲方隂寒食與木虚登屴崱峰遂餞公衡絶頂天風雲亂飛海門髙浪近春衣霸圖王氣東南盡堯韭秦花天漢稀此地賞心惟汝共萬方愁目欲何依要知寒食山中意萍葉江湖幾是非黄明甫憲副欲到湖上江鳥江花俱眼明乗春驄馬報江行閉門秪分煙霞累撫世今看意氣横海上夢囘陳子榻天邊樹遶越王城便須傍竹開三徑拄杖停雲望友生新營青埜堂未就簡髙傳二子青埜經春營白扉竟須録事草堂貲蕭蕭桂樹鷦鷯急淼淼茭湖鸂䳵飛絶塞閉門時欲暮小山招隱意應遲遺榮秪好修竒服蕙帶雲冠上素衣讀維新録日下金雞出絳鑾皇皇天語萬方看喜聞聖主興周道竟使蒼生起謝安雲捧翠旂含五色草生屈軼指羣姦早時抱志投簪客獨向滄溟把釣竿後秋興三首御樓春霧晝漫漫雷壓霆奔霄漢間涕淚翻傷以死諫風波誰分得生還山中介子終辭爵嶺表唐卿已賜環北望星河今有象幾回滄海夢朝班江湖霄漢不相聞獨拊龍泉看斗文燕雀豈知鴻鵠志鳳麟終遁羽毛羣閉門春事生黄葉去國秋山長白雲傳語元豐舊遷客好將王道輔明君龍起襄陵漢水清風掀雲