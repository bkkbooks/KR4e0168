南樓越王城東江欲濤越王城上烏山高亢龍愁雨久在野病鶻憐風空解縧西望佳人息環珮南來樂土避弓刀園葵一飽那可得今日登樓心獨勞歲晏答王時行越王臺下草堂隂萬夀橋東流水心天畔風雲新歲晏霜前梅栁故園深黄巾亂後只茅屋白社歸來無橘林揺落最憐王水部近時生理戴朝簮病起歩西禪一春伏枕鶯可憐病起野池明白蓮偶爾梳頭出城郭便應看竹到西禪天晴求食鳥雙下日午閉門僧獨眠明發螺江有行役紅塵白鴈異風煙亭子遲清亭子對群峯地逈能招萬里風八月商聲疏病葉滿城暝色起寒蛩身孤舊國翻成客世短長年是惱公擬把衰容向山月嬋娟猶在亂雲中白鶴嶺白鶴嶺頭春惱人暖風吹落小烏巾紅英照眼相與媚碧草㑹心難重陳稍喜小樓臨海岸擬乗輕艓上河津石梁南去煙波濶渤澥何時起釣綸鼇嶺鼇嶺飄飄理巾舄天風北來吹鬢毛土花石黛自成錦松枝海水相為濤空門閉雲春寂寞山鬼嘯月夜蕭騷清齋白飯正着我蒲團坐嘯求吾曹送陳國英侍御還莆兼懐素翁歲晩長途未息機羡君巾舄已南歸斷鴻江海看仍遠短鬢風塵覺漸稀肺病竟須金鼎藥時難眞想芰荷衣木蘭陂水深魴鯉欲傍雲翁舊釣磯大湖汎舟登弁頂湖上菰蒲秋映空絳樓紺殿俯龍宫鐘聲下接馮夷鼓木葉深回罔象風吹笛擬從蓬海去揚舲疑與渼陂同渚苕沙鶩太無賴我愛南山芳桂叢秋日南屏山中清秋草閣同杯酒歩屧看山幽思多雨外暝煙留不散江間飛鶩静相過殊方交友情偏厚頻歲憂時鬢已皤白幘歸來還自慰雲臺石室定如何三月晦陪顧未齊侍講湛甘泉編修應元忠吉士遊太湖龍塘舟中龍塘漪漪近太湖湖上之水明菰蒲雨餘鷗鷺清湍淨日晏牛羊滿地鋪每羡鱸蓴憶張翰未因鰕菜學陶朱兵戈愁疾侵尋久擬此卜築寧吾軀九月劉蘇州携酒過寄寄堂席上作今辰何辰我對酒爛醉却為劉蘇州佳肴佳樂見君意美境美人忘我憂百年清話肺腑露三江長望風烟流出門高下遠天淚去燕來鴻何所求暮春遊望陽山西陂野水肥東風冉冉吹芳菲越姬蕩舟入遠浦吳儂荷鍤談落暉茅屋桃花亂㸃㸃樹枝黄鳥亂飛飛蘇州病客憐汝切明朝杖藜春事違宼至二首延陵昨夜飛羽書吳人今日盡移居江隂室廬半成燼京口士卒多為魚不知貔虎為誰用只恐豺狼乘我虚向者山東只數騎將軍何事更趦趄其二山東羣盗睨東吳吳下倉皇急遠圖但見懸金募丁壮不知賣屋補軍輸屢聞天上新頒爵猶有江南未獻俘昨夜中庭弧矢没自憐病骨轉成癯答近夫九日見寄殷郎懐抱向誰開我亦迢迢江上臺塞鴈未逢還歩月籬花縱好嬾持杯龍山落日惟黄土虎阜西風漫綠苔一覽黑貂驚歲晩暝傳霜下夜砧哀九日對酒不登高今年九日長洲苑忽憶去年西楚鄉連山烽火不改色揮淚故人天茫茫且須舉盞媚芳菊豈敢登高望遠方此日明年復何處可堪廻轉杜陵腸喜得家書無數羈愁此夜窮各天相慰重題封中原氛祲三千丈故國煙霞百萬重伏枕未容蝴蝶夢加餐合紀鯉魚功幽燕十月風霜惡季子貂裘不受縫至日馬上白日冉冉復南至闔閭城西客未歸觀臺雲物舊色相靈源芸荔新芳菲凄凄風雪我乘馬渺渺烟霞他采薇亦欲掉頭東指海芙蓉三載未成衣溪上南岸村邊好放船早春風日淨涓涓風吹錦水文章見日射金沙色相鮮匝匝碧山圍矮屋輕輕白鷺掠晴川細詢民瘼非前度猶喜溪光似昔年駕出北平桑乾西路帶楊河萬乘三秋躍馬過雷澤釣絲天上應瑶池雲氣暮來多茫茫禹貢真不有款款祈招亦奈何幕下少年俱貴達袖中長鋏謾悲歌早發臨安𤣥隂早發臨安縣遠道真尋何處山一夜雨聲驚木葉幾年雲氣望函關赤雲近在風塵外黄鵠高飛霄漢間聞道襄城迷七聖中原囘首淚潺湲二月晦日發滹沱二月晦日暄氣寒滹沱水深舟楫難已携家室情復惡况憶兄弟鼻俱酸白鴈一䨇杳然去黄鵠數年離哉翻幽并氛祲只昨日客子胸臆何時寛夏夜仲鶡過草堂炎天鬱鬱氣若焚都城兩月不出門豈無故人少惠愛秪有吾子來頻繁野老開心出文字拙妻作意蒸雞豚雷陳風流世所羡與爾結契為弟昆贈高二十二宗吕早向滄江去不疑麄豪翻笑鋭頭兒禰衡材大公卿妬原憲家貧九百辭顛倒衣冠成古制招呼風雪有新詩鰲峰石室藤蘿外欲採璚花報汝知朱蕩南太守遣杯茗過鴈山奉酬蕩南杯榼走重盤正我看雲初出關車馬忽傳青鳥信風煙一佇白龍山聞知湖口舟長借每到花時釣末還萬事忘機猶汨没羡君安穩弄潺湲同畱克全丁文範董文玉西湖泛舟遂歷湖上諸山天畔雲煙清不了仲春風日淨巾袍春坊能事稱杯斚刺史風流擁節旄青栁歲時臨澤國白鷗早晩到江臯西湖野意元相識拄杖中流興自豪西湖同李水部孟玉詹進士泮春城萬水散晴湖南北高峰相對孤雨後舟航分氣象年來心跡落虚無只妨魚鳥催人事不厭菩提混世途小折梅花携二子竟無秀句弔林逋中秋京華玩月上谷諸城紫氣通輝輝星月自離宫關山萬馬黄陀北殿闕三秋白露中大將此時須縛虎侍臣何地合從龍繩樞甕牖長消息愁絶京華鼓角風送惟可還三衢昔年相逢胥水秋今日重在閩山陬中間䘮亂真憐汝南鄙音塵不散憂别後山陽頻弄笛花時荆楚一登樓旄頭尚直天西北何地巾車各自由昔余北征太初至自湖州送余至姑胥吾惟可至自三衢送余至檇李不二載間相繼下世重逄此地愴然傷懐作哭二子詩憶從把抱三吳志念爾攀翻遠道來此後音塵一哭耳舊時風雨竟何哉江山秪掛南州劍天地空生諸葛才檇李姑胥是永别暮雲隣篴動秋哀李中丞邀遊南高峰與棠陵子同賦南峰東下對扶桑海霧天風引望長此日登臨成勝㑹眼中文物傍重陽避人鸛鶴遥相過近郭棕篁好自蒼笑把荷衣接豸服狂夫談討只滄浪夏朝覃山卽事二首湖水淼淼横釣舟湖邊人家生事幽胡麻塞畦衆作動桑柘滿地春蚕收卑枝不肯受冠葢短草何妨彌阻修吳儂禮數亦自好方巾野衣迎道周其二四月覃山茶樹香蹋歌採茶多女郎孤亭小池長杜若斜川細雨飛鴛鴦島嶼歷歷渺雲水煙波茫茫連大荒眼中春花復欲盡未得及春歸故鄉答樗翁見懐次韻上日南湖春草餘飛椷報我茂陵居秪益停雲承笑語還聞抱朴入空虚苦遭瘧鬼時相泥愁見鷗羣晩自如世短途難身獨遠京華新訂絶交書莆諸君子邀遊木蘭宿雲莊溪閣因餞余涌江把袂而别悵然興懐莆陽名士太古流愛余來並木蘭舟詩書禮樂話未了琴瑟笙簧歌少休三秋問俗風塵切一路看山花鳥愁此别應知各努力思君無那海東頭七言排律九日同劍川諸子登馬坑諸山望九峰道南祠記事南平縣北重陽至強起登髙風雨朝烏帽黄花修舊事風流人物憶前朝東南形勝山川固閩粤衣冠氣象饒千樹早霜寒自積一潭秋水澹相揺漢王爼豆還宫廟劉守勛名已寂寥羣盗檄書隨處滿萬方兵甲幾時銷年荒白晝三軍譟日遠黄堂五馬驕病後故人俱杳莫幸然勝事不蕭條人兼鄴下何須避誼重淮南定見招青眼豈辭鸚鵡盞白袍更上木蘭橈四賢道近源流斷䨇劍龍潜歲月遥桂樹叢生江草長不妨志士遁漁樵少谷集巻七
