body:
  text: 少谷集卷二十三附録上志傳類明南京吏部驗封司郎中鄭少谷先生墓碑林釴鄭子少谷繼之氏諱善夫世居南湖閩邑大鄉聚代多顯者皆其族産獨鄭子結菴就賢劬詘今學賢者殊振絶也嘗誦曰墜道非時也萎儒與世靡視古太峻脆志以降其趨吾固疾學之不變果懇學十年反之古孝廟乙丑嵗年二十一第進士正德改元纂修蘇松常鎮實録成隨繼居內外艱積六年起銓户部主事出理滸市關譏闌不敗名商人利之稱其能廢私也武皇初赫柄中官鄭子善卦時歎曰大丈夫當龍凰於世退見無骫枉我志力告得請乃築少谷草堂於金鰲峰作遲清亭俟天下之清交與鮮絶巖居六載正德十三年有司勸駕起奪其疾改禮部祠祭清吏司主事十四年轉本司署員外郎三載考績推恩父母如其官居禮部握蘭建禮宗伯咸賢其文學能秩相也是年三月武皇將南狩齎謀諸寮寀曰駕未發諌之可絶否吾股肱何勸吏兵刑諸曺郎中黃鞏等若干人同伏跪于闕門疏惻切指斥嬖臣江彬及中官輩濁亂天下也怒犯之武皇杖之闕下死者貶者落籍于民者有差既南狩鄭子切告未得明年釴至京師之館焉談畫時事曰天子何可為計哉古云曙戒勿怠後稚逢殃吾胡可弗歸遂歸過浙山人孫一元太初死走道場山中哭之敦治喪事畢遊越山水至逾八月旋閩居湖上嵗多病必滿時月間已必往佳山水遊或憫其羸告之癖曰吾少谷靜中不留求佳突吾思耳益誇嚴云江南北山水畢受吾杖屨之嘉靖改元以都御史周季鳯御史汪珊薦起為南京刑部郎中尋轉吏部驗封司至建健眷武夷遊值風雪膚理弗密以病病且依依不休其遊至弗支強輿病歸歸二日不祿及歸已彌留人意所豐藏鄭子云請諸君勞苦少休少谷可以存神明晚與訣力手書授髙瀫傅汝舟二子曰修身俟死吾今更復奚憾詩文妻子付託髙傅二弟經理其寄延平遺書皆如云乃啓手足以逝嵗癸未臘晦前二日周身與棺瀫與汝舟治也後發笥皆窶窶鄉人始駭發鄭子之貧士知賢鄭子能有道其官嗟夫財利者世不學皆能旨嗜之俗殉痼厚僴然曰居官必多得財故有道者雖親且惑况鄉人夫旃旃仁義何以破愚利固善昏世禽鹿視肉如鄭子者能居道也夫觀鄭子婚嫁七弟妹資業皆其推與儒者贍之田令以完婱節葬母屬二十二人其治身嚴厚沖淡髙潔求象其道于家國誰昔曰任重者身也途畏者口也致逺者道也邪行亡平體違言不存口道可要諸逺矣寡交多親忠信則交慶其言旨乎鄭子蹈言今徵見之實完固以沛譽衆固稱少谷先王云訃傳至者咸哀涕蓋憫賢者弗長世沒時年三十九益可哀夫葬事纎悉皆福州太守汪文盛少守陳鑭二先生功德也二先生鄭子至友孤鳴梧少保孤恤亡鄭子知德於幽冥創見友道叔世可興起矣墓在懷安西郊外梅亭山山旁諸逵汪先生念口碑可世垂以章顯賢者云遷前室安人袁氏合隧遺言有二子求不纍其托鄭子生成化乙巳歲十一月二十日也論曰鄭子博學而能反之者也吾觀少谷子道論子通經世要談悠哉言乎大旨鬱然可觀其概之正而已探其要本忠信成節則非繡言觀交際編及余居京師與遊者盡海內名士其志念深常有以自下故皆以道相膠漆孔子云斯焉取斯易曰同明相照同類相求雲從龍風從虎信夫短長名位君子何可論之嘉靖三年甲申十一月二十八日友人汪文盛陳鑭立石少谷子傳黃綰少谷子者閩人也姓鄭氏諱善夫字繼之少負才名不遇師友學凡五變而始志于道就其所履考之謂今之豪杰非耶蓋少谷初業舉子欲從今世成功名乃自悱曰舉業足盡此生乎遂刻意為詩文將追先秦莊屈唐杜諸人之作研求步驟既得之又自悱曰文詞足盡此生乎遂慕東漢以來至于南宋髙人逸士孤風逺韻之可激者而追蹤之又自悱曰風節足盡此生乎遂慕西漢以來至于盛宋將相名公鴻勛盛烈之可垂休者而從事之又自悱曰功業足盡此生乎遂慕堯舜以來至于孔孟修已經世之可參立者而尚友之曰道在是矣吾將沒身於是乎昔嵗壬申豫官後軍知未足于道將隱故山求其志少谷子為户部主事督稅吳江之滸墅豫過而遇之握手與豫語竟日而别别猶眷戀曰吾亦自此遁矣子不為我棄其將訪豫于天台雁蕩間乎豫歸六載嵗丁丑而少谷子果來遂與坐凌峰步石梁倚天柱靣龍湫倦則歸紫霄卧豫所居謂之石龍書院者時天晦大雪浹旬不止人蹤盡滅豫晝伐松枝夜燒榾柮與少谷坐劇談堯舜以來所傳之道六經百家禮樂刑政天文地理之源流及二氏之所同異極于天地之間無一不究少谷子亦盡出其平日所著述以質豫又貽書其友孫太初髙宗吕傅木虛使之遜志而同歸故太初之逃老歸儒皆少谷啓之也少谷子又自謂生平知已莫豫若者但恨相遇之晚遂忘形而不忍去豫兄芝谷主人因為少谷子亭以居之南洲應子亦來會凡數月而出至台城台守金陵顧公欲重勝會乃作玉輝之堂以延之少谷時以疾起將趨朝豫乃與南洲子送之渡錢塘而還少谷子又與豫期曰吾為父母贈典未獲有此行行當不逺再訪子于兹山以共老焉少谷入朝為禮部主事升員外郎三載考績推封厥父母武皇自稱威武大將軍鎮國公欲幸泰山遂從南狩廷臣莫敢議者少谷子特為疏論其非禮並指斥權姦之所以逢迎及巡遊意外之虞詞極剴切率羣僚共上之武皇怒杖之闕下或死或竄或削籍為民者而少谷子瀕于死者亦幾矣既而告歸果再來山中又同入雁蕩登天台卧龍湫華頂之間糧絶肴盡則掇山花乞僧糜以食各旬月而去既而武皇晏駕今上入繼大統豫與少谷子先後各被薦召少谷子又貽書于豫曰今上沖年百無玩好一味恭默誠堯舜之資也今所急者知學之臣以講明古帝王執中之傳使聖德日新月盛然後可以責成唐虞之治今日四方徵召多是林邱沖養君子今日所關又非尋常百執事如先生者宜直處之以論思之地勿泥常格更得一二元臣鼓動其間使舉朝皆相信附使有道君子得行其志積之嵗年不患先王至治不見于今日也既而聞朱御史白浦之卒則為詩哭之曰柱下朱郎成永别江東黃尉竟何求黃尉指豫也以白浦常薦豫故其卒而云云豫出升南京都察院分司携家過越聞少谷子升南京刑部郎中未幾改吏部郎中有書期將至越訪陽明先生先生聞之喜留豫候之月餘不至而少谷子訃至訃者少谷出經武夷陟絶巘闖陰洞不知其疲且襲寒醫誤用藥遂病革速輿歸家至家二日而卒卒年三十有九乃嵗癸未臘月晦前三日也發其藏蕭然無所有斂而葬之者皆福州守汪君文盛為之也少谷子器度溫厚而剛果超邁而淵密清介不為激亢貞信不為諒執皆天資之近道者也視其貌瀟灑清曠碧鬚蓮目若神仙中人至其自勵實足茹粗礪耐煩勞馳風塵其取與可以謝萬鐘而不顧揮千金而若芥其與人交小而語諾之間大而死生患難之際未嘗或爽又每有千里命駕而不失雞黍約之風其處家弟妹七人少孤撫之成人而竭力為之婚嫁又以其田贍族母及姑妹之孀居者又舉母黨之不能葬者二十二棺其居官滸墅則寬商船之稅而不虧國賦治強猾之罪以惠于良善禮部則每執典秩以贊于其長如論歷元歲差之未定日月薄蝕南北分杪之難齊皆鑿鑿有見足發古人之祕誠可謂超絶古往出夫風氣而不可以一世一方之士目之若夫天假以年充之學問於其中庸之繇禮樂之文進于聖門誠有可觀者矣惜其夀不永齡未見其止而止于斯已也所著詩文有少谷集者人以鄭詩鄭文稱之刻行于世又有子通論道經世要談者則録而未行配袁氏子男一曰鳴梧女四長適陳次適進士林應亮次林出次庶出俱幼應亮以豫與少谷子相知最深請為傳乃述而論曰古之聖賢所以濟非常之業立萬世之極者固其天資之絶人亦其有志而又有師友之成學問之功有以致之然則天資也立志也師友也學問也於人可缺一哉如馬遷賈誼陶潛杜甫李白韓愈栁宗元歐陽修蘇軾皆天資絶人惜皆無志於道又皆不遇師友之真講明聖賢學問之功故其所成僅止于事功風節詞章而已又如慧可惠能馬道一吕巖張平叔白長庚亦皆天資絶人生不逢時厭世溷濁而逃于釋老他有志者又皆天資有所不及所以斯道之未大光至治之未大明也豈非世運氣數之使然乎今少谷子天資之美而又有其志蹉跎于世五變始有所聞而又遽止于斯其為斯道斯世之慨之憾又何如也噫鄭繼之先生傳鄧原嶽明文章至𢎞治而一變於是作者百數十家而北地李夢陽信陽何景明吳徐禎卿及吾閩鄭善夫先生最著先生字繼之别號少谷山人自其初生太夫人夢日墮于懷吞之遂有身先生幼負奇質髻椎𨽻學官則已厭薄一切經生言學為古文詞有聲矣二十舉于鄉明年為𢎞治乙丑遂成進士而何景明實直中書相得歡甚益切劘為古文詞已亳州薛蕙黃州王廷陳吳郡顧璘三衢方豪東平殷雲霄皆一時知名士後先至咸折節而交先生文酒過從靡間也毅皇帝初先生猶在選人纂修蘇松常鎮實録成隨丁內外艱積六年授户部廣西司主事出𣙜滸墅關譏闌有法著為潔令是時中貴人方用事亂朝政先生鬱鬱不自得竟移病滿三月上書請告歸歸則築少谷草堂於鰲峰顔其亭曰遲清以見志交與鮮絶守令干旄往候顔色先生以一童子支剝啄終無所造請諸公愈益賢之正德十三年先生病良已起補禮部祠祭司主事守員外郎滿三載考贈父母如其官嘗奏改歷元事宜語甚核詳經濟録中毅皇帝之末年儲位久虛逆藩素蓄異謀嬖人江彬及諸中貴人相左右為姦諸曺郎黃鞏等以諫止南巡語侵彬彬大恨矯旨杖闕下有死者先生不勝憤挾舒芬張衍慶復上疏切諫彬益怒罰跪午門已杖三十幸不死當先生罰跪時猶草疏數千言納懷中言所以不當出狀謂方豪曰死則上之無何而駕發先生詫曰已矣無所容吾言矣彼地下者其以余牖下非夫哉遂再請告歸山人孫一元故與先生契分不薄先生歸一元且死則間道之苕溪哭之為經紀其喪浙東饒佳山水洞天石室多仙靈壑宅如禹穴天姥蘭亭雁蕩之屬慮無不受杖屨者嘗雪中逰天台褐衣筍輿吟趣甚適時顧璘方守天台聞之曰此必吾繼之也亟使人邀之為盤桓竟月無何歸閩有終焉之志先生故居南湖去郡城十五里而遙地稍勝先生與一二曺偶如林釴侍御傅汝舟髙瀔二山人日觴咏其中而守君汪文盛者時時屏騶從從之先生為具算器食濁醪數斗佐以杞菊汪轟飲至醉也嘉靖改元先生用薦起為南京刑部郎中尋改吏部行至建寧遊武夷山大風雪為寒所中竟遊歸病遂􅒵抵家二日而歿年三十九耳病急猶手書鄭重以遺文託髙傅二子而後暝目死之日紫氣勃勃不散蓋先生客天台嘗語華玉明年海上紫氣東來是吾觀化至矣人以其語驗云先生為文章泚筆立成渾雄蒼老大抵出入諸子而本之六經其詩以氣格為主以悲壯為宗古詩樂府沿漢魏下及六朝歌行近體抵掌少陵絶句翩翩有青蓮之致書法尤入神真行斟酌聖教狂草奔放縱橫爛熳顛素而下弗論也間又創意點染花草叢篠怪石得象外趣然絶不名其業以此人亦鮮知者嘗一晤王文成於毗陵慨然有味乎性命之學則從湛氏得其緒而力行之功取專詣非獨立門户而已先生每言經生局迹嘽緩其衣多文辭而鮮實效何益於殿最乎居恆取國家掌故講其廢置所繇及利害甚晳每郡邑有大政先生輒為決策務中機宜其所莊事者莆陽林俊司空林雅推轂之謂有大臣之器厄於年而不得售惜也林釴又言先生篤於內行婚嫁七弟妹羔雁筐篚無不自其手指出者葬母屬二十餘喪皆假貸於子錢家其厚如此汪守君既葬先生於梅亭已編定其詩文若干卷行于世而子通經世要談軼不傳鄧原嶽曰余小子與鄭先生不相及而於先生外孫林學憲道茂許覩先生像髯而都若神仙云其集今盛行世有知者或乃謂時非天寶位靡拾遺以無疾呻吟為先生病夫明正德於唐天寶安取低昻哉而欲呻吟者之必賡歌也惟王元美評其詩如黃河氷凌得杜之骨庶幾實録云福州府志文苑傳林燫鄭善夫字繼之閩縣人𢎞治十八年進士善夫弱冠登第與洛中何景明同年相切劘善屬文尤長于詩七言近體興致清逺議者或謂得杜之骨又謂正德間關中李夢陽摹擬少陵然猶丐膏馥自出已意為之至善夫并襲其意時非天寶地靡拾遺殆無病呻吟云善夫官終南吏部郎其同時有林釴傅汝舟林釴字克相傅汝舟字木虛其詩大抵與善夫相類釴不長於文好用奇字令人不識為工然釴所用字非素習也第臨文簡古詩得之日稍久或指以問釴釴亦不識也釴為御史頗為鄉論所訾汝舟晚好神仙之説數出遊諸名山往往與海內名流接汝舟性恬靜耻干求士大夫咸以為塵表云釴舉進士官至御史謫州判罷歸汝舟終布衣按何景明𢎞治十五年進士非善夫同年林文恪誤矣福州府志風槩傳林材鄭善夫字繼之閩縣人𢎞治乙丑進士弱冠登第授户部主事時逆瑾亂朝政善夫以病告歸居六年起補禮部武宗末年嬖人江彬導上南巡杖諌官黃鞏等下獄善夫上疏切諌上怒罰跪午門五日杖三十幸不死當善夫罰跪時猶草疏匿懷中謂郎中方豪曰死則上之無何駕發善夫哭曰已矣無所容吾言矣隨再請告歸遍遊名山築室南湖顔其堂遲清以見志嘉靖改元用薦起南京吏部郎經武夷窮歷諸峰為寒所中抵家而卒年三十九善夫工詩以氣格為主憂憤時事往往發之篇章評者以為得杜之骨與李夢陽何景明相伯仲云善夫死汪文盛方守閩為營葬行其集于世東越文苑傳陳鳴鶴鄭善夫字繼之閩縣人善夫髻椎𨽻學官則已厭薄經生言學為古文辭有聲矣弱冠舉𢎞治乙丑進士而信陽何景明時直中書得善夫甚歡益相切劘為千秋業一時名士咸折節而交善夫靡間也毅皇帝末年諸曺郎黃鞏等以諌止南巡語侵嬖人江彬彬大恨矯旨杖闕下有死者善夫乃率舒芬張衍慶復上疏切諌彬愈益怒罰跪午門已杖三十幸不死善夫猶草疏數千言納懷中謂三衢方豪曰死則上之無何而駕發善夫哭曰已矣無所容吾言矣彼地下者其以余牖下非夫哉遂乞歸居郡之南湖嘉靖改元用薦起南京吏部郎行至建寧遊於武夷為寒所中抵家而卒年三十九卒之日紫氣勃勃不散先是善夫衣褐走雪中遊天台人以為神仙天台守顧璘聞之曰此必吾繼之也就之良是善夫因謂璘曰明年海上紫雲東來是吾觀化至矣至是天台人以善夫果神仙不謬善夫為文章渾雄蒼老而本之六經其詩以氣格為主而多悲壯之聲國朝作者世蓋推徐何李鄭云善夫每言經生局迹嘽緩其衣多文辭而鮮實效何益於殿最故其居恆取國家掌故講其廢置所繇及利害甚晢又談性命之學而力行之所著鄭詩鄭文行於世而子通及經世要談軼不傳按經世要談刻在性理會通謂軼不傳誤矣藝苑巵言王世貞鄭繼之詩如氷稜石骨質徑不華又如天寶父老談喪亂事皆實際時時感慨昌穀之於詩也黃鵠之於鳥瓊瑶之於石松桂之於木也髙叔嗣空谷之幽蘭崇庭之鼎彞也髙季迪之流暢邊庭實之開麗鄭繼之之雄健王子衡之宏大孫太初之奇拔顧華玉之和適李賔之之通爽馬仲房之華整皆其次也國初習杜者凡數家華容孫宜得杜肉東郡謝榛得杜貌華州王維禎得杜一支閩州鄭善夫得杜骨然就其所得亦近似耳惟夢陽具體而微鄭郎中善夫初不識王儀封廷相作漫興十首中有云海內談詩王子衡春風坐遍魯諸生後鄭卒王始知之為位而哭走使千里致奠為經其喪仍刻其遺文人之愛名也如此藝圃擷餘王世懋閩人家能占畢而不甚工詩國初林鴻髙廷禮唐泰輩皆稱能詩號閩南十才子然出楊徐下逺甚無論季迪其後氣骨稜稜差堪旗鼓中原者僅一鄭善夫耳其詩雖多模杜猶是邊徐薛王之亞林尚書貞恆修福志志善夫云時非天寶地靡拾遺殆無病而呻吟云至以林釴傅汝舟相伯仲又云釴與善夫頗為鄉論所訾過矣善夫詩即瑕當為掩善夫雖無奇節不至作文人無行殆非實録也友人陳玊叔謂數語却中善夫之病余謂以入詩品則為雅談入傳記則傷厚道玊叔大以為然林公豫早年知已獨此一假不敢傅會非特為善夫亦為七閩文人吐氣也按林文恪福州志云釴為御史頗為鄉論所訾未嘗言及善夫也王敬美誤矣詩藪胡應麟當𢎞正時李何王號海內三才外如崔仲鳬康德涵王子衡薛君采髙子業邊庭實孫太初皆北人也南中惟昌穀繼之華玊升之士選輩不能三之一嘉隆則惟李于鱗謝茂秦張助父北人而南自王汪外吳徐宗梁不下十數家亦再倍於北矣余細閲當時諸家若仲鳬德涵敬夫子衡詩皆非長華玊繼之升之士選輩或調正格卑或格髙調僻獨邊廷實視諸人差為諧合國琛集唐樞鄭善夫閩縣人性疏闓無留伏為吏部郎曠志辭榮博學為古人尤長於詩義不詭於風人浩然仰俯縱遊名山川其意􅀈􅀈如也正德末以養疴終其身談藝集張煒𢎞正之間豪傑彚征百餘人焉其最著者李獻吉何仲默鄭繼之徐昌榖輩獻吉雄豪壯麗如長江巨浸滔滔千里雖有枯槎敗筏無妨飄蕩又如龍翔虎變駭人耳目仲默雅麗新奇如洛園一開姚魏掩映又如鳯儀韶闕麟出周郊誠希世之瑞也繼之沈鬱之思慷慨之詞如蒼松挺秀古梅含芬又如賈生之獻治安雖過於感愴終不失為識時務之俊傑焉徐昌穀淵致秀語天然獨步又如唐玄宗霓裳羽衣於月下嫋爾仙樂此四子者撰述備矣詞林人物考王兆雲鄭善夫字繼之福州人仕至南京驗封郎中氣秀巖谷情發聲詩雖才韻弗充而古色精言髙映霞表飄飄然有逍遙逺舉之意好遊名山嘗入武夷雁蕩峻陟冥搜都忘內顧養疴自逺逡巡郎曺樂負髙標殆輕人爵時與衢州方豪同好意泊如矣嘗與友人期曰明年海上有紫氣東來是吾觀化至矣赴官留省道中奄殂吁亦怪也哉所著有鄭詩鄭文行于世雖卷帙無幾人咸鳯毛麟角視之矣風雅叢談王應山鄭善夫字繼之閩縣人𢎞治初弱冠第進士海內詞人相與頡頏仕為户部尚書郎屬請告家居與郡人林釴髙瀫傳汝舟鄭公寅施世亨李銓李江先伯父户部文晦先樵雲山人文旭倡和追隨閩人復稱才子王世貞評鄭詩以為得杜之骨林宗伯􅖌撰郡志列文苑謂時非天寶位匪拾遺殆無病而呻吟者大不然哉鄭文詩各若干卷汪守文盛刻之郡齋邇鄧學憲原嶽重梓之為敘論解嘲亦一快也鄭詩登泰山日觀峰東嶽乾坤定黃河一縷分日排瀛海浪天入薊門雲魯道傷吾志秦碑自夕曛未堪疏逺目萬里正祲氛時事可知也嘉靖更化起南吏部郎中道病卒年未四十汪守葬之梅亭山先考偕諸彥過之詩云騎箕人已逺舊侣總堪悲為憶藏舟壑同扳挂劒枝草青侵曲徑苔緑上穹碑日暮空山裏悽然共賦詩少谷遺音卷跋傅汝舟曾記少谷作此卷謂髙子吾字雖未通神已是超凡入聖矣今觀信然其最後章缺人字髙子強余足之筆力相去甚逺於乎少谷死幾十年矣余學不加進於一節之小尚不能及况敢望其他耶撫卷愴然又張詩張詩曰嗟嗟傷哉余安重視我少谷子之詩翰乎少谷子為人忠誠仁智俊極文辭交遊遍海內諸賢而比能於少谷子殊鮮然卒之年不及四十者豫嘗聞天夀仁人而夭脆薄劣獨少谷子不夀何哉獨少谷子不夀何哉乃揮涕掩卷以歸髙子又馬明衡嗚呼此少谷絶筆也少谷臨歿之時書數紙付髙子其末篇缺數字余諦觀之其神妙變化較之平時之作逺甚少谷亦甚自得也少谷負大才薄宦逹而耽山林其靜中充養完粹故其晚年所進如此藏之者與觀之者毋徒以其藝之工而已也少谷集卷二十三
