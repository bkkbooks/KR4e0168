body:
  text: 少谷集卷四明鄭善夫撰五言律詩發京邑迷路投宿黑莊東省多年病南冠百念灰關山一悵望天漢獨歸來行野蒲稗晚過村笳鼓哀迷途更幾許愁絶望鄉臺夜入魯北鄙不見黃花面凄其白鴈前清渠接淮泗衰草入幽燕月露猶團夜兵戎更積年歸途不可極賫夢歲寒天放船柂樓下急浪去險在毫端已識篙師巧方憂蜀道難此溪防罔象何日避風湍頗羡𤣥真子清時把釣竿泗上總總衣冠地方冬生事繁牛羊散逈野煙火接長村剃藿農人聚分瓜稚子喧如何惡官府鑿破此淳源對湖二首㬒㬒𤣥陰日團團照水隈鯨波動霄漢鼉鼓挾風雷地盡青山杳天寒白鳥回輕帆未相失自此訪蓬萊其二逺水明如鏡平林渺欲迷天多足鴻鴈沙暖定鳬鷖秋事關身世湖聲避鼓鼙老漁吾愧汝曼衍聽天倪過彭城懷舊二首自有干戈後年年向此過乾坤未解甲江海且增波拊劍心逾壯經時鬢易皤渭南無夢到終是卧煙蘿其二憶昔此避地諸君慰我多别來淹日月望爾邈山河灑淚山陽笛關心隴水歌猶聞殺長吏飄泊復如何吕梁蔥嶺崑崙外吕梁天地間淜騰終赴海咆吼欲頽山力轉魚龍窟秋生虎豹關平生歷險阻對此淚潸潸悼劉宓宓也歸何處營魂不可招只疑天地濶竟作死生遙苦海風濤壯炎方罔兩驕傷心卧佛寺秋雨自蘭苕得思道消息二首聞汝還家後逢時俶擾初艱難仍被冦墨絰却離居邊徼猶多故山園未可鋤棠陵幸襄事亦得慰區區其二近逢黃吏部報爾在三衢志士傷泥滓南州困猰㺄時危離索久歲晚帛書無却憶吳門約蕭條愧病夫聞開化用兵寄思道舊是桃源地如何喪亂滋荷殳連老少流血滿潢池蜀道奔惟汝荆州仗有誰尊翁在垂白莫遣怨流離牛首牛首有佳致方冬亦自竒同雲封地軸積雪糝松枝谷響傳鐘磬山昏泣罔魑慿髙俯王土何意有旌旗臘南州不待律臘後暖相催久客惜殘歲他時聞落梅家家斗酒㑹處處短笳哀却憶江西北漁樵戌未回歸來不作東曹屬歸來巾屨幽豈能效䑛痔聊且避犧牛玉木深防病瓶罍未省憂此邦蝦菜賤家室暫淹留進衣何處避氷雪頻懷負日暄未衰筋力憊獨立布衣存列子愁居鄭袁安早閉門粵南多爽氣歸去牧雞豚兵起自有西江亂流民起帶刀操差盡孺弱殺戮到耆髦敵馘時猶獻軍需日更騷長纓未得請無計罷鞬櫜錢塘萬山赴海國衆水匯錢塘王氣千年歇湖聲八月長世傳渾罔兩天巧亦荒唐稍待凉風發乘槎問彼蒼即事即事春相近回船日日操微陽留朔雪久旱失溪毛衢府風煙改常山斥堠髙危途疲薾客汨汨向蓬蒿漫興日月隨人事溪山共客情水清魚避影松靜鶴留聲枌梓怡前輩文章達後生時聞扣牛角猶愧似要名嚴州小傳清江並孤城碧嶂防土宜多竹柏民業但耕桑稻熟還官得山深伐木長經過數州郡淳朴見兹鄉梨關梨關不可上戰格屹雲端閩浙乾坤别風煙道路難隄防莫暫廢戎馬未全安謾想先皇日車書達百蠻送王參知赴闕大參行赴闕興落富春前六月樓船雨千山傳馬煙白雲留故國綵服媚南天知爾寧親後屏營金鑑篇畫鷹似欲飛騰起星眸勢可招平生酣白戰逺志礙青霄竹兔何愁得林貙不敢驕無由配鸞鳳勿以比鴟梟憶近夫吳門相失後書札各茫然巢父終東去劉郎重北遷雙鳬赴魏闕獨鶴下青田未見風塵淨懷君涕淚邊汨汨汨汨傷秋鬢依依欲暮年釣磯滄海上布被白湖邊避地親朋棄憂時夢寐牽無家杜陵老且結草堂緣梧兒初學語梧兒生六月孩笑識人情得汝愁俱破于人眼盡青暫時聞學語何日見趨庭爾祖能看我回頭涕泗零伏雨瀝瀝猶鳴旦凄凄欲作寒晚禾翻惡濕后土故長乾敝屋久僵卧凶年甘糲飱持觚向人世未得脫艱難至日至日風色好粵南霜信遙地卑饒瘴氣春近茁寒條汶水昔獨往淮南誰見招林棲歲華晏難免鬢蕭蕭冬日草堂小集近郭風霜淺寒天草木稠敝廬元僻野髙馬漫淹留豈是草𤣥宅能回訪雪舟生逢聖明世未敢杜交游喜吾惟可訪少谷兼懷方令舊國冥心久良朋見靣初同為避地客獨叩草𤣥廬花鳥三春暮乾坤百戰餘邇來方拙牧衰疾復何如烏石惟可同遊道山秀盤石春半更嬋媛海水雙江入巖花二月繁衰容防草昧故老問桃源憐爾南遊思風煙數斷魂寒食至後百五日堂齊風雨深越鄉寒作食溟海氣長陰身事南陽役神京北望心采薪纒日月髮已不勝簪早秋龍門舟中艓子小於葉早秋江上行風波千古轉天地幾時平病骨憐滄海凡才耻聖明不眠聞短吹故國亦飄零宿象山西塢二首亂木藏幽鳥清商集古城瞑煙分野意山鬼習人聲未把桐川釣聊為頴水耕巖棲備寂寞儻得遇初平其二秋雲不稱意膚寸每成霖漏日翻東壁隨風濕逺岑腰鎌野外急燐火晚來深入夜增蕭索千林猿狖吟寄潘逸老東湖潘逸老守晦十餘年久病文園枕長貧杜曲田形骸非故我天地有真詮願汝支離德閒居讀內篇海濵書所見北里萬餘户漁樵更種田打魚乘水得伐木上山便禾黍棲南畝牛羊被逺阡生涯未為少何意盡顛連卧病少谷山中伏枕東山晚閉門黃葉幽竹書遺問歲蟬語易深秋散地朋情見明時家食羞唯應習農圃草野得淹留今夕薊門城下月今夕定如何白骨凌沙礫黃塵控駱駝羽書疲傳置邊馬失關河天子方宵旰孤臣淚已多授衣秋草倐已歇鳴蛩欲近牀北風吹鬢髮九月進衣裳抱病仍多事逃空未損光黑貂今久敝搖落歲寒妨岊上送時行赴闕二首王粲江湖興幡然為國謀故山隨意去殘照尚誰留身事齊門怨天家漆室憂蕭條倍憐汝歲晚拂吳鈎其二念爾復赴闕迢迢思昔年雞盟盡豪杰天論老風煙病向滄江卧書無白鴈傳平生鸚鵡賦萬一故人憐草堂歲事日將晏草堂今茍完天風吟竹葉海月皓柴門藜莧還髙志經綸有故園何能謝貧賤氛䘲在乾坤寄林荆門暮年滄洲客慟哭向窮途春草生歸思秋風慰病夫青氊後命達白髮此身癯八月衡山去期君出五瀦答安黃門憐君下峽水寄我郢中吟白雪音調逺黃牛風浪深林丘心獨苦歲月病長侵膠漆知何地迢迢鴻鵠心讀鸚鵡賦讀罷鸚鵡賦吾憐禰正平識機寧入網逺害轉傷生名在心形纍時危鼎爼烹異時一掬泪灑向武昌城江上别道宗兼懷何仲默却向江頭别潸然感物華林泉移歲月霄漢變雲霞伏劍亦駭俗出門寧顧家寄言何水部遲爾折梅花挽王生吾鄉論後進爾最擅詞場十八人間世三千弟子行轅駒未竟步石火不餘光憶昔邢居實秋風太惋傷送伍方伯入覲尊翁吾從祖同第甲申年論世鯫生願通家令子賢春風虛木榻王事重樓船命薄徐髙士栖栖不受憐聞濤漲海饒孤寐春山淹去歸魚龍永夜急波浪逺天違孤志存舟楫清時卧釣磯塵機久已息何事白鷗飛中秋同髙宗吕傳木虛城東步月有懷京華舊遊朗月團秋社凉風薄歲寒故鄉誰獨健永夜此同看鄰笛傷今昔山杯盡肺肝長安舊朋侣搔首五雲端南關度隴心忽折殊方梅栁春兵戈近滿眼書劍老隨身世有阮籍淚道應原憲貧愁聞更選士東土已風塵金山紀遊二首雙眼無空濶長江㑹百靈吳門對海定淮樹貼天青鐘動黿鼉窟雲生鸛鶴庭中流有孤志鼓枻下滄溟其二􅀈􅀈中泠水東遊與散愁樓臺通海霧歲月送江流好事憐司馬逃空想惠休獻花緣尚淺心折過揚州不寐客思苦不寐驚心豺虎喧羽書秋後捷鬼哭夜深魂歲月消殘燹風煙失故園彭城有弟妹絺綌念溫存阻濟上叔伯何多日關山烽火明病妨風土惡身與歲時征喪亂懷先帝艱危有我生向來劉越石意氣不能平懷金山我愛金山寺洪波萬頃開乾坤留柱石滄海失蓬萊曝日黿鼉出摶風鸛鶴回中泠洗心處極目意悠哉此夕時危長伏枕月好自臨關斥堠連吳越煙塵犯海山民窮久欲亂師老未成班此夕姑蘇酒酣歌不破顔雙鴈雙鴈為人得階前相向鳴已辭關塞逺猶帶網羅驚宦情一片影客淚五更聲側目窺秋隼風煙異性情對雪答太白山人天地忽改色六花風亂投翛然翠袖薄加我草堂幽照水梅自媚閉門君不憂𤣥機正無極將汝醉鄉遊歲暮哭近夫二首南國青瑣闥東山白板扉三年不相見兩地思依依遂有幽明隔誰云夭夀微江東送望眼空復暮雲飛其二寧知是永别七月有書來即死還憂國皇天亦妬才世衰元氣散君逝玉山頺滄海垂綸客冥心若死灰海門落日綿亭嶺茫茫何所之山川淪沆漭天地撤藩籬脫屣未相失放瓢聊自怡扶桑弱水外東望拂虹霓將至鯉湖道上瑶宇青峰頂芒鞋白鳥邊風泉轟九鯉雲木薄諸天尚子終當去龎公最可憐𤣥房今夕裏謦咳接羣仙鯉湖三首到此意了了春湖接未妨薄雲長戀洞名草不辭香月色寒侵閣灘聲夜近牀神仙真可學吾即傲陶唐其二鐵嶂垂天塹石門修水關古松蟠極地小鳥立驚湍玉笛何由聽真乘未即安芝田㑹心處漫憶紫金丹其三何處遁天韜煙霄首獨搔山川進奇崛天地入蕭騷病骨憐芳草煩心愧白袍東隅紫氣盛偏薄上仙曹春日經白沙王氏莊王子躬耕處柴門碧樹團雲松飛鸛鶴風澗引波瀾父老壺觴得兒童禮數寬西坡水麥熟麋鹿下安安寄王時行僉憲二首隱約王僉憲為官近越州久無烽火警能把甲兵休清逺神仙所君王錫宴遊時平占福地不用覔丹丘其二囊山分手去正值暮春時蒲栁看衰颯風塵且别離嶺南人事少海上鴈書遲炎瘴還消息無勞罷酒巵寄充之華亭鼇峰衰病至歲月莽蹉跎不識松江曲鱸􅐜意若何朋情音問濶師道課程多預報經過日秋風偃敗荷寄鄭方伯山齊昔日莆陽役春山共採芝鄭䖍猶逐客賈傅自明時潦倒鶯花切提携酒饌隨難忘何氏宅泛愛木蘭陂聞汀漳罷兵二首整整汀漳戍羣凶復聽招頻聞洗兵馬不見返漁樵猰㺄終難狎貔貅漫獨驕皇情近憂豁氛䘲若為銷其二羽書傳上國牙帳擁諸侯别峒分戎馬前鋒失火牛果誰知要害漫爾歷春秋只道書生策能分主上憂同林九髙二傅二施二避暑越王城樓長夏升炎䓇髙城遁鬱蒸河隍虛雉堞雲日造松陵不去稽康達同遊賈島能愧無鄰舍酒率爾集良朋見二毛去國星霜變違時老憊成荒迷一身在汨沒二毛生世短思飛舄途窮乞步兵昏塵干氣象溝壑未忘情將别多事晉安郡浮生未息機草堂存下著花徑罷初衣江海形容在君王夢寐稀隆中棄汝去勛業願無違白袍白袍存皎潔傍爾竹林人安得緑玉杖長隨烏角巾莊生書是憤阮瑀行能純易俗吾奚敢將無養道真夜熱次林九二首中宵猶酷熱初伏未秋風汲井分寒水休燈散羽蟲宦情深自損肺氣更相攻象魏天蕭爽衣冠日㑹同其二雷霆慳小雨巖谷斷微風北雪陰山裏南州大火中迎秋草木異愛月女兒同內熱兼多病賡歌愧未工丹青閣建州丹青閣清切建城西雲棧浮髙壁風松出逶溪水枯沙漠漠秋晏樹凄凄多壘關山裏銷憂聊杖藜登建州浮屠訪僧道林浮屠秋獨立千里見氛祲水閣風長盛山城日易陰赤霞留鶴晚黃葉住僧深世事宜髙卧空慙支遁林再遊陶園太僕遺榮在黃華晚見招鑿池旋日月洗竹直雲霄賔客時能至園林跡許遙髙秋花雜沓勝地不蕭條暮秋旅情秋又暮長路更旌旗王氣平三極兵塵黯四夷拙慙名已晚病恐志將衰許國微軀在崎危善自持鴻鴈稻粱荒歲月鴻鴈散江湖避地風霜切防身機辟俱不愁天曠絶長恐事榮枯二月陰山暖歸心慰逺途北征五年歸少谷萬里赴燕臺戀闕鬢毛改感時鴻鴈來魚龍已寂寞江漢尚喧豗逺愧青蓮士君王愛爾才章灘九月章灘水危於灧澦堆黃郎習波浪白日犯風雷鳥獸曾何有蛟龍或上來畏途荆棘暗此地石門開憶四弟二首出門憂汝病清淚至今垂鴻鴈莽相失脊令空爾思未依南郭隱真怪北山移夜雨燈明裏商歌一拊髀其二駑馬心猶壯龍駒産不虛吾衰今更去汝病近何如烽火淹魚素關山沓羽書橫門思一出此意幾躊躇崙溪對芙蓉懷林九王七脉脉崙溪雨芙蓉傲逺天時危花爛熳歲晚葉逡巡對影㑹相憶看他亦自憐秋容長不滅吾欲贈佳人寄宗吕髙適不早達才多數亦奇名應造化忌狂與世人疑妻子已同志簞瓢長自怡箕山好風月將汝結茅茨寄林惟大不了林和靖遐心駐薜蘿星文天上有書法世間多獨鶴聞清夜踈梅渡暗波滄灣餘故宅猿鳥近如何憶道夫玉山建亥月漫憶十年前舊驛同吟雪諸君盡著鞭客途猶戰伐南楚自風煙異域懷知已沈淪爾最賢寄木虛吾弟知名早鋒稜不可當交情有端復文體下齊梁霜驥時猶蹶風鷹勢必揚嵩山讀書處煙雨壓茅堂雨後陪周用賔杖策尋天目祖花風雨於潛道藤蘿古殿陰祖花傳近代瑶草寄遐心應世吾能賦探𤣥女獨深形骸百鍊晚未免二毛侵山中對孫太初食黃精山中黃精熟作意向山人製法隨蒸曝靈根集鬼神腹心吾尚病服食爾能純有客乘雲氣三尸不纍身十一月朔日登西天目看髙峰中峰二神僧祖塔因晀千丈巖尋雷起處折古松枝扣巨石長嘯天風蓬蓬從谷底起偃仆草木投宿張公洞枕上漫爾成詩汨汨衰雙鬢迢迢向兩峰一塵消未了萬劫入無窮昧谷蛟龍雨𤣥冥草木風自慙增上慢吁駭問崆峒歲暮尋天台山水桃源未可極天台煙霧深行歌白雪調坐見赤霞心草次千峰㑹鴻䝉萬壑陰藏身一大事聊觀世人音台州觀海二首獨客長途破孤城幽思多入山忘日月觀海失江河萬事只垂釣故園未偃戈平生挾弧矢流落意如何其二迷陽不自覺春逺此登樓落日鯤鵬運一桴天地浮白波心不變青鳥信何由八駿浮雲裏平居端百憂鴈宕讀壁間詩侯希召云此陳準卿之作也昔與準卿為月夜遊仰觀天柱諸峰岌岌如墜發狂大呌自以為奇觀今兹已矣相顧欷歔賦此酹之鴈蕩清猿夜黯然讀爾詩斯人竟短折吾道日支離二谷看秋月孤峰落酒巵細翻嘉樹傳灑泣向臨菑觀鴈宕龍湫瀑布飛不徹大聲空谷哀青山下河漢白日莽風雷潭穩蛟龍定歲深鴻鴈來方巖倚天畔吾志在崔嵬潘令席上作軍中樂張筵潘嶽縣笳鼓競黃昏楊栁生南國風雲動塞垣揮戈情可念擊楫氣猶存漢主白登道甘心出玉門贈顧華玉太守客有飄飄者朅來湖海遊雲端尋鴈蕩雪裏過台州白業藏賢達浮槎近女牛豐干漫饒舌太守是閭丘郡齊燕集答華玊二首赤城天欲雪歲暮客邊心君子風騷逺良宵尊爼深旅懷新浩蕩時事向蕭森作意依劉表移家近漢陰其二梁園初授簡越客罷鳴琴節序梅花及江湖鴻鴈深雪歌難却和醴酒若為斟何限山陰興幽居獨許尋春日發赤城碧海春信至赤城愁思深雪晴千澗疾日落萬方陰畢歲皆行役凡軀故滯淫西歸負良友忽爾長蓬心浙江别王崇賢避亂安平鎮逢君永夜船何堪萍水跡直落浙江邊天子今巡幸崆峒積歲年憂心正如搗况聽卜居篇江上贈汝厲侍御之荆湖浙水重逢地閩州舊話稠雷霆喧獨夜風雨動三秋騏驥行堪見鷹鸇擊更優他時有諫草知上嶽陽樓登太山日觀峰東嶽乾坤定黃河一縷分日排瀛海浪天入薊門雲魯道傷吾志秦碑自夕曛未堪疏逺目萬里正䘲氛遣愁問途青草坂捩柂白榆林暑雨東方急河泥五月深低回長棄馬淹泊未棲禽商調何悲切從誰覔賞音北風北風天際下舟楫夜相聞白草懸邉月黃沙長塞雲鸞旗猶小隊虎旅盡髙勛崖崿暌乖久人今已勒文隱憂四海俱疲敝中原且力支路難惟蹭蹬心苦有棲遲草澤龍初鬭天山矢更遺無由濟社稷哽咽送年衰出門去國淹年歲出門仍糾紛未回塞翁馬空有野人芹山海隨黃纛風雲駐五軍逺慙東方朔談笑諍明君滄洲夏夕失意對蒲栁滄洲昨夜風野雲依暮笛客况近秋空司馬多年病虞卿薄暮窮此生隨造物行止合飄蓬對月懷閩中諸子潞河今夜月却望晉安城少谷堂猶在東峰花正明旅愁存世故鄉夢逐人情展轉懷諸子風沙吾獨行大田篇二首內使調鷹犬呼聲動逺陲萬方多事後千騎大田時關塞回金氣旌麾把健兒璜溪垂釣者能載副車來其二禁直三千士長搴鎮國旗甲戈迷塞月繒帛款邊師大禮初回蹕春原更打圍後車載光寵不數漢昭儀夢惟可為余作山中草堂天末夢君子山中營我廬江湖無利涉家室且安居梅福機事早鄭䖍生計疏京塵今始便騎馬亦樵漁秋晚直南省二首南宫秋晚直更鼓不勝􅋊鴻鴈夜仍度風霜天正寒宫車延北望越客滯南冠三輔烽煙裏聞雞未敢安其二清宵夢不徹鴉啼深樹間要荒同漢月陵寢在燕山青草乘時長黃斿何日還因風候邊使咫尺見天顔送汪希㑹還武昌題得彭蠡彭蠡何時定康郎水尚多魚龍冬不蟄日月歲相摩楚客思芳草江城未凱歌星檣候風色安穩犯鯨波黃巖黃宗賢為余築室羽山招與共棲未果守官鬱鬱輒有東路之思奈故鄉多難欲歸不可行當赴其招矣記興二首不分委溝壑上林安一枝官隨年少後拙負故人知彛鼎終難就簞瓢定不辭故園方苦亂去採羽山芝其二萬事無何有風雲信所為此生依鮑叔何處覔鍾期騕􅒁懷長路芙蓉惜後時嗣宗元玩世不恨步兵遲答孫太初平生孫處士雲水誼難忘遁世思公輩卜居真此鄉名髙多寂寞道在亦翺翔徐福終入海蓬萊意甚長答林德敷曼倩淹平世揚雲困太𤣥此生元濩落夫子最相憐跡逐捐金市心卑扣角篇鯢桓去不逺脫屣歲寒天月下聽王稚欽彈琴昭文鼓緑綺六氣指間流王子梅花思飄飄下隴頭月華終勝雪商意自成秋今夕西方夢佳人不散憂送陳生赴韶州戎幕三首閩海三山下韶州五嶺南東風鷁首去長路馬蹄諳蠻井歌堪聽軍門劍可談丹砂真易得吾欲解朝簮其二月下棲烏樹天邊過鴈羣生涯隨逆旅幽獨倍憐君百粵兹多難今時未尚文南遊得蠻府愁殺郝參軍其三已息河間轡仍麾嶺外旌艱危一命寄牢落二毛生銅柱時存漢烏蠻歲厲兵慿將攻守策慷慨說花卿讀魏鈺詩魏鈺新聲出篇篇有古風夜珠光照乘天馬勢行空邑宰深相識經生本自窮昆城依隱地秪憶鹿皮翁邊將十月黃沙動陰山白雪髙邊兵慿剽殺漢馬辟雄豪王道須無外天戈自有操莫令耕稼地歲歲泣弓刀弔劉蕡祠自昔悲歌地劉生有墓祠秪餘經世志况值諱言時去國英雄盡還山事業遲黃金舊堂北搔首動遐思寄徐可大黃門往年遊白下泛愛有徐卿令弟今相問憐君久振纓歲星還自照諌草未全行謝傅東山卧秋風社稷情寄汪令希舜彭門當太白劍閣帶青城此地神仙窟春風枳棘情桃花栽欲遍蜀道去還平知爾丹成日雙鳬凌紫清送人遊衡山衡山開漢沔髙者祝融峯羡爾為官地看雲長道容齊居夢波浪冬日見魚龍定有冥棲客巢君紫蓋松送龍相赴榮府去為朱履客瀟灑向王門君有神仙質官曹入故園乘風帝子閣種术武陵源莫弔長沙傅荆蠻處處猿白鶴廣野聲仍度華軒意不忘只疑霄漢逺其奈網羅長宿處隨鴛鷺鳴時學鳯凰終當蓬闕去天路永翺翔冬夜過王稚欽禁木棲烏盡城樓戍鼓催瞑移中散駕時接仲宣才道術吾全未詞場力擬回清風廣陵散愛爾數能來贈宋鴻憐君羽翼晚矯矯若驚鴻夜躡燕山雪春生楚澤風霄漢去不極稻粱行當逢遐方倦飛鳥猶自觸樊籠題夏仲昭畫竹蒼梧春欲至翠篁風雨深雲梢灑不亂流影下湘陰杳矣虞妃淚悠哉君子心鳯凰去已久對爾想遺音人日得諸友書六首歲晚通明閣登臨念我深故山歸未得叢桂蔚森森人日雙魚信逺天黃鳥音如何莊舄貴翻動越鄉吟其二聞爾浮南海鯨波隔歲回翻將謝傅興轉作步兵哀地到朱方盡舟從日下來交州拾薏苡誰識葛仙才其三吾愛方山老巖崖湛世情成都賣卜久不道是君平文陋齊梁體音收正始名赤霄天驥步他日與橫行其四女方尋九鯉余苦憶丹丘蓂莢生無盡璚花采末由兔園枚叔侍牛渚客星浮杳杳孤槎外相思天漢流其五不跨山公馬春今薛老峰前時紫芝曲尚繞白雲中霄漢慙棲棘泥沙想蟄龍明朝解組去共醉薜蘿叢其六爾同鄴下士染翰擅詞場余豈東方朔猶含漢署香放身滄海上得句白蓮塘遲暮思君子春來數鴈行送人遊鄴下鄴城魏七子文藻亦吾師四牡君今去風流端在兹荒蕪銅雀榭寂寞武安祠獨有韓陵石黃沙歲嵗吹部直春懷耿不寐悵望宛京天鶴到中宵唳星分萬井懸燕雲時少耗郊禘日虛傳常想南昌尉先存諫諍箋送張汝州汝水元依洛嵩山直配天今君簿領去兼結水山緣世路黃塵裏官曹紫邏邊誰能廢組綬跨鶴去翩翩聞道聞道漢天子身封鎮國公家初營上谷臣得賀離宫鐵劵傳何急將軍氣盡雄郊牛凡五卜車駕想河東送陳思獻赴金陵昔慕蔡夫子今知陳使君深居避矰弋用志到羲文却向金臺别翻將寶劍分秣陵依隱地養拙幸相聞河隴河隴時多事兵車歲幾奔猶聞遣太僕長計向軍門羌羯方酣戰驊騮盡不存西歸報天子已到渥窪源西山雜詩三首春盡一到此散愁幽意繁西湖草已緑南國桂應蕃宫殿浮今日山河控北門時艱羡飛錫來往給孤園其二昔日西湖釣宣皇遊幸來至今鮫室裏倣佛錦雲開歲月芙蓉殿關山龍虎臺東巡志更逺誰挽八鸞回其三西山五百寺多傍北邙岑土木春巖盡樓臺海霧深僧皆傳玉食地更壘黃金縱目翻愁極長安歲歲陰送洪南安平生洪大理朴直古人心執法漢庭上春風吹六陰一麾橫浦去相失庾山深他日逢梅使聽歌行路吟伍中丞擬歸田索題伍公江海思魚鳥久相安擬逐鴟夷去翻憐鐵豸冠蘿雲藥圃細竹月錦堂寒矍鑠風塵裏憂時且據鞍周公器𢎞治初為慶符令賦詩追憶之周君為邑日江漢盡桑麻帝力誰知識長安無狹斜但將九溪水頻灌慶符花遙想彈琴處南風吹未涯余侍御珊喜湖柱史湖邊宅柴扉開皖峰晴天回鸛鶴暮水逈魚龍芰服身偏穩漁竿意可慵眼中秋浩蕩為爾咏芙蓉西山雜詩落日春湖上煙波正渺茫衣冠非敢倚魚鳥坐相忘痛飲還山簡招擕有葛疆濯纓計未得意氣總滄浪少谷集卷四
