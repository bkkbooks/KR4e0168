body:
  text: 鄭少谷集别集類五明提要臣等謹案鄭少谷集二十五巻明鄭善夫撰善夫字繼之閩縣人𢎞治十八年進士授户部主事改禮部以建言廷杖尋乞歸用薦起南京刑部改吏部郎中事蹟詳明史文苑傳善夫在𢎞治間不襲何李緒論别開生面盤空硬語徃徃氣過其詞雖源出少陵實扵山谷為近集中感時之作激昻慷慨寄托頗深或病其時非天寳地逺拾遺為無病而呻然正徳時奄䜿内訌盜賊外作詩人蒿目未可謂之無因朱彝尊靜志居詩話云少谷詩有獨立不遷之概當時孫鄭並稱孫非鄭敵朱鄭並稱朱非鄭匹孫謂孫一元朱謂朱應登也今以二家之集參觀彞尊所論為允矣乾隆四十六年正月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:354655ca6bb9e11e7fb851cc02c205b6477f2a270eb1f4b987b91038b85836bb
