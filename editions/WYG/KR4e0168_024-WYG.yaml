body:
  text: 少谷集巻二十四附録中題序類題少谷先生遺稿方豪少谷先生詩文若干巻往汪郡守刻之流海内矣獨經世要談子通論道未行余聞先生疾革歎曰詩文小技害道而吾為之吾悔之矣向非石龍南洲二公忠誨夾持吾有出頭時耶是稿索居時隨得而漫録者固蕪稿矣今巳矣夫吾死之後可寄此於應黄為黜疵存醇藏之少谷山使不殞吾晩暮之志朋友講學之功或異日得自表於世死固樂哉可分是編為上下巻曰經世要談曰子通論道云悲夫少谷先生集序邱齊雲國朝𢎞正間北地李崆峒以古文辭倡海内而一時屬和如晉安鄭少谷者實與伯仲故談藝之士褎然以二先生為稱首云不佞生也晩未及其門逮官民部閲往牒乃知二公咸用是官起家也于是從署中築吾兼亭日取二公詩文讀之仍作一詩見意亡何聞而和之者數百篇不可知世有同聲哉去嵗出守潮謁督學使者碧􅅢林先生于嶺南手授鄭先生詩文曰是編爾向所讀者盍梓以傳不佞喜甚歸付之梓人閲月畢工竊念之先生何如人哉振衣圖南遡遊漠北聲光奕奕流著海宇乃遭時不弔抗疏削迹中間顛沛流離日晏未炊然皆處之泰然不少見於顔色至於泉石之事君自以為為政若而人也豈直一鄉一世之士哉嗟夫以彼其才使之際清明悉洩所藴藉未必不追蹤姚張以收黼黻之功乃齟齬郎署之間不得一日安其位而行其志竟淪落以死也悲矣然亦以此故得肆力于詩文從今觀之渾乎若璞澹乎若太羮之味森乎若發武庫而莫可窮狀也其詩或感激世變時遇幽憂一切規法少陵至晩年之作又能齊生死一常變彷彿于南華逍遥之風蓋浸浸乎澤于道徳者矣此之為業天壤俱敝也假令台鼎足重先生乎王元美曰繼之之雄健如黄河積氷寒色千仭又如石骨巉巗俯入幽澗知言哉今督學君于先生為甥家學淵源愛而傳之宜也昔者王儀封初不識先生及卒之日千里遣使紀綱其䘮事仍刻其遺文夫世之士有能使素所未識之士一旦身死之後而慕之若此者乎其非聲音笑貎之力也必矣則兹督學君之梓以傳尤非私于先生可知矣李集有全刻乃先生詩文舊無倫今彚而輯之得二十九巻復以先生墓碑與輓詩及諸公序文為附録一巻題少谷文集林俊余亡慧執故滯真無足世道繫也居閒處獨謬意作古文詞取六經傳記秦漢而上書謬讀之亦謬効之竟無得其大都如航廣川茫然津涯捕風影無所得鏤脂刻氷負成勞於工巧又如宿留東萊凡骨未蛻身固在此也今年年六十六倦以老矣榕人鄭少谷繼之齒後余以倍悟獨前庚申余過其諸祖藩叅建中少谷尚少語余忘之矣嗣是少谷文日起伸縮兩儀顛倒萬化輪古今而上下翫弄作者于掌股之間羣喧就寂靈響効職溯典墳宗風雅出入莊騷以直附左氏超凡突詣易吾難如此也蜩與鷽鳩决起而飛槍榆枋鵬摶扶揺而上者九萬里凡馬撾策不盡一舍一日千里國馬固能之物諸天異也抑風之積不厚則其負大翼無力鵬獨運乎哉馬食日盡粟一石則飽飽則力而材美外見少谷將無是之遭歟善自愛哉少谷袖稿来雲莊商略其臧否駁純以訂所學噫子實惠我惡置我一喙哉無已則有告焉文寄道者也韓子踔絶奫澄千狀萬態而卒澤於道徳仁義炳如也少谷善自愛哉余將焚筆瘞硯以荅子一篇遂強疾仄枕書為别題少谷文集後林釴鄭子坐余於少谷草堂與論今古之聖賢曠絶於世之傷岐徳與文聖邱賢軻徳文稱矣后軻之愈愈視軻則愈固弗若矣聖賢同不同如此其曠絶也已世之遫弊盡人以詞夫斧藻其詞徳之藻矣詞藻寔僻蕩徳藻寔餙華僻蕩餙華時之然也柰之何其弗傷也故曰天下有道則行有枝葉天下無道則詞有枝葉夫行有枝葉者根本盛而條逹也詞有枝葉者蕪詞曼說佻巧者之淺是故豪傑之興者世責之頼也鄭子其身之自根本而逹未彊而負望於天下天下之知鄭子者唯曰其能通乎古之詞矣嗚呼鄭子無通於古之道歟古之道不為利回不為義疚守道如守官是故鄭子之成也於今之樊橋然而反之正以詞盡人不亦鋭乎使未有樹是市人舜裳予决其否也信乎鄭子者於今誠曠絶也况樹乎後者其又膴焉耶余從而卜之也余奚張之哉題少谷文集後黄鞏傳曰文以足言言以足志不言誰知其志余友少谷久矣讀其近稿乃始得其才識之髙意度之廣更歴之久且熟也鄉之知吾少谷不猶淺乎繇是觀之世之人欲以片言而决㡳裏一傾蓋而盡得其􅊭生者皆非也雖然少谷之所以自見於世者殆不止此余也又奚足以知之題少谷文集後殷雲霄六經之文天也諸子山川草木也鉅纎醜正不倫亦各有生意矣下此直繪畫耳繼之知文者因以問之題少谷文集後王鳯靈文道之􅆬也本之則夷而􅆬是用崇其不可崇朝植也賊夫道而澤夫文可乎壞殖削榮厚庇之以土以反求其本或有能生者矣昌黎子似之吾用是觀少谷焉漫言乎漫言乎刻少谷文集周廷用少谷子鄭繼之弱冠頴異善屬文既長登第泛交海内名流濩落無所容遂託疾逺遊慕鄒魯之風遵海岱凌日觀既乃浮淮逹泗􅆘吳徂越探禹穴躡鴈宕振衣風塵之表其意嗛嗛如也已而結屋少谷之山潛心大道攬觀萬物之終始譬猶鸞鳯乘風九閎之上飄颻游豫而時人莫測也夫辭榮躭寂者其志曠窮幽遡逺者其思奇故其放而為詩也龍翔虎變波湧雲蒸備極情態命世之詞也詳其所至正足以翼三百篇之經變可以摹於騷漢法以凖其體魏辭以則其要晉選以暢其氣唐音以澤其和盡性情物理之懿義不詭於風人或曰少谷詩人爾余觀少谷遺周方伯衡山髙云周夫子崇髙遍博要如此平生意氣吾與爾使天假以年則事業余莫之究竟矣少谷已沒其言立於後世死而不朽其以是夫書少谷詩後林民止海内談詩無慮千家其髙者乃稍取裁漢魏至叩其音節猶在朦中人謂繼之詩擬杜甫即杜甫何擬杜甫詩於古時或出入近體則齊梁之變者也夫自三百篇之不得不為漢魏漢魏之不得不為齊宋王岑盧駱者時使之也而能令曺絳談伊周之事不然矣繼之詩入以杜甫七言變體所謂扺掌叔敖古詩綽有蘇李風致至其恬澹冲雅亦或離而去之夫詩心言燕齊梁魏無方言他或以方江南之橘江北為枳地土有然吾以為詞致可學風骨不可學此詩所以有列國之風也家大人舉僕於燕十嵗過洞庭浮沅湘登祝融之峯飄飄乎慿虚馭風二十而對公車入邯鄲以為故土間從燕齊人語則或以為莊嶽之間者顧恨不得繼之同時於以言風為之太息少谷詩序謝肇淛自三百篇之降也浸滛至於勝國蓋正始無遺音云國初作者尚沿餘習至𢎞正之際然後琢雕破觚力返茅靡時則二三君子之功為多而吾郡鄭繼之先生其一也先生曠世軼才其於詩有所獨詣命義剏詞蒼然古色髙足頡頏兩京下不失凌鮑謝朱絃希音硎羮寡和一切人間藻繪可憐之曲不啻沈之濮水當時與北地金昌諸君子執鞭弭周旋海内翕然向風要其終身所至於少陵氏可謂具體而微矣先生家食以孝友式里閈立朝抗疏濵九死而不回死之日家徒四壁子孫至不能自存蓋其生平志行有足配千古者昔人所稱三立先生兼有之非徒僅以詩不朽已也天既奪先生之年而復孱先生之後遂令其遺言幾至漫滅余小子不勝懼焉曩嵗議與諸同志一新之而弗果後余李吳興而鄧女髙計部以搜粟來㑹其志適與余合遂稍為較定而授之梓嗟乎自繪事勝而情性逺七子興而大雅衰里中耳食之軰往往喜逺交而近攻蓋先生沒且百年而論今日始定悠悠黄河寧復可清而况乎其以下駟走者也掩巻卒業但有三歎少谷山房雜著序徐熥一日偶於市肆見廢書數冊皆蟲䑕之餘余欲索觀其人謂將用覆瓿不足觀也強之始得觀則此編在焉出鄭吏部手書無疑然以印章考之知為髙宗吕家所藏首易論河圖洛書次洪範論及洪範數補叙次田制論次九章乘除法次演禽法次奇門遁甲法終以衣冠車之制皆探􅄨索隠鈎深致逺非世儒所能窺測者先生於學可謂博而精矣先生殁且七十餘年其書片楮數行人皆珍惜况此編蠅頭萬計又闗理數之㣲尤可寳也然不縻爛於醯雞者如綫哉因重加補葺秘之帳中時萬歴丁酉嵗四月十八日鄭少谷先生集序曺學佺初鄭繼之先生有集刻於家其傳不廣鄧汝高為浙江監兊惟取其詩稍裒選之刻於湖州余選明詩至少谷必欲得其全集又不能無去取較諸湖州所刻存者僅四分之一然而選自汝髙者同異亦有間矣去嵗董崇相贈余言以予方之少谷先生其少年科第棲處閒冗以詩名號召海内者略同而末且引左氏之立徳立功立言為三不朽予謝何敢當先生萬一但考魯穆叔之對范宣子曰魯有先大夫曰臧文仲既沒其言立此之謂不朽按此即吾夫子所謂君子疾沒世而名不稱焉蓋人於既歿之後其言足以垂訓與否皆聽於後世取舍之公心而其人不得而與焉故傳又云太上有立徳其次有立功其次有立言凡言有者謂其徳其功與言皆實有諸已故後日雖久而不廢也與夫好名之流襲取於一時而實為速朽者大逕庭矣繼之先生位不越郎署年不滿四十而其詩至今人稱之也余選其集亦殊寥寥與他名公無異而公集中之詩與何仲嘿孫太初王道夫諸名公相往復者余選之才得三二首其餘皆擬古登眺感遇之作也然則公於一時交遊中簡澹亦可想見而其海内以及後世顧咸趨之何哉昔之君子不近名而名歸之信乎其有以立是言者其為徳與功又可以類推也予自度於三者何有焉故謝先生不敢當亦以見夫名之不可以苟得而勿䘮也鄭民部映崑將重刻少谷集於金陵而問序於予余乃推所以景行先生之意者如斯而其詩則直為言之所寄而已矣如先生之詩則其所寄者可謂逺也已矣鄭少谷先生集序孫昌裔吾閩少谷先生詩若文流傳海内已久而人尤膾炙其詩以為得少陵骨第稍稍以歩趨擬議求多當先生時所稱少陵具體莫若空同尚亦未免斯語嗟夫先生空同所以與少陵合者别自有在而非以詩也少陵避亂竄歸初授拾遺即以抗疏嬰肅宗怒遷徙間闗至於負薪拾橡而愛君憂國之念未嘗少衰空同初彈夀寧後觸逆瑾下詔獄者再矣先生以諌武廟南廵與梓溪諸公同受杖闕下此咸以雕龍之才抗鳴鳯之節蜍志足羞龍比未俊忠憤感慨發而為詩宜乎有急調而無繁音有勁氣而無纎態有惕思而無喬志有危論而無巵詞維柱藉支日星並耀此其不朽寧獨立言而斤斤乎尚以篇章字句離合吹求所謂飛鴻已翔於寥廓而羅者猶視夫藪澤也予嘗尚論其世唐之寳歴明之𢎞正乃風雅極盛之時泰否相乘之際三先生生應其期身閲其變詩以當史匪特少陵而少陵家楚客蜀空同家秦客汴三峨七澤增其髙深九曲二華竝其神秀若夫屴崱嶢屼摩霄標霞滄溟漭沆郃日吐月表大風而獨霸甲震旦以稱雄微少谷先生其孰能當此者盛矣美矣難測究矣抑予因是竊有感焉山川自有神皋亦猶文章自有天府往昔無論明興諸方家自先生空同而外先後不乏率皆壯湖海之氣炳河嶽之靈雄雄一時礌礌千古述作者所宜奉以為程邇來一二輕儁必欲蒐奇剔異於赤縣神州禹跡亥歩之外而以易曉易就自文其俚淺者又相率謂口頭語眼前景即詩家絶妙詞是何異陟莽蒼之部婁汎邨塢之曲浦廻溪而遂欣然以天下之美盡在已也予友栝蒼守鄭君合刻先生詩文於南庾署典型具在遺佚悉收豈惟知𤣥之君山抑亦救時之東里蓋世習知先生詩而不知先生於文尤蒼潔取法嚴而持論正得之陽明甘泉兩公麗澤為多夫世寧有真文章真風節而不根極理道槖籥性靈者哉天假先生以年殆將分擁兩公臯比不徒與少陵空同稱鼎峙敢因栝蒼之請而併及之汙不至阿稍識其大後之論先生者度不易吾言矣少谷集序邵㨗春予友鄭章甫重梓少谷先生集成孫曺二觀察已弁之予復何言然世之推轂先生者徒以文若詩王弇州評先生得杜之骨如天寳父老談䘮亂事皆實際感憤竊謂少陵在唐值禄山不軌傷時感事到處皆憂西瀼東屯流離托跡良苦矣先生當正徳初立朝無幾時值閹瑾用事屢疏乞歸築少谷草堂於鼇峯即予里也顔曰遲清將以俟天下之清矣迨毅皇末年瑾誅而嬖人江彬又揺亂國是莆􅈠郎黄鞏軰以諌南廵受廷杖先生上疏止輦且明鞏無罪杖亦濵死故其詩一本忠孝之忱非無病而呻吟也者顧少陵潦倒名場竟慳一第年四旬餘始拜官卒年五十有九先生弱冠登進士未滿四十而歿屈指少陵遇主之年先生墓檟可材矣遲速夀夭何其不侔惟詩篇渾雄悲壯大率相類予載觀先生品評杜詩指摘瑕疵不遺餘力豈以吾之不可學栁下之可歟又竊計少陵之詩意興偶觸而後世耳食者相沿蹈襲不免畫虎之誚先生神與之契匪摹擬而得故能掊擊而發明之如良醫得疾腠理自知自治然則先生於少陵其即岳陽之元度成武之諸葛耶何其太似之而更能箴砭之也先生之業不寧惟是其於易數河圖洛書演禽遁甲莫不精詣非世儒所能窺測為文本諸六經子史書畫又甚絶倫嘗晤文成甘泉慨然究性命之㫖躬體而力行焉如世所傳經世要談大畧可覩即里居貽書當事殷殷不忘民瘼稍假以年俾獲大展寧不竟少陵所未竟無如天不憗遺而遭逢以後則一一符合者少陵工部先生吏部其生平宦職同少陵變遇禄山先生變遇彬瑾其遭際不辰同少陵疏救房琯先生疏救黄鞏其批鱗風節同少陵卜居浣花先生築舍鼇石其棲遁雅志同少陵歿後貧難給䘮四稔始克葬先生瘞跡梅亭松栢摧為薪其遺後清白同悲哉章甫蒐羅詩文既備予因掇拾先生雜纂及同時贈答哀輓碑碣詩話諸篇附之末簡用抒髙山景行之意誦詩論世者其以予言為然乎否鄭少谷先生全集序徐􅎾吾郡自洪永間十子稱詩崛起草昧力追正始百餘年間則鄭繼之先生布侯海内與李何邊薛諸公分鑣而馳一意歩趨浣花得其神骨譚萟之士推為盛明正宗先生詩名不脛而走矣先生夀不永遺稿㪚落汪福州希周拾詩若文刻之郡齋嵗久䆮漶萬歴初先生外孫林少司空督學東粤時重刻於潮陽又三十年鄧觀察汝髙稍删汰其詩授梓而文則未遑焉汝髙已化板藏家塾近罹鬰攸之􅍔悉付煨燼汝髙仲子道協僑居金陵謀為重鐫甚盛心也昔曾以展墓過家與予商𣙜今古予性喜蓄書漁獵先軰遺文如獲重寳先伯氏惟和曾得少谷雜著一種予得經世要談一巻遺詩一巻遺文數十篇尺牘數十幅皆先生手録者乃盡授道協彚為全集方事剞劂而道協告逝友人鄭章甫官南户曺遂踵成之而先生雜著種種未及纂入郡觀察肇復補而續焉又採輯先生同時贈答哀輓及墓碑詩話諸篇附之於後夫先生弱冠登朝位非言責廼抗疏闕廷濵死者九其風裁行誼超越時流且好遊名山所交非海内賢豪長者不與晉接著書立言窮乾坤象數之變察車服制度之㣲使天假之以年其造就寧止於斯耶嗚呼先生亦宇内一異人矣論世者毋徒以詩文槩先生可也少谷集巻二十四
