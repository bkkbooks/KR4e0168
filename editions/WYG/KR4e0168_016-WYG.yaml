body:
  text: 少谷集巻十六明鄭善夫撰跋文山墨蹟跋昔余在吳下曾見文山墨蹟凡十餘條中説空坑兵敗之事較詳其後載徐妳環娘流落之由與此本相類其字畫月日亦相類時同觀者數人三讀欷歔為之泣下余友殷近夫跋云使公用于徳祐之前國尚可為使公不死于景炎之後身無所安時讀其詞咸願為之執鞭不可得者初不暇論其真與贗也今觀一峰之論豈此本得之毛氏者乃其真蹟而吳下所見者誠所謂虞褚蘭亭耶於乎百世之士片文隻字流落人間雖偽為者亦能使人興起其他可論哉戴節婦跋少谷子曰貞節至難也人受剛中正賦又㓜學尚志動則曰古之畸人一遭事變遂遷次以䘮其平生况婦人耶色之欲本諸天地之根成性也盛年守貞難於格虎無論心􅆐夫本來安安者上也自防於禮法忍荼食蘖者利也勉也及其成功一也余嘗曰斷髮截鼻者勇冠三軍余讀節婦傳得其情未嘗不為之降心焉黄羅戴氏母拮据一節國人稱之嘻難矣然有反風滅火之報節婦弗論也迪功集跋昌糓吳人也十歳學古文章遂成章二十外稍厭吳聲一變遂與漢魏盛唐大作者馳騁上下今之世絶無而僅有者也年三十調迪功幽憂中遂選平生所為文曰迪功集識者見之曰昌糓之年其殆止是乎既而竟死昌糓且死抱是集付其子曰是不出門傳必以獻吉盖與獻吉見諸集中云云此本余得諸其家藏選本其子手抄者今所行於洛陽者獻吉多為更定失昌糓真盖獻吉雖與同調其丰神氣魄亦自有不相能者矣昌糓死今十年海内作者莫不輸其心恨不與同遊者余實與同游而不知昌糓鄙哉余之賤目也於乎千載下覽是集者竟如何也此本木虛録者俾余作語髙時菴真蹟跋時菴世髙士也余不及見髙士獲交其似者髙士於藝無不知亦無不能能亦無不精觀於此巻能具一隻眼者可攷也余性不好世俗寫法而獨愛宗吕之品格蓋法度之中有神竒焉謂其天分迥絶若舍是而求其上者何患不至而不知其傳蓋出諸此也宗吕性至孝此其父手澤也春秋設其裳衣正以親存形魄所慿又覩是物所以興乎孝也况是手澤又精神之粹然者是慿哉畫龍昔張僧繇於安樂寺壁寫二龍不㸃睛謂㸃之即飛去閻立本亦名手也見之却走不敢視夫龍神物也筆端之神而能造化之至此哉先儒言人心天地人心而曰天地則萬象萬物中其有也而謂之能造化也固宜僧繇之神物也道眼中之易易者也今人自塞其天地猶世俗之畫龍也而責其不能神抑得其疑似耶非耶易論二條易君子以趨吉避凶防微杜漸易也者用於君子而勿用於小人者也易其聖人之時乎如姤之時五陽在上一陰在下小人雖微其機則將盛也然其道未成其勢則可剪剪之者杜其漸也至於二陰在下其道成矣其勢難矣在君子則有遯遯之時不可為也猶可去也至於三陰在下天地否矣否之時君子將何逃乎亦惟守死善道定其志以竢天矣盖聖人可完名則完名可完身則完身遇否則完其志而已如一陰在上五陽在下小人尊而無權君子盛而多助剪之便也五王不去武三思自為机上之肉不明乎易之義矣易變易也物極則反泰否相乘時之至天地不能已也堯舜最善用易堯舜盡聖人之權者也羲黄相續至堯舜之世值乎極也則反之以朱均堯舜能祈天永命而權之以禪受以濟其極是明奪天地之變而反之正者也故曰聖人賛天地之化育三代聖人則道乎其常矣立吾齋林子志古名其齋曰立吾一日過少谷命申其義鄭子曰名其至矣吾我也即志古本來面目也人皆可以為堯舜識得志古面目即是堯舜堯舜豈難為耶豈易為耶夫子之言曰可與適道未可與立聖賢立身無二道識得真吾而求以立之者自如飢渴之於食飲無之而不得而後為真識飢渴切身舍食飲則身死真吾切心真吾不立則心死莊子云哀莫大於心死而身死次之聞見之識如飢渴之於食飲也出於意氣入於才質才質局於彼此安能一了而百了意氣頺於衰暮安能一得而永得夫真立也者有真識者也無夷險無靜躁無久近巨細無聲色生死榮辱禍福一切舉不足以嬰其真猶砥柱之湍也㒺覺也夫是之謂志古面目非耶昔夫子三十而立時則志意堅定萬變不摇也志古今其時哉愚見止此請質諸素翁與愧吾吏部家庭授受當有奇聞幸以相告漫書授君用漫書一本授君用此余心口也此學稍戾時禁然究竟不學則亦已矣若必為聖賢此是明正一條大路不可讓人先着脚也君用聰明直截好根器入此甚不難不可蹉過此日豈再得僕回首旁蹊曲途悔之晩矣詞章雕蟲小技然不明此學雖工何益君用細思之從善如登從惡如崩要須下死工夫方做得聖賢事業君用稍過飛揚莫尚有照影自喜意思在善學者貴鞭其後贈三子髙宗吕甘貧守節安安然人無知者又其性瀟然物外下視𤨏𤨏者如市兒故憎多口云爾固信而行之未嘗改也與余與克相為貧賤之交未嘗漫及家事若將凂焉者其天性如此事母致力為養事兄致友余表其先人之墓見其槩云今學使者表章儒行愧余力綿屢薦之而未信盖有聚沬成河云然君子修其在我者無盡自今宗吕其益楙修之遯世不見知而不悔方謂之君子宗吕無欲臻是哉易曰君子終日乾乾惕若又曰潜龍勿用又曰見龍在田天下文明顯晦用舍一龍也君子象龍徳故龍曰君子君子曰龍云然時有顯晦身有用舍乾乾惕若則無終無始無首無尾堯舜之兢業文之純非歟傅子善學易者也知用夫易今初其勿用時乎禹稷顔子易地則皆然勿用在田一也乾乾惕若則在吾軰作為如何耳龜山云此日不再得學問成於勇决廢於優游傅子其益修所以如龍者而文明天下哉闕諧謔藹然可親然二者有志則無害昔劉貢父善諧笑彼盖立得脚跟故不病道故詩曰善戲謔不為虐云施子性資最稱明悟讀書極易通曉文理粲然然每以一科第為病余曰此未足以病施子也君子疾没世而名不稱焉不在科第之云也聖賢千言萬語只是教人修為誦詩三百授之以政不達亦奚以為讀書而不措之躬行余不謂之學也子張學干禄子曰多聞闕疑云云禄在其中矣施子能以余之言病病哉東廵懷草跋此本余伏闕罰跪時所草置懷中謂倪本端方思道曰余死則為出之時死者十一人而余最柴瘠幸不即死今存此草每靜夜一披追惟徃事未嘗不潸然痛哭也連璧巻跋此余在杭時同太初作此寄髙子者珠玉在側覺我形穢嗚呼太初已矣荒村閉門撫巻懷賢為之憮然辛巳夏朝髙傳二子過我少谷志游藝巻跋宗文持此巻欲予寫舊作余顧欲為知己者鳴也然心求工而筆愈拙凡四更端而後成可笑可笑世間事不由人作意為之類如此太初山人稿跋余敘太初漫稿成太初曰子真知我者又明年庚辰而太初死遺命以漫稿必付余余歸弔其廬撫其孤携其稿至杭梓而行之凡與太初遊者如杭人許台仲陳遂初髙世美湖人施邦直沈仁伯率來集事於乎使太初復生諸君當不愧乎其平生之言乎是年秋七月望善夫志畫虎跋有元時濵人劉平戌楚道棗陽遭虎其妻胡氏與其子殺虎得復甦時好事者傳播圖賛至于今以為美稱壯矣哉鄭善夫曰物役于精精率于性物軌不跂情専無畏故義每起于所激仁每術于所重吾觀物見情也觀情見性也觀性知道也永樂大臣觀春詩巻跋是作者鳴其幸者也永樂諸君子際天地平均熈熈於廟堂之上噓而成聲聲不苦迫時也不幸而逃山處竇而亦鳴其為聲也荖荖也以人考槃采薇之什是已然而皆順也楊文貞曰自非山焦水濆賞幽悟淡為無益之聲者儔豈真為無益之聲者哉與可墨竹巻跋與可教東坡作墨竹曰必得完竹於胷中執筆熟視見即追之如兎走鶻落其在洋州時遺以所作偃竹且云此竹尺許有萬尺之勢東坡嘆曰更十年余亦不能至此仲黙教余為詩曰學詩如學仙神仙逆天地之氣以成詩亦如之逆則詞古則格髙則意長余讀仲黙詩始覺余之醜耳然東坡學與可心誠識其所以然雖不能過與可或猶乎與可也後之人之寶之傳之亦或猶乎與可也余學仲黙不可謂不識其所以然也而顧不能猶仲黙者天分量之耳不知後世論余於仲黙亦猶與可於東坡否也癸酉歳葉茂全偶持此畫欲余作詩余欲仲黙先作詩及見仲黙詩竟縮手退舍不敢出口茂全強余為之曰中州人士品題當世人物皆以吾子文不逮詩果然余詩之自信乃如此文斯下矣慰遐思巻跋崑山蘇州屬吏也上下以道相友世人非之在蘇州用上友下樂人之道而忘勢者也而謂之辱在崑山用下友上樂其道而忘人之勢者也而謂之僣彼二人者可謂踐迹古人而反乎今之道者耳然此詎足以槩其餘哉公人物論當自見東湖巻跋東湖在象山之麓山人潘搆家焉湖之又東作亭一枕塘塘之内植蓮墻以竹箭間以名木面以山陰晴之氣燕雀鷗鷺鵁鶄鸂􅈑之鳥芙蕖椒芷之香四時也丁卯春予過此樂而飲焉飲輙醉至醉輙歌甚驩也繼是歳數往往輙數日日凡得詩數首以主者搆也今將有逺役搆以文請於乎余將陳迹於是湖耶異時風塵囘首此意何極三復而歸之贊鄒山人贊而媞媞而于于廣禮若比廣義若迂其被衣齧缺之徒與巽所道人贊服美而伏縁形而趨伏匪名處趨匪明居萃乎其若猖亷乎其若隅人著其著而莫即其都彼若人矣夫銘方塘銘華容魏子秉濟作方塘于洞庭之野結菴以居尚意也閩粤鄭善夫為作方塘銘銘曰濓水脉脉伊水洋洋誰則導之瀦以斯塘羣象在中庶類在傍君子之處不愆其方匪江匪河不浲不波吁嗟乎塘上之人兮奈爾何少谷集巻十六
