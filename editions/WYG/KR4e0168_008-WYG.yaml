body:
  text: 少谷集巻八明鄭善夫撰五言絶句宋宫故基西門數頃地舊是帝王宫莫謾歌禾黍山河涕淚中病居讀顧與新詩伏枕殊方客秋風歲載隂頭風頓覺愈吾只愛陳琳楚客楚客望不返行坐楚天心荆門未可渉洞庭波正深冬青樹道傍冬青樹人好樹亦好豈不纒風雷青青自持保子夜變歌三章洪江通海潮朝往復暮來岊水下洪江何時逐潮囘我欲渡螺江螺女不可遇人知子夜來不知子夜去漢王昔垂釣白龍從天來至今龍起處猶傍漢王臺東園汶口園仍好商於草已蕪誰歌採芝曲高調滿江湖柴門二首凉月光不了照我芳桂叢白鳬如人長來往柴門東家住白湖陽習見風波事苕荻何蒼蒼亂我蘭與芷題畫商意變緑荷秋風落江渚零露忽泥人愁聞鶺鴒語吳中雜詩二首秋浦下鴻鴈秋風鳴芰荷客懐一萬里江月夜如何烏衣不復見蟋蟀聲近牀黄花深幾許昨夜一籬霜江行五首氷合如鏡平氷斷如雷鳴孤舟不得寐枕上悲風生厭見雪如麻不見梅放花江北是客路江南是客家閉門對孤燈開門見明星黙黙心底事礧磈誰能平宦海多白波客路多黄塵波白解覆舟塵黄解汚人少年愛春日羯鼓閙春盤一自不家食春盤歲歲閒漫吟三首浣紗傷妾貌折花傷妾心郎君不相棄請聼白頭吟白頭人所賤緑髪人須戀君如戀緑髪莫到白頭變愛君如愛天事君期盡年妾意無虚假君看塘上篇古意誰家玉靣女素足立水傍睠言新歲近作意浣衣裳無題三首悄悄風色寒白地不敢看天尾是故國天頭是長安嘆息復嘆息淚沾頭上巾青萍將底用光掩屬車塵明月豈長好的的入我懐東風不愛情浮雲與意乖漁者白日下廣川煙濤去不還平生釣魚意入手便忘筌虹橋虹橋不可渡東斷蓬山陽只有賔雲曲流音下大荒韶州吟二首聞渡韶陽水滄溟水更深娵媀時入饌莫作百蠻音蠻溪楓葉下蠻女答歌還太平無外患何事百牢關閉門四首閉門打乖坐鵲噪庭下槐種竹成琅玕天風颯然來曉起披雲氣攤書青澗阿六經無一字秪道配江河讀易苦解事閲世涕横臆如何中天日未見羣隂息葺彼南陽廬瀟灑玩世事平生梁甫篇吟對滄浪水畫六絶皎皎水上仙風吹入我懐我夢逢姹女洛波墮弓鞋邊人競北風牧馬隂山陽腰間寳刀赤河清爾來王頭陀戲海蟾手握庵摩果大觀天地間一咲吾䘮我鸜鵒乗天巧幽篁學語繁江南氣候正莫過魯東門賣藥行市南隱身入壺中指揮費長房白日騎黄龍六拍按六氣廣樂音未希舉手謝世人行歌綠雲歸病中吟六絶掩書臥𤣥冥蟋蟀在床頭如何閉關月耳畔鳴不休形骸久為累三尸今晏然安得魯仲尼展轉鑄顔淵虞卿為著書卒歲坐窮愁那知交字外翻有逍遥遊有身終是盡學死始長生吾將鍊真性去去凌紫清愛河易漂溺三山波浪翻覔心了無得吾今閉吾關詩書破我拙聰明多事起那復黜聰明返我混沌子伏嘆五首少年逐鉛槧學道苦不早眼看春田花誰是長久好宻雲不成霖西郊氣烘烘女其蛟與龍胡為處池中窮年守庚申服食意未已如何三尸蟲猶在腹心裏生亦何所喜死亦何所悲言脱生死關短脩復誰尸中歲聞大道鍊已成蹉跎去日一以多來日今若何六言絶句洞霄白鶴久辭華表青牛已度函關五内天花未飽麻鞋踏盡名山七言絶句題邵二泉繡嶺草堂二首湘山寂寂楚􅆐啼湘水迢迢過客悲何處篔簹不愁思邵公惠麓武公淇茶仙品泉泉為寒泉翁愛泉泉出山只欲逃名逃不得許多甘冽在人間登北固樓北固樓前鵝鸛風奔濤蹴汐撼龍宫舟楫是非京口渡關河憂患海陵烽遊焦山焦丘龍臥浪冥冥𤓰歩雲囘海樹青風塵重問焦光洞讀罷華陽瘞鶴銘武夷曲次晦翁棹歌十首幔亭彩幄㑹仙靈紫霧濛濛薄太清奏罷人間可哀曲鳳笙龍管杳無聲沙棠為楫桂為船紫嶂丹厓錦映川我是開元李居士鐵龍吹散萬峰煙不道巫陽十二峰玉環珠珮浄雲容美人婉婉秋波立逈隔天關百二重藏裏黄棺壑上船春風秋雨自年年覺來天地終歸盡煉得丹成亦可憐蛻骨藏真傳此巖土花石黛已􅧑􅆴那能縣綆探金槥下𢷬龍宫萬仭潭大隱屏前煙水深九霄雲覆紫芝林彤墀不作含香夢丹洞忻傳出世心水過蒼屏灣對灣山形密似百年關巨鼇不戴東溟去要與乾坤作大閑博羅東下三百灘噴雪奔雷仰靣看虬龍不出蝮蛇出天風下來吹歲寒石鼓雲樓天漢開飛泉幾道白龍洄探元笑入桃源路黄葉千巖風雨來九溪歷盡興翛然亂瀑喧豗赴錦川尋源已到明河曲飛舄還過一字天金陵紫禁金門閉寂寥不聞清樂下丹霄髙皇事業如天地過客何須話六朝臥黄帽青鞋何處尋道人髙臥南山隂閒誦維摩一百偈白雪牀前三尺深竹枝詞二首西澗西邊東澗東千山不斷萬山通謝豹見春啼出血王孫上樹㨗如風梨嶺遥於楓嶺遥小關高比大關高傭夫過嶺如平地一嵗來廻二百遭送林仲頴赴馬平東浮淮海三千丈南過羅浮四百峰知爾欲尋勾漏令㑹看雞犬白雲中送陳侍御使廣嶺南巨海散溟濛海上羅浮四百峰炎瘴直須三尺雪鱷魚先避五花驄櫂歌四首鴻鴈飛來風雪心鴻鴈飛去天山隂二月天山風雪淺六月天山風雪深鴻鴈飛去稻粱荒白鷗不飛羽毛傷天寒日暮黄蘆蕩江水渺茫心渺茫送君把君緑荷衣悲莫悲兮生别離衢陽向上江水絶縱有鯉魚何處來青螺江頭遊子吟黄金臺上秋水深風塵一别一萬里美人駕車傷我心南征二首去年出師大冒山五千歩騎凱歌還可憐今日山前月又照漳南諸將壇贛水西邊是賊壕年年楚越泣弓刀天戈指處欃槍落來嵗徐看破爾曹望靈山上饒縣北香爐西暮靄朝煙咫尺迷平望靈山一百里高南峰影入沙溪天姥行天姥旁通天一門下臨絶壑桃花源玉珮靈車杳然去鳳笙吹斷越山魂赤城懐太白山人天台歲月輕劉阮不見雲端䨇玉簫知爾西湖臥風雪神遊先到石梁橋昔余夢遊鴈宕乗最高臺東觀海波浩蕩囘望萬峯蔚蔚雲際及登盤山歷歷如在夢中竦然題句昔年夢上百尋臺薄海鯨波天地廻四十九盤東向立鴈山猶是夢中來羽獵謡三首君王自擁鷫鸘裘獵騎翩翩盡貴遊歸來錫宴傳封拜狗監雞坊十二侯羽林十萬是親軍漁陽鐵騎天下聞廐馬長留太白壘胡天驚散犬羊羣今年天子又行邊勅報旄頭照酒泉乗輿自領驃姚部内使宣頒九府錢送人遊吳興二首黄龍洞下雲色深霅水苕溪吏隱心東道若逢孫處士青春須寄峴山吟鳩兹城邊望不稀翠木朱藤罨畫溪津吏揚舲唱歌去溪花十里使人迷天姥吟山人住在天姥隂憶余曽登天姥岑雲樓雪磴參差起下控桃源幾許深燕京三首將軍白馬紫金韉接鞚聨綏御􅚋前並誇異姓稱皇孽不用長纓係薁犍緋衣紫甲入東華羯鼓鐃歌散御花邊士盡騎天廐馬燕姬翻泣五雲車山後干戈震朔州君王按劍到邊頭二月凱歌班士馬天閑遺却萬驊驑逐客二首送劉伯儒侍御黄衫白馬簇金臺逐客飄飄去不囘莫向猿聲墮清淚銅環椎髻解憐才尉陀城外汎雲槎西望峨眉隔水華若道日南天萬里歸心一夜過三巴山人税鶴停鸞去不分玉簫瑶瑟散春雲日暮天花吹建水曾孫重拜武夷君新製白㲲巾贈崑崙山人二首細葛新裁白㲲巾風塵把贈武陵人漁樵早晩相擕去五色瑶花好自紉萬里黄河天漢通崑崙遥帶碧琳宫青牛已度流沙去述作虚傳河上公曹仲禮索巾云將歸具茨兼柬王稚欽元是山人白接䍦雲逵贈女莫相疑便從夢澤穿嵩少更歴襄城問具茨送林茂貞大理二首君今執法白門西余亦將隨倦鳥棲黄籜為冠芰為服幾時停棹武夷溪武夷溪上水濺濺東入滄溟天漢連萬里裹糧從汝去乗槎直到女牛邊正德十四年四首君王按劍東南征錦障黄旗出鳳城矯矯六飛熊虎士中原萬里倚戈行雲中鐵騎獵漁陽鼙鼓塡塡夜未央白馬將軍傳號令金盤寳篋進壺漿黄牌使者出行營選舞徴歌傾衛城報道儒生飭士馬南州叛賊一時平桑黄渺渺躡飛塵清路人傳天子真宰相無須保車駕至尊雄武動如神送人之鬱林二首蒼梧之峰雲萬盤下控牂牁連百蠻莫道蠻方非近地日南南是漢關山鬱林東下對扶桑黑霧沉山日暈黄鷓鴣啼上桄榔樹一寸鄉心萬里長蜀中歌五首巴東春水錦江來流入荆吳萬里廻樓船細逐江流去不見瞿塘灔澦堆峡猿啼過下牢關雪嶺連天三百盤錦官城外西遊客白日髙歌行路難連雲不斷三危路雄略猶殘八陣圖巫峽劍門天地險錦官白帝霸王都瀼東瀼西花映渠浣花草堂今有無苦憶平生杜陵老暮年涕淚滿江湖文園尚憶馬相如錦水風雲逐駟車若道君王慕封禪西京元有茂陵書送人之嶺南二首蠻江春色接瑶京江岸桃花流水聲他日䨇鳬來謁帝蓬萊宫畔笑相迎潮州東門鱷徙溪行路蕭蕭猿􅎜啼可耐曩時勾漏令雲車更度鬱林西巴人曲蛾眉山色上青霄白帝祠西巴路遥二月巴江花爛熳一聲𦍑笛為停橈寄安公石黄門二首聞君久住成都市豈為成都賣卜錢萬里橋西逢蜀使問余何事女牛邊草𤣥亭下浣花溪載酒看花隨杖藜青春不斷黄牛峡日日思君猿􅎜啼送人下第歸蜀黄金臺上草已蕪錦官城西花映渠知君賣卜成都去不羡風雲駟馬車南望湖二首南望諸湖波映空揚舲東逐芰荷風垂楊亂覆茅簷緑好看魚梁山照中湖上空波明綵霞逢逢花鼓若為撾雲帆擬挟飛仙去滄海驚傳銀漢槎黄河二首五月黄河風不廻六鼇東湧雪山來烏檣天轉蛟龍窟未道瞿塘灔澦堆桃源縣前雷雨急洪河拍天黄霧深淮南古意正愁目更着悲歌亂客心璚州歌五章青氊烏帽適天涯白首投荒莫咄嗟東傍扶桑多薏苡南過勾漏有丹砂長鯨一湧雪山翻海若爰居不可馴知君定怕風濤急白地風濤怕殺人君家住近海門潮君去朱厓不寂寥哨哨㒺兩能人語種種烏蠻觧漢謡蠻子灘頭興不孤桄榔樹下打娵媀年年五月荔枝熟翻怪先生愛索居嶺表黎酋分鳥羣桂林象郡總能文更憐蜃氣朝朝見莫厭猿聲夜夜聞夢黄山梅花陽湖春動蘂珠宫我夢黄山白鶴峰羅浮仙子娟娟下笑整雲裳風雪中同王方湖泛舟鑑湖入蘭亭偶成贈章二首木落秦山近草堂避人仍葺薜蘿牆知爾經綸數在手釣船長繫鑑湖傍鑑湖放船雲霧光蘭亭八月溪水長我愛風流王逸少青山同引碧霞觴若耶溪山廻水曲若耶溪八月荷花光映堤越女勞歌采蓮曲江南今有杜鵑啼剡溪曹娥江接剡溪流亂石幽花只漫愁剡曲尚疑安道宅山隂誰上子猷舟東山柬董文玉諭徳東山中峰天漢連紫笻丹屐共雲煙髙臥正懐謝太傅莫令小草後人傳清風嶺嶀浦橋東雲壓山清風嶺矗明河灣捫崖忽漫䨇流淚日短風塵易滿關天姥峰天姥崚嶒不可招雲巖雪壑傍丹霄天台四萬八千丈俯看飛虹度石橋答天彛君今笑入天台山余亦欲田箕頴間白日風傳紫芝曲莫教人識是商顔看花山藤花開紅映衣看山藉草遲遲歸錦石無人溪水下隔花刺船鸂鶒飛天台雜詩四首一夜雨聲吹不斷國清寺前溪水鳴欲過天台拾瑶草秋風無限石梁情赤城雲閉玉真符桐栢宫涵滄海珠早晩移家葛洪井璚臺䨇闕是仙都華頂數峰飛刺天長風白日灑雲煙鹿裘行探金明草笑拍洪崖星漢邊曇花亭前雷雨飛石梁天巧眼中稀素􅅂綦履沾雲濕我自天台華頂歸江村錢塘江浪拍天來江上茅堂負郭開蜃樓鼉鼓時能見鸂鶒鸕鷀晩自廻青埜堂成二首飄風落木氣蕭蕭抱病經時亦自聊湖上小堂馴燕雀年來淨業混漁樵子真谷口成深隱少谷柴門故自開藥裹書籖䝉不理海鷗江鸛日相廻遊淘江贈林樗翁野亭雜花紅近人山翁愛客青綸巾渉江欲採芙蓉去無數秋風鬂髪新戲作木虗據石圖雲裏孤峰爾獨憑下觀星斗帶滄溟翻身笑折三花樹擬傍蓬萊頂上行送克相侍御使齊魯五首千盤岱嶽矗琳宫萬壑平吹瀚海風何能一探金鵝蘂並爾呼雲日觀峰淄青南下滄溟開鵬擊鯨翻天漢廻東廵定上蓬萊閣五色樓臺萬寳堆吾憐白浦控滄洲目盡雲槎天際流儻遇阜鄉䨇玉舄與君髙結望洋樓海内談詩王秉衡春風坐遍魯諸生我昔傳聞薛吏部為君遥式洛陽城檇李忻逢孟望之湖邊秋艇把楊枝青袍笑入襄陽社白璧翻傳梁甫詞送人之萊蕪萊蕪縣在海東頭遷轉還君山水州日日鳴琴了公事魚龍波浪眼中遊贈武夷道士二首幔亭道士住紫宫年過八十氣吐虹揖余觧下䨇龍劍指㸃雲涯三百峰武夷亂峰攅紫蓮丹房想在彩雲邊分君一粟庖羲洞閒㺯明河抱月眠漫興忽驚溪虎連羣嘯不分林鵶朝暮啼畫省行臺堪牧馬山城更鼔不隨雞觀馬清癡所臨元繆佚山涇雜樹詩畫戲為題句吳下風流盡此物後來好事更傳真爾軰安身是何處素毫零落寄丰神塗山浲水東行滄海廻衣冠玉帛萬方來後期獨有防風氏君看塗山戮將臺禹穴脫屣行探禹穴靈萬年鴻寳秘丹扄梅梁窆石空山裏想見虞廷舊典刑曹娥廟東闗東偏曹娥碑今古流傳絶妙詞洪濤駭浪翻滄海要識人間孝女祠桃源桃源紅映赤城霞洞口春開度索花擬傍東方啖桃實不隨劉阮問胡麻石梁寄㑹稽王山人石梁跨海與天通千里騎驢識孟公東路寄書王子晉遲爾緱山緱氏峰委羽東海龜兹仙聖居琅玕芝草洞天虚函關已斷青牛駕委羽忻逢白鹿車有背師者索題東臯書屋東臯書屋傍風雲翠篠紅蕖臥典墳請君終學壺丘子汧水鯢桓恐未聞至日𤣥冥久不行冬令瘴霧蠻烟泥殺人惡草翻翻長至日未看蘭蕙轉陽春次素翁臨滄亭滄海鯨波天漢長壺公東影拂扶桑彤雲彩霧行空壁此是人間素老鄉灘上雪噴雷轟三百灘臨川力擬障廻瀾淜奔險過瞿塘峡細看中流砥柱湍吳門送黄明甫僉事赴嶺南二首吳門海風吹白波嵗晏離城可奈何明到羅浮避氷雪還君及早播陽和其二江頭日暮歌欲罷告訴不盡哀情多嶺南自古炎蒸地君去風霜合若何惠山吟去年曽飲中泠水今日初嘗第二泉我有靈泉甘比蜜無名應是在山偏延陵送劉克柔延陵四月新水生延陵江上送君行行過長淮莫停耳淮南淮北鷓鴣聲王山二絶懐玉山前黄葉深遠天烽火上人心不知何處歌都䕶拍斷尊前梁父吟十月玉山寒雨生萬峰疊疊更分明長溪淺溆從容滿冷蕋枯荄次第榮畫者近愛錢塘孫畫師江山花木亂生姿正愁京洛風塵急却耐龎眉歌紫芝赤城天台山前黄鵠飛仙人城闕赤霞圍最憐謝女蓬萊去未識人間馬子微送沈一歸閩烏石山傍思蕨薇還家頭白故人稀溟溟苦海沙棠棹幾處風波他是非瓠子河遇葉六草草逢君瓠子河河水瀁瀁柰君何雲山涕淚渭城曲天地爭廻易水歌歌風臺陸賈詩書叔孫禮猶能潤色漢乾坤爾曹未是真王佐威鳳文鵷未得馴大風之計在四方豈意牝晨禍蕭墻身後貔虎盡食邑左袒危乎仗彼蒼寄黄明甫僉憲頗憶故人黄小江為官三載帛書荒閩中幽事笑殺汝麥飯藜羮薜荔裳㯽榔不過南詔驛五嶺氷霜今已多歲晏詩篇尚記不吳門海風生白波宿石門晦翁讀書處石門抱被雲濕衣流水聒耳無是非海潮夜語梅花戌起看扶桑朝日輝籌峰南下楓林西岩閣千盤平翠微雲蹤不見朱夫子尸祝能談劉布衣悟道松玉柱峰頭悟道松根株歲久化為龍若比茅山左紐檜大千世界極鴻濛遊丹青閣讀舊還懐許黄門啟衷風流不見許黄門文字丹青閣尚存最憐佳句車盤驛黄犢青山何處村太山三絶巨靈盤盤閶闔門日觀峰頭玉冊存黄峴西行看落日碧霞南靣拜元君秦皇自謂功無量擬揭空碑古帝前磨崔小篆三千字何似開元十四年苦憶太山孫處士春秋三傳尚須編只今四海無青眼欲向何門乞俸錢讀漢書四絶鄧禹數言天下計定功端合首雲臺牛鼎終非眞㑹合中興不復食鹽梅子陵不廢桐江釣才力還堪比傅岩漢室規模故人意只餘糠籺落空談不及遼東管㓜安龍翔鳳舉出人間東京竊笑三君軰風節何禆末路難建武閉關示無外後來夸者却開邊虎頭何物飛食肉西山康居三十年河道金陵方物上樓船州縣流傳則例錢聖主戎衣無盗賊山東河道避氷鮮龍湫龍湫瀑流轉怒雷囘風散作靈霧飛青雯倒掛鴻濛練斷盡天孫雲錦機沿溪見白蘋盛開江深木落見蘋花千澗秋容爾自佳不隨穠李分春事要接寒梅成歲華天台崩湍轉瀑下龍湫皛皛銀河綵霧浮履險能無伯昬分等閒來往石梁逰讀松江漁翁傳垂釣松江三十年澡身浴德意仙仙那能心跡俱忘後共女中流歌扣舷呂徽之平生意氣呂夫子遁迹空山薇蕨春不分弱小與强國獨操魚釣寓經綸元天台戌婦不知其姓名有殊色千戸長欲奪之不可盗械其夫陣亡時守囚者頌其係且恤之至意在婦也久且左其夫令聞之婦婦曰君以妾故至此妾顧可負君耶遂棄兒女自投于百歩石厓下柴立湍激中死數日不仆當路聞者為釋其夫囚仍立石旌其烈石在紫陽神化之處今杳然蓁莾也余過天台訪而吊之台山名姝人共悲殺身千古怨娥眉不道激湍無獨立桁楊夫壻已全歸贈族人栗齋侍御露公之後世多賢侍御才名英妙年總見風霜上容色更期摶擊向秋天青野堂成二首小隱堂開青埜上鶺鴒鸂鶒傍人初安身正學周夫子庭草芊芊費剪除不厭芳華耽寂寞江湖廊廟本同機明時正好興周道要識莘磻是汝師班玉杖歌二首贈木虚阿羅掌上千年物信是蓬山綠玉枝拄到中天斡元氣乾旋坤轉莫知誰君家拄杖班龍質十二星精光恠多直教騰踏風雲去王道平平奈爾何至日滄江病裏逢南至化國欣看日線長未堪取醉酬佳節恐碍垂貂夢紫皇江南氣候異京師天道流行動失時栁條梅蕋相催迸蛱蝶黄鸝未入枝贈樗翁樗老釣磯淘水曲漁竿獨抱弄滄波經綸老手終自惜鼉掣鯨翻奈爾何送平厓侍御使山東爾往乗驄山海東赤霞心捧大明宮腰間繡斧横金枘白日青天意氣雄鰲峰烏石殘芳迹天府雲臺秪薄遊堯舜山林余且隱伊周事業汝須謀孔林東奠龜䝉山闕里長存天地間要得吾儒振羽翼迷方回首聖賢關八神長呵封禪文魚鳥能符七十君誰令先帝終廵幸御帳親團龍虎軍殷浩墳前烏夜啼飲牛那復魯門西我愧延陵吳季子將無佩劍慰𡨕栖金陵咏金陵佳氣鬱崔嵬鍾阜龍蟠隂殿開萬里山河陵闕脈千年松栢棟梁材皇皇嗣聖造乾坤靖難勛臣有特恩王魏多知權所重夷齊解事喪其元靖難相傳是佛緣浮屠九級答諸天琉璃力盡金銀帑黎庶身􅂗十八年閩粤猶傳湯大夫殘山振海定皇輿當年肘後懸金印今日人間賣玉魚鄱陽戰罷録功臣赳赳中山第一人不識漢家同用武雲臺顛倒序元勛祀典春秋享帝王漢髙爼豆有輝光皇王帝伯原功德戰伐何如揖讓長何嶺見杜鵑花青龍白虎事非幻石室丹厓路不賖一枕却成塵土夢碧山開盡杜鵑花送人遊新安送君南向婺星源三十二峰雲色連蒼龍白鶴時來往羽盖銀幢下九天峴山劉守新作去思碑劉元瑞為文撫時興懐漫為題句吳興霅水水倒飛上菰下菰歌正悲江漢有誰羊叔子峴山先勒去思碑蜀中歌其六補雲濤雪浪通牛渚杳杳飛槎天漢行芝殿蕋宫連棧起成都今去問君平山行見嬾椿嬾椿一樹與松長麗蕋秋掀紅翠香愛爾未知誰更嬾松間好看臥雲房南征貔貅南出晉安門劍㦸如霜萬馬奔小醜應須就殄滅天威南靣正乾坤君王南顧似深憂每遣材官守贛州多士能無見節義諸公何意遁巢繇將軍自許霍嫖姚豺虎山南尚爾驕有人伊昔持干羽不出階除格有苖官軍不出粤山深招撫年年空費心天子拊髀思葛亮南中孟獲定成擒縱使孫吳親戰陣何如仇覽在蒲亭鳴梟亦化為鸞鳳農器寧銷作甲兵贛州城頭皷角哀清漳道上羽書來何處總戎深屬望陽明夫子出羣材旌旗䓇䓇亘紅雲鉦皷逢逢警六軍壯士不圖收戰骨五陵豪貴䇿竒勛少谷集巻八
