body:
  text: 少谷集巻五明鄭善夫撰五言律送人歸渤海爾去秦䑓上秦䑓秋正繁城深渤海郡草歇樂陵原蓬閣風雲至若華波浪翻看君有道氣早晩共騰騫送人之宣州二首白也風流處雲山滿意幽兹為宛水隠况得敬亭遊桃李含清夜梧桐下素秋澄江淨何日轉憶謝宣州其二宣城仙聖地山水作名州石控琴髙鯉江深謝眺樓白龍降已久黄鶴喚何由爾去乘雲月飄飄過十洲送屠文治侍御使蒼梧衰䬃仍乖别羈棲㡬過從駑駘無熟路鷹隼自秋空銅柱扶桑下鬱林滄海東南征且鄉邑大不類秋蓬張子言家移旋覆草旋覆知名草秋齋不住花羣芳盡搖落此地且年華坐領幽人意行辭處士家相看到霜雪採掇輔丹沙吾邦䘮亂秋風起吾邦爾獨回徒傷覉鳥賦不見釣龍臺少谷芝仍茁南昌角正哀建安七子下流落仲宣才送蔣君佩視弟還譙太丘二令子伯也是難兄櫪下垂騏驥原頭過鶺鴒燕關共卧後亳社獨歸情萬國今戎馬愁雲日夜停屏息屏息經綸志棲遲閶闔雲風塵䝉不解龍虎亂相聞秪有還山夢空餘諫獵文長纓繫越頸感激漢終軍薛君采見過薛稷過逢日新詩向我傳聊炊太倉米一誦陜郊篇薄宦虛談劒危時合引年秋風下滄海擲置廣文氊題虎溪三笑圖東林卓錫地宛在崑崙西蓮社誰堪入廬峰不可梯一空無色相三笑豈菩提便合攅眉去酕醄過虎溪送林以乘謫夷陵二首宜都三峽口遷客意如何落日黄陵廟秋風駭浪多巴蠻伐鼓祭江女踏蹄歌莫唱渝州曲猿聲近汨羅其二水部青雲志憂君雙鬂斑同時諫羽獵獨爾竄荆蠻波撼黄牛峽天連白虎關棲遲下客食直以長瑜還秋月秋月長安社光清太液池蟾蜍終不滅烏鵲竟何之鐡騎喧今夜金波及四夷關山正阻絶却向篴中吹思道約遊西山病不赴漫答兼問宗林二首嗟爾棠陵客乖期秋獨歸香山有夙諾幽事忽相違木石機心損雲霞朔氣㣲時時夢魚鳥未返薜蘿衣其二昔遊湖上寺猶記釋宗林語我菩提樹恒河深復深風沙晩識靣江海後知音白鶴翩翩去青天何處尋聞西江亂乍發洪都使風傳消息回荆吳得􅀈孟江漢尚深哀畫角連城動黄衫自將來萬方思繫虜寧乏亞夫才十日對酒姚氏園二首野老經時病深秋出郭情輞川聊對酒京洛未離榮小水行丹壑餘花藉綺楹松隂立不倦何限暮濤聲其二病跨山公馬秋過習氏池逺天鴻鴈盡昨日菊花期碁局翻相惱鷗羣總不疑生涯抱甕外一任隠君為上毘盧閣二首逺上毘盧閣崇髙望不稀關山仍此地城闕自斜暉羽檄流星過行營萬馬圍漁陽暮色至引領翠華歸其二閣逈臨虛曠秋髙入渺茫燕歌動易水駿骨望昭王日落城笳起天寒塞草黄揚雄輟扈從空自賦長楊城戍戍鼓長鳴夜軍容更入朝北風塵漠漠南討意迢迢秋有蒼梧狩能無黄澤謡遐方盡玉帛八駿自應驕陳執之宅同諸君酌菊二首秪抱霜雪姿風沙悵獨悲親朋更此地酩酊對花枝栗里歸心逺瀟湘秋事遲東君不相識只自向華滋其二繡衣都下宅叢菊好花枝延客尊罍罷良宵風露垂娉婷豈自媚遲暮宛相宜故國鼇峰上繁英今滿籬冬日順門陪九卿請駕視牲春曙復冬初仍瞻白鷺車禮從郊廟損天入震離虛江漢哀戎馬巖堂望諫書生慙百里子去國意躊蹰送蘇侍御從仁使蜀驄馬今何去𤣥㝠歲已殘風雲行劒閣鉦鼓動松潘事在西戎部功虧舊將壇懐柔亦邊略要識聖恩寛依依獨有南冠客依依郭氏臺未酣燕市酒翻惜隴頭梅漢戍連城動秦關千角哀縣金買駿地徒使壯心頽夢與王陽明論學羙人入我夢惠我白雲詞述作何多事經綸非爾時空齋下鳥雀深水伏龍螭尚愧瑤華贈悠悠江漢思柬顧華玉在昔過逢日天台山雪生何期易水上同憶赤霞城杯動青春色堂含滄海聲終焉謝朱紱㩗手石梁行送人之贑州西江兵亂後作宦意悠悠秪愛青油幕髙横白鷺洲風塵鄱下戰嵗月贑江流應羡陶皮隠桃花開未休贈方梅墅方干樂道處小墅野梅開對客翻髙調飛花片片來蘿雲䝉卧榻隴日照行杯不耐王孫思春深未却囘送人之惠州名家叅政下獨覺仲容賢宦轍今何徃畢棲此最便物情滄海俗天氣百蠻煙秪近啼猿樹鄉心日夜縣馬伯淳西歸與君同去國别路各悠悠吾邑東海上終南西雍州何時報縞帯於此解紓裘萬事將慈母長歌渭水流春暮遊城西寺毘盧千佛閣近在緑雲中客到虛無岸春歸鶯燕叢燕臺望不及古意渺何窮擬入東林社殷勤向逺公山人呂公嘉遯處雲鳥静相親日與􅄞中散沈㝠山水濵鴈蕩斜連海桃源直避秦齋居玩易理龍性可能馴别林克相二首鄴下傳詩句滄洲拂釣竿正思龍卧穏翻惜鴈歸難燕壁雲囘合閩關天鬱盤飛騰最憐汝慷慨一彈冠其二汝復彈冠出余今解綬囘平生一掬淚灑向黄金臺戎馬東南劇鼔鼙城闕哀無能奏羽獵翻愧子雲才贈吳生稻粱荒楚塞鴻雁尚安歸秪避雲中彈㝠㝠天外飛子有鸞鳯質枋榆非所依風塵好自惜莫損綵雲衣贈山人受封念彼南山隠南山鬱自怡時聞春雨外髙倡紫芝詞猿鶴心同逺裘羊徑不緇莫嫌兒女笑宮錦照龎眉崑崙子君本崑崙客巖扉星漢連流沙拂袖去述作為誰傳紫芝秀可掇青牛何當還異時求物色蕭䬃白駒篇安陵阻風落日安陵上荒蕪望薊丘風沙無晝夜家室此淹留江漢悲多故干戈賦逺遊河清是何日吾志欲東周遊金山寺地控恒沙界峰廻滄海波潮聲永夜壯雲氣秣陵多龍窟存光怪鮫宮湛綺羅黄斿蔽江左何日返天戈贈杭方伯兼柬東卿提學邴原猶薄宦疏廣已遺榮無復周王獵誰欽釣渭名余亦武夷去探𤣥學久生逢君五湖畔北眺有餘情同晉陵諸子遊水西二首共有煙霞想言過西水潯薜蘿迷逺近魚鳥入髙深花氣含風滿山堂附郭隂宴酣忘主客誰賦越鄉吟其二喜到晉陵郡行逢諸子招竹林初散帙槐樹已鳴蜩遶徑馴朱鶴通池接畵橈遥思荷蓧者去作羽山樵陳遂初進士邀宿頳谷草堂夜觀西湖漁火税駕歸閩土尋山入浙中客情逢勝友東路任飛蓬夜艇流漁火秋杯折渚筩巢由聖世事直北大明宮錢塘映江樓㝠坐觀潮錢王此開濟旋入宋山河潮汐秋來壯雷霆水上多尚傳江有怒翻恨海無波颯颯攅陵樹悲風日夜過過孫山人苕溪舊居耿耿憶孫楚溪邊青竹門未同苕水月竟失漢隂原夀天眞詮外風雲孤夢存平生少谷榻獨下向誰論寄施粤之侍御南昌隠君子寄跡緑雲端念爾神交久慙余色㑹難此時歌伐木伊昔阻風湍何日下縣榻相看黄籜冠碧巖下小憇望太湖長夏碧巖好蕭蕭千竹林看山白屋静息駕古藤隂震澤驚波在洞庭歸鳥深楚臣新去國漫有卜居吟謁孫太初墳二首草堂琴瑟罷羽化竟何如那復烏藤杖空傳白鹿車沙湍且鷗鳥天地即蘧廬白首林君復終無封禪書其二伊昔丘園隠風流誰似君談詩振大雅抗志入髙雲宅擬王官谷山名太白墳寥寥廣陵散定向夜深聞宿歸雲菴澤國變元氣名山留晩芳雲藏伏虎寺花近挂瓢堂鵝鸛飛騰逺漁樵言笑長沉㝠達者事散地即慈航寄赤城諸子自别赤城去藏身金馬門蓴鱸心獨苦林壑道何尊萬事風波過三年魂夢存終焉共􅂝手採秀入桃源贈張南陵張翰風流在南陵谿谷間一為香案吏便得敬亭山飯飽鱸魚味身隨鷗鳥班後期望星漢知爾御風還宿勝果寺游吳復適越漫宿贊公房小隠薜蘿宻大觀江海長鉢龍蟠夜壑雲篴語秋堂稍覺菩提長森森松橛凉贈秀公不作尋詩計沉情日閉關牛車載上乘錫杖拄空山玩世風塵外放身花鳥間秋齋食橡栗見爾好容顔題潘山人水居習静不出郭著書長閉門烟霞結白日薜芷避緇氛巾舄從吾好鐘彛有道存埋名愛蔣詡多事陋揚雲荒村荒村連日雨散髮不曾梳歲月報恩子生涯種樹書無因致故舊豈是愛空虛門巷曈曈日輕車恣所如贈葉少府吾聞隰城尉通練更文章坐掃封狐雪行開射鴨堂詩篇窮地秘海水識風涼似爾紆黄綬巢雲意不忘行宋宮故基西門數頃地舊是帝王宮複道清波没粧䑓碧蘚空王侯混䘮狗臣庻議從龍莫謾歌禾黍山河涕淚中吳山吳山入闤闠佳氣自蒼蒼洞窈通仙隠龍盤集吉祥猶宜雪後對莫為歲寒妨所歴多酸鼻兹山耿不忘鳯林鳯林五百戸活計在山溪野碓逺隄水嵓田髙治畦新年傳糗餌舊俗誦菩提生女無人育男長少娶妻屴崱峰盤礴地靈在東南天柱髙三江轉燕尾百粤亂牛毛未出無生網難忘大覺刀巢雲定何日萬國且旌旄九日方山登髙方山五片石巉嶻七千尋氣象恒嵩敵風雲歲月深百年大夢寐九日此登臨願卸紅塵累嵓棲長道心耳鳴官司忽失職雙耳自今聾盡日聞天鼓何時聼麽蟲向人艱應答於世類㝠䝉未老神俱耗勛名涕淚中寄華玉瀟灑顧吏部為邦日漸多人心興禮樂世事入風波剡曲舟堪誦濠梁道不磨向來巾子雪堂構合如何新昌縣曉行暝發新昌縣晨臨赤土隈秋花隨地有渚鴈與雲來雜樹炊煙出前涇山照囘忽聞歌伐木行路興悠哉繡嶺曉行繡嶺行不極盤山霄漢長誰將釣渭意同寄鴈湖傍野宿雀芋飯巖居木槿牆晨征莫相失雲氣正茫茫金山紀勝揚子宅前水東溟勢欲吞乾坤眞浩蕩島嶼盡兒孫石舞風波作龍歸日月昬平生愛飛動長劍倚崑崙集勝果寺分得眠字寺閣兹辰㑹賔朋盡世賢雲山兼勝日巖壑得髙眠移席竹林晩題詩花蕋妍燕鴻何意緒來徃各翩翩遊爛柯山同楊節使二首太末徐王國青霞洞府名江山共吾子風雨若平生錦樹巖扉浄秋杯雲鳥明應悲看碁者柯爛未忘情其二岝㠋干峰下天開姑蔑墟地靈蕃玊蕋神至響雲車未破人間局先繙石室書茅靡入道術歲晩莫踟蹰風雨過南關元亮東歸日長途菊正斑寜辭彭澤米早得匡廬山雨勢秋崩峽雲隂晝阨關囘思鳯凰閣吾已得生還贈姜建州南遷為隠吏山水興難降客至丹青閣時翻白玉缸諫書留御榻惠政及隣邦若訪漢隂老知余是姓龎送李曲江李子新為令南遷百粤州梅花過庾嶺吹滿曲江頭鵬運天池暮槎停星漢秋丹砂好寄與早晩上羅浮寄倪南雄京華相别後聞爾亦南圖笑解銀魚綬坐分銅虎符山蟠五嶺厚俗到百蠻殊千里梅花使春風好寄余送王文輝遊武夷王郎不肯住脱屣武夷山學道心長苦尋仙鬂欲斑魚龍淹海日鵞鸛厲天關何限滄洲興希君共一扳送公衡韶州省覲兼懐倪南雄李曲江二首爾徃寜親日千花春未稀此行無道路綵戲及庭闈王勃才名盛孫登世事微如逢始興守道我釣魚磯其二擬此過逢數何期迅别愁青山問庾嶺滄海近韶州猿􅎜聲堪聼桄榔葉正稠風煙易春暮須及曲江樓暮春湖上滄溟春欲暮湖上芳草生風煙吹不斷遥帯鳯凰城萬事兵戈外孤臣藜藿情何當拊神物談笑掃欃槍詹文化報爾龍頭選才名我昔聞鳯凰今有象騏驥直空羣黄散經綸事金縢禮樂文更期射三䇿早晩奏明君夏公謹四海夏公謹平生道未疎豈為青瑣客不問白莬裾帝業維新日皇輿草昩初看君抱經濟獻納定何如戴宗道小戴青雲器明經正顯行以兹先後甲知爾廟廊情樗櫟人俱棄凰麟世必清經年無一字何以慰平生林克相厓老本釣侶經綸今若何自來科目選秪為利名多江漢波初定䕫龍道不磨南冠有詞賦萬古卿雲歌梁日孚梁鴻終自潔禄仕蹔棲遲混世名為佛修身早得師兒童送我意俯仰别君時何日長安市相過笻一枝方思道方郎天下士慷慨古人稀刎頸交惟女同心結到誰江湖同苦别霄漢獨雄飛逺媿朝歌叟中興淹桂枝汪希周崇陽汪武選識汝自京華拊劒平江漢經年别室家飛雲収虎帳戰馬返龍沙長揖青門外何人善種𤓰林徳敷聖后乘元化江湖思致身君居財賦地况作廟堂臣勛業時堪就鱸蓴興莫新何當逐狐䑕同看帝城春鄭伯興吾宗賢吏部昔徃鹿門山應世身難卧探𤣥意自閒山公啟事近龎老㩦家還余亦隆中隠接君牀下顔蘇天秀吾憐蘇太乙磊磈長安豪釣罷渭川獵名馳天漢曹言余亦善士拊已媿時髦徐稚平生義還山解佩刀姚元肖接手燕昭國倥偬十載前烏栖空繞樹􅉇轉自横天撫世縁知已掄才後少年君看越石父客禮竟虛傳顧九和崑山顧學士十載綰銀魚勛業天人䇿行藏封禪書與君成去住謀道竟何如先帝焚香在皇情可但虚陸子淵成賢眞此地瑶席爾司成述作囘中古機雲媿後生華亭鶴正唳蓬海鴈長征結誼風塵上看君萬里情寄劉希尹吏部兼懐薛君采二首長安薛子宅對爾誦驪駒雲樹懐良友風塵媿腐儒看山費日月憂國阻江湖方朔金門下藏身道不孤其二薛郎成小隠舊宅定荒蕪萬事將雙淚經年無尺書身隨梅福去病與馬卿殊白日調龍虎飛騰意有餘龍門西象頂望海浩蕩窺南紀長天望正繁北風青嘯海髙浪白浮山舟楫思兼濟雲霄悵獨還何當泝牛女重扣紫皇關岊江送黄伯固大理赴白下大理平生友相看涕淚存諌書君最切徃事我難論放逐心無盡巖廊道已尊願將金石志長報聖明恩送人之鄴浩蕩夷亭意經過鄴下來王門占玉節春日上銅臺遊子牽多夢髙堂候舉杯蘼蕪江畔草應挽使船囘明妃曲明妃初出塞宛轉意何窮上馬琵琶曲流悲入漢宮自言妾命薄萬里去和戎今日蘼蕪草青青向隴中木虛過青野堂夜坐小坐同吾子荒齋寡四隣林鵂鳴近夜山月逈隨人太乙青藜杖先生烏角巾中宵莫説劍恐益鬂毛新訪吳山人隠所脱屣吳居士尋君江水遥雲房生夜氣薜牖散春潮榻静聞空籟情髙夢九霄從兹畢靈寳不赴小山招答陳天游淑氣囘南紀文星傍省堂猶縣滄海月留照紫薇郎學道防衰晩愁時應帝王思君直咫尺一夕鬂毛蒼湖中寒食湖上逢寒食行行雲日迷林花相映發只似武陵溪逺水清煙並髙楊黄鳥啼年年對芳草古意滿城西答林貞孚主客憶自秋風起虛傳奉使囘未捐池上珮翻失隴頭梅堯舜垂衣日班楊奏賦才黄金散朝士知上禮賢臺送吳徳翼僉憲赴闕使君今赴闕春興定翛然江漢黄華動風雲錦䌫牽星移南斗下路引北堂前願有華封祝天朝夀萬年夏夕青野堂卧月海月團芳夜園廬引緒風琴書棲榻晏巖壑與人同尚澤南山霧終懐北極楓黄虞忽到夢伊鬰卧隆中入海滄海鷗波外雲艘逈自航大江沉馬腹密雨濕魚梁未及星槎逺那知天漢長漁竿變孤志翻愧紫荷裳大末憶方思道逺憐方比部經歲斷來書何日垂嘉樹青青拂敝廬累憎鴻鴈響三見栁條疎幽獨疲孤夢松齋月正虛答顧華玉叅政吾憐顧長康吏隠近滄浪學道通元竅蛟龍翊爾翔雲囘朱鳥國花照紫薇堂授我㝠筌意相期天漢長閉門經嵗避塵縁時叅道徳篇柴門背海閉鷗鳥受人憐桂樹栽成實松花採作團㣲官渾忘却唯記孝皇年聞薦逋客晩知幾西山言採薇長安三丈雪而我賞心違隠處無人識薦書何事飛㝠鴻天萬里空遣弋人歸早秋懐晉安諸子揺落茭湖晩湖邊鶗鴂鳴秋風吹桂樹一佇越王城榻有南州重人兼衛玠清還聞刷羽翮看爾共蜚聲寄贈石室山人安期持世界挾䇿西入關吳老遵牛渚乘槎釣不還行藏元氣裏弓劍彩雲間何時留玉舄去入蓬萊山病中避地抛銅墨風霜歲屢更那期鳯鳥至亦遣伏雌鳴久病丹心苦中年白髮生如何張仲蔚却掃卧昇平出塞曲二首黄金琱鵲印白馬出榆林瀚海行人絶隂山殺氣深漢恩長北損邉騎日南侵一唱丁都䕶三軍淚滿襟其二大王開絶域上將喜邊功塞外風煙異軍中苦樂同龍旂凋朔氣虎帳卧沙風未繫單于頸横戈意氣雄送楊明府入覲雙闕𤣥霄上三山滄海邊雲逵望鳬舄明府似神仙曲報離城調琴希清廟絃煩君告天子百姓尚顚連克相過草堂别去余病垂死詩來見懐呻吟中答之喜女文章貴相過成笑言追陪憎病骨風雨别柴門㑹苦青衫濕情多白髪繁形骸已近死誰復與招魂病中哭伯固二首我眼雙枯盡那堪更哭君平生猶鐡石靈爽定風雲葵藿雖同志凰麟不戀羣吾徒向凋謝誰黻太平文其二去年白下去送汝芋原陂今日湖邊問俾余雙淚垂終為諫議鬼竟失帝王師已矣先朝事傷哉此盛時陳少府鑭吾憐陳少府獨抱明月珠五載官閩土春風生向隅縣知水薤意頻握玉麟符霄漢聲名早看君受劍車張起溟約過草堂為傳卒所誤君是峨眉秀余慙南海琛並期歌白雪何止斷黄金接手難如此浮生感獨深閩關及漳水魚腹莫教沉答林白石大叅歸釣龍溪水君胡亟失時豈因白石爛竟賦緑衣詩拙抱江湖愧賢於弼亮宜重華迹已逺吾道欲何之七月望逰水西白鶴寺乘月泛峴江愛爾東林社乘秋到蘂宮招邀滿童冠歌罷舞雩風鸛鶴黄庭莫巾袍白露中西江上雲月歸艇意何窮送季明徳應召赴闕二首接手為兄弟交期共死生雲逵易相失三宿晉安城海内風塵切秋邊鴻鴈鳴飛騰未時莫萬里好長征其二相别無一語相觀情自閒風雲感壯士江海散秋顔道已干時禁人須渉世艱去鄉莫草草遲爾陽明山琅琊王墓下作田文全盛日淚下雍門彈王氏千秋後勞歌玊樹殘寢園生兎穴疑塜奠龍盤萬仭蓮花色關河望已難大田讀伯固起溟見和之作悵然懐答二首讀爾懐沙賦􅏰然繫我思當年分即死此日已云遲社稷還唐介江山哭子期才賢世有幾况及聖明時其二朅來張仲蔚秀句日逾多豈不思君子其如長路何商霖憐我在谷口喜人過終愧箕山隠無能守薜蘿南山贈林遷于比部憶自隨三釜同歌滄海篇何期傍九日得結碧山縁江漢兵戈外風煙魚鴈前相看未忍别更上木蘭船莆口之敗福寜兵最無紀律大縱掠金以致肝腦塗地賦詩傷之閩粤何多難興漳師未休虎豺行白日天地泣清秋欲𢷬羣兇穴須梟敗將頭兵貪法半至遺恨福寜州劔州贈陳待用太守鬰彼神仙府雲驂逈莫扳言將五袴手滿弄九華山紫葢風塵表黄堂霄漢間因君覔神物劍水有龍蟠鸂鶒鸂鶒無拘碍浮游錦石傍雌雄互飲啄毛羽割隂陽已得滄洲趣寜思天漢翔並生大化裏幽獨闡文章不寐反側終難寐寒天候不明經旬淹厲氣永夜厭灘聲萬事呻吟外他鄉兒女情還聞䘮良友展轉淚交横哭遂初良友看餘幾今年報女亡江山有頳谷風雨泣秋堂元氣能無損星文定不光連宵激孤志灑涕向錢塘送羅復之聖夀齊天地臣衷効海山靣陳安瘼疏頭聳觸邪冠玉帛奔重譯衣裳濟萬官不勝戀闕處時事尚多艱春日懐南湖舊居南湖不可到幽事自漣漪田父春相遣隣翁暮與期煙霞隠薜荔風日曬鸕鷀豈待清商發花時有所思雙鳬汎汎長依渚飛飛不度岑却無黄鵠志但有白鷗心煙水知音舊魚蝦得食淫自從葉縣令來徃五雲深向曉河影忽不見東方方小明晨鷄許市客秋管海邊營起舞者誰子飄零獨此生矇矓聼金鑰封事轉馳情朝雨若木光初判𤣥雲復積隂撼江風色勁灑壁雨聲淫泉室鮫人泣天邊越客吟餘情何處訴燕雀處堂深將旦曙色浮東海騰騰漸太清明霞低水檻宿霧逈江城警柝已罷擊征人初啓行豺狼今挈領豈是乏長纓與方質父登于山巾舄動髙興江山入大觀煙霞幾囘首天地一凭欄晴日千村晩長風五月寒莫嫌踪跡逺石室在人間雨夜蕭蕭風振屋汎汎雨鳴樓宿鳥驚巢墮潜鮫出水遊客牀沾處濕病枕聼來愁頗羡清江上風波不碍鷗地上雨霽臨池好橋平縱歩宜濕泥勤燕子新水樂魚兒病葉風多下團萍夕更移中吳消息惡吟賞淚交垂秋暮秋色去不反客心悲奈何病妨風土惡愁感歲時過弟妹流離甚江湖喪亂多滄洲十月雪囘首釣漁簑題南野舊居南山百畝地記得種𤓰時風日蜻蜓下犂鋤布榖知輞川流水在谷口主人非獨鶴青天外空亭自落暉湖上愛此湖上雨共君湖上遊乾坤雙短鬢江海一虚舟煙景初相見春光不可求明朝下西崦相望意悠悠參文殊禪道上得棲字移舟泊淺渚風日便輪蹄不雨江聲定長隂野意齊香厨鐘後飯田舍午時鷄入山應未得聊爾學禪棲次劉徳羲懐金山韵記得金山頂風煙八靣開乾坤留柱石滄海失蓬萊夜色京江水春光般若䑓兵塵兼病眼長望幾徘徊重遊大石次劉徳羲韵二首病夫泉石性山雨徤來過花濡廻蛺蝶松偃足藤蘿隔歲青春别同羣白髪多宦遊殊慰此髙志未全訛其二幽事住雲泉湖光逺接連寺鐘山意動松雨磵聲懸石壁開雲竇桃花隠洞天中原尚多壘此地合逃禪望武夷時與黄元質同賦客路未千里名山已萬重歌傳武夷曲興落幔亭峰宻竹幽幽鳥深溪隠隠舂黄生詩句好吾得事遊蹤有懐獨客路千里羙人天一方連宵入我夢今日寫新章白月猶故國青山皆異鄉不堪秋信至梧葉下滄浪謁屏山書院隠隠屏山頂悠然見考亭衆星開分野一水入滄溟禮樂今為盛門牆世必經平生鴻鵠志數問紫州城謁考亭書院西門猶闕里平地見滄洲謀道無虚日尋源直到頭徳言俱不朽廟貌正須優欲濟波濤濶臨流重澁羞送王崇賢黒雲天未厭清江船不開客情春草長國事朔風來嘆世長卿枕疑人郭隗臺看君囘綵服拜舞興悠哉贈吾隠君兼懐惟可誰言道學者正印自文山守黒惟空谷潜身到大還聲名百世下交誼九垓間因爾懐君子江湖好駐顔棠陵家觀釋宗林詩畵戲為一偈嘲之蓮社柢能入林公許徑過法衣乘獦獠佛日動山河五藴元空寂三車亦障魔白牛載詞藻西去欲如何冬日對白菊白菊塵埃裏翛然湼不緇風霜忌太潔桃李競當時水徳元如此花神祗自􅀻遐方對燈燭聊副賞心期少谷集巻五
