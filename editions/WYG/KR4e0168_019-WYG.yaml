body:
  text: 少谷集巻十九明鄭善夫撰書三與王時行囊山之别便至今不相見人生幾何良友幾何苦哉苦哉伯固兄竟死矣善夫嵗裏一疾亦幾與吾兄長别少年兄弟今髪已種種平生勛業未曽植立毫分值此聖明中夜思之藴念何極吾兄蓋當乎時命者也時豈易得惟吾兄以古上賢自待自心身上措之事業要令徳性用事自然功用無疆矣歳裏有奉懷之作今并錄去子才崇道俱有書道意抱戀不盡答張起溟使至手書珍重悉兄心事良用縈念然君子唯修其在我者所謂遺而不録其失在人於我性分上良無一㸃加損然吾輩因此復可加一叚警惕進修工夫道理其實無窮學問到老只是不自滿望道未見看古人意思是如何兄如此根器當求作百世人物眼前細故何足上懐抱蓴鱸之思但看發出是道理是意氣意氣却能害心善夫意兄此時此地且可行所學盤根錯節正吾輩致力之地擇地而蹈之恐非聖賢正法萬萬免動此念如何如何善夫即日戒行矣劣才病體當局甚迷唯兄有以教之府治文冗次所就殊不成章尊翁傳并往稽慢萬千相㑹在何時寓椷忉怛與宗道昨夢井水溢起而作歌偶便録此代啓素翁行已附一啓大約是述自已行藏於知已者迂拙唯甚不出意較多新正執之行亦不令走知想以走執迷頗固也有追送不及詩今亦錄去乞為轉之見走不忘於執之也此外唯勸東岡廣詢天下賢才布之百執事然人才各有偏勝用之當位然後可収其効此是培植國家元氣至𦂳要者萬望寄懐唯此耳幸留神至念至念答小野承手翰已悉存念賤體苦未佳山林中讀書談學之外無多人事煩聒精神血氣已大非往時因審老兄民事叢積尚有餘閒養靜之功過人逺矣出處上有此聖明走非果以忘世也求人知與自衒以往者均是枉已今日之出必以平生所究心者為國家効尺寸安時處義固難其進矣非敢任情也年嵗不足家唯饘粥蔬水大小皆便習只此至死不苦也承念承念南雄之政聞有古人風甚􅇺時不可失眼前百姓少安未是至極飲酒賦詩似亦無妨於政事然有二説不知是政平民和後天下之樂乎抑只是郡事尋常自有餘力而得云云乎走芹曝之意惟恐老兄不肯為古人也古人極難為亦極易為唯在堅其志而已如何思道近作何官久不通問矣㑹面何時不勝翹企答歐陽崇道近日事貧士只是要便宜公養聖賢之度恢公輔之量教戒之足矣萬勿動心朋户之法居今之世勢不能清淨其源欲均節民力恐聖賢亦無有别法衆輕易舉民不見累凢百催徴併力分干亦甚易就且免侵漁細民之弊此法甚美非一端也中有下户為朋者倘加至三四人行之十年消乏自少矣尊稿妄㸃抹一二奉内閣下封伯此另是一世界中事春秋定曰紀異時事如此天下豈有太平之望耶不肖終老岩壑矣早秋欲往蘭溪弔章公即回至期欲請一引預干草草奉覆答林志道吏部草堂奉接後再承手教深眷謭劣何足以承之愧感愧感令弟到省善夫正卧病近方得問起居疎慢萬萬適得執事謝病消息明時壯嵗建立事業自是吾輩分内事計執事才力豈宜閒居秋涼幸備辦上道以副君相用賢至意至望至望善夫比日無一事長進又無師友相覺發去日苦多大可驚怛作計負笈出逰莆實在意中也未便云云功名事善夫嘗自揣而安之又恐一向頽􅛑一旦即死何所藉以立於世未免與草木同朽矣執事相知幸有以發之尊夫人夀文見委荷在通家子姪萬當執役但善夫名位素薄文事又非所長操墨班門白地退數舍矣豈敢豈敢素翁議禮疏聞再上不知聖意稍轉動否山齋伯固近况且如何附問未面惟為道自愛答陳執之侍御春間傳使節至岊追送不及有詩附宗道處宗道歸發回此情未有以達左右也承諭道徳之論出處之節敬佩敬佩時事已轉至此乎幾微之間治亂之判也廟廊臺諌想悉小貞之理中興自古與創業不相及要不令小人尋得吾輩空缺以為口實大同而黙化久久當自定也如何從仁為何喪心讀書知道理乃有此疾不可曉不可曉草草布臆餘惟為國自重不悉答林徳敷𤨏事雜沓未得侍不任藴懷南曺之命於懶拙病軀最宜崇卑不論也行色大叚在莫秋親戚墳墓顧自戀戀矣七夕後敬當過從君載自是逺器向㑹思抑深有成就之意萬勿局而小之此却在父兄前輩聰明特達者何限然所就竟如何辭􅇨中亦見其意向所在文章猶美色最易溺人若非豪傑士鮮有知反者親事君載尚未除須與入白下如何竢面究答汪希周太守故情稠疊何徳以堪之善夫别岊上即發寒鬱疾痰喘連日痛楚不勝畢竟吾人只是虀鹽之分耶集山詩呻吟中得無好佳思此外唯願尊兄廣施仁惠然行之却有次第獲上則志得行審委任則澤下究去貪汙則政徹逐舞文之吏則法不撓勦惡人則民安同其好惡則民從廣詢博訪則得民瘼振風節表恬退闡幽伏則民勸此數者獲上最難人孰不欲令名令名衆之所忌獲上之道功則歸上怨則自歸民至愚而神畢竟令名自有攸往矣福州十邑惟福清稱梗一變尚未至齊治法須是粗枝大葉其風氣如是自古未有以變之也閩邑在有穿窬并舞刀之徒濵海造巨舟者多是強冦法當去其太甚亦杜漸防微之道也芻蕘之見不覺縷縷為吾兄盡之病次言不成章惟採行一二幸甚答道宗辱書併見所上封事大丈夫樹身為君固如是也甚慰甚慰時論以子言不遜而復惴於心士君子旣定志而復懼乎懼則寜無言言旣慰志祸患之來聴之也惟吾子益自壯走無似自廢一邱愈自離索無足語知已草茅固耿耿耳近来應縁不與當道通人事人事尚覺擾心卽欲入山畜艾自康飯糲茹淡以逃於空虛復恐擺脱不盡靜久而念生耳吾子以為何如幸教我世事多艱忙閒固各有所惟毋泥於迹為道自重四月初得一犬子併告知已與林徳緒道宗回備悉動止康泰知榮轉在早晩喜慰近聞三邊聲息甚大在吾輩尚有逺憂耳不識廟廊諸大老長算如何或者邊徼常事路逺傳訛而在不必憂者幸以相聞杜門數時了無有得轉覺閴寂京中諸欲聞者幸毋惜一一相聞與萬吏部自廢歸奉違已及三載獨處荒村數千里外每憶曩時晤語被䝉深眷曷勝追想走在京師時薄徳譾行謗聲在人而執事不加罪且洒然無疑也走何修得此於吾兄哉自登籍以來徳不加修一行作吏善名不外傳而流言已滿人耳揆之朝廷任人合在罷黜之列耳及自放歸復不能如箕山澗濵脱略人間事每聞風勁輒有飛颺之思邇者刻志杜門於六籍上究探一遭略不得其涯津迺姑舍去復於百家上而繙之求古人所以用心處然而病日不加少識履日不加多大抵中無所得渉獵羣書徒取勞苦耳方叔賢在西樵築室靜坐深有所得靜中作用甚大走顧不能也近聞近夫首舉内補近夫海内一大人物也方今冡宰亮方光大執事賛之有賢如近夫者其擢用也固宜然藪澤之間不遇知已甘淪汨而不悔亦尚有遺能者乎走實無似未敢勤大君子心力北土先秋天向凛萬惟加餐自愛不宣答王時行拜緘識君子動定走向所圖地又成畫餅時俗以吾輩宦歸似深有所要可笑可笑以吾輩不免於求田問舍反觀亦自薄甚矣别後日處荒穢清思漸減恐愈久與俱化耳石竹嵓九鯉久所願逰按忘復得麥畬夢寐葢先我陳迹耳俟早秋腰鎌稍罷即巾舄過壺公從吾子方外結烟霞好如何年來乾清之變切於鼎雉聖天子之詔上於輪臺重可為宗廟賀社稷賀天下臣民賀但恐有司輩不肯上體天心與聖情耳見素時周二大老為達殷勤方抱病不備與近夫比入北人事風物倍協愁端維君僻戾海隅維太初寓跡無端杳莫達所存無任結鬱時下滯濟中幸接令弟致區區道揆乖艱惟涼温自攝不一不一與張青田去冬修問詎今缺二時耳蓋冬春之間有攅册起程之故兼以畏途以無使坐致闊如實抱戚戚青田新令殷近夫冨於六經子史制行甚髙詩文亦非近代所有政事亦甚精真天下豪傑也同朋相與豈無麗澤之益哉忻喜忻喜近聞學官不論有無功績即以學行課陞黜於官人之法庶乎公耳王節甫已擢邊郡令壻回否太夫人音信嘗通否在京師一月甚無頼即欲得一歸病亦無時少脱今雖未即决時事如此復欲為家人輩圖衣糧以濟寒餒而憂皇韁束如此計亦拙耳人生貴適意大抵只在一歸也夏將中動定自攝與張青田論號向以一山同張元徳誠是且犯古人但改曰介石泉一逸復曰一鶴殊覺未穩介石泉青田之勝也愛其名須顧其義今曰一逸不過泉上之逸耳於介石字義似無力且無用功處况古亦有五字號者鄙意請易為介泉如何曰介已包石字見堅忍意曰泉見流動意如是則有着力下手處耳不鄙當走書近夫為作介泉記善夫當作介泉先生傳如何信便候所以罪過罪過與近夫陳凖卿去附狀草草適使便致所欲聞目下敵兵十萬分入三邊大同新喪師請兵請糧請馬之使道路相望邊儲已數月無支通太二倉又無一年之積江南財賦皆供不足以給俸食况水旱蝗螣連嵗相仍乎急則民亂緩則國瘠廟廊諸公如之奈何都下六軍食粟者九荷殳者一而久借邊兵於京師憂念其室家日夕皇懼氣已奄奄矣邊馬喪亡無數太僕馬政徒有其名勁敵壓城方縣金募駿是猶千里齎糧以濟旦夕饑餒能不枕籍以死者耶內患外虚天災地變未有甚於此時者也此輩厝火已然又益以薪吾儕力不能救而又安之而不知避之亦愚甚矣孟望之謫桂林李自古謫泉州何粹夫謫開州賀志同謫處州未遣而待玦者不下數十人憂世之餘亦不能自忘情也走在告月餘心疾轉劇先人墳墓汨沒荒莽歸志甚鋭計七月當疏八九月或得歸如道鮮險虞身稍健當走千里候君於鶴溪之曲共悉行藏耳適心事不寜努力相聞惟加飡熟眠不宣寄方思道與子别忽更一年每憶呉中晤語書帛往來如旦暮相遇一旦别去南北數千里遂至闊然未嘗不望雲出涕海内故人合散之跡有如此哉到京師故疾復作覽世味惟有一歸来時别應期知子襄事畢避亂衢州竊喜必得一㑹然獨不相聞何哉至杭居月餘欲過㑹稽探禹穴登天台石梁與石門鴈宕諸山而後沿金華来與子南入武夷以遂宿諾竟以人事歲寒違志又惡識其所以然所以不然哉蘭溪㑹虞佐與談吾子制行與章前輩所以髙邁是又一快李自石吾廷介深可為吾道傷尊先生安穩如何趨堂未必行路荒蕪草草布臆後合在何時毋金玉爾音與童賔暘小僕回逺拜執事之辱方悉出兖事跡蓋兖因遭兵燹民困久耳况既理之地民瘼素切於必理之者乎萬萬為殘民加意况闕里所在邊爼墳寢尤當愛䕶乎哉屬下諸邑尤切近民者令之可否民之生死樂苦夀夭理亂之係焉者也所以可之否之而廢舉之者在執事郯令黄某舊以理青田廢於權倖今舉於賢相走以同年知最深葢鯁而才者也執事以為何如時事尚多艱百惟自愛臨緘感憤答鄒衛辰史評甚好篇篇有新意但槩以聖賢大道律三代以降人物殊少恕心耳且頗為諸咏所累如故物陳列雜以新治未見其為全美也維再刪定去取盡除諸咏間亦有昔人曾道者似覺剽竊是亦為此書之累也昔人評史多不可計數物要其的無尚其繁君以為何如日来諸詩似見大進大抵作詩立格命意欲如立崑崙山頂下觀四海絶去烟火不可跟隨衆人古人亦曽有云也病冗中不能備陳竢相㑹日對談答衛辰所論諸評誠是但人品得之天修之人各有分限故品人必隨其所至則公耳春秋立法未嘗不恕不然何以責備獨於賢者聖人用情未易言也諸咏在評後不過咏所評耳有之則複無之亦自好初不見其遺也必欲用諸咏恐終為此書之累耳㑹面當有忠告不佞答黄元質使到知治郯益善葢郯向以城完民病比諸邑稍淺日下無冦虞未可便棄武備所最急者菽麥不登復苦征役猶人病憊而負其有不蹶而死者寡耳今必藥其病逸其勞而活之者責良醫焉惟老兄加意童賔暘有志斯世者可與共賛好事萬萬毋墮初心毋以郯小為不足為今天下稍可以盡職行所學者唯守令而已古之人茍可以利民者亦為之幸自愛自愛走經年伏枕經史類一切罷去所餘者壯心耳然處無用之地每思時事憤憾不知所為匪才痩骨所念者一歸耳使回心緒縷縷不能詳陳㑹面未必答方元素别元素期年耳病兼之冗兼之酸楚嶮巇兼之而思我元素未嘗以病冗酸楚嶮􅇖妨也元素以我為薄於情耶自武夷後期杳不聞元素消息閩人之到京者道呉者非所與知者不問也稍知者問之曰不知也音塵契濶有以也去冬失一蒼頭蓋曽事我元素者今春之遣傭吾工者故不知所以問元素也允黙来適有太湖之遊相左又不及問元素者也五月曽郯城价至道元素動定甚悉云四月已到家旋附候狀而今不然也豈其傳聞之謬耶抑其故為無益之誑耶是後惟日望元素之來矣而筆硯則以病廢方思道知我情也豈期元素秋末猶在閩耶夏初手教冬初方到呉音塵契闊有以也即張燈作書尚不知此書何時到君側耳臨緘旅淚汪汪欲詳復草草與白方伯别後得令弟消息於都閫公知執事有無涯之戚竊以為國自重節悲如何大冐新定閩地復苦旱荒又知執事純愛不遺重勞憂念蠲減之恩寔延領於執事也江南風秕江北蝗灾事聞處處舉行民瘼莫有大於此者萬萬為民加意親炙末由病中草草答倪宗正善夫自抵家削跡荒村與野老無别近哭先皇帝一進城耳又家食朝饘暮粥飲水甚甘也天下將太平吾輩耕巖釣海何適不樂秋末天台諸友欲往少谷遂為羅浮之行非漫説也與胡方伯首春不獲侍以小嫌不敢而願教之意與景徳之私浮乎儀矣有吾生謹者開化人文山先生某之孫中書先生翯之子文山通古學為世通儒章徳懋公所畏者中書博達簡淡鋭進勇退大進乎今之人謹少靈識有竒童稱十八著書為詩文皆崛峻崚勵可喜可愕於三教經典皆明曉其隱向在京師敝友黄應期何仲黙極稱其頴發以其祖父子各擅其長皆一代之人物也比到呉偶獲交其父子且稱知已焉往嵗盗在三衢文山草堂已入煨燼中書流離斃於道隅兵荒疚癘喪亡憂難莫甚於謹之家也走竊以文山中書之積天乃降譴反甚於人人殆不可曉謹以頴異多能年且三十阨窮落魄尚不得第一方而且食此百罹文人多窮固其然也近者走千里求為槽户走蓋深知其非志也弗獲已也而顧不能謁公卿且不一就掩户欷歔而自嘆其窮耳伏惟大君子憐才下士憫人困窮念文山中書之積之報念走之交幸憐謹之才之窮而􅂉有以處之乎走非謹不敢勤君子心力顧為謹弗獲已矣皇悚皇悚與姚元肖吏部客嵗再上無益狀久不得命執事名益髙位益崇盡天下豪杰而友之凢在同儕孰不以得侍游於君子為光顧走無似自廢於萬里之外不得以朝夕繼見執事能不遺之耶走在京師時獲罪於貴人退歸後致謗甚烈執事朝夕與處亦見走願為不善乎執事交逰日益多而走日益踈浸潤之譛勢不能無入於左右之耳也執事能不疑之耶年来獨處荒蕪日對蒭畔固已忘意仕進竊欲於天文地理禮樂仙釋百氏稗官小説諸書繙閲一畨兾得其糟粕以為不如是不成通儒不意碌碌嵗年病冗相迸一不得其門今雖少蘓息然神思恍惚漸覺不復能記憶耳通籍十年守雌如故而日就昏瞶建功事業顧豈在我輩哉因風力不欲久㫁音塵不覺吐露𠂻曲慙靦慙靦陳佑卿萬士鳴蘇天秀夏舜俞諸兄長為道懶慢身跡疏逺固嫌於通書也與人論事𨽻人持朱書至威甚不敢逢執事之怒禮之請為致口詞萬一執事之霽威也不意執事大遷怒於區區𨽻人再至張大執事之威推門破户以必得袁景而刑之以泄執事之怒而辱區區之衣冠也亦已甚矣區區臥病京師被䝉聖恩賜之南歸孤貧無依寄家外氏實賴外氏之慈也外氏耕鑿自為讀書守禮上不敢逋朝廷之賦中不敢違常賦之役下不敢於非為且景年望八閉門待盡在朝廷常典已在不役之數况恩詔屢下而所以丁寜告誡於有司者政恐有司不體優老至意而使山谷老人不䝉朝廷之實恩也向者不勝催促控詞於侍御王公賴王公之明行之於有司王公公仁不可私請而即憐其義必真知其為不必役之民矣有司未即行而執事之白板朱書捉獲再四必得景而刑之夫以不役之民而欲刑之毋乃干朝廷之典而伐王公之令乎區區伏枕其家實不忍外氏之苦也力疾致詞而重違執事之怒穢惡相加不可聞於人人夫不可聞於人人之詞而可加之君子耶區區自登籍来安貧守道卧病二年不肯妄登公府今雖自廢尚從曺屬之後執事得而辱之耶今以一言不合必欲行其血氣戈盾盡露而欲如何志士顧有不可辱耳區區讀書効學聖賢義之所在死不得辱也且執事享朝廷重禄真能不素食不妨職上不負朝廷之官下有多少惠澤於吾百姓乎此區區與執事之所共明也且執事之職事固别無所重而真有重兹一役耶剛柔重輕緩急之序固嘗見之真矣執事豈不知景有朝廷之典有王公之命而在必不役乎苐以一言小忿不能忘而欲快意於區區耳夫朝廷設官分職其意何似茍得勢一以私忿行之至有戕賊百姓而不顧噫此志士所為驚悸痛心而悲焉者也興言至此曷勝激烈惟君子能容盡言幸毋怒與傅子木虚文潔藥物多累賤恙差勝前微覺熱痛耳星者能造吾之命乎君子不謂命也箋二十葉奉上幸脱水患者陳家巻子苦苦推托容細推究帕子尚在袁家不致沈滯晨朝處分童子種樹灌蔬除荔蠧生事匆冗雨晴幸過湖上為農談如何又讀百竹之書令人涕零世人不如百竹多矣弟之愛兄未必如兄之愛弟也有人往南海走當作字賛服之吾輩揚善之心不識面者猶表而出之况吾友乎渠門户走當護持苐此事須面言非可動之筆札也漫音發去第二册中有那移幸為一一毋致差錯霞邱生詩幸錄一册與我何日到湖上專為掃榻又青野堂已茍完絶無塵埃汚賢者巾舄也候益館養䝉齋專待吾子作大字龎公鹿門幽寂古野頗不相減世上事紛拏未暇聴也莫相報莫相報蔣詡徑惟許求羊走頻訝子履聲辛巳漫稿失去莫落吾子之手否漫言報宗吕投下又近用茅筆作行書極佳閒中漫書甚是適意二紙分髙傅二子莫作覆瓿又伯固竟死京師竟無子苦哉苦哉哭伯固不能已於言也厓老嵗暮竟歸耶新春竟去耶韓子所謂吾不可去子不肯来鄭子所謂㑹苦濕青衫情多生白髪其奈何文潔久候不至固知嵗暮如朋友之病何力疾作字雖不費心思亦頗耗氣而况於子豈得已哉又此紙前日遣東之持去偶值厓老歸途見之遂過我門作午草草由西峽歸矣今更過紙檄三子看轉移如何施子襄事公衡未愈滄灣老人不及至也又趕門奔走自是我弟動止無常自致狼狽不干冩字作畫留連光景也國賢下第不為異此時君子道否正是困心衡慮時節看國賢用志如何耳明當為力諍之諍之不得亦當付之無可奈何也勤可及第昔人云以手摶得狀元是在千萬人中奪得者凢物人可奪得未足為貴語云匹夫不可奪志人一身来此天地奚啻萬金貴在自寳國賢只是不自寳遂起人爭奪此正對也竟不呵呵堂成少谷之門元無俗客但有上座次座之等若云先招賢士方能代出賢才即是勝心勝心最害事百竹書中絶無不平但自叙其勛伐勞績耳雖然喜慰喜慰又表弟數日甚擾累吾予僕閒氣近來一掃不留閉門而已縣官如此尊貴少谷如此卑抑尚不能濟小事都付之浮雲過太虛也趙門所為一一合晩宋家風徒使人抱恨今日正是割地致金繒不能免時節也不可云不可云柴門亦累人遑遑過日一切事未暇行為八日未敢邀吾子容走柬也詔到出城厓老書賦詩未就得幾日可去乎又廿九日决請拉諸君到敝園荔子日見其綠暗紅稀矣又此稿煩為走看過病處抄在圈下或為改過校讐惟其是萬萬勿避蕪藁早發下渠數日内要入石也聞巡公府主求民望吾子肯與試否又别駕公竟有此傷惜惜公衡去不能奔走弔慰奈何僕子逺出無一在身邊可使者敬此附慰幸達之公衡當亮我也又昨日謝枉敝廬知厓老至城中日下湖中春色總在愁裏寓目者幽獨甚也聨轡過枉吾有意否厓老如未歸煩達又雨打桑苧園風欺明水閣頗覺東顛西􅛑但池増新水花木潑潑有生意為可忻矣何日過我同賞天地之化又别吾子後數日甚不佳今方稍脱前素翁書來約西禪為㑹諒今日方到當走西禪吾子可不來㑹素翁乎走先達之耳又喪祭未畢冠婚在下復無一錢着槖柰何朱墨家實無有惠我一半又舉人名次乞發一紙相示文輝入吾夢夢如此之靈從容一二日可同來謝夢也近重陽欲過呉嶼訪師禹子能同乎桑苧園之招無一人來走不徳甚矣滄灣子水竟北轅乎又桑苧園新成明早雨晴請連歩過湖上觴咏功名事可付之倘來也又少谷柴門四字信佳吾弟平生莫未有此竒此竒乃谷老神助也草堂元不俗着此伉儷無妬也又晉書發下厓老到城了事後千萬為拉諸友同光湖上專望專望沛夫處何日行禮祭文須吾子作之走志之厓老表之石門圖之諸子詩以挽之是必是必藥煩令弟一行又頃所云走思之尚不獲於心今夜枕上詳之旦日有以報吾子耳三日過到城門歸登釣龍之臺上第一山願與吾子同之又不敢入城嵗事更始特到文堅兄家奉㑹諸君幸同出城萬望與鄭蒲澗見佳作知蒲澗之窘也古人正於此際見進學工夫幸自愛石碑已磨定在此休暇乞拉徴明枉顧從容敬柬來請又數日不面懷想愈深於徴明猶是也少暇能過關上一㑹乎太湖巻向曽求䟦於徴明見間希為一速日來佳作必多教音杳杳何也顒俟顒俟又禮生事宦途冷熱大率如此毋足怪者至日在胥門有一心曲話欲面語待已久聞命欲各衙門行禮畢則在午時耳故先趣歸心曲之話未可紙筆啓也蒲澗至捷敏者能揣度之乎徴明可邀到闗否墓表之托至懇至懇又閲相者多矣皆不一其説此頗近理盛許蒲澗下科夀七旬外位五品别無餘説背後亦乞細詢所以上司俱在蘓城闗上之往冝不能待紙一百筆十枝專人奉去又舍弟逢東􅂪林同府先生見許令愛煩蒲澗先生玉成其美生早晩當到蘓州問名拱候所命與木虚公衡行路安穩乎慰慰寒家弟妹而下幸無恙但谷老常病耳方君詩病筆未能錄茗爐若佳即能喪志當為吾弟搥碎否則發到草堂作公器配我白鳩杖也太初集幸早促完十四部未領漫言漫聲猶緩也不急之物亦愛而錄之乎仲黙詩方在覽中太初落板便當補之陳家巻柰何恐作烏有先生耳又所報數事皆所欲聞厓老入臺名實俱稱此地此時看厓老鋪張矣胡世寜此疏固美三人者為朱者請入經筵但此三人後日朱陸異同之黨益分矣今天下豪杰豈止此三人天下稍無事君子者使分黨一分而後小人得而乘之矣宋朝故轍也可慮可慮師徳還山之人乃不得首邱自取之也惜哉四弟疾稍愈走明日往下江成母姨服歸途當枉諸君入草堂看暮菊一二枝孤黄獨立太湖竒石畔不與桃李輩爭榮艶品格顧自絶髙也又數日扶病骨督工開池得甘泉二坎可比清冷吾子速過我共知此味竒哉竒哉厓老十六成發否走買舟候送吾子可同之兼問公衡之疾文旭之醫走氣色不轉有何藥療之大丹難得駐顔何時柰何又今日是清明後園鑿池種樹看田甿揷秧田園之興勃如也請三子聮歩過我踏青呌白無不可者少頃當扶藜候於賢士橋莫徑歸也筆遣去鼎菴文木虚執筆人有常言少者勞也素翁之處晉溪之死方今却用中間一流人也小野書已遣去公衡家耳又公衡去否聞説遣人到我不見到今望自來宗文久不相見耳文輝世亨文潔閒可拉顧草堂滄灣聞欲過我此其時乎過此則嵗寒矣燈面畫否陶學士欲請過西牕館之也又亡室宅兆頗温燠啓封煖氣如炊飯來春當邀吾弟採秀一行毋曰風波阻艱山嶺峻絶也夔州以還之稿真相信乎然純駁不一須擇之耳厓老近有書云暢月廷試來春决歸甚喜墓志奉去吾弟一鑑倘如意當以數幅分諸友但首二行鐫不佳少谷集巻十九
