body:
  text: 少谷集巻十二明鄭善夫撰誌銘方處士墓誌銘方氏世居歙東郷歴遷開化元亂復避地於邑之慎山代有名徳天順成化間有曰克共處士者諱儆少孤孱即能誓志强立自慎山徙居棠陵連歳興土木任播植收山川之利以身其勞紏宗屬分貸積贏歳廣祀田為則不匱居郷閭温温無疾言倨容人多諒其悃愊凡有紛難率就之平焉性不飲常預羞醴以欵賢士對客笙歌宴樂久而弗衰吾文山昔嘗出遊處士結之於婺州吾語人曰匪物之貽抑以其好賢焉耳其親賢善施類如此初徐宿州瑲之窮也長而無室處士力妻以宗之女弟後宿州貴顯儒生學士翕然服其識也俗歸女率重富輕儒亦因以少變云處士平生履患難一不動容色壯歳役於職貢裒致方物挈厚直過鄱湖疾風失柁儔衆皆䘮魄處士獨歌嘯若遺畧不為變及濟衆咸韙之以為莫有道者其大都如此配吾氏有淑徳能承處士之志生男五人綉縟綺䋶細孫男六人豪唐度承廣奭豪綺之子也㓜時頴異有大志處士嘗摩其頂曰祖宗積徳百餘年天畀女豪將大我後乎每囑其子善成之𢎞治甲寅月日年五十八而殁其亂命惟豪也後豪果第進士著賢聲於昆沙二邑徴為比部郎為文伸縮造化聲實日起將進為名世之賢識者以處士方食其報云處士既葬之十有七年余與豪定交吳中又七年復合於京師因得詳處士行誼嘆曰君之賢達顧其所哉豪感泣曰先公注目於豪豪深愧非達非玠無以慰先公兹葬許年墓猶未志子幸為我圖之余覽狀復嘆曰余嘗見隱君子不由學問其作用自與道合者豈質美乃爾抑亦山谷之生不習五味其氣清明不近都㑹其風猶龎厚與及其食報往往智巧者不能跂其萬一古所謂善人巧於用拙者其在斯人乎其在斯人乎再拜而為之銘銘曰古有善人百年而興爰踐其徳以雄其成吁嗟乎處士之名同安林處士墓誌銘處士諱應字應彬以字行曽大父五秀才大父乞奴父凱明世家同安之翔風麝浦山處士兄弟四人處士以支子為叔氏後少孤失學及長始知書旁獵衆技如星數九章之類悉通其理值業中蕾勤動門戸弗克竟其所之比子元長即令讀書日勵以古人事業曰吾悔不學聖賢耳母令若蹈吾迹已也郷故逃儒即農自處士首先敎子而後章縫之士起惜元身立名揚處士弗及見之耳處士平生好惡多用其天資每讀史至奸臣傳必切齒唾罵及至忠臣義士未嘗不為之泣下平生臨義事不顧利害直以身當之𢎞治壬子海冦起處士計執其首者數人後有反仇事露至徙家以避之其事每為人所傳如此同安富室多坐食少務農桑處士身致贏尚計口力田抱甕決渠備勞苦而適也間語其子曰女雖讀書兹亦不可不知持家靳一緡雖禾頭木屑亦不忍殄然有告以困窮又恤恤捐所有人以為儉故又稱其恵云先娶許氏生男某某某夭女某適某某適某某夭許以罪去娶鄭氏生男某某女某適某處士生正統巳夘月日卒𢎞治巳未月日年五十六越壬戌與鄭氏合葬長興里鞍嶺葬後十六年為正徳丁丑元登進士又明年友余於京師始以狀來乞銘於戲處士古所謂木强者惜夫執之而未化也元今濟以學問處士之璞於是乎開矣於戲處士嗇於其身顧宜有元也銘之曰璞之純以開於後之人從叔南京監察御史竹泉公墓誌銘從叔侍御公殯將行其孤昭泣告余曰自先子歾今八禩然音日遐而徳日幽孤之不肖也成矣後兹庸詎知有先子也雖然兄之耻也余曰唏是誠余任也明幽追遐今其圖之侍御諱行字世濟彊志利學成㓜不貳達於行而無流懐故日載其耀𢎞治乙丑以春秋成進士出而執令於増城増城屬廣隩區逼五嶺嵗厭大盗於是乎下則以為民紀針兵順農以遷其途資亡振淹以藾其生立方育類以綸其恒徳由是日引月長民變而順臚言風蜚三年無秕政也入為侍御史還軫白下復監廣右之官日罔安志又三年持母憂去歸嗣父憂哀苦以死年四十而三方侍御未歸時有相者曰禄戾是數亦伊邇余時以侍御燕頷駝肩鶴武而虬髭必將大施志於民國不然之也乃今其然哉豐聚而嗇施阜體而儉庸志士盖惜之也侍御平生疏曠强義不下氣不為嗛嗛之徳蒿目而急世之憂其在増城也上任其果嘗厲戈揚盾以蕩羣盗而三奪其魁又嘗掩枹鼓卸囊鞬以身誘巨逋至犯其剡及袪以脱其好以竒制師類如此曽祖塾兵部主事祖文韶父明壽官娶陳氏無子窆祔壽官之封繼娶陳氏生男四人長即昭次某某某孫男某某卜以嘉靖元年秋九月日葬於赤龍之隂銘曰桂也可以為麗大折而小泄也蔽牛者櫟神用以拙也誰之弗材而久持捩也朝穆之抱真離數世所媟也故嘉定教諭吳公墓志銘公名汭字子潔吳氏系出宋觀察使朝甫之後公懋有隱徳母葉氏生二子公長少慧從舅氏堅講毛經數年大翫於詞奫於理閩士之雋者附焉如御史危行户部郎陳嬰進士余衷李廷朱璽謝珂與珂之弟璠皆樂有成者成化二十三年省試上其名於禮部弗售以母老分校唐昌七年以最遷儀真過臨安母卒扶䘮而南卒䘮改嘉定又七年乞歸邑士夫僚屬與門下諸生願留以考成不克歸二年卒得年六十四實正徳五年七月十一日卜十二日壬寅厝於東郭鳯丘之隂以母弟濬祔孺人林氏男二曰徳祥曰徳祚孫男一將葬徳祥致孺人之命曰先夫子遺言必得君銘諸幽敦請余諾曰善夫嘗館公家日得侍言竊記公自誦曰吾中歳窘甚身化居妻績紝不能得父母甘脆先人棄吾哀而屑此官以奉母也母且死旁皇逺道肩輿櫬跋梨闗三百妻孥以徒歩從事今雖鼎食未嘗甘也嗚呼公其有至性乎哉可銘也已詞曰維躬弗嬴惡既其庸維齒不豐誰守其宗嶷嶷鳯丘爰止而宫閩進士林允大墓誌銘君名徳昌字允大以字行林姓十九代祖穆自光州固始入閩居方山十三世至津龍為元尚幹官地以官顯而稼翁而同徳而烜烜始遷瀛洲生成成生鋐其别業在尚幹者多宦名惟瀛弗耀君鋐冢子也穉時以敏受專毛詩識大充𢎞治二年録閩進士籍再校於禮部棄乙榜歸力學奉親期必効所志十七年夏以母陳氏疾籲天求代坐憊先母以終享年四十有三噫其可哀矣夫負志而竟以休用情而不獲養誰之為哉斯其以然者天也娶吳航髙氏生子男三長曰繼其次曰憲曰舉皆始學而文女三髙先君死繼室以臺江陳氏歸二月而寡今將以是年某月日奉君之柩合髙氏宅於某山之原其友林某為具狀導其子繼來乞銘善夫哀其志而感其情可襮之以傳也銘曰負志而遺用情而訛維天匪吾匪脩維何至徳之陽有丘其塋貞珉是勒爰尚而聲墓表時菴髙先生墓表鄭子隱居鰲峯之北有髙子瀫者九人與游時登山釣水嘲風謔月余必九人偕而九人亦莫予之逆也邦人見而指之曰十才子來矣復曰四生葢詆之之辭也然誰詆之而名亦嗣是日起瀫家最貧然事母至孝事兄至弟身菽水得錢即以畀其兄妻紡紝為生卒歳無愠余久而難之丁丑秋余有四方之役瀫􅋦其母陳氏之命來曰先公徳浮於用有美弗徴瀫復弗克肖恐遂沒於瀫之身後世亾述者先生幸哀而表之余覽狀嘆曰風之下久矣自䦧墻之刺作君陳不作漢晉唐宋以孝友起家者一指數而盡傷哉吾方吊往昔而諦觀乎天下久而弗吾應也何意乃今得髙氏於吾之郷吾無得而闡之耶無幾何林子釴傳子汝舟報曰瀫之母於是年月日死矣殯無容棺之所再旬日而即幽於乎孝友之門戾此其極也悲乎今者尚忍公之弗表哉髙出宋廸功定之後元有慶生通三經為醇儒入明旭最以行業顯旭子基基生四子其諱鑑字孔明者即公公少彊立慱載籍至干常犯紀臣侵君子妨父妾婦乗夫弟兄相虐迭瞿然失席叱咤而唾罵識者已知其有所不為矣為文用古於今試輒不利晩以父日耄就分教曹州尋遷清逺入官忻忻然歳分餘廩致甘脆為養先事繼母至相忘如所生者其於先世遺產悉以推諸弟曰吾方食祖父之休矣郷間義之以為躬行孝弟而公自視欿如也父沒之後即無復宦情歸結菴以老曰時乎時乎吾不知為偶乎為竒乎舉世溷濁孰與其潔衆人芚芒孰揚其芳復自稱為種蘭道人云於乎公才足以幹世行足以轉俗其有緒餘見之丹青文字人皆寶而惜之况其大哉侯官吳鏘聞人也嘗曰先生如髙陵廣淵吾未曽陟其樊而渉其涯安能測其中之藴即使天假以位移孝移順施于有政豈但如古之所謂狂者不掩其志哉吾聞晉王祥之後衣冠之盛甲於江左公之弗施也或者天將侈之於其後也况瀫也復修公之業耶公墓在螺峯之麓其詳見於舊志余今舉其大者表之後千百祀有道公之懿徳者視吾之文敬齋鄭先生墓表先生諱伉字孔明其先赤石魯氏七世祖正叔出姑子後遂為鄭氏居常山之象湖世濟其徳至先生而大先生吳康齋之髙業弟子也風聞楚越之交葢闖然游於萬仞者余生也晚不及挹先生之容近季子道者揖余於京師求表先生之墓因得睹行蹟聞風慨然樂為執鞭而恨不可得者先生三歳聞父母哭而知哀五歳誦故事十三讀易治舉子業文理蔚然二十為慱士弟子及省試一再不合棄之曰顯親揚名恐不在是也乃走豐城拜於丁潛軒之門求踐履實學時年三十有幾矣廼復見康齋先生於崇仁康齋曰此間工夫非朝夕可得恐誤子逺來對曰此心放逸已久求先生復之耳敢欲速乎因受小學日自驗之心身徐得聞四子六籍之要久之於道若有見焉乃歸築室於龍池之上日取諸儒論議一切折𠂻於朱子凡古載籍鮮不讀但不讀佛老之書嘗謂其毁肢體滅人倫即不容誅又何待讀其書而後辯其謬哉一時名士若蘭谿章楓山開化吾文山南昌張東白皆與相可否所著有易義發明卦贊讀史管見觀物餘論蛙鳴集凡數十萬言惜以燬盡其存者僅十之一云吾嘗聞康齋之學最强毅直致不屑屑於文字箋註約破碎而大同之卓然有六經鑄我之見誠所謂發章句之迷而立於獨者夫章句猶筌蹄然本以發迷欲學者既得而忘之也豈為終身溺之而不究心於章句之外者乎吾聞其執䘮極哀祠墓殯葬一本之家禮設義學立社倉事事皆著實地上作業要非所謂瑣瑣破碎者故自號曰敬齋又曰斷迷子葢有得之康齋者矣然挾經濟之術三謁公卿而不一試豈所謂逆流退飛者邪古之君子知之則言言之則行聖人之心顧亦何嘗忘天下哉使假先生以年其用舍内外之辨必有分矣先生行履備見傳志此特其大者余故表之以詔後之尚友者少谷集巻十二
