body:
  text: 少谷集卷九明鄭善夫撰序文修江先賢録序史以考信古者有國有史古史莫信於春秋春秋魯史也聖人之文約而苞其義大而公自秦人黜封建則史氏用獨獨則遺於是乎有紀録之書或以時或以地胥如志也自秦而下凡百餘家大率有四病不避則溢不濫則漏名蕩乎實之謂溢有所怯之謂避信輕之謂濫識疏而聞寡之謂漏四者於其人焉不鑒於春秋之義也雖然顧補史氏之遺耳余序修江先賢録知周子之善用春秋也賢寧産也寧春秋艾子之國也録賢而係之修江者其漢修江録山川之能也始於漢者封建既黜之後也建置沿革乃始於三代之先者假一邑之文統元也統有五號曰正曰閏曰僞曰賊曰篡弒或正名以統實或去實以全名用宋庠之意而折其衷也賢有六科曰忠孝曰事業曰文章曰特行曰貞節曰仙釋集有五義曰正曰續曰附曰别曰外正者上也續者嗣也嗣似也附者依人以傳也猶附庸之依於大國也别者别也别閨閫之範也外者以道其道而外之也曰公曰先生者鄉先生有尊之之文也録而必按其履者不枉其是非之實也凡是者皆用乎春秋者也録實則不溢號明則不避科分則不濫義該則不漏是録也但補史氏之遺耶稱信史矣醫林集要序余嘗讀內經不盡通曉然頗㑹其意自古成毁相因隂陽散伏民鮮戩穀於是乎有草木金石之英以衛之而憲之於經是故犀羚蠶蠍貫衆茵陳狶苓狗脊酸辣苦鹹神竒臭腐齟口齬齒蜇吻裂鼻而各有投人之經而裨其生焉者及其傳之既久人不解究竟任疑用獨而經乃樊亂至仲景李杲始肆為論說發其疑義而經復一明然方土異宜古今殊運兼以庸醫固滯顧懵然莫適其所從耳成化間有王氏璽者乃復苞并百氏之異同沿時遹士稱長置短約為大常而不畔於經於是子隂陽相勝之機氣運旋斡之變疹切攻尉之法宣補和平之方木石溲液之分輕重沉浮之數翕然遂大定名曰醫林集要凡若干卷鄱陽胡公購而梓之以公於人人其惠博矣始豫病肺羣其醫而藥之至彌歲月弗療豈真方之不足以愈病耶是書之行有仁之惠也人有言曰不為名相即為名醫其作用巨小功惠舒疾雖若弗倫而仁之流一也人亦有言曰弗善為醫莫善為相有所操者有所縱也公名韶時為閩大方伯云草木子序草木子葉子竒氏栝人博物洽聞達於古今生元季詭時匿德於龍泉之槎溪立言以昭厥志人亡識者所著有範通𤣥理太𤣥本㫖各二卷詩十有六卷文二十卷本草醫書節要各十卷齊東野語三卷草木子二卷草木子成於洪武戊午狴犴中稽上下之儀星躔之軌隂陽五行生尅之運海嶽浸瀆異域希乏之物神鬼伸屈之理草之變魚蟲之尤律歷推步易衍之大宗釋老禮制之書而之於六籍之緒大歸同焉野語記時事失得荒兵災異而文弗避而義則則乎春秋古稱虞卿非窮愁不能著書草木子其善窮哉草木子云者草計時木計歲以况其生而傷乎其言之立也或曰草木子劉基宋濓時人詳觀誠意集未之及者而濓叙太𤣥本㫖似不心贊其能夫二子者亦蔽賢乎哉凡人賤近而貴逺知者相世機則掩其識昔揚雄撰太𤣥法言與州針以比迹聖人當時雖劉歆輩號稱知已亦拙其書顧乃盛傳於後世好竒者以為奧於孟軻然𤣥實失之滯法言州針亦多迂謬今觀草木子其義至精論甚正使遇賢知者闡而張之走揚子矣其與法言太𤣥並傳復何嫌耶而或者又以惟鯊胎生無無華之實胎卵濕化貴賤之類病之是惡足以纍其成哉舊本凡二十八篇今纂為四野語凡三卷今為二其七代宗子溥殺青而行之并曰草木子古語云傳先之美仁也刻成晉安鄭善夫為序正德丙子夏日重修南湖鄭氏族譜序舊譜依歐陽法系圖以五世一提竊以人身各具五世五世一提則髙𤣥捍格昆弟失倫且子前父名孫前祖名義不可為訓今酌蘇法以父子為世父上稱行明昆弟也稱爵稱公稱號若諡子下稱名明父子也帙必實録示信也傳贊銘志備本支詳所親也於賢者雖疏亦備賢賢也為僧道不系女出而失節不系絶之也出婦與失節不系既絶於其夫也系於子之下明天下無無母之子也女而貞與婦而烈傳志附其父婦節與賢附其夫勸也帙附祠堂儀節附祭田附家法家約禮之備也鄭出唐别駕莆南湖淑公𣲖閩中丞元弼公後傳八世至源深公徙三山今其墩亦曰南湖不忘厥自也祠始源深公重始遷也以四世祖天祐公配以功德推而立之也有附祠以無𦙍者祔食恤無𦙍也善夫比到莆得通元弼公以上譜到仙邑得八虎以下𣲖因拜祠墓合族人今增而詳之居三山南湖十世孫善夫謹志僉事顧箬溪平冦序古稱蠻夷悍輕易怨以變控御失所則負岩峒相嘯呼如蜂屯蟻雜不可爬而梳之風氣之以也甌閩古百粵地也潮漳之隩枕海其隂多大山山連亘深阻小口中漫上廣下鋭蜿蟺數十里蔦道莽如行不可駢肩世惟蠻夷所據而獷獪亡命之徒往往竄而附焉為孽梗州郡兵至則憑要害下矢石狐伺鼠伏以逸敝我之騷騷急則移山蹈海視􅋂﨑滉漾若平地然數年歷文武圖議攻撫並用然力用頓而患且益滋蓋攻而無法則我去而彼來撫而無信則朝聽而夕叛朝廷大有憂焉乃命三省之師悉草剃而禽獮之由是而僉事顧君以簡行十月之吉視師於潮君至潮號令惟嚴䩨靺惟明裨二惟良甲卒惟馭閲惟時動惟機正月誓師進次於饒平由是而掇箭灌蹙大滻搗木窖􅝌泥園而夷之殱渠魁二十俘其䣊盡自潮之南蓋先漳贑之聲而褫之氣者昔之善師者果而勿矜果而不得已行無行攘無臂仍無敵執無兵以制勝也君浙西書生也一旦仗鉞即戎以當悍輕巨寇即能决全勝於幾之先以關介胄之口語曰章縫之流不可語金革豈盡然哉君知足以集事果足以有功恤足以輯民文足以經世此一事也舉其全不有却走馬以糞乎潮郡丞林侯序君之績欲吾黨張之次年為正德丁丑秋七月日晉安鄭善夫為之序太白山人漫藁序太白山人漫藁者吾友孫一元太初所為詩也夫曰漫者觸而成聲無謂有謂之云也太初關西豪杰也束髮入太白山為山人繼入終南泛觀恆岱遵龜䝉慕宣聖遺韻止於鄒魯之郊久之踰江淮下吳越鶡冠布袍獨立於萬象之表志孑如也夫髙蹤逺影者顧以世為不足為乎及讀其詩皆悲壯竒崛感激奮發而卒澤以冲和如神龍在淵變化不測得時而興乘雷雲以雨天下噫是豈忘情遁性為犂輿來祀者倫乎或曰太初離親戚去墳墓逺遊於方之外與名教或不相䝉者是何言哉孔子曰丘也東西南北人也復欲居九夷莊子陵去齊適越管幼安徙於遼東孫明復隱居於太山之陽邵康節去家入洛四十而後娶古之賢達流寓於外要必有所為而安焉者獨太初爾耶或曰吳越之人右文人易致名譽太初操觚飾智揭揭然為髙意有終南之捷者夫以太初之才稍自抑以應今之世何往弗達顧甘心寂寥卒其世以餂無端功名耶吾嘗與太初乘月泛洞庭浩歌漁父傲睨一世似無少芥蒂於其懷又嘗與卧西湖之上見其息深深時乎天壤時乎地文要固有道者吾聞無欲而後可應世今之應世者可勝議哉漫藁凡若干余為之序以傳藁而曰漫則固傳也太初不與也子通序子通一書余卧罪長安時口授林璧者每講一通命璧録一通居兩月璧去講録止述而篇嗣是無從講者遂不嗣録是書出一時應接殊有語病噓辭安能盡余意耶雖然實余獨得之心而應之口者也雖然今之事舉子者用不行也故璧亦叛去於戲此學晦久矣舊習之膠人也固矣余安望世之余知也雖然不作溝中之斷千載之下㑹有知者余俟乎千載之下嘉靖元年春三月念四日求志齊夜坐偶閲而志之曰子者四子也曰通者通理也送王子北征序雙林王子將北征十月初吉觴王子於新亭之上王子曰諸君子其亡命余耶鄭子晉曰子今可以踉足而前矣日余夢羣羊而角子其先者夢而診其夢曰羊祥也羊而角解之文也子將先羣祥而起與又兑為羊兌正秋也子之起也其於秋與今余夢而信也前是癸酉之歲余夢其伯子余夢而信也亦無異於王子何王氏子數數余夢寐間邪昔商宗夢說按夢而得說得一說遂嘉靖乎殷邦方今天子秩德商宗蓋夢寐似說者將物色而賓之以嘉靖其天下王氏伯仲其人與王子工若天而俍若人吾見其注焉漻焉積之謵矣聞之越矣時日及矣余春曹賓人之舊也今雖矇􅕓向曽與於麗綺之觀矣無將兆魄於余行且感於天子之媾者乎子今塗游於四樊吳越淮徐其歷也梁楚在西燕趙在北目將熒之耳將傾之當武皇之世天疆其毒百昌悁悁凡辛酸苦鹵靡不有也調之鼎俎以奉於天子在此行乎王子興曰嘻未牧而牂在奧未弋而鶉在宎吾且疾鶉牂之狃吾遽說之能當余曰古語有之遊心上行人定其亨伏志無極天贊其吉且也二三子之與子友也相券以內也相助以消也下是曷以命子二三子揚觶而前曰君不見吹劍首乎下是則一吷而已矣鄭子之夢子也非信也其命子也信也於是王子載余言焉遂北征前丘生行已外篇序前丘生余友傅子也行已外篇歲為卷歲之乙亥與余交余贊之録其所為詩篇始乙亥始交余也前丘生詩淵致瀟散多發之性情其道江湖林壑神仙隱逸直臻其要妙蓋本風塵表人也平生志不専詞章然其為詩實上下魏晉抗聲於武德天寶之間大歷而還不論也余誠愛之慕之其不能使余忘情者是篇耶前丘生日所切磋者悉見之外篇自余外皆豪杰士也豪杰之士無文王猶興詎分以辭章自坎乎詩三百曰思無邪吾夫子之言也前丘生進於是矣其發之性情故曰行已其見之文字故曰外篇云送夏方伯赴浙江序明有天下置十三省省統以左右布政使即古之方伯也有地數千里省之僚采與郡州縣之長凡所謀議伯主之天子之政令教化伯宣之天下之財賦與百供具出之民者伯處之伯之任實重且專也非望弗遷非能弗釐非德弗鎮非若他官之徒以釐以鎮者吾又以見伯之難也夏公某為吾閩廉吏風裁肅清未幾天子使之伯於浙非以其德且能乎哉夫浙隸府十一壤地三千里其僚采官屬財賦當天下三之一天子政令之行必以先之又非若他省比公何以為之吾聞公向以御史巡斯土莊嚴練達於今為烈所以理吾閩者是道也况既理之地有不易於理者乎天下論諸藩垣以浙為首吾見他日論諸藩守臣必首公矣蕭司訓還永豐序蕭子佩校閩邑三年不樂於心一旦集諸子言曰吾寧役而形而復紛而志吾不當時命者也吾其歸諸子長揖而進曰先生業明而行成末世而遺行位乎得於校也夫何梏於修蕭子曰子欲我為犧牛與欲我為龜曵尾於塗中與吾智不子遇也母吾已秋且薄乃嗒嗒而歌曰陽之山兮巃巃景風濟兮山豐擷芳華兮盈掬聊容與兮山中又歌曰恩之水兮濺濺鴻之揚兮逺天原有桂兮隰有蓴人率滑涽兮吾惡樂為彼園念不移與議不及庭去之日琴一劍一圖書數數無長也鄭子善夫曰道不興世世不興道則至人之德隱時也深根寧極不得不聞此之謂滑疑之耀故曰物不喪已俗不失性故不賊命得不殉名蕭子也符吾素矣送魏貟外序正德八年春二月大中丞彭公理蜀寇請餉於朝大司徒孫公議轉椘粟應蜀請疏以員外魏君行彭公以蜀寇故請孫公以楚粟故特魏君大若事也魏君之楚重若負也或曰制士在內三年得封其父母父母沒得享於墓魏君楚産也朝卒其事夕得致天子之命於其先行而欣於情勞而愜於私或曰大夫出不二事公不窺家詩不云乎王事靡盬不遑將父閩鄭善夫執二議而觴之曰聖王敬義而厚情志士敏公而緩私君請權於斯二者雖然君子有必用之情有必恤之私比者刑臣煽孽九洛盜起齊梁楚蜀之墟殱於兵者十三叢於盜者十九朝廷募兵揀將括金需糧三年而中外為虛寇不加少其故何哉有志者能無私於用情乎不也他日到軍門以告彭公歸以告孫公以復於天子必有成算者矣此則愚之所以皇皇致私情於魏君也已送張巽所先生赴大寧序甲戌之秋巽所先生行為大寧博其徒鄭善夫議於泉山夫子曰巽所先生學博而通行介而不羣篤於文文尊六籍孔曽思孟之書敦頤頤皓熹載之格言至於耳周不害非佼鬼谷雄說潔寇安施齊丘百家之嗷嘈七十二子之著作一切屏而不序則其文也理然而三賓於禮部一伏於青田青田地鄙而風漓漓則無介鄙則弗廣人習細故駭人之作新是猶張咸池於洞庭之野始於懼中於怠其卒也惑而愚矣今者大臣知之言之天子天子知之遷之大寧夫大寧武地也巽所儒官也行復何以處之夫子曰噫其信然與吾聞大寧左揖太行右控大都黃金之臺鬱乎嶷嶷即燕昭王所禮郭隗致樂毅者下有易水其流湯湯即燕子丹縞素壯荆卿之地至今其氣激烈而悲切其俗徑義而易感我國家化成其人已相忘於文采非猶向之所謂鄙且漓者材成損益顧巽所何如耳邇者惡少哨聚殺人成丘髙梁淮蔡播宕為墟然則今日之教武未可略也他日或有毅軻輩出其門而分禍變之憂乎抑有韓范輩出其門而鼓順平之盛乎是在巽所善夫以告巽所命書之以自益壽圖序介壽以圖非古也圖以物昭其祝也古之為壽也以言今之為壽也申之以圖是故有圖蘭桂圖滄海圖龜鶴松柏岡陵固也惟人子於壽其親也意蕩乎言言蕩乎物有恩勝者矣余表李録甫壽其父菊坡先生作椿萱圖而於芝蘭松桂山海龜鶴蝙蝠麋鹿之類無不舉圖成率子若弟拜堂下而祝之如其圖者三凡逺邇戚屬畢至各觴酒為夀如前祝酒訖命豫以言尚其事余於菊坡與孺人有外戚之好有內子姓之分也言詎可少哉言之則情真情真則多而不溢不溢則可書也於是乎書繡嶺草堂六咏序少司徒二泉邵公以身養請於天子得歸錫讀書於惠山繡嶺之間編草而堂時即物而歌人見其適也君子於其歸見錫類之性焉於其歌而適見惕艱之情焉夫既祿而身不違性之至者也既逸而心不遺情之至者也至性者道之㑹至情者義之樞夫然後知純臣與純子也凡今之有君有親者可以興矣善夫為公小吏繆受公知故既序草堂又賦六詩而使孺子歌之尚意也劉氏祠堂八咏序劉氏之昌於潮也自劉允始允之昌其氏也賢大得潮人官程鄉循化大得程鄉循化人世歆潮祀實祖劉氏祠始允之三世孫中允少集配以允二子龍圖學士昉光祿景禮也祠在城東湖韓山之後湖山麗而闕革宋元明祠完圮因之𢎞治間十世孫繼善用諸父琯文理命乃協昉景二宗𦙍新之治而墠堂設而宗祊序而逺邇釐執秩量典物百籩用光犧象昭明於時乃事於房蒸擇柔嘉敬祓除水陸之菹之醢隂陽之物匪不時至於始祠為侈焉猶曰不足以訓則揄美也於是乎有顯聞人八咏詩以襮其懿光教不忘也鄭善夫聞之曰君子之德逺矣吾於兹祠得人道焉復始也能備知美也能傳復始者義之章也備物者禮之周也知美者知之飾也能傳者愛之原也章義能祭周禮能敬飾智能建原愛能親此四善者天之所貽也吾聞之天道艾善必豐劉氏食艾也有豐矣夫悠然亭序嘗觀之世人遁世泉石者則有廢棄不平之况窮年宦海者則有舟楫失墮之恐二者窮達纍之纍則無適也閩義溪泉石僻野正遁世者所不遺陳堪氏作亭其際名曰悠然是將無廢棄不平之况者歟誠有堪者昔陶元亮不欲為五斗折腰憐故園松菊飄然長往彼蓋不以窮達纍其真而得其生者故采菊而見南山適也堪無窮達之纍者乎無纍則無物無物則無我無我則無弗適矣是故萬色與目㑹萬聲與耳㑹萬氣與神㑹萬變與形㑹而心適也雖然人心不固久則移堪乎母厭山棲而思以舟楫駕長風則不免有失墮之恐為我慎之林下增恩序林下增恩何以名紀榮也留餘陳公歸十年矣新天子推恩及髙致之臣例進階為朝列大夫尚故秩若曰有金紫之貴有上下大夫之别有不煩以官職之守有鄉邦之光榮也則不也吾於公為鄉小子頗識公初公之歸義溪也鄉人駭之而嘖嘖相語曰是何歸之早也及朝廷以恬退風天下吾黨例公者不能二三鄉之人復嘖嘖相語曰某也與某也不與夫夜行不休者鮮有不辱其身也是則公所獨榮而人亦以榮公也迹公之故可以風矣可風可賦可賦可傳也是詩倡自公朝野大夫士咸倚而和焉艷其榮也吾别有以發之且自勵云壽蔡母詩序蔡母生二十九年生浩四年而主亡苦心立浩垂二十年而浩達達十年克承母歡母心始無苦歡且無苦是之謂餐天之和壽所因也君子曰達浩以艾母也天之與耳善夫末眷於浩詳母德於其六十也賦南山之篇凡十有六句云葉古崖集序古崖集為文若干首今古詩若干卷其狂傀雕鎪滷矜燥濕錯然弗倫而悉和之以清揚藹如也余嘗辨其音節多放手唐宋之間惟五言近體於杜為似蓋亦菀菀然充其性焉耳杜詩渾涵淵澄千彚萬狀兼古今而有之他人不足彼乃有餘又善陳時事精深至千言不少衰世之學者劬情畢生往往只得其一肢半體杜亦難哉山谷最近而較少恩后山散文過山谷逺而氣力弗逮簡齊蠲而少舂融宋詩人學杜無過三子者乃爾其他可論耶吾閩詩病在萎腇多陳言陳言犯聲萎腇犯氣其去杜也猶臣地里至京師聲息最逺故學之比中國為最難焉若非豪傑之士鮮不為風氣所襲者况遂至杜哉國初如林鴻王稱王恭髙廷禮輩逖然離羣出黨去杜且顧逺與古崖閩産也余讀古崖詩蓋所謂豪傑者竊嘗評其詩如春空游絮隨溫風飛揚衝條附葉雖乏穠綺然自有一段丰神猶至京師者越浙度淮駸駸乎北軌矣尚論風氣哉或曰如國初數子何如昔人云詩道如花論髙品則色不如香論逼真則香不如色古崖葉姓名元玉清流人守潮為古良吏其行履之詳見於長汀李貞夫氏歲彊圉赤奮若相月哉明撰少谷集卷九
