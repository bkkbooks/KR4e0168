body:
  text: 少谷集巻二明鄭善夫撰五言古詩草堂大風雨徹夜懷田家旱魃自首夏今兹山吐雲翛然草堂前彷彿氣候新迅雷殷霹靂積陽乃沉淪振風䬃而至涷雨猶傾盆中夜想抱被寒燠忽爾分回思前幾宵始得一爽神平明窺少谷生意復津津乃有棗與榴落地紛成囷緬惟收斂畢農務仍苦辛造物詎可測且幸蘇勞筋陰陽未順序吾憂尚無垠出自郭北門行出自郭北門松栢何繽繽白日不到地野草悲陽春仰觀苦霧繁俯盼白骨新白骨火不化髑髏夜相賔飈風嘯有恨大暮難再晨昔為囂市子今作廣野塵昔競刀錐微今託鴟鳶親𤣥運迺如此彼蒼豈遺仁䝉莊達生死緬邈煩惱津孚齋成心繡鞶帨僨驕不可拘脊脊廣運中吾道其何如罝罘亂藪澤太素成蘧除畸人乘莽𦕈焦火蹈若無汎然涉九淵木舟一何虛得一合衆萬瞻闋生明疏至情通喘耎而况孚豚魚齋居霽煩想兹理守弗渝説巽茍不虧化邦擴所餘睠言永登假去與天為徒遊建州陶園和淵明擬古八首南服翔燠風杪秋猶春和水乾坐濡滯木舟載悲歌名園占原隰節物逝已多崢嶸甘菊叢綽約芙蓉花流景瞻應接靦爾懷陰何其二少小秉末尚擔簦逺行遊如聞赤縣外更復有八州車轍苦未厭光景倐若流歸來守純氣蘧然見丹丘乃知不出門偃仰六合周王風久寂寞吾行將奚求其三四序逓興没萬有乘始終景陽未停軌積陰已肅戎何意松栢條蔚然乃獨雄糜糜田間草淅淅草上風凛秋一披拂姣好㑹有窮遲爾採脂苓服食青山中其四羣山積莽蒼莽蒼當座隅萬木忻適所境幽鬱以舒細霧宿陰洞叢菉亭廣廬東山抱逺志栗里賦閒居浮榮曷足縻三徑不可蕪歳華日向晩吾道乃晏如其五東南有一士名節貞自完葆光歸田園散髮懶不冠白魚入羞饌取色慈母顔幽居藏市廛白日以閉闗客從逺方至情話憂絶端酒酣命僮僕取琴為之彈希聲入窈眇忽下雙紫鸞睠言履昭曠相期逾歲寒其六秋登黄華山恍然見大荒前有樂天居後有歸來堂堂居厰雲鳥回池亦淼茫主人端逸念蒔菊翳坻場天寒菊未華逸念齊嵩邙桴汎通永夕萬象爭低昻情景茍不虧余何動迷方緬惟無窮門引領情内傷其七我行復中野怛怛自今兹蹭蹬勿重陳所傷命與時非無青霞質素衣向已緇側聞雍門彈慰此中憂疑憂疑卒未解至音已無辭古風落㝠㝠大道不可思王喬非予願詹尹亦我欺江花莽消息遊子暮何之相逢東園公遺我考槃詩其八楚江有杜蘅葉短不堪採越山有舜華秀色昏旦改不如擷芙蓉逺意薄雲海美人隔秋波秋容澹相待悠悠鶡冠子遯世豈有悔北鴈步雲詞昔我夢翼飛去與王子親雙雙鸞鳳簫吹破緱山雲翻身大火坑洗髓明河津芔然馭白鹿下宴瑶池春枉駕鴈宕陰𤣥㝠閉天閽醉掃千文石萬刼留至文只今靈峰洞元氣猶氤氲悲歌草木偃坐嘯天地聞歸來鏟光彩大隱金馬門君看東方生至人伏垢氛詎羅不了道一壑空云云業書樓台南有髙樓下瞰澄江水飛甍冐流雲疏櫺一何媺重幃無長物三車擁圖史中有偉丈夫云是百世士連繙十二經呾爾蕩其滓繙罷三嘆息回首鴻濛裏迺知無物初萬軸皆糠粃青藜宵到門欲語餘一指目擊道自存我愛温伯子北山詩二首朝發委羽陽暮赴紫霄期南遊嵗向晩戀此溪山奇終風豁初霽陰谷雪已晞振策陟曾曲薾然見茅茨疏鑿信未倫情景殊匪虧新松㑹多翠逺江亦不迷素月明當中坐久生靈臺少焉寒威重尚覺陽氣㣲良朋矢為好兹生幸未衰本性茍可遂毁車去何疑其二東行寓遊蹤逸軌迷西還矧兹𤣥㝠月翳翳風景昏非無兒女懷所適山海觀陽崖冐逺陂陰壑注奔湍步雲青峰頂搜括窮其源前有空明洞蔦徑迴巖巒駕言采玊華將以遺所懽翛然雲霰集置身虛無間大道出死生静者見腑肝願招柱下史去入無窮門燕集玉輝堂窈窈巖壑姿迢迢契幽賾緬懷天台勝遂寄山水癖赤城淹歲晏所戀有三益壯陰屈㣲陽闗山雪盈尺雖嗟軌路阻稍喜緇塵息巾峰入草堂天葩進瘮􅂒美人羅公車求友意何極文筵麗竒態流觥樂無斁鹿鳴紛諧和造適非絲革退念蒹與葭兹幸附圭璧覩空悟氣機體有見真色吾道未榛蕪辴然露胸臆送何仲黙遊闗中六首跨馬出薊門馬行不旋顧丈夫重髙勛狹徑有矩步狹徑非所遵將子恐歳暮多財乃善賈長袖乃善舞巍巍西昆丘矯首以延佇其二延佇如奈何離居生怨惜輸心風雨夕執手衢路側神交無古今長道有羽翮晤言念彌久去去結松栢女蘿乘飄風睠此中乖絶其三弱齒逃篇翰中逵謝華藻深文用情性鞶帨日已掃簫韶奏虞庭鳳凰出瓊島至音動天地和者一何寡永言承德輝别爾乃草草其四登髙望咸都送子過易水朔風何蕭蕭黄鵠逝未已肴函列百牢涇渭亘千里西當太白窟代有隱君子長孺用髙義壺遂且逺舉古道存遺編睠爾托經始其五崦嵫下西日翳翳風景昏虎豹扼九闗廣利那復聞重華不可晤聖智乃沈淪鴟鳶日連類鵷雛遁其羣矢言引髙步行止遵時屯其六杪秋行終南箭括髙刺天黄河從天下列宿相勾連何意紫極北狼嘴張其躔南開蠶叢山北俯邙與鄽廣野闃無人草生鬱芊芊塵飛苦無象谷變㑹有然行哉殖元氣皇圖夀萬年武穆吟三首南瞻岳王墳拊心訟宣和四海既無虞樂事一何多師師入帝側金兵乃星羅舊時張諫議天閽語非訛但見户括金不見士荷戈回首靖康末志士悲如何其二太尉出世姿用兵自神武懷中左氏傳羞與絳灌伍燕雲唾手得甲卒盡熊虎北開𤣥㝠天南靖朱光土國耻猶未雪百勝曷足數誓將與諸君痛飲黄龍府不觀潁昌旗氣已吞邊部其三英雄無奈何氣數乘人事宋徳但末光椒房生夢寐北狩不可返上天有成意壯士自苦心奸臣自長計蠟書晨到門將星夜墮地平生四字符竟落氣數裏桓桓蜀武侯殺身志乃已佳人篇青青壖畔蕉粲粲空谷女頭上金錯釵宛宛鸞鳳舞腰間碧玉佩娟娟下蘭廡言採草中英不踐草上露新製齊紈扇自障復自顧非無合歡被防身宻如堵飄風吹楊花夫君渺何許長恐時易沉裁悲以延佇贈吕愛員外秋雲㑹崇臺觀子意彌逺新知何草草半饟迭酬勸同生不盡歡異世乃増戀真交重意氣豈必日繾綣叢菊有逺芳女蘿有深蔓大道淪滄溟相期汎波瀾芳樹篇二首芳樹生廣除蒼蒼正輪囷芳樹不自芳拂拂千紫宸朔風吹樹巔素雪舒其神今日曷不樂公堂有嘉賔把酒對蘭楹懽來不能陳㣲言托哀竹惠心欵以伸其二吾皇嗣歴服神武古絶倫拔劍下大荒裔夷率來臣大食獻寶刀大宛獻麒麟單于獨犯順戎衣不及晨軍聲動地起旦日至西秦分金賜五侯衛霍不愛身萬國拜稽首三祝何諄諄但令修文德王度永無愆早起赴思道索飯晨朝不舉火去扣故人門坐見相忘意終銜一飯恩醖謀蘇軾婦蔬摘長卿園童穉能看客文章不諱言粗豪吾豈敢道誼爾應存陶令時獨往杜陵嵗七奔從來略温飽以此信乾坤萬事羇孤極元慿好弟昆蘇蕙娘織錦七解扶風蘇蕙娘織錦不下堂朝朝理機杼字字迴肝腸織就逺寄將夫壻在襄陽一解夫壻别有懽置妾長門旁新愛正糾結舊恩一時忘二解仰看天上星環轉如車輪經緯自有度卑尊豈無倫慿妾手中梭愬妾心上棼縱横八百字反覆合成言妾心方悔悟君心儻回旋三解蒼蠅㸃素縞嫉妬無愧好憶昔君别妾人事何草草君逐陽臺雲一去斷音耗妾似芙蓉花芳妍向誰道四解朝雲歌未已隴水鳴不止願作青陵臺同生復同死五解琉璃易破折紈扇輕一擲生前參避辰死後致魂魄六解白頭且莫宣紅顔多棄捐安得竇連波解妾回文篇七解贈汪希周朔風吹歳花之子意嵂屼矧兹日初度乃值履長月賔筵擊朱絃調急新商發君才當雄飛一舉偃溟渤培風向天池九萬豈天閼終焉到彼岸去去忘其筏北辰久未安欃槍耀雙闕睠爾弧矢志翻身射星孛大業猶次且誓言共黄髮妾薄命翩翩並命鳥步步相諧悦中道忽分散鳴訴哀以切有生諒同懽有死願同穴衆雛羽翼短詎忍兩訣絶蘭芳不如桂荼苦不如蘗妾身未能亡惡此中衰歇雙星下洞房流景何光潔照見君衣裳不見君顔色重泉睠有期海水亦有竭巍巍蒼梧山竹淚無時滅燕歌雲鴻下雀羅越客變燕歌燕歌聲激烈越客悲奈何長歌劍斫地短歌髮直竪朔風吹易水四座俱隕淚少年羞睚眦壯士重意氣拔劍殺仇家生死無顧忌猛虎欲攫人不擇愚與賢食膽中自知豈避猛虎前出門逺孤征雄劍終夜鳴竄身脱蘆下亡命入幽并幽并多豪俠結交踰平生杯酒接然諾信義何分明白日髙漸離筑聲愴以怦田光為君起片語謀立成荆卿獨忼慨舞陽乃輔行上馬報仇去土花照青㝠秦庭事一就干載揚令名游俠篇長安逢少年意氣何昻昻鳴鞭六陵坂先驅勢正强戒途列萬騎一一羽林郎鐃吹動地來颯沓若雲翔面前五花驄寶􅎗金絲韁腰間雙龍劍吳鈎飾英璜弄兒十四五藉綺凝素光行行且游獵游獵及上陽張弧向大漠忽墜雙飛鶬持歸平樂宴象筵歡未央借問此何誰云是漢金張六年起卒伍一日傾侯王文人天帝子出入乘金閶揚聲重綸綍流燄爍朝堂逆鱗不可嬰太阿手所將乃知朱門貴溢恩胡可量沱水三章仙人騎白豻逺在蒼梧山我欲往從之沱水深以瀾沱水深可厲蒼梧鬱巑岏其二雲門何皇皇逺在洞庭岸我非沱上鳬日夜汎波瀾其三言采蘼蕪草思心倐如摧不見王孫歸但見章華臺同心結三章送林徳敷赴齊東文旗出郭門念子赴齊東攬衣起躑躅嘆息不得同鳳麟久増逝爰居亦避風㝠運方險艱去去隨短蓬其二短蓬逐晨風轉徙無滯淫我其鴻與燕乖坼一何深雲臺志莫就奄忽昔與今平生廣陵散寫此歲暮心其三歲暮心匪夷哀絃久斷絶與子不殊調胡忍相訣别臨淄錦綺塲子去守饑渴願保金石志慰我腸百結五子二首曹王振大雅抗懷逐游龍江馬亦決驟連翩乘上風汪生何慷慨接響蒼雲中京洛五鳳翔矯然下梧桐和鳴正以則至音激黄宫叔世競蟬聒置爾荆棘叢上林逝若脱遐趾隨斷蓬素絲易以染姣女難為容行矣斂華飾達人有深衷其二太山五株松冬夏恒蒼蒼涼風旦夕勁聲聞一何長聲聞曷足貴所貴䝉雪霜東封翳隆爵俛首以徬徨何言帡幪勛乃見斤斧傷蒼顔日摧頺卒嵗増慨慷但令本根固繁條㑹有強依依女蘿草永言附遺芳安期生人言千嵗公昔在阜鄉亭賣藥青海上徒聞千嵗名雙畱赤玉舄珎重報秦庭東指蓬萊頂風波連紫㝠河津不可渡誰識安期生我昔逺行邁我昔逺行邁飄颻度溟渤洪波浩漫漫東下遍窮髮蓬山彷彿見鼇足互興没回瞻赤霞城照耀金銀闕道逢五行仙姣好若氷雪璘璘白鶴車翩翩逐雲月導我探魚腸迺得餐玉訣入山採黄芽和之以璚屑服食引奇齡秘訣不敢泄斂袵入懷抱三載字未滅歸來歴故都不復見物色回首望徽音徽音已斷絶桃花源不昧去矣忘其筏蘭陵贈王誕敷使君何處見君子蘭陵西上門坐看蒼翠色蔚蔚照熊旛爾本蜀中彦才如横海鯤余方閩地隱夢逐故山猿鬱彼風雲志澘然廊廟言並收𢎞治籍惟戀孝陵恩漢主親戎陣書生爼豆存迢迢去住意一與醉芳樽遊張公洞二首阮籍懷廣途盧敖歴四極尚慙壤蟲隘或哭周道阨伊余抱末衷迺泝二子迹北遊費歲年東歸睠幽賾豈不念窮路黄鵠有羽翮陽羡山水區西奠洞庭側嵒扉靡雜卉菌芝類盈尺昔有攝生者於此煉金液空筌夙所慕靈洞杳莫測寒泉滴不散千嵗成璆碧中有科斗書漫滅不可識朅來事㝠探宛若藐姑射豈伊耳目娛但恐霜露迫緬思縞鳳吹儻值紫髯客修觀竟十二累果及八百深功諒難期所志未忍息永服先聖訓至誠裂金石其二乘槎陽羡湖延覽銅官山山氣何氤氲飛崖鬱而盤西南有乳窟窈窕青雲闗倐忽啟靈秘傳聞赤符間七日混沌死鬼鑿永不刋神竅通十洲清淺呈琅玕𤣥陰伏其下六月氷雪寒仙䑕與石燕倒掛風雷壇仙人度羽去尚留九成丹爰有好事者裏糧澹忘還㝠搜了無得悵然回波瀾余亦採芝徒九載勤登攀九載在旦夕皓髮凌朱顔尚子既畢娶坡翁復營田至人貴遺形細故惡足牽與原侍御鄭地曹遊虎丘祝融氣已深行雲麗晴暉霜臺早見招驄馬來騑騑升髙目不極望逺神欲飛南風起木末吹我芰荷衣把酒白蓮池長談暮忘歸白日無却顧浮雲紛是非麟鳳在羈靮心事殊多違何當晤生公參破區中機汎舟五曲謁武夷精舍朝汎碧浪溪夕宿隱屏下洄湍激九折淜洑以東注丹厓寫靈竒怪者莫可悟豈伊神理秘諒有鬼物䕶仙術非荒唐宣聖有矩步㴑流無窮門直以夫子故依違尚友心謇謇恐遲暮終當據昭曠睠此結桂樹龍溪志士樂巖棲巖前幽鳥啼長風吹瀑布飛過白龍溪抵道桃花發花源處處迷古愁二解出門采棠花風吹隴山木隴山未可行荆棘傷我足一解隴山高以臨隴水阻而深不畏傷我足但恐傷人心二解偶書神龍棲九淵志在天漢表終始養神德用九仍初九安能逐鼃蠙泥蟠東西沼志士篇河伯誇秋水未知東海深衆人尚雷同安識志士心志士有苦心心苦道自舒上山思采玉入海貴探珠至寶非外假真詮豈予誣獨行何涼涼濶遵泝周衢雖無凌風翰睠此適國都升天而遊霧惕哉子大夫楊白華裊裊長楊樹青青埀白花楊花攬不住春色若為斜如何宫畔草萋鬱遍天涯邊人曲結髮事逺征能知邊塞情長騎汗血馬調戲郅支營大小七十戰金鼓夜自鳴稽首兩賢王大開受降城匃奴不可敵劍聲詎能平終生獨忼慨抗言請長纓渡峽凛秋行日夜短别去故里睠此有所思陟山復臨水重峽亘天塹下足頓逸軌回飈激伏瀾絶流渡濛汜西崦積瞑色翳翳斂夕靡所憂風波集擊楫志未已至人乘虛無君子慮終始蹈險乃真見履順有滅趾矢言涉大川勿負横江耻遊石竺巖少抱煙霞資雅志向林壑出門混世塵中逵反墮落聞道豈不早優游嵗將迫言就巫咸問敬訪何氏宅石竺敞靈界紫雲冒巖箔匪夢復匪幻乃見鶴上客長跪訴悃誠曰予動迷錯授我靈光劍斬斷妖魔色朅來無窮門灝灝見天德接手浮丘老感恩詎云薄乘雲凌髙丘永與世寰隔題集山書院大江貫蘄黄中有碩士居抱璧重一擲探元破羣愚偃卧大集陽悠然見蒼梧魯峰七十二芙蓉峻而都所戀得依托寧能去園廬衆山止其巔百川求其瀦不觀洞庭濶但恐周道紆白鹿有筌蹄衡岳空笱篘𤣥𤣥入疑始吾與爾為徒黄山雜詩十首黄山如岱嶽蘿山若梁甫曾顛遏行雲屼屼自太古咸池蕩初景昧旦河已曙我夢天都行笑折扶桑樹其二燠風熙自南淑景變物色引領望巖阜光寵徧林薄撫兹盛農節耦耕及南陌雖匪康莊衢良用歌帝德其三經始朗上原秬菽長如茨巖霏散叢薄谷風回春姿童伴歌以嬉苦樂中自知寗生聲慷慨乃作霸王師其四黄山奠南服􅰕􅀢分楚望連峰標天樞結秀極地藏金鷄時一鳴髙鳥不能上睠兹俯滄海窮嵗夢波浪其五藍田有嘉植種玉世莫比靈氣紛璀璨熠熠寰區裏玞碧奴視之琳琅乃支子不遇後車載終伏磻溪水其六回溪下釣緡溪水見我志緒風揚伏波波伏風不起中有雙文魚簁簁不受餌履兹釣鯨鯢掊擊東溟水其七園廬春欲至歲事此伊始采芳入層雲散髮不及理蠶眠桑柘繁土膏農務起龍鬬未敢聞巢父正洗耳其八硃灘流湍水壑龍無時吟水流木葉下宛轉歲序陰歲序倐以改丹砂仍費尋蓬閣儻可求去矣極髙深其九崇巒互經亘靈氛厰𤣥蓋天風散鼓鐘旦夕發清籟日晏紫芝茁山靜幽鳥萃真機秘心賞要在達者㑹其十停雲扃重闗蘿風隕天聲遐搆名山陽允諧真隱情詩書豁俗韻巖丘湛性靈鬱彼漆園篇聊用得吾生謁紫陽精舍竒遊歴四窮兹山負靈勝翠川玉篆繞丹巘璚花並浮桴臨星源仙踪煥雲柄圖經宛不爽神理杳莫竟緬訝開物初豈無稽天浸懷山谷就變赴坎槎交迸迹竒易讚揚歲深改觀聽朅來幔亭宴渺渺論神聖諒同武陵源去為嬴民病梵蜕昔所誹真函此須正所以紫陽翁不履黄庭徑逺矚悟氣機内照見真性永持哲士誡修身俟元命雪晴登闔閭城屯車闔閭城北風吹我纓殘雪輝逺山牛羊縮郊坰四望靖氛祲何以烽火明荆豫復梗化巴渝未休兵東方亂新定詎可言太平淮蔡連齊梁繁華轉凋零新鬼夜羣嘯貪攘日相乘闤闠少人煙狐兎行其庭向來膏腴地眼見白草生白草何田田不足飽蝗螟縣吏尚夏楚餘民死誅征我生夫何為罹此百憂并拔劍出故里捧心向明廷八月過沛水長路愁榛荆宵雨惻野哭晨風起鷄聲空日積悲憤豈不懷志誠承乏下三吳伏枕惟獨醒遭逢想馬周􅀢然慙匡衡客從北方來因之問神京狸鼪宣慢慆鳳麟多自屏荃蕙委厥美艾榝朝盈盈語罷各掩涕使我心逾怦捐珮遺故人畣我非衆馨媒拙終受詒好修誰共成吳儂亦有謡辛酸不忍聽東門有瓜塲予亦將歸畊遲遲俗士駕望望靈修情子夜歌三首梅花在嶺南儂歡在山東梅花歡所愛不得附㝠鴻其二客從海上來遺我雙鮫綃鮫綃是何物留此比璚瑶其三山有並命鳥闗闗感人心中夜有所思澄江不如深歲晏行終風薄旅衣遊子行天涯天涯行不息歲晏有逺悲出入盗賊間進退昧所之休駕入彭城身在猶驚疑問舍得所安聊慰兒女嗤故人皆鮑叔眷我情委蛇論文具鷄黍旬日以為期駕言東問津相送洪水湄中原且多難伊人復生離握手寫肝膽我舟行且維感此綈袍恩有心終酬知但恐喪亂後㑹晤無定時努力將奈何惟有長相思湖上太湖何瀲灔歲晏亦自好長風西南吹天水共皜皜遥峰七十二恍怳紅雲島洞天在空濛流水隔煩惱昔有緑毛翁於此采𤣥草至今白石牀風雲為持保聞兹生古心携艫事幽討良朋既同調逺客亦傾倒鼓橈乘黿鼉凌波擷蘋藻汎汎景將入黙黙意未了方壺不可問滄海恨無早歸循去時路木盡乾坤老羅浮四百峰贈湛甘泉編修還嶺南羅浮四百峰屴崱連青旻中有甘泉子頭戴玉臺巾伏火燒丹砂趺坐三千春下憫世溷濁飛舄京華塵西歴太行山北渡長淮津瘡痍滿道路此意長諄諄回思葛稚川睠言慰所親傾蓋姑蘇陽探春五湖濵更欲折梅花持以遺逺人相從不可得獨步采江蘋遊天平侯思道不至曉起發吳門遥望天平山秋風吹松濤入我衫袖寒白雲無朝暮好鳥聲闗闗良朋期不來獨遊心無歡駕言問名泉髙興猶未闌山僧導我入桂樹聊躋攀我眼日已飽我身殊未閒平生抱丘壑三十驅塵凡尚恐豺虎劇不敢縁其端願從華陽君五岳時往還居杭旬月遲王員外不克先赴閩州昔我違京師秋月始生魄今我離越鄙凍雪迷廣莫良晤無久期達節守駒隙與子同𣲖波復作中路拆上天黒猿嘯下水白蜃斥如何臨嵗晩迺爾事行役寒日下荒蕪雲林正蕭槭檣烏旦暮轉遂有川塗隔悠悠泬寥天切切風雨夕神交諒不爽萬里日親炙夢戴寅仲二首之子不可作壺公無春姿毘陵江水深游魂歸未歸風波闄汝東虎豹咆汝西北走限氷雪南征多蝮蛇年少死道路斯人更流離何以入我夢明我長相思萬壑真淼茫三泉苦􅀈䧅天髙猿鶴冷尚有鍾山疑其二交遊滿江漢誰復更如子讀書京華塵相看忍羇旅訴心風雨夕潦草各别去云胡大宛種一蹶千里路朝陟洞庭山山逺不可處暮航太湖水水濶不可渡精靈復何為白璧已黄土落月哀杜鵑切切復延佇寄思道二首中歲倦六籍出門事逺遊逺遊于何之五嶽還三洲一鴈雲中鳴訴訴如有求芒鞋嵗月晏得壘東海頭談文竟晨夕亦足銷吾憂相期每自勵志决天河流阨運當奈何捷徑不可由鳳鳥化梟鴟纍乎行當休南湖煙水闊去去狎白鷗失得勿復道上遡多前修其二闌雲翳日景埃風起拔木我前駝白狐我後舉黄鵠我生值巇嶮行止不可卜椒蘭擲道傍菉薋以為馥楚璞胡為爾和氏刖其足祗修防二兵古道何時復將子田商陰商陰有黄角虎丘與近夫太初同遊余㓜寡好尚所求在岩巒青鞋白接䍦濩落三吳間良朋偶云集結我以歲寒殷郎自東海孫子自函闗霜月明楓江駕言虎丘山歸雲擁絶閣下視空塵寰騰身慕黄鶴延年愁金丹願言事支遁孟浪烟霞端悼志豺狼立道周行旅限東西我生理酸楚歲暮猶麻衣盡室出故里生涯多差池萊妻對我啼稚子日受饑形容飽風雪摧折非平時世事就澆凉吾道將安之三韓在何處黄金不可為焉能有羽翰飄去從安期役役役役不自息旦夕白髮新衆非紛往來誰能超世塵早年失所依迷誤三十春讀書不聞道空負見在身伯夷北之海宣父西問津行藏各有以予將希其倫青袍豈心事白雲終我鄰罷官亦何難去去完吾真陪王中丞夜遊治平期到上方不果湖上興不極復治東山具執策入治平繁霜濕衣屨山僧不好客髙卧闔庭户清商動木末靜聽不知處遥看上方勝子夜發襟素情長事乃違咫尺不得據月落空歸來寒猿挂深樹吊古戰塲昧爽發汾水崇朝經白溝茫茫古戰塲四時天為秋斷魄化腐草精靈化寒颼英雄不可招世事如東流惟有戰士骨萬古無人收依依野草黄惻惻行人愁行人愁未己四海方戈矛謁李延平書院緑槐夾青山中有古書屋行舟劍水濆弭棹叩芳躅長風薄衣巾六月無三伏先生萬古心一旦付雲谷通來四百年民用如菽粟溪山發幽想吾志尚鴻鵠下有清泠泉一飲成三斛石湖夜泊懷近夫思道二同志移舟石湖路敬訪石湖水湖光上衣白夜景正如洗疎星散明珠淡月在湖底趨橋納微風沿潯搴芳芷美人不可作吾道滄波耳歲晩誰與期棠陵石川子陽山與方思道同遊書事晨光淑初夏野意招遊蹤策馬陽山行所親逺來從下馬結桂枝道穿白龍宫藉彼宫裏草乘彼桂下風渴飲丹井泉泉甘思慮空希君遺人世相將尋赤松虎丘懷古嶻嶻虎丘山盤盤闔閭墳墳頭閲古蹟劍池三千春蛟龍水中藏白日嘘煙雲圖王事已空萬骨成灰塵湛盧南入楚神物焉能馴不必賣薪女王氣已湮淪冬日與顧九和殷近夫孫太初顧與成遊太湖漫漫五湖景役役百年客霜容舍廣墟申椒不勝摘葭管復氣候歳序莽消息羣山一何蒼逺水一何白燕臺既迢逓𤣥圃又懸隔終當吸沆瀣去去結松栢秋日尋友清溪用韻深秋足爽氣蓮社有雅集我從西丘來蒲龕蹔棲戢清溪在城市八月違暑濕褰裳涉溪水水芳遲余挹庭菊未吐華亦有翠可拾悠然發遐想西風鳴鴈急虎丘與思道同賦西郊下木葉商意殊不惡舟輿滯虎阜言覔方外樂招㩦心所歡日暮倚髙閣沙彌事簡澹菜飯謝杯勺雲霞閣外留野興忻有托相期無奈何歲晏與俱作感興二首仰觀北斗星遥望北斗城天上故歴歴地下何溟溟中原萬餘里數載風塵驚憂悲直愬天聊以舒我情情長天更逺矯首看鴻㝠其二天河白如銀隔水處牛女咫尺不相從烏橋渺何許年年只一夕倉卒修雲雨金鷄催早發回車不得住含啼理支機尚悔當年事亦勝參與商睽離永終古題白雲泉亭子白雲在亭上清泉在亭下我本山中人來結亭前樹雲泉甘且冽予心永終慕塵機久未息禪機當早晤芬華隨髙秋淹留歲云暮盈盈丹棘花壽張母盈盈丹棘花歲寒麗奇姿樹之髙堂背日有春風吹物貞本則固凝霜不能欺佩兹曰宜男采采心自怡駕言贈佳人金光以為期和思道取友天下半今得方子焉為官不受羈修身將到仙葉縣王子喬勾漏葛稚川明年適百粤期子羅浮巔菖歜二章贈鄭于漢菖歜何葱葱乃在澗之濵歳晩開九花世人不得紉秘之嵩山隂以竢九疑君念彼蒹葭草芊芊彌廣津其二菖歜何青青乃在山之隰歳久生九節茹之可絶粒華滋謝秋風憐爾固獨立吾將舎芝苓薄言采芳苙天台二章為應節婦賦天台有方竹歴歴山之嶇奇姿奪春色標節方不渝天寒氷雪繁清隂固自如南方有佳人貞心與之俱其二天台有方石光潔宛如几大者何嵓嵓小者盡齒齒不是雕琢力豈無神鬼庇南方有佳人貞心與之比少谷集巻二
