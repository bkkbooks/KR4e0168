body:
  text: 少谷集巻二十五附録下詩辭類少谷子行何景明少谷子在武夷之山二十抱策扣燕闗朝排閶闔暮湖海九霄萬里身飜攀豈徒聲名冠帝里要使蹤跡窮人寰朅來京華始一識意氣形神兩相得肺腑真成水石痼辭章亦帶煙霞色龍姿鶴性不易馴海思江情浩無極頃將東遊觀岱宗便欲下泛滄溟中鼉風奔浪巖洞黒鼇日壓山樓觀紅南浮江淮覽吳越復上㑹稽探禹穴去鳥情生雁蕩雲飛虹夜躡天台雪波濤窈渺岑崿移遍訪名山入武夷仗劍不憂百怪出采芝或得羣仙隨只今妙年始三十辭官讀書志何逸九曲煙花對草堂三山蘿月開芸室已㸔鳯凰在千仭回首驊騮空萬匹八月髙城氣稍勁流鶯木葉交相映燕山遊子落日吟海邊歸客秋風興他日遥尋少谷峰武夷莫作終南徑得鄭繼之書鄭生湖海去髙興渺難降累月音書數清秋涕涙䨇天邊登越嶠雪裏渡吳江萬里千山暮何時到爾邦寄少谷山人二首武夷九曲上仙庭錦壘青天萬仭屏下望神人釣鼇石北風吹霧海冥冥台嶽中峯綵霧生石梁遥挂赤霞城仙潭尺素傳雲鯉報爾今尋華頂行寄題鄭少谷園三山今有鄭公園避俗從來亦避喧蘿竹青青垂谷口花林靄靄覆桃源天邊鴻雁春寥廓海畔蛟龍晝曲蟠南斗尺書招隠意白雲叢桂幾攀翻送葉生還閩中兼懷鄭繼之葉生行吟燕市中葛巾麻鞋歳將晩兩都為客今始歸五岳尋仙不辭逺江南畫舫春栁低海上茅堂白雲滿谷口如逢鄭子真為道棲遲未應返贈繼之薛蕙長安城中不可留風塵日日使人愁上書解印我將去拔劍出門君且休五岳登臨幾兩屐三江來往一扁舟東西南北好行樂與爾相隨萬里遊逺游曲十首贈鄭繼之并序祠部鄭少谷以病謝歸烏石山中先將抵杭訪天台四明諸山南循浙江望閩海而返余壯其行賦贈之烏石山中想紫芝少谷先生歸去時贈君試作逺遊曲較似仙人碧落辭闕下屢移稱病書知爾不復少躊躇海上但留䨇玊舄山中誰見五雲車五岳之山君遍過名山不比浙江多赤城直上仙人闕天姥斜連織女河赤城宛轉石為梁雲裏振衣千仭岡聞道台州老大守為君先已築丹房太白山人髙士流十年不出卧滄洲爾去相逢託相訊南來儻許共扁舟越中㑹稽天下無金城玊室是仙都即向山陰覔芝草還從禹穴探靈符丹山赤水足華滋雁蕩龍湫更自奇招隠頓憐君去早移文應笑我來遲鏡湖緑水畫難成五月南風菡蓞生越女舟中歌白苧道人醉卧酒船行海門東去片㠶歸却傍三山開釣磯人間物色那能見空向青天望少微天地經今幾刼灰區區人世只堪哀莫漫著書抛歳月徑湏餐玊訪蓬萊鄭繼之舘内積雪為小山戯作長句君不見少谷子饑寒卧病長安裏長安臘月雪一丈怪爾朝來何技癢凌晨掃雪為小山數峯突出忩户間我時過門訪子入子也階前荷鋤𤣥亂垂㪚髪雜塵垢斜挽短衣半沾濕憶子前年覽吳越東遊四明尋禹穴慣矜赤脚踏層氷苦覔黄精劚山雪平生好竒心未已今朝作戯聊復爾斵氷積雪止俄頃走海驅山宛相似仄崖崩壁色悽愴玊膏乳竇陰森爽磊砢初驚大禹鑿成削飜疑巨靈掌君不見五侯甲第當此時紅羅斗帳流蘇垂銅盤燒蠟綵雲㪚玊袖拂靣香風吹吁嗟如子何為爾低睂蹙額凍欲死酒酣歌贈鄭繼之地官孫一元司徒之官不可求早年通籍金閨遊青袍只今厭奔走兒女衣食泣道周屢見文章出翠釡未聞廊廟登天球郷闗萬里望不及風吹離思江花愁野人勸汝蚤歸去塵埃骯髒難為儔朝廷嬖孽未除盡早晩尚有巴蜀憂氷雪照埜驚歳暮行人烽火多阻修天狼出明東海岸哀凰獨呌西康州酒酣對汝不料事為此長歌歌未休鄭繼之埊官久不過湖上奉簡怪爾狂吟客不過湖水濵寧遭官長罵莫得野人嗔雲外烏藤杖花邊白鷺巾相看只自好空送月華新寄鄭繼之少谷平生友青雲半載離豈忘吳地客不寄雁門詩嘯傲定何日經綸須此時後期解朱紱同飽九莖芝夢鄭繼之不見平生鄭廣文風塵側望隔青雲殊方物色偏憐客雨夜燈花頻夢君隔葉山鳩髙自語避人江鸛獨為羣眼中此日堪惆悵塞北音書久未聞送少谷子繼之少谷山人去不返洪河素舸坐長空一官卧病菰蒲裏萬里看山烟霧中海内談詩名已動夜深説劍氣還雄闗西野客應憐汝君有當年季子風鄭繼之新着小烏巾訪予作詩戯贈道人相見一笑同烏巾自製誇新工禮數懶慢政着我山林風流今愛公眼前物議一時事溪邊自照䨇鬢蓬接䍦倒戴間紅羽何當江上尋漁翁憶鄭繼之年來苦憶鄭夫子獨坐幽林興轉孤晶晶鷗羣廻晩日青青菱葉㪚春湖何時共採金鵝蘂此日君猶銀符一笑滄洲終自去那堪風物眼中殊㑹江與繼之聨句張天顯海門潮入風初勁山脚雨來雲更多巽所龍起烟江船背濕泥封石竹麝香過繼之旅懷落落衘杯酒野景蕭蕭一浩歌巽所倚櫂殷勤問漁父東南消息近如何繼之山行與繼之聨句三首籃輿遝遝作山行野鳥林花不識名巽所出洞烟嵐遮嶺路愁人雲樹足江城繼之錦囊不盡摛雲思綵筆常含題柱情巽所醫國有魂招未得終軍何計請長纓繼之東郭西郊耨草天江南行客飽雲烟農家三兩不成井繼之樵擔往来自作聨泉落竹根寒潄玊巽所苔生谿徑緑鋪錢飜憐病骨禁愁陣一嘯松風過大川繼之富陽江上水衝潮兩耳漁歌送寂寥繼之鴟革當年歸海上羊裘千古在山椒巽所沙頭蘋菜還堪薦水國忠魂不可招繼之長嘅扣舷和逸調乾坤空濶鬢蕭蕭巽所凰山與繼之聨句偶上林臯覽物華東南形勝此為嘉千山北走三吳盡巽所一水東歸百粤賖芳草郊原新第宅繼之夕陽城市舊桑麻傷情莫説宋家事巽所猶有臨春剪綵花繼之出杭立秋次日與繼之聨句水國金風釀早秋繼之碧梧辭葉下滄洲波光雜雨入書舫巽所雲竇滿空妨旅眸蠶繭已成桑柘老繼之柞烟初發稲粱收横江忽聽一聲雁巽所帶得闗西消息不繼之送鄭繼之歸閩余門人也傷心嗟莫説南樓離思匆匆又薊州鷗鷺蘆花成午夢雲山江月伴新愁太元語塞侯芭壯縞帶情輕季子酬霜葉西風来日路獨憐任昉賦交游南樓舊讀書處菖蒲水冷菊花黄握手其如别思長敢謂傳經擬公穀應憐作賦似盧王鵲巢未就風偏勁狼鬛頻張月自凉君向南行吾在北髙山流水永相望少谷子歌有引王廷相閩士鄭繼之詞人之豪余聞之未覩也偶覽其遺集有及余一詩云海内談詩王子衡春風坐遍魯諸生我昔傳聞薛吏部為君遥式洛陽城嗟乎繼之念我深矣生也吾不及其㑹沒而見其文已恨失繼之况􅊭生有詩念余恨當何如耶乃作少谷子歌酬之焚其稿於燕之郊望閩海而再拜少谷有靈應鑒吾意藉此神交慰我良友君不見斯文天挺鄭少谷詞林閣筆推長雄六鼇之力戴九土昆崙拄天髙穹窿左日右月抱兩丸象緯烱烱羅心胸文成直與元氣㑹思渇一吸滄溟空青蓮豪逸建安骨力挽古格追鴻濛少谷子紫薇宫闕遊不盡却下勾陳徧南北日觀振衣盻東海雁蕩天台幾眠食太白山人許相交時人碌碌安能識少谷子汝初抱策升明堂余已跼蹐流海荒南天北極渺雲霧紫宸黄閣空相望彼時才俊遊帝傍信陽之何棠陵方大梁翩翩李川甫吏部薛生尤擅塲我也豈堪天下士君胡念之垂篇章少谷子古来神交隔山海安俟目擊道乃在覽吾詞翰魂夢飛萬丈紅霞㪚天綵少谷子人生電掣湏臾爾惟有文章流萬禩眼前得失浪悲愁富貴勲華盡泥滓少谷子人言海上多神仙羽人不死常朱顔誰其獲者王子喬七月七日来人間君曾學道叩𤣥牝吹笙驂螭應未還為君一戴雲華冠再拜贈君䨇玊鬟贈少谷子别四首傅汝舟首夏氣恢台草木紛苞長芳蘭被洲渚嘉植翳茠爽逝節悲已滛邦媛浩遐想悠悠京華道泛泛岊水槳岊水吹景風輕槳去若失朝發芋原江夕宿水口驛濶遵泝劍津湍石衆溘崛雖匪蛟龍驚情用或怵惕怵惕情自怡人心重險巇嶮巇不可近傾仄孰為支豺虎委牀帳父母宿瘡痍行矣茂道力擗哉壯士悲壯士無還顧離析歡絶端狂瀾殺隄障歡端何繇敦修門切重入衰房隠層巒煌煌三靈芝遲爾同加餐喜少谷歸一笑春初盡南歸意已勞王風時不競人事日相髙雨濕菰蒲氣風生鸛鶴毛柴門近湖水知上釣魚􅀈冬夜接少谷子京使有懷一室風顔逺中宵月色殘近前問来使别去作何官獻納朝還隠氷霜國正寒焚香先帝日莫掛武門冠元夕同少谷登鰲頂為余作據石圖下界燃燈夕髙峰接手行始知人代裏不及化王城夜色虚明滅禪心澹送迎異時對圖畫片石最含情白龍洞少谷子題名處城西小洞伏屋側苔深車馬塵尚抛清泉何心亦避客白龍與世本絶交林楓妬菊倩斜日溪霧逐雨争低㘭遲廻忍讀鄭䖍字歳暮旅倦饑熊咆送少谷上南都岳立嵩衡竝身纓舄紱踈乞歸三疏日多病一官初載出心應苦中興道不虚黄金懸駿骨知上玊階除鄭少谷吏部詩傳鄭吏部清廟歎朱絃流作南閩𣲖光爭北斗前山中官自逹海内友多賢伯氏忌交久憐余喜執鞭暮泛白馬湖懐鄭繼之林春澤返照明春湖片㠶輕烟裏長空絶鳥飛汀洲見芳茞美人望不来春暮吳江水西湖次鄭繼之韻湖上尋春事天涯泛梗同角巾山寺晩白馬栁堤風澤國吏情逺帝閽愁緒中未能從逋老莫擬哭途窮憶鄭繼之少谷吾憐汝形骸亦已忘飄揚四海志嬾漫十年郎玩世惟青眼歸山有草堂且從金馬隠與爾共徜徉次韻答方思道見寄兼懷鄭繼之張道宗遲日思君子招携汗漫遊客疎嫌地僻官冷喜春幽青草風烟暝空庭燕雀留何時拉張鄭披豁話林邱病中懐鄭繼之二首抱病秋光老懐人不可攀何時同避地羡汝蚤歸山興逺江湖外名髙天地間芳隣吾已卜為掃白雲闗衛川分手去濟上寄書來白鴈秋天沒黄花逺地開山翁迎舊侣朝士惜髙才安石終當起蒼生重可哀答鄭繼之聞薦聞道采薇去山中避薦書弋人何慕鴈漁父竟登車驄馬開賢路客星明太虚長安雪霰霽遲爾到天衢大悲寺次鄭繼之韻故人萬里去倦客亦思休悵望滄洲逺遲廻野寺遊閒雲依淨土爽氣似清秋霄漢慚孤鳥人天意白牛哀詞長激烈歳月秪淹留擬約鴟夷棹滄波天際流雨中憶鄭繼之草堂獨上孤亭憶草堂野雲度峽望微茫鷓鴣啼歇山横雨白鷺飛來水滿塘病起尚縁詩思痩秋髙偏為客懐忙翠旗峰下吾廬舊何日林陰掃石牀喜鄭繼之青野堂成茭湖青野草堂新萬里䨇魚慰我真録事無貲堪寄逺裴公未老便投身紅塵走馬慚羇旅滄海㝠鴻笑弋人天上春風正遲汝白雲他日結芳隣夢中懐鄭繼之得江上漁舟忘歳月雪中鶴氅似神仙之句覺而足成塞雲飛鴈下遥天旅夜懐人入夢邊江上漁舟忘歳月雪中鶴氅似神仙南宫文物思前軰北塞風塵異昔年木柝淒淒霜月裏故山何處意蕭然次鄭繼之南湖舊居鄭鵬使君湖上宅靣靣俯淪漪魚鳥酬相狎烟雲靜與期畬人供谷蝀漁父課鸕鷀一被塵纓縛悠然繫夢思送鄭少谷之留都林庭枝湖上逃名獨養髙彈冠此日聖明遭宦情已似錢郎薄詩興猶如杜老豪雨後菊花含别思風前木葉㸃征袍仙舟無那飄飄去愁對江湖首重搔答鄭禮部繼之顧璘寥落混風塵憐君意獨親同吟山郡雪稍醉帝城春海月通幽思宫鶯咤逺臣期尋石梁去還待謫仙人雪中鄭少谷黄石龍過郡大雪滿山城驚聞屐齒聲本非安道室真接剡溪情小閣梅花笑寒燈秫酒清相看興難盡樓鼓下三更送鄭繼之歸鰲峰四月燕山雨雪寒省郎多病復辭官路經海上三神島興在仙人九轉丹玊洞桃花留笑靨滄江秋水濕漁竿爾家谷口空長往安石東山望未闌夜坐鄭子宅彈琴王廷陳言訪少谷子呼童携素琴為發絲桐趣俱諧山水心徑轉松篁宻堂虚風月侵再彈