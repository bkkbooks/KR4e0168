鍾輟太音江門空老我落葉滿秋林零落辰星後斯文失主盟病多憂國淚出為薦書行宇宙浮精爽江湖問姓名彭殤非夀夭不朽是長生峴水秋仍社招尋不見之星河成永訣涕涙倍交頥命苦賢人短天將吾道衰茅容黄幹意獨向月中悲哭少谷年兄先生陳墀痛惜鄭夫子髙才與命妨道因儒術重詩遍士林揚今古修文地乾坤傀儡塲不堪生死别涕淚滿衣裳廿年同榜客一别幾經秋我愧留徐劍君應賦玊樓江流終古恨霄漢此生浮悵望南湖路風烟黯不收邳下遇少谷訃王希旦逺訃臨深夜長風悄客燈病魔回玊女道否失金陵雲谷心長在杜陵壇可登此生寧化物天地寄除乘哭鄭吏部繼之王昺少谷真死矣傳聞久尚驚文章憎爾命造化忌人名出處道何愧經綸志未亨獨餘遺稿在山岳共崢嶸少谷墓下雨夜感懐傅汝舟良友竟亡悲鳯死遺編雖在泣麟窮休論十載追趨地只漫千山夢寐中青草漸生今日雨白楊時動故園風撫墳豈稱酬知已愁絶春原薜荔叢冬日過少谷墓下高瀔一自玊棺葬西麓歳寒空為掃楸梧心悲白日猿偏哭氣逼青陽鳥亂呼生死丈夫元不二妻拏友道竟何孤終傷泉路同幽憤未信人間有至愚和髙子過少谷墓韻汪文盛岑寂買山增感慨艱難營葬力枝梧梅亭碑在秋猿嘯青野堂空暮雀呼義重遺言猶在耳心慚白日敢欺孤百年公論終難冺萬古人心不可愚過鄭少谷吏部墓徐熥荒墳不計年過客淚潜然朽骨藏於此吟魂何處邊野狐啼暮雨石馬卧秋烟安得斯人起重令大雅傳西郭塜纍纍經過下馬誰先生一坏土詞客百年悲藤䕶將崩石苔封未斷碑應知靈爽在嘆我不同時又陳薦夫寥落野城西悲風亂鳥啼荒墳樵䜿識豐碣郡侯題磨㓕名猶在榛蕪路欲迷尚餘靈秀氣長此伴虹霓梅亭多舊隴獨識此間墳諫草傳青漢詩名戾白雲骨應何日朽地見幾家分東里西華意蕭條不可聞又徐􅎾昔賢寧復起大雅久無聞黄土空銷骨青山不葬文精靈沉夜月吟咏冷秋雲詞客應相識詩成墓所焚風流山吏部白骨閟泉扄異代思相見千年不肯醒松楸䕶靈氣川岳暗文星墓隧何人掃遺篇又殺青又陳仲溱詞客去不返荒邱空暮烟亂藤纒古隧落葉壅寒泉恨不同時見徒增異代憐青山多白骨獨識大夫阡挽少谷吏部馬陞未識人宗靣詩名已慣聞梅岡三尺土少谷一堆墳可是天生數應憐鬼作羣縹囊餘舊業不忍讀遺文哭鄭吏部繼之陳沂少谷美自匿吐氣常不勝鬰思不易發抱萼丹艶凝無意向珪組蕭㪚結儔朋明星忽晨隕悲歎撫吾膺過鄭吏部繼之墓陳椿才名稱吏部遺墓委郊原起草孤忠盡摛華雅道存秋風愁立馬落日慘啼猿誰掛延陵劍枯枝灑淚痕邱封臨野嶠登陟想伊人路聽樵童入碑看處士隣生芻一以薦宿草幾經春歎息殘編在悲歌倍損神墓與傅汝舟為隣梅亭過鄭吏部墓陳鳴鶴孤魂長不寤灑酒對荒邱生死人千載江山土一坏夜臺寒薜荔春雨暗松楸他日滄洲意從君地下遊過鄭吏部繼之墓鄧原岳繫馬梅亭下懐賢落日邊蘭摧仍此地鶴化是何年草已沒殘碣雲還迷舊阡臨風一掬淚感激向重泉過鄭吏部墓袁敬烈落日暝烟收凄凉閉一邱生年無四十姓字有千秋孤嶺寒猿嘯空山過客愁可憐風雨夜蕭瑟是松楸空林閉白雲深樹易斜曛詞客當年淚先生絶代文藤蘿牽斷碣狐走孤墳向夕悲風起凄凉不可聞讀外曾祖鄭少谷詩陳勲風騷久不作大雅日已斁聖代儲元精含耀鬰未吐自從洪永來作者紛馳騖體裁非正始色澤勞雕塑皇皇成𢎞日輝輝奎壁聚北地抗前旌信陽繼高歩鄭公參其間同聲乃響赴公也東南英道真夙所悟七星羅心胸明月開寳璐古意逼鼎彞正音發韶濩二十登省郎蒿目籌世務豈繄驚俗文緬懐濟時具皇圖值中微國事方多故攙搶直紫清九土風塵暮公時諫羽獵抗疏天爲怒且辭北闕雲歸卧南山霧波沱憂國淚一一沾毫素千秋杜陵老餘子不足數性本愛名山靈境窮杖屨萬一遇安期白日生毛羽長卿苦抱􅍚尚􅊭須畢娶服食願多違徵書飛已屢終懐子牟戀敢忝南陽顧病纒劍水舟劍瘞城西墓文章滿穹壤鬼物亦可䕶麒麟翳鳯凰有識誰不慕如何蜉蝣者乃欲撼大樹萬古江河流徒嗤爾曹誤小孫抱微尚燥髪誦佳句懐公青野堂頻望南湖路斯人今代無天地莽廻互過少谷先生桑苧園林滙廿載曾傳有此園離城十里不聞喧南湖舊隠行人少吏部髙風故業存桑苧影疎池水涸薜蘿陰宻稻花繁書籖藥圃歸何處惟見江鷗日到門過少谷先生南湖故宅髙兆康陵久已終王氣吏部長留一草堂春色南湖空悵望浮雲北闕好悲傷階前芳樹飛啼鳥門外青山過夕陽回首當時此遊讌詩名吾祖忝齊行予從祖石門公與先生有泉石之契弔鄭少谷先生墓陶澂漢代直臣推汲孺先生遭主不同時廻鑾事業空餘骨竝日聲名總付詩春草岸旁樵采盡夕陽天外雁歸遲行吟獨苦真無頼但欲逢人哭斷碑墓石近為盗所竊鮮有存者過少谷先生故址許珌吏部風流昔莫當歸來三十厭為郎曾傳諫草廻龍狩尤羡詩名絶雁行廢埒土花團曙露荒林石鼓咽春陽聖朝耆徳悲湮沒無復南湖舊艸堂又陳日浴鄭公隠處傍南湖龍首橋邊故宅無空地悲風惟蔓艸寒林落日只啼烏聖朝有道全耆舊大雅中衰重楷模寂寞不勝今昔恨幾廻吟望獨躊躇又王子彪曾聞吏部南湖隠十載幽居似子真碧水青山甘自老海鷗江鸛日相親中朝久切蒼生望一疏終全烏角巾故宅已空時代異到來吟眺獨傷神又陳遴吏部幽棲何處尋越王臺下白湖陰荒墟歳久從殘草落日風悲滿舊林畫省曾聞多補衮滄洲已分早投簪至今客子空搔首不見斯文感慨深又陳九臯表閭通徳識名門林壑清風尚有邨遇世青雲登獨蚤致君丹檻折還存荒墟日暮供覊馬寒雨春淒送斷鴻我忝文孫姻婭誼一來慿弔幾傷魂讀鄭少谷先生集馮祖快儒臣風節至今傳抱質懐文竝古賢封事幾騰留正氣才名獨歩憶當年時危總擬歌招隠道直何妨欲問天更羡後人多繼起表揚大業有遺編讀鄭少谷先生全集余颺少谷山人杜甫流片言隻字重千秋七經剞劂多新稿屢換宫商合故謳萬丈光芒騰日月諸家評説比墳邱斯文未䘮填河岳自有名巖定去留吾閩詩盛永洪間十子已登高啓班獨歩江東推少谷頡頏北地屬三山黄河積雪氷凌動幽澗攢巖石骨斑此皆評先生詩品攬巻悠然思古道景行殊自愧愚孱鼇峯頂上昔曾逰丰采遺風嘆莫求驟諫突逢明主怒掛冠歸與洞仙遊遺文留作髙山秘故魄猶驚北寺收天壤令名公自得拚飛小鳥㸃佛頭六飛馭輦勅南乘斷靷宫門恨未能臣節不隨草木朽諌章直共雪霜凌當年時事真天寳不覺歌聲逼少陵慿弔遺編多感慨百家異說等蟲薨董賈才名昔少年歩莊驟左盛無前執言忠孝生成史抗志烟霞蛻得仙五福文人難具備令名後世自當全至今同作文章看尚有英風啓後賢又余佺孝武兩朝多作者扶輪掉鞅逢大雅西涯老子首蜚聲臺閣雍容鳴韶夏北地崛起覇詞壇手提牛耳不肯下同聲酬唱徐與何雲衢并轡馳天馬當年海内正昇􅊭東南竹箭秀羣英閩海雄風壓吳越少谷首繼何李鳴赤城霞起映天表黄河氷積鬰峋崚崆峒山上武夷頂萬丈光芒共抗行我嘗追覽誦遺集荆玊隋珠珍什襲一吟再唱有餘思忠愛淋淋垂篇什世人不解讀公詩遺篇歴亂恣評譏無病呻吟异天寳千秋耳食真可疑君不見南國翠華去不還年年黄竹望囬鑾手披赤章奏金闕長安一疏鳴鳯鸞復不見䨇袖歸來風莫莫鼇峯山頭人綽約陸離長劍華陽巾先軰風流今不作噫吁嘻綜公遺事讀公詩如公真不愧拾遺千年詩案談未易細與後人討論之雨夜讀少谷公奏草有感侄夢麒展巻餘春夜思公半雨天憂時甘死諌樂聖乞歸田㪚髪南湖上行吟青野邊堂懸惟舊榻藥裹半書籖漢主徵逋久長沙起少年愛君西北向返素武夷前廻棹寒雲冷空堂暮靄連龜魚非故主燕雀傍誰飜按古堪千歎哀今每百泫何人當接武收拾茂林阡哭少谷公侄孫日近執㦸歸何處魂招未有蹤乾坤一死盡事業半生逢此日搜遺草他年憶舊宗人琴不可作䨇淚掛堂封恭讀少谷公集有感𤣥侄孫衍祖憶昔吾宗全盛日文章冠蓋動京華祗今海内稱才子猶向閩南溯世家司馬著書終自序陸機先徳應堪誇漫言率祖源流在敢擬當年杜浣花謝諸公題詠𤣥侄孫磊先朝吏部家乘逺故宅虚無野水濵江鸛自當門徑浴林花空傍土墻新諸公不鄙遺佳句顧我無能忝後人廻憶武皇南狩日諌書尚在淚沾巾感詠少谷公集𤣥孫芳標湖上簪裾固自繁睠懷吏部讀書園三朝忠孝文章在千古才名俎豆存雪滿柴門餘舊跡水深村溆長新痕祗慙祖徳真難述展誦遺篇每斷魂過少谷公鼇峯草堂有懷元孫芳楷共道鼇峯勝登臨半不禁地靈留古蹟堂廢入林深芳徑思延客餘香憶在隂陟巒頻顧睇緩歩細沉唫不盡簾櫳杳無窮文藻森南湖培世澤書劍百年心讀少谷公諌草偶感五世孫睿吾宗自昔擅文風節義爭傳吏部公二阮瓊林同寵宴千秋諌草抒精忠方知許國襟期素不僅專家字句工薫盥祗今開巻讀宛如謦欬在空中祭少谷公墓感懷五世孫克燦春風罨靄䕶梅亭碧草芊芊一望青幾代鴻名光史册兩行華表聳荒塋鷓鴣啼處聞先訓杜宇聲中感舊靈深愧未能繩世徳祗循蘋藻露霜馨少谷集巻三十五
