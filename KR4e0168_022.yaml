body:
  text: 少谷集卷二十二明鄭善夫撰論著經世要談刻在性理㑹通應迹以委順為主然必明於人情物理然後能委順可以接人處事無事理之障矣委者除事障也事障只是情欲順者除理障也理障只是意必有生皆為物所引故當委之有身又安得無事故當順之委而順之則雖應物實未嘗有物也委順必先於明理修身必先於格物也動若水靜若鏡應若響委順也動若水者可行則行可止則止行止無心也靜若鏡者物來則照物去則虛空洞無物也應若響者大扣大鳴小扣小鳴不扣不鳴也若鏡無意也若水無必無固也若響無我也靜坐飬元神元是吾儒底事世儒槩闢為仙釋却去作下半截工夫虛勞一生却無箇著落識者又欲假仙釋靜養來立腳而後去反到吾儒上豈是道理習氣不除如何了道習氣如蛣蜣但知有糞丸堅不肯放也有物過眼必看有聲入耳必聽小小入意即喜小小拂意即怒小小利害即生恐懼皆習氣也人只有自愛之私便自天地閉賢人隱有氣節者便自愛其氣節有事業者便自愛其事業有技能者便自愛其技能有文學者便自愛其文學如此便狹小了人莫不自愛不知自愛反是自害人但能看此心與天地一般便有天地變化草木蕃底意思則凡氣節事業技能文學見之猶笱屣耳是之謂大愛其身人只是不曾存得真心真心無一毫氣質才惹氣質便是私意私意潛伏在內人多不自覺只說我能去私去蔽一旦心不存便依舊發出來如人戒酒不真知酒之决能殺已才戒一畨他日不覺牽迷將去周江郎云無為名尸勘破幻妄也無為謀府無思也無為事任無為也無為知主無知也然須定得性了方行得四者不然實行不去莊子曰吾以無為為樂矣又俗之所大苦也太顛曰衆人而不思不為則天下之理幾乎息矣應事接物只是一箇情字為纍若無情則無纍矣故曰聖人無情吾輩學問貴包荒韓魏公一生只是包荒故能成得相業吳遣二才士使蜀武侯甚偉之後二人伏誅武侯云此人只是黑白太分明吾輩只以天地為吾一心何所不容中間自然物各付物今人才向學便分黨相非抑何見之小也元東陽鹿皮子謂秦漢而下說經而善者不傳傳者多未善淳熙以來講說尤與洙泗不類嘗自謂明月之珠失之二千年乃獲之牧竪之手其言曰神所知之謂智知天下殊分之謂禮知分之宜之謂義知天地萬物一體之謂仁禮復則和之謂樂國家天下一枳也枳一爾而欀十焉枳有十而一視之其於人則仁也發而視之欀有十其於人則君臣父子長幼之等刑賞豫奪之殊所謂禮也視十為十者禮之異視十為一者仁之同天下萬殊之分視聽言動之宜所操者禮之柄耳鹿皮子却是獨到之學謝顯道自負該博對明道舉史書不遺一字明道曰賢却記得許多可謂玩物喪志謝聞此語汗出浹背明道却云只此便是惻隱之心及看明道讀史又却定行看過不差一字心甚不服後來省悟却將此事做話頭接引博學之士此項意思極難分别此便是王霸之分學道是意誠意誠如救頭豈以喧擾中止古人耻其君不為堯舜耻其民不為堯舜之民必有是志方做得光大事業孔子謂管仲器小管仲功非不髙為其元無是志故所就只如此耳行義逹道古人多不如志寧甘死蓬蒿而不悔者謂何須要識得此義人不可剛愎自信剛愎自信即是自絶誰敢語以至道凡人有才氣而復虛已下問者實大難得防身當若禦敵一跌則全軍敗沒愛身當若處子一失則萬事瓦裂涉世甚艱畜德宜豫布人以恩而外揚之則棄教人以善而外揚之則讎正德十六年朝中諸君子諌南巡罰跪五日燕山衛都指揮張雲托以黑帝語欲靣朝廷云南巡决有禍文臣忠諌不宜加罰時權奸朱寧逮之使不得前遂刺胸以死諌竟係之獄論重辟不協有㫖杖八十邊方編管杖畢猶彊步出東長安仆死朝廷亦竟以南巡大行如其所托云於乎今日權奸何在張雲赫赫有生氣矣自古刺史鎮臣得自辟其參軍記室擇其賢者薦之於朝廷然後大用之此法最美刺史據聲望以辟人凡部下之賢者鮮不就辟故多得人亦鄉舉里選之遺意也後世科舉之制行詞章之習盛繇是人才混淆古意落盡矣君子貴通天下之志疾惡太嚴則傷公明之禮舊習一處消百處消即致曲一處得百處可得經世要談遺世間一切聲色貨利令人行尸走鬼當如利劒一切斬除之釋氏所謂今日有此四大可以說七道八他日四大滅除却向何處安身立命伯子云凡百玩好皆奪志至于書法于儒者事最近然一向好著亦自喪志曾見善書者知道否余誦此語不覺神色獨變向時每每勸人行陰德事故每每以陰德存心今看來陰德只可勸誘著人若自已用功亦不消如此以此存心是又添箇陰德障也聖人無情此是何等境界象山論介甫一節甚好云介甫凡事歸之法度堯舜三代何曾恃著法度不知户馬青苖等法合著堯舜三代否時闢之者無一人就其法度中言其失但云喜人同已祖宗之法不可變夫舜嘗變堯之法禹嘗變舜之法所變果善何嫌于同惜無以此闢之但云祖宗法不可變介甫才髙如何便服惟韓魏公論青苗云將欲利民反以害民甚切當或言介甫不合言利周官一書理財居半古人何嘗諱言利但恐三司等事非古人所謂利耳不論此而以利言遏之彼豈無辭又云介甫慕堯舜三代不曾踏實處故所成就王不成霸不就本皆不能格物學者先要窮理事君須體納約自牖之意牖其開明處因其明通其蔽無不入矣所謂順風而呼所因便也戰國談士鄒衍之徒使世主擁篲先驅者全用此義但彼不明王道只欲濟其私意小智耳惠盎說宋王行孔墨之道却自勇者刺之不入力者擊之不中說來一步進一步安得不入若孟子一開口便直說仁義說王道便直說五畝之宅當時世主強弱相攻利害相軋此語豈能得入聖人言語便自不同就如答問仁一般因人材質如化工成就不似槩守一路說叔子云今之監司多不與州縣一體監司專欲伺察州縣專欲掩蔽不若推誠心與之共治有所不逮可教之至于不聽擇其甚者去之此却是無我底意思在凡人各有挾彼挾其所長方且自信而吾驟語以道德不惟執而不化彼且以我為迂妄矣須就其所長之中而告之所謂納約自牖庶幾可入莊子堯桀自然相非養鳥之說正如此凡朋友辨論須要氣象從容又要懇懇開道故夫子循循善誘人使學者便可以漸而入若極言爭論不惟動氣且語亦不能入數數如此便至于離吾輩同志海內能得幾人于小節目上不合便憤爭以至離尚何學問之有明道與人議論不合處便曰再商量至伊川便曰决然不是看此便見所養與教人何如牛僧孺李德裕李逢吉李宗閔搆此大隙其初只為數言語不合其弊至于朝廷之爵賞行自已私憤故文宗曰去河北賊易去朋黨難近見章恭毅文集道平生忠節一事每不置口近㑹潘南山便自陳其生平好處無他只是自家看得大了不曾見得上一截境界吾輩學問若不憂勤惕勵便是臧與穀俱亡其羊安知髙明者不覷破吾輩如吾輩視章潘也凡人見識不透底立腳不牢固見貧賤則曰是我當安見富貴便反張皇若將纍已此固是好些一邊不知聖人隨貧賤富貴只如不曾見得孟子四十不動心正如此每見章楓山只言國家大計談及大臣依違不能正君重于去位輒叱咤唾罵由中逹外無少矯飾觀其生平出處大節一一不茍真君子也或者以為迂儒不通時務其生平難進易退但可為國家作門面夫人有所不為而後可以有為豈知楓山者哉楓山問朝廷東封諸小臣伏闕之故余備道初謀必欲九卿率僚屬以見滿朝皆曰不可後又以陸水村不肯為首恐罪及作倡者故致僨事楓山拊案歎息久之因云我朝凡三伏闕景泰初因聖駕䝉塵百官伏闕求誅禍首給事王竑格殺毛長隨馬都督𢎞治初朝廷以周太后之故欲别立某太后山陵百官伏闕事遂寢正德初羣小亂政百官伏闕與羣小謀通消息許以决無事者焦芳也焦芳賊邪小人不足論但惜李西涯謀國不勇一言之誤遂喪盡國家元氣至此遂不可挽今此誤國復是阿誰余曰西涯劉瑾時儘陰扶君子瑾所敬信惟此一人故賴以保全輕貸者亦多及至無可奈何輒流涕竟日楓山所得曷足以償所失也余曰西涯終是君子邊人但平生只是一個弱不覺誤國至此莆田林國賢至湖上議論彌日鮮有不合處亦多出新得此子却是法器見余斷陸子民為貴君為輕之說余以此語到天運極方可言但看春秋尊王便見聖人意思如何國賢以如此說何以見春秋天子之事知我罪我其惟春秋乎國賢以春秋作于末年就是革命聖人當代為天子余曰諸侯猶禦者不待其改過而後誅乎曰平王忘殺其父春秋作于末年者正待其改也不改而後誅也中間尊周固其事也曰周室雖衰天命未改非是此論僅發于國賢今未敢遽以為是俟與同志者論之觀孫太初與汪仲蘇劄子最後者云日惟肆力道理似更透一關方思道叙其漫藁云髙明之士一變便超絶吾欲及其變而友之當有得也於乎已焉哉方太初之未變也凌駕海內播動豪傑豪傑之士無貴賤逺邇匪不願與之遊及其一變也遂退焉為妻執㸑食狶以死所謂朝聞夕死者其果然乎耶其果然乎耶太初嘗曰居山陽時遇斗笠翁相對古梅樹下所謂嶺南羅先生者又居西湖有一叟據床說蜀中山水不别而去所謂青城山人者皆其托興寄情方外之辭無是人也余不欲後世以神仙鬼怪之事傳太初也朱子祠堂以西為尊四龕之立云不是古禮又云今公私之廟皆同堂異室以西為上無復昭穆之行依違牽制不免失禮曷若獻議于朝盡復公私之廟皆為左昭右穆一洗其謬之為快乎可見家禮是斟酌未定者周制大夫三廟則祭不及髙適士二廟則祭不及曾官師一廟則祭不及祖夫髙曾祖皆有服未斬者今欲祭始祖而不及髙曾實不近人情程子云某家却祭髙祖又曰自天子以至庶人五服未嘗異皆至髙祖雖九廟五廟祭亦止于髙祖三廟二廟以至祭寢亦必及于髙祖但有疏數之不同耳近日嘉靖一詔從前實未有也其赦民田租一欵實收天下人心苐一件天下實歡然指三代之治可立而待不知吾輩儘讀聖賢書儘有志于天下事者有是聖君有是詔命到此上極易分解却便分解不去箇箇恐百姓落得便宜如已與人一般就使百姓落得些便宜正德幾二十年海內百姓受了多少困苦今使全蠲三年瘡痍尚未能滿况止减半乎其曰十五年分已徵在官准作下年之數廟議正恐赦得不均使已徵者准數是使十五年一年海內無分彼此盡得全蠲聖恩何等公溥近日户部却曰真定知府王光言語不遜却去如此分說縱分說直不過作箇朝廷聚斂之臣不知此事關朝廷命脉天下至公的事不是可任血氣占衙門的使孫九峯在位决不如此其曰知府王光徒知愛民而不知愛國民是何物國又是何物讀書不知本原其弊遂至于此坐使朝廷失信於天下可痛可怪昔栁子厚云守道不如守官識者譏其不知道亦不識官道理分明在目前不知人臨局便迷昔孝廟何等仁聖分明無好臣子共成其德業今主上雖沖年何等剛明神聖使下有臯夔便成唐虞之治下有伊傅周召便成三代之治惜夫聖賢之學久不明在位諸君子元無此本色安有此實用今看眼前起廢諸君平生挾一假氣節少不以氣節自足者氣節于道不滿一肢一指若稍有心在氣節便去道逺况自足乎明道終日端坐如泥塑人對人言便見一團春風和氣固是氣質十分純粹若非涵養真到豈得不衰颯今人儘禀得靜定多者不曾學問安有一假春風和氣出來此等氣質却實難得今人有此等氣質却有二病以我不為不善凡浮淺輕譟佻巧暴克之類我性無有此便是道更不去學問不痛不癢能得幾時不衰颯又有明知學問頭路志氣昏惰等閒過了一生何等可惜自足自暴二科最是學者大病某恨無此氣質百般鞭策不能到得靜定田地不敢怨天直是人事未至耳范純夫嘗謂陳了翁云顔子之不遷不二惟伯淳有之了翁問曰伯淳誰也范默然久之曰不知有程伯淳耶了翁謝曰生長東南實未知也自是深以寡陋自愧學者嘗操尚友之心豈患不到好田地鄭莊公克叔假吕成公以為封京之後伐鄢之前其處心積慮未嘗須㬰忘叔假得之矣又曰魯隱之十一年莊公封許叔曰寡人有弟不能和協而使糊其口於四方况能久有許乎其為此言是莊公欲以欺天下也魯莊之十六年鄭公父定叔出奔衛三年而復之曰不可使共叔無後于鄭假之有後于鄭是莊公欲以欺后世也噫是何言歟聖人大改過許遷善莊公亦人矣豈無愛弟之心實以姜氏意立假故至此今人爭小利至殺身而不悔况國乎莊公非聖賢能免克假之險哉惻隱之心未泯一聞考叔之言遂為子母如初其後入許而復封許叔實充其友愛之良心遂使許之宗廟得血食假之不絶于鄭莊公之改過遷善不可誣也吕公之意必欲不發此言必絶其後而後謂之不欺乎文法太深有過者無路矣按定叔出奔衛魯莊公十六年鄭厲公之二十三年也時鄭莊公卒已久東萊加以欺後世之罪不考其年與事為誤甚矣南巡吾輩多有本舒國裳二本汪汝礪一本汝礪本甚正直辭甚宛轉得告君之體然俱以不斥名權奸遂留中伯固六事却剴切直欲誅彬遂至延禍諸君子幾成黨錮然因是遂大顯名於天下方伯固諌章在手余與諸君子有大臣率僚屬之謀余語以故伯固輒出與堂上議當時使王司馬不出惡聲陸水村不避利害則國事大好矣豈有後來許多棼錯可痛可恨可痛可恨應南洲兄天資合下純粹未嘗破碎一些加以學力自是大過人平日用功却是真實懇到門路甚正余得之觀感處甚多相隔數千里每得一書自使人沒齒不忘也余病年來目加昏鬚髮已種種精神大覺减損究其病源却是不真實用功之過日月如流可勝驚矍自少便知棄舉子業一味要作聖賢功夫唯見石龍兄一人只此便非吾輩所及始與王陽明為友見其髙明便北面稱弟子可知服善之心又何異橫渠之于二程也子通論道遺象山說孟子進鋭只如釋氏直超上乘說話學問須是勿正勿忘勿助俟其自化又云學者不可用心太緊深山有寶無心於寶者得之顧是此意却不似進鋭語孟子云進鋭本是有意必在過用其氣力氣衰則退孔子十五志學三十始立却是無意必在上古之世蕩蕩平平猶魚相忘於江湖也魚不為爭水而起貪嗔不為思水而有愛欲不為無水而生煩惱泉涸魚相處于陸而始相喣以沫此情欲之所起也象山云道遍滿天下無些少空缺四端萬善皆天之所豫不勞人粧㸃但人自有病與他間隔重一些便是病輕一些便亦是病却說得源頭分曉紂君也武王為救民則曰紂為獨夫夷齊扣馬不食周粟則曰臣無伐君之理聖人兩是之武王夷齊正所謂仁者見之謂仁智者見之謂智殊途同歸百慮一致也叔子云克已可以治怒明理可以治懼似太分折克已即明理治怒即治懼其功一也此在養之于素若當其時則難也孟子養氣則無怒無懼孔子云臨事而懼即敬也臨深履薄夫何憂何懼象山云明德是十五入大學標的格致是下手處博學審問慎思明辨是格物之方讀書親師友是學思在已問辨在人方册所載亦有純疵若不能擇是為泛觀師友之言亦有當否若不能擇是為泛從此假議論甚當又云學固貴于博然知盡天下事只是此理天下事事物物無有二理須要到其至一處朱陸格物之論異處正在此工夫間斷如鑽燧之火隨出隨滅故曰道不可須臾離也為學須如饑求食渴求飲决無他不得所謂如惡惡臭如好好色之真一得永得也學問不精進譬如種樹不培其根能得幾時鮮好年光如建瓴之水一落永不收矣萬木起自萌芽日生夜長至成合抱以其不息也若一拔其根旋復植於故處雖不停時生意斬矣象山云今之學者大抵是好事未必有切已之志此語極中時病好事即是好名才好名便打㸃著巧言令色又云學者不長進只是好勝出一言做一事便道全是豈有此理古人惟貴知過則改見善則遷最可戒當時學道者又云主于道則欲消而藝亦可進主于藝則欲熾而道亡藝亦不進最可戒當時學文者象山作貴溪學記云不拘流俗而正學以言者豈皆有司之所棄天命之所遺最可以警當今之學時文者伯子云聖人千言萬語只是欲人收已放心使反入身來象山云收此心照物便是格物孟子所謂學問之道無他求其放心已矣不格物何以知此心是放的伯子又云窮理盡性至命三事一時竝了與收放心原是一片話二家之真空亦是聖人之無我但彼委順處雖在人事上走却無了彞倫典禮故以名教為業識不知名教皆天所賦底實理周江郎學道作意欲避名教恐反墜在業識中矣象山云君子喻于義小人喻于利人之所喻由于所習所習由其所志甚中學者之病義利之說一明君子小人相去一間又云學者大率有四病一雖知學而恣情縱欲不肯為一畏其事大且難而不為一求而不得其路一未知路而自謂能知論得切當叔子云學問驕人害亦不細若說學問可驕人是甚學問象山與晦翁論辨尚有此氣象在象山云朱元晦泰山喬嶽可惜學不見道枉費精神遂自擔閣看來朱子即是逐事求道亦至力到功深地位但不得聖人一言㸃化之耳晚年學問顧自渾融了又云舊罪不妨誅責誅責愈見得不好新得不妨發揚發揚愈見得牢固誅責舊罪却是改過頭路發揚新得恐又落在伐善巢底伐善最害事象山一生坐此故其氣象去伯子甚逺守中亦長有此病他日當以此告之語云陰德如耳鳴只是已自知孟子所謂集義却是如此聖人之于民設為禮樂刑政便有去偏使正去蔽使明底意思在象山見道甚分明然氣質終是箇有我的人其論說多欲上人如梭山云文所以明道辭逹足矣本夫子辭逹而已矣象山即正色而言曰道有變動曰爻爻有等曰物物相雜曰文聖人作易如何生蓍如何生卦如何生爻和順于道德而理于義窮理盡性以至于命這方是文文不到這裏說甚文却是他日對門人又云須讀漢史韓栁歐蘇尹師魯李淇水文不誤後生又云作文須煆煉又云作文如何左傳深于韓栁未易入且讀蘇文可也原說得如許大歸結來又是這箇陽明云文公晚年知向時定本之誤是其不可及處力量大一悔便轉可惜不久即去世平日許多錯處皆不及改正愚意不改正正是文公轉頭處若又去改許多文義還是未曾轉頭一般中人以上可以語上也不待諄諄然命之也默然而其意已傳莊子云二人相遇于道而莫逆于心也聖人每每教人行戒人言行過了自然言之有味如人走過京師自能言得京師路上風景真切若影響言之自然不凑接凡人識髙明者多忽略著近小處只是心粗心細則無大無小無髙無下無逺無近故聖人學問德愈盛心愈恭蘧伯玊行年五十而知四十九年之非知非便要求出頭處若全靠著知非亦反為害若曰我不妨有過我能自知便自積纍得過多遂有頻復迷惑之病何時能出頭黃金至寶入眼為害人但見得惡之為已害而不知善之亦足為已害也見小善矜小能何足以入道入道者魚忘于江湖也人學問原頭一差了隨其所得分量向人誇誕不知逹者見之不滿一笑入道猶適國都譬如國都在金陵四方之人各以其所便而至人情所通行處便是大路便是執中但不可執定一方大路欲四方之人皆由此方進却是執一也亦不可立此四方大路欲一方之人遍由此各方而後謂之適國都也人氣質自是不同故入道自有逺近難易但看聖人教人何曾著一路說季路好勇便告以君子之強司馬牛多言便告以訒樊遲計利便告以先難後獲究竟來俱欲其成就一箇仁得魚則棄筌矣昔人求道如探重璧今人雖抱璧與之彼尚以為燕石睨而不取也今世之言道者只是好事附晦翁者却吹毛求疵去排象山附象山者亦吹毛求疵去摘晦翁之短便并及其好處都說倒了如此豈是真實用功若去真實用功恐自不如此朱陸未便到聖人田地安能一一皆是象山分明有空疏處晦翁有精義之過處若其好處自泯沒他不得吾輩只欲求至當是依是的合還他是非的合還他非若大道理上偏了雖伯夷伊尹栁下惠孟子云乃所願則學孔子豈必朱陸少谷集卷二十二
