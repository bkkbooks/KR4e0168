body:
  text: 少谷集巻三明鄭善夫撰七言古詩朔州行朔州城頭凝黒雲朔州城下邊人魂健兒悍驕好殺戮少壯戰死今無存悲風南下吹􅓋篥馬逸飲血太白窟不見鐃歌入塞門但見人骨白崒嵂近來衣冠苦出粟豈説千朝養精卒班生介子不應募願弄悲笳令歸去時逆瑾罰廷臣入邊儲雨黄埃䓇䓇二麥死幽天五月無雷雨秪疑青竹修大雩忽見黄頭澤下土少男風生鳥鳴渚蒼龍行天翠蛟舞兒童拍手歌􅔼蜴徴歛從兹脱箠楚廼者盗賊連三霜以致逆氣成旱荒老稚大半委溝壑丁壯豈免從豺狼况爾犂鋤鑄為兵縱有廢地無復耕東家鬻兒西鬻女骨肉之怨何時平只今一雨民稍寛栁葉榆錢尚得飱莫令邊陲又金革公賦從容私始得古劍行贈仇將軍北征將軍手提三尺氷乃是鬼國之鐵大齒之珎滄溟水枯淬不成莫邪斷髮躍冶死而後龜文漫理流天晶霜鋒閃爍鷿鵜凝萬金吳鈎拖頳纓北斗七宿土花發青天寶匣廻機衡斬蛟斷犀俱細事此物自是蒼龍精江翻河仄㒺象急提出白曜揺東溟飛芒殺白帝喉下不可嬰豐城古獄誰識女斗牛之墟元氣升沙塞秋髙塵壓城黄龍白狼不肯庭山甫無人武安死戰馬西向徘徊鳴安西都䕶君好行此物應世世當平丈夫叱咤鞭風霆國難不赴非俊英劍乎劍乎吾與女同死生林員外東甌斗城圖引連山蒼蒼若星宿大江孤嶼象雲搆我行東南未見此云是東甌斗城子巽吉仁王柄東指松壇華蓋魁堪擬西山岧嶤作領袖就中陳迹無不有前有王將軍後有謝太守白雲春草蕪没久墨池歳歳生芳茆自有王謝經行處至今景物無塵垢紹興以來産俊英周劉鄭薛次第興咸淳之上二百載醇正無過王龜齡要皆山川所毓秀亦自守者善造就林侯風流士直駕王謝後賔御盡才藻形勝布篆籕功成北首誰與娛但寫江山入畫圖行邊似防百怪出耳畔長聞海波入駐鶴亭吹笙臺更有鴈蕩四百峰崔巍千年陵谷辭刼灰我生胡為處溷濁明日黄冠歸去來小岷山歌君不聞小岷之山連胃婁雄視西川十二州青天萬古走蜒蜿峰廻嶂轉無時休劍門峨眉名失勢白帝鳥䑕俯之如浮漚上有許由瓢世人不得用直挂月户三千秋蒙泉瀉天奔龍湫巴溪湲湲學字流淜騰入汶江萬里滄溟收山中老桂色不滓芝草琅玕爛成綺洞口長回聲利車盤石但坐煙霞侣宋有蘇長公隋有劉仙子探芝斵桂樹長鑱亂雲裏小岷山巉嶒不可攀劉蘇以後人迹復不到迺有曾東石架屋讀易於其間平生負此滄海志少年訪道青城山上飱青城絶璧之流霞下弄岷峨陰壑之潺湲黄熊蒼兕不敢迫猨狖呌嘯情自懽空谷無人行蘭草復翻翻朅來遊人世十載愁朱顔吁嗟乎青山信美䝉泉亦可以洗君耳君胡爲乎城市許由之瓢欲何俟終南有㨗徑北山有俗軌𤣥猿獨鶴煖眼冷眼遥看爾紅塵白馬有何益柴桑不負陶彭澤歸來乎曾東石天津同王劉二子較射西營因賦長歌病夫平生滄海情南征喜得王時行天津橋邊秋氣清邀我醉遊劉伯耕投壺呌白意未巳乃復較射城西營劉君膂力信莫當控弦運肘固所長王郎生長在南方亦能左挽五石強調弓坐使猛獸伏矯矢豈有飛禽翔當塲角勝不相降神臂拍張人堵墻伶人考皷輿臺走白日冉冉廻精光鋒翎衝撞氣益揚觀者顔色歘沮傷熊渠以上合比數拔勝之軰斯尋常病夫雖然力不足見爾誰能分碌碌騰身即把忘歸接引手轉被繁弱挶沉思重自咎百罰敢辭辱忽憶先皇時此技何曽録承平却作凶器比喪亂始識文事跼乾坤比年氛䘲厚幽豫青徐虎狼吼專城將軍習逃走遂令死者十八九至今楚蜀猶未夷六軍雖衆能者誰轅門衣冠更寛博教塲藜莧成町畦吁嚱王劉學孔子反有餘力從事此幸須為國收多壘吾聞兹藝徳之輔匪直區區為閲武君不見矍相圃公罔之裘揚觶語衛昌蒙羿巧弗取射乎射乎吾愧汝汶上對月聞笛作商調哀切命船人度曲為和因賦醉歌焉耆八月髙風起鴻鴈羣飛渡淮水月下清砧愁逺人天涯芳草思公子王郎哀時最蕭瑟萬里迢迢向南國呼我上船設氷鱠仰天頌酒開胸臆關山茫茫何處邊但見急管哀中天馮夷聽曲波靣出楊栁亂落西風前酒酣月落歌未己隴思江情嗒然起未掛姓名玉策上願添海水金樽裏人生合歡那可測有似大海翻萍葉回首親朋各别離豈無江漢通舟楫流光過鳥不復駐達官好爵身之蠧况廼豺狼横地軸何限驊騮窘天歩竹林諸賢皆酒徒嗣宗只願歩兵㕑古來賢達一澌盡醉鄉之托今何如憶弟去年蘇臺送汝歸布被獨卧愁依依畬田力薄霜雪厚憐汝受凍仍啼饑北有鴻鴈南鯉魚但見風塵不見書深林大道防豺虎萬里看雲涕如雨猛虎行𤣥陰㝠㝠天欲雨蒼兕嘷風劈林莽磨牙下山天為愁白日殺人如捕䑕我忽聞言仗劍出彎弓却射白石入吁嗟鳳麟無時來故使此輩為民菑不然驅汝渡河去河北蒼生非草萊鍾吾行皚霜凛凜頺楊栁鍾吾驛前白狐走山東虎穴已盡除淮北人煙亦何有自從天狼犯東斗殺掠如山如拉朽四溟兵氣寂不揚縱有城隍誰則守黄河無梁葦可渡曷不去此甘為虜就中一室三十口那得孤兒應門户投生避死誰不知鍾吾令長實主之桃源行黄河水盡蛟龍馴桃源沙飛愁殺人東方亂後再反覆憶昔過此増煩辛扁舟困頓不得攜賊壕只在河東西路官邑子微服走大屋髙門狨獍啼到今事定還是非請問流民歸未歸行淮北戰塲我君渡淮水倉卒見賊壘一聲金鼓鳴馬躍昏風起三千義兵坐倒㦸一日同赴黄河死嗟爾漁樵人何曾識蒐狩但聞鶴唳膽已落乃使執盾從敵後邊頭將軍故縮手要取金印大如斗淮陰寡妻啼向天遺恨東行劉太守遊子桐江水清石可數遊子思歸作漁父空谷春深記薜蘿長途日暝憂豺虎入林何曾見赤雀結舌詎可賦鸚鵡皇天反正誰則知有客哀傷重延佇去年行去年狼山北風𦂳斗間坐見狼星殞南下旌旗若震電東奔盗賊如虀粉皇天厭亂欲大誅爾軰曷早為身圖好趂天兵未臨女即銷鋒鏑作農夫兵馬行越南諸州復召募滚滚盡赴桃源戍鉦鼓聲填滄海鼉旌旗色閃扶桑樹欃槍耀芒犯女斗虎豺也更能咆吼部伍存亡不可知𢷬衣愁殺閨中婦天寒野營雪嵯峨指墮未易親干戈幾時奏凱標銅柱願得將軍似伏波百憂行自我結束出門時正值世路多艱危匪才被䝉主司録壯圖恐負平生期刑臣干紀作厲階此輩乘勢為狐狸朝中衣冠死桎梏意外括索空茅茨君門萬里不可測虎豹九闗那得窺所以流殃遍海岱使我積憤齊峨嵋一時安化起作孽敢睨神器寧無詞山東鐵騎皆王臣亦忍弄兵於潢池髙祖社稷豈易改孝宗惠愛無孑遺所賴天子開神聰大加顯誅不復疑繼是諸賢出補葺至今萬姓猶瘡痍朔方三邊屢入境桂林羣獠長勞師意者蠻貊本梗化雖在平世亦若斯荆巴乃是荒服内五載恃險夫何為要之三將愛生事民瘼肯與朝廷知遂令赤子化魑魅乳臭小兒盡緋衣況聞村落吏捉人比併只為供軍需去年華林覆大衆今年桃源殺偏裨乃者狼兵豈得已所過慘於熊與羆四方郡邑所召募紀律不一皆逃歸以此公私厭金革廟議復欲為覊縻安得一下罪已詔民得粒食莫為非歳晏行烏龍山頭鴉亂飛客子迫嵗憂蒸藜桃源餘孽幾反覆玉山一路方塗泥黄雲阨闗鼯狖啼前有戈鋋後皷鼙十年通籍何辛苦猶自飄蓬負老妻臯魚子陟阿丘以風白楊揺揺朝暮中烏棲白楊樹飛過阿丘宫臯魚子抱樹啼為我問終風何事無已時父母不得養兒心亡絶期兒心有絶期木華落盡風不吹今辰行送張敬中巽所今辰何辰秋復暮黄花欲吐且未吐越王臺上風不廻謝女江邊葉如訴征途遥遥不肯住歳晏天涯向何處冀北能無屬目雲閩南㑹見傷心樹憶昨奏賦大明宫綈袍布被昕夕同于時公壯我尚少許身奚啻登䕫龍黄塵白日兩相䝉世事變覆真太匆十年風波苦汎梗一旦鬢髮成飄蓬皁鶻飛來意怠杳龍媒跛足眠芳草勛業空嗟明鏡中巾鞋早向荒山道公今走馬黄金臺黄金安得如山堆自信材官少貧賤豈有志士久塵埃石田豆苗半枯死余獨憂勤弄煙水劉向何心厭簪紱管寧薄命甘泥滓他日西方相憶無北魚南鴈徒為爾大水歌二首閩州五月雨不歇劍南諸溪水俱發溪邊樹木纒風雷郭外人家走魚鼈野老惟憂禾黍歇尾閭不見波濤泄君莫恨去年前年雨水絶越王臺下江流竭行人道上思飲氷古井鹽花白於雪其二𤣥陰㝠㝠噎不通五月六月皆天風雷霆嘯海烏兎急田野盡在波濤中南山豆苗沙壓死東畬禾頭半生耳志士寧辭溝壑填農夫自此生事已君不見無諸城外鬻㓜男今歳誅求豈但三獨樹篇豫章之山盤盤乎嶻嶪而倚天石璧萬仞荒㫚噓雲煙上有獨樹風雷纒輪囷偃亞黛色古百圍竅穴譹吸謞宎飄風傳孤根入地幾百尺云是蘧仙手植距今三千年内注沆瀣華外盪日月光枝翻浪湧子墮金香自是靈株䬃飛動天鷄海鵠空多夢白日影倒彭蠡陰黄昬聲壓香爐重千峰逺意含太和萬木豈敢爭嵯峨霹靂空中下矢石洞庭無地浩然風波兹木結踞其如何大厦長年急梁棟心猜目眩今猶多君不聞上古有大椿萬六千歳為秋春精英幻化那可測至今世有青牛君兹木無乃是不然何以有此垂天之蒼雲山樊古栢相葱菁早晩移根天帝庭修條思在雪霜外肯與衆木分光榮柤梨楸桑亦蓊鬱掊擊拆泄豈辭辱商丘之樗曲轅之櫟非不巨且齒拳曲軸解徒為爾吁嗟乎豫章獨樹何神哉安得長梯倚天畔上採附枝下柱明堂摧君莫疑行送道宗赴闕長歌一曲楊栁枝短歌一曲青雲詞近前勸君君莫疑男兒不作兒女態所貴國士當酬知與君俱非年少時桑弧蓬矢何當遺腰間環珮光陸離取媚泉石非其宜留侯只掉三寸舌黄石將略真王師寗戚車下鳴聲悲風塵漫漫緇短衣五羖大夫百里奚世主不識終塗泥英雄所耻比草木且復俛首就馽覊故國萬世尤神奇安能鬱鬱久居兹子雲寂寞空守雌屈身伸道非君誰君知鴻鵠合髙飛一翥萬里無天涯短枋香稻藏罘罝弋人慕君君不知閬風𤣥圃便棲止慎勿下飲淤塘陂於乎慎勿下飲淤塘陂衡山髙贈周公儀方伯吾聞天髙不可升南嶽上應天璣衡絶地七千五百丈祝融之峰最巉嶒乾坤開闢自古綱維平三山西圮六鼇死然後陽門反户東南傾巑空遏日乃有此巨鎮儼如天王神武虎臣矯矯來千城離宫富炎徳桂樹常冬榮若非崑崙西起占樞紐泰山之外誰當南嶽之縱横芙蓉石廩勢騰擲雷泓風穴聲硼􅗟七十二青蓮一一凌紫清行雲膚寸合呼吸遍四溟鴻鴈髙飛不能過嗟爾鶴上人胡為抗行雲而上征囘風瀟瀟吹古雪倒翰七澤流三星瀟湘如系淪洞庭君山萍漂一㸃青纍臣帝子不可以招而返兮但見蒼梧慘澹皷瑟悲湘靈吾聞地有五嶽猶天五行衡山萬古合峥嶸日南天闕儻或折尾閭汎溢地道何由成吁嗟乎祝融馭無極朱鳥來有慿夫何為乎絳天芒熛炎海波濤驚天生豪傑須爾用五嶽四瀆備爾形彌綸藩翰豈比塊然者不然天將誰使之清地將誰使之寧周夫子崇髙遍博要如此平生意氣吾與爾歳暮集林中丞宅中丞華堂集衆賔金杯玉盤興未了尊前羯皷催落梅醉後佳人媚芳草洛波二龍卧已深睢陽五老歸應早座上狂生感歳華銅龍咽月霜天曉涵江寄伯固囊山十里涵江市不見涵江見溪水溪邊柴門占青竹市上髙樓夾蒼梓市南故人黄省郎後峯自壘對茅堂一旦相思輒命駕豈無消息到君傍麥斜行今我不樂遊麥斜石田璚草揺春華洞門玲瓏駭初見細路窈窕行未涯是日春光正駘蕩黄鸝布榖聲相向逺樹葱菁色已齊古木詰屈神猶壯巖下山翁供酒餔賞心豈復憂行㕑雲端儻遇林樵谷為爾分張石室書再題望夫石登彼闗山望君來歸朝朝暮暮君不來歸襁中兒女大日久無完衣泉水滔滔不入山男兒出門良獨難今時畏途相戒蛇豕相殘欃槍苦未滅君身無時還君身亮自惜妾身無羽翮思心從君安可得晨興望君暮化為石芝谷歌商於黄公人不識獨卧空山候秋石紫芝風香吹滿谷渚蘭汀芷無顔色兒童對客歌白雲此曲人間那得聞𤣥明宫行君不見𤣥明宫中積金碧云是權璫結真宅貝闕慿陵上帝居彤臺照耀長安陌琱龍鑄虎歘飛動至今赤日風雲黒崖壑天開朔漠揺鯨鯢日吼滄溟仄探竒秪見靈怪集矯首翻詫星辰迫西國衹園應𣺌茫六朝蕭寺空千百白龍胡為作魚泣想爾當年勢輝赫土木經營動四方珍奇聨絡來重譯分明造化出其手左揮右霍何不得欲將燕市作蓬山便有神人為驅石奸雄到死竟不悟驕奢之末無終極氣數相乘可自由李猫趙鹿空囘頭君不見大市街頭權倖路古來虀粉誰曽收雪山歌和薛君采方思道君不見南宫少谷老麻鞋布褐色枯槁萬事都歸混沌裏一生但結江山好未即乘牛函谷闗尚須跨馬長安道長安歳暮雪滿城甃雪便築山崢嶸巖㟼踞地虎豹急星躔斗轉山河明玉女峰前瑶作臺夸娥一夜輕移來袍笏真當米芾拜詩篇數荷鄒陽裁階墀把玩已兩月皓氣遥遥正相得塵土誰分氷雪姿市朝聊寄煙霞癖未妨頺莫大羽旋補葺時見消融勢尤岌嘯月長聞白鶴回含風豈恨青陽及青陽青陽謾相放金石瑱填本波浪適來天地入虛無何事么麽論消長鞠歌贈思道垂桑弓挂蓬矢旦夕如長鳬誰將哺爾烏來啄粟飛入網羅將爾含哺向滹沱河水㶁㶁黄沙滛滛琴絃自有心翻奏山水音流響入明堂錫爾龍鳯章但得龍鳯章不願尚書郎持歸報爾父母父母之恩安可畢歌黄鍾皷朱瑟髙堂沉沉射紅日東漈柴門歌陳執之侍御席上與思道同賦􅌡海之濵龍門髙萬峰廻合相騰逃歘忽雲氣隨六鼇沙蟠石走地不毛八水東飛漈其下青天白日風雷號蛟龍窟宅掀夜濤深不可測安可撓天吳海若長周遭豐隆雨師爾所操上天下天直頃刻沾灑后土如流膏東海仙人騎赤鯉翺翔盡决三千水下憫濁世意未已六龍鞭策風雲裏神功一歛容一指太虛不動民安止柴門蕭蕭水之涘但見金波墮潭底世人不識柱下史曾進當年圮橋履余也青雲一畸士袖中三尺龍之子只今濩落甘泥滓乾坤不交國士耻有往必復自此始惟願爲雲逐君起思道屋為暑雨所破為作破屋歌南州暑月氣正溽伏雨衣裯盡如漉朱方轉東熱更酷渴想宫氷與夏屋不應天氣反北行苦寒之地炎蒸沃長安敝廬淫雨裏上漏下濕寧安宿方子新頺籠鶴亭鄭生亦失窮猨木郎官俸薄食指繁原憲終辭九百斛伏金未伏火未流虞書歴象今難讀安居美食古所賤陋巷簞瓢分須足洛陽杜䳌濕不歸願得羲和宅暘谷徐瑞卿給事所藏仲姬墨竹引田郎掉臂登我壇手持一軸青琅玕云是仲姬真蹟留世間徐卿得之歳應寒煙波淋漓灑不乾蜩腹蛇跗古所難風梢露葉僅尺許逺勢翻在青雲端燕山六月雨不止暑氣如焚汗如洗那知此君入我側便有秋聲落吾耳偪側未枕洞庭流虛無更憶瀟湘水君不見洋州文學士渭川千畆不盈咫筆鋒取自心眼底但見鷹鸇隨兎起又不見前時蕭恊律能工水墨古無匹疎寒不作筠粉態瘦勁獨得簫韶質蕭郎丹青久絶筆洋州韈材誰祖述勝國諸賢各擅塲只數仲姬入其室至大由來二百春墨痕縑素看猶新得非尤物自有鬼神䕶無乃好事者摸擬希其倫於乎貌物非物人非人天地亦到么麽津徐卿畫本且莫論眼前萬事誰偽真南唐後主畫竹引昇元閣上作賜宋齊丘君不見彭城彭奴元姓李早入徐家稱帝子又不見九華山下齊丘生晩入南唐作謀士同時契合風塵裏草昧君臣若魚水淮北初收格鬬塵宫中漫得丹青理昇元閣上寫墨竹翠葆蕭森鳯毛起手書珍重表恩殊御墨淋漓濕桑梓世代相催猶夢幻金陵畫餅寜復爾帝王從古多好手人物絢素無不有前有殷武丁物色惟傳傅巖叟後有宋道君鷹犬驊騮歘飛走丹青意氣稍或别治亂興亡一回首彭奴彭奴聽我歌淇水才賢本衆多但惜九華山不似傅巖阿吁嗟乎竹花零亂歳蹉跎鳯凰不來將柰何白紵歌二首白紵歌白紵舞吳趨青童越素女翩翩綺縠鸞鳯舉流宫轉徴清激楚玳筵璚膏君莫忘卿雲燦燦世將昌赤日時下舒以長令君黄耉樂無疆其二蘭陵白紵色勝銀裁縫舞袖當上春調筝考瑟宴嘉賔送意尊前未敢親東方將明樂不違主人歡笑客忘歸鐘皷齊發且復希矯視雲端雙鶴飛太乙山歌吾聞終南太乙峰廼在於天都陸海之中巨靈贔屓與天通丹梯直駕太白窟金精反射蓬萊宫西南爾是華夷闗日月平視如跳丸但見黄河涓涓下霄漢齊州九㸃翻波瀾鼇掣鯨掀勢何勁三星不度龍沙瞑華岳崚嶒徒自雄渼陂盆盎虛相映山中之人夐自奇驂鸞翳鵠凌雲逵袖中劍器撥時危林猿臯鶴且莫疑君不見衛叔卿白鹿雲車謁天子問之不答意何長興亡已落紋楸裏留侯談笑用漢帝功成麟鳯誰能係孫登長嘯蘇門山聲似黄鐘動天地達人修身俟世至得薪用光始有濟才多識寡嵇叔夜爾曹寧免今之世吁嗟乎終南太乙長崔嵬虎視龍興安在哉霸王賢達俱塵埃峰頭儻結三花樹從爾黄冠歸去來題吕紀畫鶴國朝畫禽誰最精四明吕紀推獨歩貌出青田一片影天機物色生毫素霜翎藻質何翩翩月下蒼虬欲上天半夜狂風吹碧落揚聲直徹廣寒邊鳯凰不來猿鶴悲似憐獨立羽毛稀若遇遼東丁道士聨襟接翼與同飛畫山水引天風盤松翠蛟吼白浪浮山蒼兕走月落未落光射空道人夢在滄洲東雲冠雪氅烏皮几皓首相從只黄綺我亦天台採藥師為君更話蓬萊水一樗散人歌君不聞漆園傲吏稱上仙商丘之樗人共憐棟梁繩墨秪須論散木不有全天年林夫子一代賢揚輝飾智君不然有才耻與短世用滄溟卧處洪波無邊手握青玉芝暢歌雲和篇奇氣不可秘吾嘗得君于三狼之紫煙拜君牀下稱竪子大兒小兒安足傳酌君酒捋君髯乾坤盡納芥子裏大道之下聖䝉融晦俱茫然掌中樗樹大莫擬附枝屈鐵龍夜起長歌行南湖谷老誰識爾被褐裹頭卧桑梓早時讀易編屢絶直道如絃仕三已郎官十年窮不休八口羞稱折腰米虞廷咎䕫苦夢寐前代君臣若魚水老驥伏櫪志千里綈袍百結吾不恥魯生甘守白茅屋張良還從赤松子洛陽少年抱區區漢室規模叔孫禮嗟哉往事誰向語惠施無人予期死鳯凰樓下黨錮成濁流豈但十一士君不見申屠蟠滅迹煙霞裏又不見郭林宗渉世終泥滓滄江日落歸去來東山草堂安在哉遲清亭子風拔頺貧賤如此令心哀殷王中興圖逸才孰為霖雨為鹽梅終日畚鍤歌徘徊於乎終日畚鍤歌徘徊題趙子昻林木元朝學士宋家子手得丹青古莫比筆端㸃染入精妙心上經綸乃如此唐之畢宏宋郭熈林木山水那兼美一匹縑素動數旬工夫細膩世絶倫未論意象補造化已覺氣勢生風雲眼中蛟龍相盤拏風雲變態何詫嗟草間莫着王孫足王孫芳草今天涯君不見馬逺區區念宋家殘山剰水胡為耶逺如期逺如期黄道亨聖人繼天麟趾來臻麟何以來時將太平黄河千年而一清四序遵軌轉玉衡日之方中破幽㝠美人來騑樂我民生琴瑟不調絃當改更逺如期把君熊軾飲君兕觥美人哉治載成行哉乎願我皇帝夀萬年匪荒寧復嘆三首我生四十無聞時已暮三年角巾守煙霧空村落日門不開獨抱鶉衾哭窮路麒麟趾折龍馬杳世俗那得知其故嗚呼興衰用舍總在天中夜擊劍心茫然其二憶昔金閨困天梏乞身還山思維谷頻年藜藿口不充況復呻吟卧牀褥生子當如孫仲謀豚犬區區但口腹於乎天時人事兩不值我生安命而已矣其三歸來來歸愁復愁潔已不及滄溟流苦逐獮猴逐山雪眼中蕭蕭誰故物天涯良友半槁死我身雖在空皮骨於乎青山伐木鳥嚶嚶胡為使我無友生傅木虛報與諸君問余疾苦不至口述嘲之善夫卧病將月餘死復不死甦未甦晨昬咆躁向天呼藥物丘積恨未除昨日傅生來報予言拉諸子過吾廬聞之頓覺眉頭舒喚取庖人飭賔㕑奚兒舉網更捉魚餚核已具音全虛病夫延頸直到晡柴門不見君子車裘羊徑草今何如嗚呼自古友道勝妻孥生死不二方丈夫疾病望爾來相扶岊江樓觀漲送馬子莘北征霖雨五日風不廻百川流沫連山來洪濤拍天浩蕩而崔嵬驅沙走石龍門開白日不到地滄江一何哀三山反在八水下一葦阻絶天之涯與君起登江上臺節物感我曠士懷六龍行天太陰死妖蛟孽虺胡為哉蝸皇功虧禹徳衰吾恐地軸今將頽短歌㣲吟為君起丈夫壯年要為者何事請君起長楫共擊三千水苦節行過漁溪聞前王王文奎之女詹氏少婦死節為之泣下作苦節行下南四郡三郡兵閩盗此日真縱横安溪莆口備慘毒殺氣上冐天為腥六師不發無戰情賊過一程移一程兵驕將怯往必敗疆場之事誰曾經官軍畏賊逺䕶送民兵不教將何用坐遣羣羊啖虎口萬姓何辜死無訟前王少女不就虜抽身抱石沉江水詹家少婦賊殺姑罵賊不屈同姑死我歌苦節行淚下哽咽悲不止吾軰堂堂七尺軀况作男兒把天紀清風嶺曹娥渚長使志士哀千古吁嗟乎詹家少婦前王女傷哉行宿涵江聞賊盡得王莊諸婦女惟王元德之妻守節二十八年抗死房闥中作傷哉行傷哉乎尚陽之南廣業之里千數茅茨變賊壘殺人成丘山旬月不見官軍至我思八閩十七衛太祖以來食盡多少官倉米一朝緩急不得分寸力惡用飼爾民膏髓膻風吹塵汚詩禮安能一沃滄溟水傷哉乎垻頭山新渡嶺婦女不行刃加頸新渡嶺垻頭山黄金滿意婦女還可憐蛾眉七十二竟無一下清風灘死生在前良獨難傷哉乎前王寡妻獨死房帷間令人苦憶大古時上有堯舜下臯夔契敷五教張四維稷播百榖民忘饑九州分理十二牧天子端拱而無為四凶既誅戮六合歌雍熈耕且讓畔行讓路重門暴客從何來嗟彼盗賊豈無民彞犂鋤化兵誰使之傷哉乎聖王不作吾已而東歸行送殷先輩闌風吹江江捲素雲脚如霾暗前路陶河捉抺應有求絡緯追秋不知處江南江北氣蕭騷十家九家聞呌號嚴城白日森長㦸粤客中區折大刀道傍寡婦向人訴自從亂後多愁苦夫主從戎去不還大兒又在軍前死小兒九歳嬌且痴母子投生中道離向來喪亂饑寒在到處蟊螟耕織稀吳門一杯天為悲送客那堪此道歸塵煙海内還消息兵革滄洲有是非東土酸風射客眸蘋蘩為我薦髑髏戰塲斷骨今收未古道腥魂招得不請君勿田太山側山樊豺虎多如織請君勿釣東海濵天吳九首飛殺人請君莫叩函谷闗只今長夜正漫漫為君生計謀不得一夕籌心鬢毛白題官竹黄河之水非淇澳亦有籦籠挺平陸彭城官舍清如簇磥砢紛披成綠玉使君公餘開鼎餗清聲入坐可無肉酒酣戲我題官竹座中才子謝水曹對客跳躍先揮毫詩成奪我宫錦袍行輩大呌稱詩豪我憐此竹絶短小忽有感遇難成騷㸃與語曰汝之生也不似篲箒排青蒼安能截作笙簫來鳯凰又不似由衙大如斗惡用於汝為柱梁惟應托根官舍傍且有標節儲雪霜中虛不肯容螻蟻作德君子多比方噫華滋爛死兮汝得孤存刼火滿山兮汝獨不焚子猷云何可一日無此君吾欲移汝歸崑崙玉華山歌贈盛太史端明玉華兩峰天下雄力障碧海東巃嵸峰頭偃蹇千尺松停霜冐雪蒼苔封松根飛瀑聲淙淙流入韓江豢虬龍徴君結屋浩渺中開窗下瞰馮夷宫角巾一幅雙鬢髼玉華相對為主翁酒酣擊筑詠古蹟韓山越埓啼猿狨小桃溪春深淺紅有時鶴馭來偓僼月明小艇西復東富貴於我如飄風鴻鵠髙飛不可籠羅網繒繳難為功去年闕下見一鵠今年天際㝠孤鴻嗟予覊的未解脱駑蹄㨗徑愁㤝㤝亦有靈源似玉華茅茨傾倒登羆熊安得脱身若鴻鵠萬仭峰頂時相從秋夜過虎丘與方思道坐白蓮池石各賦一首夜入虎丘山露坐白蓮池秋月淡淡開漣漪秋風嫋嫋吹葛衣月中歌聲遏雲起雙翮忽欲乘風飛憨憨泉甘如飴一飲數斗療我饑可中亭上鳴參差希音嘹亮明者誰方思道鄭繼之二人瞰世同一機今時莫道無鍾期吁嗟乎太行之路多嶮巇煙塵障天咫尺迷壯志於我夫何為五斗米焉足糜南山有蕨藜北山有紫芝歸乎歸劍池蛟龍久不起生公法石至今疑來日大難知不知願言將子顛𡨕於武夷遺太白山人方舄歌道人昔年屠赤蚪蚪革中作雲錦裘授之素女製方舄精比南海之輕綃鶡冠鶴氅言好逑未有售者微其儔余知尤物終非世所畜化作雙鳬飛去從王喬低五嶽小六州遊汗漫三千秋更欲乘風觀十洲掉頭太白山悠悠饑飡聚窟霞渴飲清海漚赤霄九萬去一息戾止豈負樊籠憂漢網恢恢羽獵愁雙鳬雙鳬何處求我亦從今理風翼覔汝于崑崙頂上之椒丘登七十二峰閣歌吾聞太湖東注三千水乾坤納納幾萬里東西洞庭天際起七十二峰如聚蟻青天白日飛雪雨兵塵慘慘滿人間故國何處愁路難五湖多風不可渡入山魑魅相依附若為化作鴻㝠㝠南向峰頭結煙霧終焉身重飛不得展轉湖邊倚髙閣湖昬閣靜百感集悵望毛公謝烏鵲嵩髙西去尋靈藥題望夫石自君之出西玉門寒砧夜夜驅離魂樓蘭未滅君不歸淚眼一注窮崑崙自紡自績孰與存眼青直到天地昬城中少年生情性一曲離鸞豈堪聽妾身自是藍田璧寧向峰頭化為石海水屢見成丘山猶望夫君生入闗呱呱小兒尚在手白衣蒼狗無不有誰家去夫䞉出醜世上婦人多姓栁黄茅岡和東坡二首雲龍山下黄茅岡秋風破㡌聊相羊徐州太守遺石牀煙花十萬皆微茫白龍帝鄉千里長有客好事遥相望髙歌不乏太守狂其二我醉倚歌千仭岡一聲叱起萬石羊寒笳數聲咽胡牀四山烽火何茫茫道路阻絶煙塵長京華咫尺不可望小子年來學𦍕狂東征大風從西來行子向東去黄塵十丈強没盡傷心樹匹馬追風不受鞭長安回首思悠然城頭笳鼓晩來急村村寡婦當簷泣鷓鴣行行人行人子細聽鷓鴣近前語分明山有長蛇兼罔兩水若可渉霜濤驚哥哥欲行須蹔停君不見赤雉四顧不出山虞人闗弓射雉還君不見大鵬摶風九萬里六月一息圖南徙早發臨安東閣冬月西關西仲冬雨雪水復微去年今年風色惡大有小有人煙稀於濳諸縣討大賊軍旅之后多蟊􅀈意外征求莫大繁今日蒼生合蘇息大游篇贈髙宗吕登山須騎五色羊渉水須泛無倪航一身之小四海逺紅光瞥影明煌煌年少離居歴寒暑孤鳯㝠鴻自髙舉東封碣石入羅浮十洲山水猶能數世人未斷區中縁頑腹無腸萬愁貯炎趨聲利赴火蛾戀食癡鵶嚇腐䑕吁嗟乎吾求此輩無其曹翛然六合解天弢上乘灝氣懷宇髙丹山碧水相週遭仰天大笑秋蕭騷九州熱客從滔滔髙生髙生縱遊遨石梁行陰厓􅞛谺氣溟濛山木慘切悲回風石梁駕天蟠彩虹飛流下𢷬龍光宫上仙之都弱水東彼岸可度天之功十年尋仙志未己台嶽欣逢羡門子願君啟我元命秘荷鑱拾茅吾不耻桃源洞天春色多爾時劉阮今如何慈竹引二首北堂慈竹連理枝青陽含惠流緑滋堂中佳人雲珮垂霞冠鶴帔光陸離麻姑盈盈進紫觴東方小兒翺且翔徐歌緩節宵未央明星煌煌應夀昌其二芙蓉朱蕤蘭紫芽含風被露齊發花庭中象席連鳳珈流輝照耀麒麟車麻姑盈盈進紫觴東方小兒翺且翔徐歌緩節宵未央明星煌煌應夀昌望夫石自君之出矣日日望君歸秋風吹紫塞夜夜𢷬寒衣樓蘭未滅君不歸含啼獨自下重幃玉闗西去路如棘安得身隨鴻鴈飛食荼中自苦食蘗那忍食西風吹妾身化作望夫石東海之水成丘山公乎何時生入闗年年風雨裏但見血痕班妾心匪石不可轉君身如璧當来還太白山人歌吾聞太白之山横絶沙磧東去天盈尺秦地雄陰厓古雪吹烈風開闢以來如白龍赤日横半度百草不發天無功山中之人氷雪容飡霞吸露五内空緑雲結交河上公夀三千歳顔如童北招汗漫南挾韓終椒丘縣圃直天幾度拊嘴捫畢天為通長髯下照滄海水𤣥虬跋浪吹蒼穹視彼守株之徒奚啻黄鵠之與壤蟲吾將乘元氣與君遊無窮粤中元父歌泉山老子金馬仙青陽温風春可憐魚須奉帝三十年角巾南首泉山前司徒起家青棘郎娟娟寒素臨秋霜炯如白鳳從君王瑞文㝠舉天地荒壺公山人見素子頻年三出還三已𤣥文突兀凌太華峻節孤稜冠青史木蘭江上弄煙水豸角雞香惡用爾中丞謇謇新齋公麗如月露映梧桐白筆持裁陳素封殿前斥奸氣如虹蒼蠅貝錦心不同中丞解纓猶潰癰蚤歳稱知犯公眼酬知力共塘蒲晩齊州腥氛黯長夜飛騰願附㝠鴻逺玉龍手提不可成長歌一夕雲河傾苦寒行二首刀兵之餘氣不淑立春一月寒猶酷東日㣲微背暘谷西風獵獵遺華屋吳儂號饑拜人前吳姬受凍啼門曲去年冬雷折地軸其二南冠丈人何偪仄惡風吹雲閉春色白梅陰多開苦遲黄鸝口噤啼不得東方征輪斷無迹鳴呼彼蒼未肯廻天戎翻令絲絮専元功河上行白鴈噭噭思朔方烏衣逐逐度河隍河間草樹色焜黄淮西二月春悲涼北風慘懔日無光洪濤簸天不可航晨風不食百鳥藏妖虬怒鯨連山長途遥日暮雨沾裳臨河欲渡愁無梁散髮狂夫何郡郎箜篌絃絶聲不揚側身天地夜未央愁燕愁粤熱中腸少谷集巻三
