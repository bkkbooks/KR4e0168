body:
  text: 少谷集巻十八明鄭善夫撰書二寄周方伯公儀違侍以來凡再三辱手教亦曾再三致書問雖乖越數千里如在左右也比處京師每於湖湘人得動定知君子勞心民事比閩中時較苦矣今天下之重在於食不足故其變在下其患在邊食之不足大率有三横征冗食與天灾是已三者常相須亦嘗相害而後䘮亂乗之自古如此也京師近來歛益苛而費益侈江南財賦之地目下患害似大有天意催科撫字二端實不可偏廢也今雖欲偏用之勢已有不能矣况得而兼耶三邊士卒近來復傳入自臨洮至鳳翔連數千里正猶心腹受病而百邪顧乘之耳聖駕此度北狩甲兵錢糓掃刮殆盡仗社稷之福祖宗之靈即未有壓城之敵内變之憂倘萬一有之為柰何哉不敢即謂朝無豪傑也我國家立法如蔓絡相持一舉即牽掣非一人能專其運而盡其長者今日方受其弊矣頃者閩中兵噪亦坐此延平首禍當道實大家推艱計始終遷就遂使五郡之兵乃敢肆然而起人心最易揺動况當此時哉湖湘民瘼日如何大君子當事必有逺圖萬萬於常賦中行其仁此時用世勢不可盡去苛政但每事寛一分百姓自不思亂矣以為何如觸目怵心不覺盡露其狂憤其有妄言處伏候相告答周方伯使至拜手書珍重教以未至敢不祇服以無負君子盛情比來待罪祠部四月于兹悠悠終日食粟而已方今聖駕逺遊朝廷多故中外危疑感時觸目有不但可流涕痛哭者丈夫不經心天下則已矣既出門事事而晏然散地竊禄安安豈其素心哉故園多難歸路無由惟日咄咄耳大君子以善夫樂此哉八月初閩城軍士復大譟衣冠盡為所辱毫髮之間幾成數載之亂天幸就殄矣恐欲聞近事日新不敢盡言惟若時為道自重幸甚答林克相侍御張友至得緘篇章累牘誦之至四鼓未忍釋去時勞苦馬上歸大困卧牀側讀不覺忘倦陳琳制作足以愈頭風似此信不虛也本末賔主之論甚當詩文一事亦是世間一大玩物今看古人文字之極好者未免嘆賞忻慕欲執鞭而從之此實是一欲闗極易移人中人資質到此自不覺其遷就也就如覽執事制作平生執着頓已坐馳其如何其如何昔人云立言而朽君子不由固也嘗竊觀古聖賢立言皆自其充然自得處發之故曰有徳者必有言不似今人雕心苦思如劉勰李賀之倫未免害心如何範數已補完乎似此類葢真立言也自踏京塵此意漫復衰䬃矣教我教我孫太初已卜居苕溪甚念我平厓幸相聞走歸計决在明冬矣預報草草答李沛夫拜緘如見君子閩中兵革固去年地震之應也向已逆料其必然矣八月之舉幸收拾得甚佳顧吾閩終是福地倘此軰不專其利盡散以結人心則其勢遂不易收拾萬一殺一長吏則其勢亦不可收拾禍福之判毫髮之間矣可懼可懼吾儕論事要不可全歸天時前後禍機實自延平失着故末流遂至此看來以寡馭衆以尊臨卑而能相安者全在紀綱今者三軍之衆即敢蔑其主帥肆然為亂者由紀綱不立也紀綱之立又非是慿威福愚黔首之云也要在處置得宜以安其心分自定矣只今以還不善整頓他日之禍又有出於天灾之外者試事吾弟亦不利至此自是文字太古之過君子必自反不可尤人應今之世亦須稍自抑所謂得魚即忘筌是何害匆匆布此答傅木虛别來逗遛道路將一年方就此散地一無所施雖頂冠束帶而角巾野服之興每在於鰲峰仙路與諸君子擕手也待了事即挂冠而來矣居京塵凡百無味惟得日閲時變比來世故看得較熟竊逃於踈拙以完其生漸次有野老爭席之意矣如何閩中兵亂似此災異其應乃止此豈足為大怪君看草昧之際其氣象何如天地間只是理與勢此時節雖但補罅塞漏亦不可得易所謂二陰在下其勢已成其象則為遯遯之時君子不為也家室粗安梧子近出花幸無事此外不備與顧華玉報荒吏至拜手教奉畣漫及心事慙赧慙赧治台朞月聞廢墜以次而舉風化以次而成足見君子為政着實地上故能隨事有功也棄女一事所闗傷天地和氣但習俗既久猶魚忘於江湖耳不知出令之後亦尚有梗化者乎此事必自巨室始須積誠以道之厲禁以申之遏其論財之流明其利害之歸然後數百年已成之風或可以漸而回也夫人非土木豈此一方獨無惡殺之艮心哉財利之心起而軋之也利有所重則愛有所忘耳如何此風一囘執事平生掀揭之政能有過是者鄭重鄭重黄石龍邦之賢者其道未盡信者鄉閭之間貴耳賤目矣奬進之責實在君子餘不備寄見素公數年來荒嬾惟甚雖大君子之門亦不能以時致書問罪何可言然懷仰之私無時少懈也近來事變猝爾而成大可驚駭伯固以乘幸皆不死者毫髪之間耳古所謂畏途宦海信然信然其不至黨錮之慘者亦毫髮之間矣冬間作意南歸定家之後即負簦詣雲庄求所未至前歳雖得侍許時然但於意氣中領略髙深顧道徳至意槩乎未之有聞也抑受教之地亦顧淺矣深負提掇馬懋聞之子子莘者大有氣力嚮往之志誠為未涯恐欲聞病楚中努力布此山林道體百惟自愛是為慰是為慰寄應南洲久不得見兄書近應天彞到方詳兄動履甚慰甚慰吳徳輝薦劄能勉一行以慰蒼生之望乎近日之禍悔不用兄之言豈亦近名之弊遂至此乎初事始於朱守中之宅同志者四五人意欲九卿率僚屬伏闕庭求為必成之計不料事既不諧勢不能中止其禍遂慘烈至於此時記得臨祖一言繼之若出只做得郁亮之事業倘今日與十一子同死不過是泡沫同澌矣雖欲為亮之詎便可得真不能滿兄一笑也兄出處事胸中稱量真是停當以今觀之追想當時告語當時之聽之尚如隔一重夢覺闗也縱遇毛生軰亦未必不以為愚矣歸志甚鋭自今以往更無復功名係戀深居守義孟氏所謂其子弟從之則孝弟忠信顧亦何適而不可哉顯仁親事尚爾優游古人介于石不終日言恐盱豫則有悔也人事最易參差倘前言莫踐悔將柰何哉石龍書中已漫及之幸動心動心尊公傳久廢文字畢竟不快鄙意早晩當寄上寄黄石龍報荒吏去後雅無好便繼以春夏變故卧杖埀死至今精神猶似夢中作夢也應天彞到得動定為詳聞少谷亭尚未成豈以不肖色取仁而行違不足以副君子盛心乎向得爛柯之説良用警惕又聞訟事易歳未决竊恐處鄉要必學孔子恂恂然後無病横逆之來自有三反利者衆人之心也吾軰但可撝謙較來亦自無不利矣詳東橋書中有黄氏多事之語參以天彞所告意者仁民心盛凡有民瘼匪不盡言於當事者容或有不行乎納言須以其機聽言者亦以其明要必童䝉求我匪我求童䝉是聽之無不誠則言之無不行矣上下不交君子以儉德避難善夫近日之禍正蹈此失着所以談虎獨變也病初愈草草奉聞少谷巾漫往答顧華玉使至書惠珍重深領久要之情所云惡事擾心豈方田之事尚爾紛拏棄女之政不行於巨室乎肆今之時稍可以行所學者實無過守令也况台州又非要途雖時或掣肘然執事聲實日隆行亦自無不得矣棄女一節前書已詳之方田自是草昧時事恐未可先甲三日自取紛拏也且一法既立百弊即生興一利不如除一害要之亦身體力行者之言也萬惟舉今之急務者以身先之以孫出之易所謂噬乾胏利艱貞終不若使人無訟之為先也畢竟大道理是如此萬毋以為迂罔之談然以執事才力而但尼於近者小者不亦萬萬可惜哉善夫三月之禍幾為溝中之斷要其實亦是就於近小者之弊也玉輝堂聞尚未就此一勝事它日人比為甘棠之愛顧使君自已事也亦須及時作意為之人事因循能得何時就耶念念巾一幅奉去横渠製也相聚未即東向縣情與鍾偕甫二泉處書近六月方到計之沉滯歳餘矣盛情如江如河感念感念納音之説大有理走近來於生死闗上益見得明白更不復憂疑矣以巨眼觀之天地尚不容一瞬况其餘哉昔作武夷棹歌有云藏裏黄棺壑上船秋風春雨自年年覺來天地終歸盡煉得丹成亦可憐要亦真見得是如此非孟浪而言之也如何京行何時動身走冬間凖告歸矣萍踪杳杳合并當在何時與何地也忉怛忉怛答孫太初林茂貞來得三隱詩内云劉豫是何人天意亦草草葢京師士夫多以山人聲迹太著恐有王蠋之迫也及觀是詩知山人當此時節必能深自韜晦以保其身耳苕溪草堂近如何少谷山人榻髙義甚盛也走自得罪之後形神甚衰至今調攝不復九月滿考既了初志即移疾歸去明春當過苕尋山人龍卧處以究大業此身恨未即奮飛也近來讀易覺得消息盈虚之理較親切此心已無復係累眼前富貴真不能熱中矣别後所進只此惟知已者教之答周方伯公儀禍變猝爾而成而廟議數旬尚紛然未定孔子所謂季孫之憂不在顓㬰而在蕭牆之内也荆湖正當上游敵出上策必先經略荆湖得荆湖則可坐敝川陜而後北窺中原此誠可憂為今計者即合擁衆扼蘄黄之口使不得逆流西指蘄黄不通勢必趨金陵大師扼其前四路兵乘其後我得其上禽之必矣今觀渠始事即行刼掠葢不過狂悖縱恣自速滅亡矣聞其將又皆閹竪乳臭之徒昔吳楚不得劇孟者知其必敗今天下事實賴諸君子收拾敵顧在成算中但恐我一失策草澤乘機而起良可深患也惟大君子留意留意病初起心緒樊亂不具答黄石龍潘令來承詩辭珍重讀之一大省悟領教領教是月已抗疏歸田計河解得發神遊左右葢已久矣居京師終為紛華所縳幸與朱守中軰日相切磋尚有碌碌不見長進日來作用僅求得放心下落又輒為文藝引去歳月因循柰何天彞戴星出入大為官守所苦早晩亦欲行志耳陽明公立此大功傳聞不免于禍駭汗駭汗古人云功業震主者身危又云功葢天下守之以讓今成此不世之功而反危其身者豈讓有未至乎吾道其固窮矣心事縷縷恨不得對榻盡之草草布此答曾東石太守使至拜凱歌諸什驚眼不可言斷斷乎埀世之文也西江倉卒報變反掌之間收功於吾軰諸君子垂貂擁緋者可媿死耳天下事尚賴吾軰維持夫子所論衛靈公者朝廷養士何須正在濟險利艱耳鄭重鄭重走在告已兩月疏已再上久渴奉覿今復去為老農圃㑹面何由數年來病轉加日惟坐一室自攝其身書不多讀文字之類亦未嘗作意為之偶有感觸適情而已與林克相明日發舟矣專人來謝平厓善用功者當鞭其後平厓平日所長者姑且罷去平厓今日所短者在於何處須自身心上一體驗詞章上一意為之最害事大根本上立得脚住於詞章何妨此實一得之愚再請質諸髙明者論之好朋友最能夾持人萬萬擇交立脚不住汎交最易為所移正人君子終日相對似覺無味且拘迫久久當自有味自有樂處此非口頭應答言語也顧志仁器局大好第恐於不痛不癢處安頓須要講明初相與便直率如此似不自量天地間同志一時能有幾人萬萬彼此相諒也與朱白浦兩年間伐木之意勤勤教我深媿譾薄不足以承之自此逺離㑹晤之期又不知何時與何地也竊有所欲言者公力量最大最能混世然交游實太汎久不自覺不能不汨沒其中也如何楊叔亨尚未有㑹處恐他日有以詞章誘之者相信不篤一為所移實非善夫所望也萬望為攻破此意臨發倥傯中布此未究與楊叔亨向來相與之意媿彼此因循不能有分毫相禆益今復彼此南北面晤無期柰何近見叔亨意向强半在於詞章上用力詞章實是玩器最能沉溺人區區於此求出頭未得而叔亨顧欲入頭耶古人用志不分分則兩無成立得大根本在所謂有德者必有言於詞章何難孟子曰學問之道無他求其放心而已求放心只是洗濯此心不令汚下不令昏蔽不令一物夾雜其中則自然虚靈光大萬變之來應接自然分曉是則立其大者也此理初入頭最枯淡無味要須見得所欲而甚於生反身樂莫大焉田地何如則世間一切喜好榮名聲利俱不足以易之矣善夫亦口耳乎此未有躬行但信之頗篤幸相與勉之答應天彞逺送信宿相期至意顧有出於言語之外善夫雖庸下敢於自薄舍弟來得别後手書所喻實中某之膏肓枕中每一玩味未嘗不神色獨變也敬念敬念海内故人肯極言所失如兄者三數人耳某實自幸天之未嘗忘余也兄門路極端正且善持志復能舍已從人非大勇猛者未或能爾也然光陰如石火歘忽間耳四十以還精氣有減而無増者一念因循大事去矣萬勿以市朝為不得用功自阻用功能如捄頭肯必擇幽靜之地而後持䕶乎以兄之勇猛堅定正好於喧囂中鍊此本體此善夫一得之愚願獻於兄者未敢自謂其能爾也汪子修諸兄為叱名守中兄想在行不别致途次匆匆不盡寄倪小野正好相聚不意病卧有此乖别戀慕之情其可云自此日逺光儀去之窮僻之鄉無復君子夾持之力不知將來竟作何等人物驚怖驚怖新功惟日自損偶有㑹心處嗒然若忘有我但恐尚作覺中之迷也老兄才識極佳且善陸沉涪湛於世味即此去道已最近過人已最逺矣但有碁癖亦害事葢溺之之云也母曰吾托此而逃也古人進徳無有窮已行年五十當知四十九年之非老兄勿輕自信更修其所未至定自有㑹處新得幸一一慰示逺懷風塵相見尚未有期也寄顧未齋諭徳陸江東司業數年相與之情非筆舌可盡不意卧病廢時遂不獲終事君子臨别又承至語戀戀若不忍舍我佩服以來一切無益技能痛自減損日惟靜坐内觀其心近復覺得一切技能非徒無益却是累性亂真之本葢此是結習之氣與性俱生者實未易知覺未易改除也古今多少豪傑鮮不從此路上斷送自今觀之真如蛣蜣戀糞丸未滿達者一笑也古人有云沉迷習氣不可與入道因憶往時挾一才一技自以為持此以往莫之或先也然無怪也沉迷其中不知有糞丸之外也維老兄聞道大早兼以氣力强毅横進直前將無復形迹向與老兄遊談尚如隔紙辨色可謂人已兩失矣自兹意向稍定不忍厚自棄於君子風中幸母惜一一提撕之至望至望起居不敘寄聞靜中奉别幾時遂有多少變故時事如浮雲但見日新一日耳善夫葢既死而甦者緬想興居真若雲際竊以𤣥陰合沓未有不待雷雨而後霽也時事多故實賴多賢持䕶夫子所謂其愚不可及者廟堂諸君子當必有善用其拙者矣鄭重鄭重善夫自歳下在告再疏方得請匪才多病端合掛冠去矣過淮南遥瞻金陵鬱鬱太祖之神京與陵寢在焉良用興懷應念先皇帝祝天求才之意顧有獻於君子自此入山掃軌音問恐益荒矣惟君子者能不忘情於我否也匆匆未究所念惟為道加愛答蔡止所克相到知動定偃蹇良用抱鬱而先生直能順受略不介心焉可謂顔之陋巷路之敝袍足以驗先生之所安耳去歳以歳差事欲改歴元議請先生任事竟復以為非急務中止近已付之守中葢此司耳目者職事也善夫卧病易時近方得請以去今雖稍平復然自得罪以來精神頓覺衰䬃日惟求安靜無事以償所失安身立命處尚瞢如也未間布此何任想念寄傅元質奉别將一年矣囘首往事渾在夢寐中一時交游今俱散盡真如蘧廬假道託宿焉已矣近况如何正是孤臣孽子動心忍性時節况君年力方富萬毋以一才一節自止此身既來此天地間顧有所以安頓處此實君自已事自已有者求之有餘取之不竭然光陰易失二十年只在轉眼間過去少壯之日豈可再得哉動念動念善夫賤體今幸稍安然神思已大不及往昔日惟倍加減損稍覺有一段清靜尚未知畢竟如何也濟川近來學業如何此子信是逺器當養之以正勿以近小拘之慰慰答蔡希顔拜篇章深見伐木至意天地間同袍共業能幾人况又合并無時耶兹與足下一江之隔矣便未即命駕相從善夫之自棄何如也早晩赴應黄二君子之招當過貴境未敢先往者白浦新歸方料理人事竊欲徑趨台州囘程拉二子到雲門禹穴之間按鵝湖故事合并數時如何草草奉畣且未備與施侃近兩柬只為太初書事事已集所須者名公之詩與銘而已不䝉差人又不䝉寄聲何哉夫子云見義不為無勇也太初平日於足下如何古人所謂死者復生生者不媿乎其言方為托生死之交善夫羇旅逺地凡百力不能及謀所以行其書表其墓欲少盡片心耳無他也故所賴共成其美者亦惟足下也前喻謂必藉於當路何哉古人仗意氣雖散萬金為知已亦不惜吾輩力既及為又何必向道傍築室太初所遺者不過一妻一女其大者在表章其身後之名使不冺其心事於後世方足以慰其平生今其墓一荒丘矣宿莽一深人心遂倦後日復有吾二人者注念乎人事叅錯恐足下亦曰今且罷休矣亭臺碑碣計不過數十金太初之書籍稍市之儘足給事但須足下之力矣足下只視太初如生存則凡百為無不力力無不盡盡無不美矣善夫嘗私論未嘗以吳人待足下也太初之墳須是買山郡陸侍御不受直必須擇善地而遷之太初平生云平生陳正字死不受人憐不爾恐非其志昔太白女云先人志在青山今葬東麓非其志毋使太初之魂鬱鬱不安於地下也劉元瑞處志彭費諸公詩并發下槀上挍勘尚有數十字無下落選槀得借來一對尤見不吝急欲就事出語過直幸恕幸恕答馬子莘國賢至承教言并惟濬逺信惠我蒙鄙良厚也惟濬再得遊陽明之門觀書中所云便大非京師時比經此大患之餘正古人所謂困心衡慮者啟其扄而進之沛然矣聞之國賢子莘早晩亦欲往贑州意思甚好走頗有此意但以今歳占數逢革奉先人遺體不敢逺出也且赤城應黄二兄期在夏秋到閩無此二端甚欲從子之往也守中兄向遊赤城曾與宿禹穴甚念吾子知吾子至贑西江未畢事定當作計為㑹耳國賢却是法器與論彌日一一合意勝友也與伯固别後累得吾后峰動定歴此大患難真萬死中一生也世事多故吾軰但當保嗇其身以待天下之清慰慰所謂忠肝義膽膾炙天下人口非所多也近來作用如何山林無事想益定靜文字類較减損於往昔否此固天地間不可無者然分心太多自損道念吾兄何等力量必不學山雞照影也善夫自杜門以來終鮮同志終日兀坐轉覺荒落窮年學道尚不能去病柰何柰何相㑹未即便中渴望教音忉忉上見素先生違教席凡五寒暑矣適歸甚欲裹糧造門畢所志以今歳占筮逢革閉闗待盡未即逺侍展轉何可云逺惟山林道體佳勝名教内真樂何限所謂子弟從之則孝弟忠信是已松厓山齋想長相聚晩年精進當云邦有典刑也伯固新功還理㑹文字否志古近况如何饒舌饒舌時事艱危明公雖迹厓崿實繫天下之屬安石不出當如蒼生何又况不為安石者乎萬萬為天下自重不宣與道夫去後杳無音問豈便相忘耶曲江巨邑且當要衝今之上人多驕而好諛近五嶺以南又最訐宄吾兄之天性我最知之任真者近傲近傲則上益凌輕信者眩事眩事則已多咎順過者易餒易餒則下益欺任真固是美徳然近傲則不可是以君子貴恭已君看游定夫之於胡提刑古人處上下之際何如也輕信害事順過害德二者要在明理知學吾兄公餘恒把心政經熟玩行動坐卧恒惺惺此本體要得空空洞洞如鑑如衡及至臨事再加審處定當一一分曉自無三者之病矣吾兄平日最排遣不過處是為不由甲科嫌於小就故稍拂意即氣餒此只是不知學聖教中何有此色等級若以道眼觀之更雖𤣥纁安車之來者只是𤨏𤨏况甲科乎若使心安理得孔子之乘田委吏將不足為乎哉萬萬以此身與天地同看自重自愛則曲江雖小四時之氣八荒之理皆將備矣如何子積先生有道君子也閒中幸以此意相聞當有教言也走近况公衡至能詳之不具與倪小野吳德翼來得思道去臘書報我兄十一月十六過懷玉知此時蒞任久矣新政四物之外更望行其意醫者意也我兄寛仁君子也以兄之才望南雄出其緒餘矣政事之暇尚有棊癖否竊意當如淫聲美色以逺之葢此最悞事寄一郡民命不比在省中時也克已須從性偏難克處克將去我兄之偏處在於何處饒舌饒舌善夫索居荒莫兀兀然過時今歳正值革運未敢以先人遺體逺遊也明春不死擬過羅浮與兄為㑹李銓省親韶州布此上監司自白狀念善夫得罪以來洊罹重疚辭禄還山將及一朞惟杜門掃軌料理病骨雖户外事亦不與聞又自登籍十有七載家世食貧窮年疏糲遇荒歳便不自給近有鄉人傳報不知何人妄指姓名詐取逋負致有兼并之愬聞之驚愕不知所從竊念古有洗耳者尚恥飲牛於其下流又有顧地金而曰子何居之髙而視之卑者其風節至今流動於天下顧善夫徳薄望輶乃不足以信一鄉懾羣小致使欺負之徒敢假借姓名而累以溷濁之行以濟其貪又念有告曾參殺人於參母者未免投杼况善夫之小亷曲謹闇闇而未光耶竊嘗自咎年將四十古聖賢則四體修治無少疲薾今善夫之耳目口鼻四肢百骸未免潛伏病根實不忍與草木同死乞身以歸日惟靜坐一室以諗病痛之所由内觀其定外審其動誠恐過惡伏於幾微不防而長大皇震憂飭務使四體孔修百骸用理今雖未能一一修理然腹心之疾葢或寡矣信如所指則是盡刳其心腹無復生氣耳何論腠理之未仁哉此無他假令善夫有管㓜安之貞吕徽之之遯則亦安有此也縁此干係行檢禮當伏門求直縁善夫伏枕彌年不出户庭又以告中不可衣冠謹此自白伏惟照察幸甚答王時行使至承手書佳惠捧誦無已感念感念就詢興居嘉勝貴眷而下皆還籍安妥甚慰甚慰善夫近來閉門料理病骨撿方書品藥物他無所事也昔時華藻掃除殆盡一味靜淡稍覺得逐物處少向所云靜裏根尋非是閉門求靜之云結廬在人境而無車馬喧其意思何如就以吾兄今日所事論之羣盜在前搴旗伐鼓指揮應變而意思安閒此便是真靜若有厭煩愛靜意思即是病痛竊知吾兄意思大丈夫得時而駕審時度德便當行其所學行義達道孔門一大事業也若時尚可為志尚得行吾何仕不可若時厄志沮亦何處不可若嘗懷引去不樂於作宦吾兄試思之恐落在適莫窠中善夫非慕髙尚之名而决於忘世者審時量力乃爾爾耳前月使人訪素翁應問吾兄之廬俯仰懷人不識何日再續麥斜鯉湖之好也使行促草草奉復不備與湛甘泉向歳獲侍吳門奉承教言祗服至今幾欲摳侍門下以畢所志輒以人事相違馳仰馳仰歳裏過天台與應元忠黄宗賢相約是秋至閩即欲為西樵之訪不知遂所圖否也緬惟山林道體幽勝於元忠處得聞教條正所謂得英才而教育之是已歆念歆念善夫此數歳始知門路然又汨汨没没未有歸宿囘思十餘年間才脱欲闗尋墮理障一身百骸無非病痛日惟減損華飾一就恬淡稍尋得病源分曉然氣力微薄不知將來竟作何等人也萬望有道者成物至情不惜夾持之力幸甚分淺言深皇汗皇汗答石龍兄使至拜三書前書所喻極詳極切向日對面之談未有如此懇至也敢不祇承以期無負於左右西陵别後事跡略載芝谷書中日來惟閉門作靜業諦觀故虚室中日見其病痛日見其未足也然但見其病痛未足又即末能除其根積以嬴者詎非麗澤者無人而荒惰之氣時乘其隙乎信如所云信如所云又喻今之所勉惟平心觀理不執已見不掩過惡不矜小善不避疑訕深求古人之所以至若事事云爾即無不了但其中亦有可言者聖人作用不是一一立定格子只是降伏其心一大事正所謂一得永得者自然不執不矜若曰我欲不執已見便有執的根在我欲不矜小善便有矜的根在程子所謂立一個名便有個對便不謂之中也後世儒皆正坐立格子遂至於無所歸宿如何如何伯固新功甚端正舊日逐末今俱無了近通書馬子莘報二公來閩深欲邀至莆此子亦甚艱得也使者求去甚急草草未盡所論答應南州正作書附黄宅人去忽報柴明府使至拜二手教數千里寄緘不約而同至同志相感乃爾未可全曰偶然也西興别後惟於鵞湖武夷之間留連數日到家正值歳暮焚黄襄事因為母家舉數喪匆冗過日了事而已入春稍閒日用惟閉户兀然内觀其定外審其動閒中事業儘有許多稍稍忘其生死之闗矣近命弟輩葺一草堂於湖曲以奉二公至止秋冬之間不識真能來否縣縣承過與何敢當何敢當神龜見夢之説良用驚惕今人學不長進信是認客氣作浩然往往自迷自誤以至於死承教承教襄事完否令岳大人方作啟相通久杜門未敢出城迎候俟他日至莆奉謝簡慢也小妾新春舉一女豚犬粗知向學未敢望其出衆人也令弟先生承在通家惜不得一面若以神交亦即是同堂合席矣二書俱作於燈下甚草草黄宅使人求去甚急故不暇打㸃書札也又西興之别遂易寒温一時同袍俱各天一方學業未成幽獨寡助深用悵惋方湖信是狂簡然山林中如此人藐視王侯涪湛世味亦自不可及使其知學而力行之未可量也蔡兄主白鹿虞佐可謂善處賢者矣近見蔡兄亦未免嘆貧藉禄養母出去甚長載道竟於此已乎為善者愳矣得石門視後事且䕶其䘮可謂死於君子之手矣近得林克相書石門是春已得歸誠然誠然先生若來閩石門必無不從矣為慰為慰杭州答書出於一時未嘗為稿大意相期無敢自薄於君子與石龍兄處大叚同也武夷甚可久居所惜近地絶無好學者須得諸君子來續晦翁之響台建本接壤往來亦未甚跋涉秋氣益凉東道主敢不努力時事我軰既退處山谷不當言但當進徳修業振作後進之士以培植元氣元氣厚則天運自囘此言似迂然究竟是如此不然空憂何益如何素翁伯固儘憂世但將如彼何哉承諭危行孫言不敢不勉燈下作書如與兄對談但寫心事甚不文亮之少谷集巻十八
