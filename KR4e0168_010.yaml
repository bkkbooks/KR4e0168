body:
  text: 少谷集卷十明鄭善夫撰記唐石墓田記正德十一年春巡按監察御史胡公文靜肇置朱晦翁墓田於建陽崇正學也墓在縣西唐石大林谷九頓峯下先時考亭九世孫洵澍裒田若干與唐石居守者用釐歲事守者易代而困田弗資且變歲事不稱又凡幾易代弗復也子朱氏道在人人之心有美弗復謂之右文邪語曰不肖者廢之賢者興之公至亟用惕然下令有司處田若干畝畀守者率時祀歲正輸公賦若干其令有司不得傭焉用是歲有積可亡困官可亡變積贏可備物用是祀無爽於時無弗備於器而凡垝垣圮桷無弗他他然葺也黍稷既登百籩既盈犧菹暀暀有褘有翼於戲子朱氏之道如是乎光哉凡祀有公田世不廢者惟孔氏之徒與釋老為然然釋老乃愚夫愚婦出以徼福有司傭之不少貸而賢者每斥而廢之且欲廬其居火其書而屏其道乃爾豈録其孫子躋其有事貸其傭垂百代有崇而無殺如子朱氏者正邪之辨顧若是縣哉胡公政於閩首役念於其林墓君子曰見人心矣考亭十幾世孫烜一日走輿情於少谷請記其槩貞諸珉以無忘公崇正之休十一月初吉晉安鄭善夫記禹穴記禹穴在會稽山陰昔黃帝藏書處也禹治水至稽山得黃帝水經於穴中按而行之而後水土平故曰禹穴世莫詳其處或曰即今陽明洞是已又云禹既平水土會諸侯稽功於塗山尋崩遂葬於會稽之隂故山曰會稽穴曰禹穴至今窆石尚存或然也後二千餘年而司馬遷氏來探書禹穴歸而作史記文章煥然為百代冠説者謂是山川之助也又後千餘年而晉安鄭善夫氏及山隂朱君節王君琥氏來復探禹穴尋黃帝藏書處乃玩梅梁摩挲窆石覩先聖王遺像得禹穴於菲井之上徘徊瞻眺想其卑宫而菲食為之喟然興懷又想其執中用智與臯夔稷卨之為臣又為之憮然自失也夫自禹迹以後三千年間遊者不知其幾而惟司馬氏顯此山川之能發為文章亦惟司馬氏夫三千年而僅得一人於山川顧止以文章顯何哉豈山川之能僅足以煥人文章邪世有不為文章者於山川何取也自昔至人見轉蓬而造車觀遊魚而造舟得河圖而成卦因洛書而作範咸取諸物也子在川上曰逝者如斯夫不舍晝夜余乃今知所取於山川矣禮登髙而賦余未能賦姑記余言如此云石龍書院記石龍書院在紫霄山中岑崿修阻林木莽然豺虎聚之闢而居之者石龍黃子也黃子在京師時與王湛二子論聖學聞道之的乃期作室於幽深以候二子者共之余時居吳吳東南之衝也得多接士故得見黃子繼得見二子與聞所謂聖學者欿然自鄙其平生憤悱而歸杜門五載仍倀倀如也乃復出山走四方求所謂三子或有以成吾志者由是遵會稽探禹穴登陽明之廬無人焉由是東走天台南入雁蕩始復遇黃子於委羽之陽語平生歡甚黃子曰吾向所謂書院成矣遂偕處旬月晝談夕息余盡得聞所未聞於乎黃子其真成我之志闕於乎此學自孔孟而後千餘年作者只濓洛數子其他役志載籍揭日月而行者可勝論哉吾儕幸嗣絶響今者其會也然一念依違遂至沒世噫其可畏哉乃今欲於紛波中定慮更期三年裂冠而來子其虛榻候我楊子云在夷狄則進之在門庭則麾之余嗣是又不重有畏哉書院凡五間中為凝道堂東曰幽賞西曰寓逺其窩曰虛白東軒曰天風西曰空翠曰石龍云者黃子之先在洞黃山下有湖有石如龍生湖底水枯輒見故云遊北山記北山去黃岩澄江六七里至山之樊巖石嶪峊有洞穹然曰小有空明天每風則聲從中出復曰天風門山以洞勝故復曰靈巖巖下有瀑其聲琤琤然注為川昔朱晦翁與杜方山南湖講學其上以川之狀與樊川為類故名曰小樊川後有杜清獻杜司農者起而張之故村曰杜村巖之上為嶺曰招仙嶺東轉為崖縣水百餘丈龍穴而淵曰龍崖崖下有亭曰二公亭上有谷曰芝谷氣和則紫芝生之谷折而陘青壁㟏岈泉涓涓出石罅為少谷亭又西為鷲峯峯益峻林木益翳凝紫出天畔北瞰赤城南臨雁蕩西望括蒼東極滄海之隩復名曰紫霄水甘如飴其源出峰頂一泓顯伏不常即志所謂影迹潭是已莽蒼之交黃子書院在焉余時東遊訪黃子居再信遂定北山之約窮髙極深復居再信時大雪壓山風蓬蓬振屋猿狖晝嘯熊兕夜號余與黃子披􅌁衣兀坐萬仞之表伐松枝燒榾柮參訂周易仙仙如也於乎自余結髮遊名山川四美二難往往不相值間或相值矣其有如黃子者乎時艱歲徂窮荒逺海能使余安泬寥而忘羈栖者誰歟吾聞之馮危履艱以居仁也余遊北山於黃子得鍊性之道矣同遊者芝谷子空明山人亦城林益菴思牧廳記台州古稱風節之地其俗近朴其氣用剛其民易興以善義浙東西數郡浮萎繁華而台皆反之及其敝也胥靡以偷胥成以訐一不相能至聚徒旅相攻擊訟纒孥裔不解椄槢死狴犴罔有悔者且風然曰豪哉豪哉狡猾之徒則延蔓為宄愚黔黎治之急則紏黨與縛長吏緩則日就穨莫大羽至其君子則或決亷隅藩翰而為之是故牧斯土者不曰民頑梗吾化也則曰吏姦蠧吾政也夫斯民也三代之英也豈今昔不相倫至此哉吾聞之牧人猶牧馬也和其唇吻順其恆度寬其銜勒時其食飲馬異類也固可馴之以驟馳而况人乎目其橛飾鞭策之法繁燒之刻之飢之渴之而曰世無良馬顧弗思已矣金陵顧君華玉挾才識志節為令有聲徴為天官郎久次出守開封忤奄柄謫居嶺表者三年始復遷兹土至則喟然思曰民敝久矣無他牧之無法也由是進父老而風之曰爾若赤子也若爾父母也以繼自今若與爾濯而新之不率者有憲勦凶振墮昭勸懲長亷耻政未及期而六邑風歸郡故有燕居久就垝圮君經易櫺桷墁飾粉堊參以瓦甓環以卉木旁有松數十株髙可數百尺磐石巍岌可亭其上延逺風作虬龍聲或曰是松元至大間趙某所植者或然也時若風教未純俗未變民有乖戾君休衙舉燭坐其中於邑不懌小吏報曰漏已三鼓矣君曰吾方思吾旦所出者漳州重新府治記嘉靖二年春二月漳州府治成張子集宷屬示厥成績前參知周子某左理是邦贊厥具美請憲諸貞石遂委役於少谷某附志業於二子者役無愛也禮匠人營邦五等其堂塗庭序廊廡閍闑各有差以戒分也堂皆南嚮其崇修數尋以臨明也有燕饗之堂以肅賓合寀共議庶政其隅有室以退思過今之郡治即古之侯國也漳州南袵海又控島夷實維雄邦三方皆連亘巖寨洞蛋修阻厭大兵其按制防虞之艱實不與他邦類先是漳之治弗治堂欂櫨撓腐級甓四折其燕堂為墟蝕於奧草門卷傾塌吏露處是謂弗莊民之慢政且久也嘉靖改元張子假臺臣出牧於漳至則喟然曰夫土階既逺明德新民是用莊以蒞者維兹弗治乃可以蒞乎於是乎度資於郡倅杜君昂聶君仁郡提刑胡君宗道得請遊粟若干石於是乎以七月載功以龍溪尉聶彥漳浦尉莫魯司征郭玉耆氓王虞煥以其能受勾會以南靖尉關鳯受陶旊平貿百用凡石材瓴甋鎡鍤楨幹絢堊之屬一時而登傭遊民而役之七閲月而治成為燕堂八楹崇五仞六咫修十尋而上橫度九尺之筵十四之而下遷外帑於左周序蓋甃悉以石用杜寇災名曰廣濟前為堂治其漫患鮮以白盛黃錯而繡綰堂東西為卷二十楹南為門二階三閈閡既槩昭其觀也夫漳人營室其庀材最艱材出延建以海至輸轉率登於其直兹維始事也龍溪茶硿有靈石裂決漲木千章來會城下是困崖嵲十許祀者耋老驚曰自吾生於斯齒齓而豁未見此豈天將神之以相公之營耶之役也資出於遊粟力傭於遊民神相以材問之四人無厲者足以考君子之政矣古人云作室猶治身門堂寢室猶之四肢百骸也而吾中處猶心也門廡不治猶手足之不仁也手足不仁不纍心乎哉古人掃滌舍宇正使心地清明明德新民一也張子之政蓋自心身之治而用之民者也髙閍夷庭豈徒為莊耶將使繼者覩其外思無歉於其內也張子諱鵬西川洪雅人為侍御史激姦振滯見正德中云是年秋九月日某記福清縣復祥符陂記嘉靖元年春正月福清縣復築祥符陂夏四月陂成始興水利也閩八郡其四袵海民之半鹽魚以生福清土益鹵海益患其田下下不蕃粟稷而蕃人故四人外給恆十之七八焉宋祥符中令郎簡相土可田者得五十頃而餘相水可瀦者得三十里而餘於是乎疏請截江而堤廢民居百浚逵而渠之引源於石湖之嶺𨗳而界江瀦奔殺悍東抵於旗西臨於玉融南循於五馬北極於玉屏之隩所跨遵義永福永東西文興凡五區轉瘠卸鹵田化而上以始自祥符故曰祥符陂蓋噩乎其浸也洪武二十三年陂決文興潮殺稼越正統七年邑丞陸忠復之正德十三年陂決南臺大娘垠潮復殺稼民至是大敝明年海虞陳侯逅來又二年下令於邑中曰余爾牧也忍視爾敝敝今與爾復而陂以簿楊俊受稽畫曰而往監之凡田頃出十夫十頃出百夫約畝受力駢力宣勤沉以巨衝實以砂黃由是荷鍤執畚四人雲至量日齊工乃湮乃防田畯報程餫夫走餉甫三月而告成績由是變膄敷膏候氣執成江有恆流歲遂大有繼自今即有炎嘯罔悠患由是黧老黃孺呼抃歡躍舉曰陂之悠悠樂只有秋微侯之載齊民其亡瘳由是某某某來致衆情請永憲於石水利裨荒政者也程伯子之上元朱晦翁之浙東塞決堤起涇堰古則王政也而時慢之侯今之舉無軼代論世哉侯起甲科令海邑毅斷神察大宜厥官此其政之一也余知侯故樂序其績云重修桂林文廟記正德辛巳春三月桂林文廟成行釋菜禮畢善夫退而言曰我夫子道法百王功垂萬世孔門而下之所稱論其至矣余過闕里拜夫子遺像蓋得觀歷代帝王崇尚之典云凡祀法祀功自王都郡邑皆祀夫子其祀物與祀天並者夫子之功則天也桂林之祀何始乎始於宋省元潘㧍廟成墀下茁二桂因名曰桂林祀有田鄉社行之不廢成化間桂復茁墀下郡太守唐侯珣因益田若干歲久廟圮鄉耆宿某等復聚而成之增四配享復益田若干祀㧍牖下以㧍首事也今之佛老之教比之六經豈啻爝火於大明也今六經行天而爝火亦然者何哉夫子不攻異端而異端廢孟子攻楊墨而楊墨廢後儒無夫子之道孟子之辨使佛老蔓及於後世至明王之法不能制焉傷哉明法凡郡邑許一寺一觀備祈禳也今天下之鄉社虔於所事至與食飲同要雖明知者不免其故何也孟子云能言距楊墨者聖人之徒也㧍始為之至化其鄉不為佛老而專事夫子在祀法亦當血食其社也故既祀夫子亦尸祀之云董事者某某益田者某某祠部員外郎鄭善夫撰周太僕遇寇事記辛未春三月山西行太僕卿周公某如太原遇賊於朝歌變至令妻子縋垣而避之賊執公需馬射公中脅公創甚正冠堂上抱天子誥勑矢死以委之時脅者百至公亡屈也俄有朱千戶者渠魁也覩公肅其䣊曰朝廷大官何得無禮劫公行不可曰不去羣小無知慮有竒巧時縣尉曹安亦在虜中固請從之賊重公居之樓上命主者為食覓醫為藥其所以尊而衛之者甚周公意其無他也以義讓之賊卉然起曰吾豈願至此哉吾為賊瑾驅耳公曰瑾既戮曷不改圖曰嘻吾無生之門矣既而糾其黨去之謂曹安曰吾不􅀈此城者為好官在也而謹護之公妻子既出亡及牧有夏生者迎而施舍焉於是乎俱免於難噫竒哉余時正阻兵淮北實詳公顛末以為變亂中美談且聞公所以滅賊之策於人人扼腕久之山東羣盜不過狗鼠之雄耳身無頓師無律烏合而起志不在大也壤鄰相驅乃醖此大患朝廷鑿凶門命將出師散中帑錢幣不下數百萬連五六年而卒借徼外之兵然而山東西兩川河淮南北城陷者十三死者十五僵尸成丘流血成川使天不悔禍有隱憂者矣國家養士百餘年縻以好爵裕以重祿章縫之流平居長節亢言炎炎一旦倉卒棄城逃生甚有鬻陳賈敵以僥其身者吾見其人矣介胄之士食恩纍世積威蓄鋭以俟用於一朝乃聞風而靡猶豢芻者忘意於膏粱卒見鼷鼠反怖而遁也否則幸禍以徼功養釁以邀賞視芟民命猶棄草菅然彼何心也哉雲溪記吳楚之東浙之西去海百數十里曰吳興厥土曠夷無連峯巨藪山蔚特蓊薈蛇行不數里即斷而原不能伏虎豺苕霅二水洄其際霅水源出吉州諸山苕水出武康西北流二百餘里道吳興或滙或渴為濱為陴而後東瀦於大湖水皆安恬無四序涸溢昕夕可方舟自苕東折𣲖為小溆曰雲溪名不見圖志或曰是溪辟囂去煩所見者白雲而已或曰隱者與雲為伍溪故多隱君子與吳越之交風淳而土腴且宜蠶作民易以為生其山棲淵伏也無風波豺虎之恐故世之隱君子多托焉而藏於漁畔也溪之潯麗菱芡葭莩美竹箭有柴門靣溪上屋數間桑柘數百株逵徑紓回蓋觀察副使張公水居也始公羈貫時釣遊是溪凡三十年出而料理天下事又凡三十年髮已種種乃得歸是溪兹者畢志於白雲之表與嘗怪蘇子瞻惡居西夷買田宜興又疏請居浙竟以人事宦情違志樂土固靳於與人耶余避人海上稍厭蠻俗不免有風波虎豺之恐欲謀避地而力苦不可於公之歸是溪也不無注深思云凰陽記下龍門東入逈溪六七里百折至衡山溪門漸狹水漸融溪又東二里有山嶻然如鳯形其名曰鳯峯又曰凰陽入凰之西曰西上有登龍故碑泯嵗月下有廢宅畔者據之相傳宋丞相鄭魏公避地處也或曰莊也其旁多古塜又西半舍曰聖洞委蛇幽深天欲雨則煙雲從其中出吾先子嘗曰凰陽可以返吾真也既而先子沒先夫人亦沒善夫用治命卜西上之原築為塋徙故碑於道左而新之勒年月及先子姓號於其上結廬以守勤所志也曰青山如故時之化如斯廢宅荒塜而昔且如今吾安知吾後殊今所見後吾者攬斯文而化思見見聞聞相繩以傳之無窮庶鳯陽其不丘墟哉庚午臘月日記春雨遊大石記大石在陽山之西四五里嶔危峻拔特出衆巘跨者為梁卧者為几崚而立者為丈人登之者非攀援弗克下有流泉風雨則其聲淙淙然泉石之交有松數株盤屈偃蹇若虬龍然旁皆椽竹栱木鬱不可數中有菴曰雲泉或曰以其石之潤而雲澤而泉也或曰以泉流雲也吳中山皆土少石有亦不能竒惟陽最多惟雲泉最竒故曰大石今年春豫有事滸墅滸墅距石邇而未能即往也三月朔崑山令方豪氏過豫豫方病肺得豪則甚歡言大石則又甚歡時且雨遂泛舟聨句抵石又得王龍臣益歡且出肴酒酌梅花下復聨句至夜分時羣動閴寂但聞所謂淙淙然者脫然有遊仙之想又於枕上各賦詩合若干首明日晴乃策竹上絶頂盼太湖及洞庭諸峯鐫姓名歲月於石而後返夜遊虎丘記自大石歸方子興未竟余病且間復登虎丘日入戒行月入告至時暮雲未歸夜月不生山川之境陵谷之態暗暗然若韜其靈秀而不售也乃挾奚奴曵輕裾秉燭前導列為火城轉於中亭踞千人石藉草而坐取憨泉而飲尋至劍池取闔閭神道不獲又以燈取石崖上古今人陳迹又緣法堂入千頃雲閣取壁間韻賦詩詩成僧大泉具清齋白飯對嚼而歸世之髙興者有如吾二人哉噫吾之髙興而感亦大也方子為崑山強二年而六至吾十年於外至者再今此則偕方子也前此非方子也方子亦非吾偕也後此者而復誰偕哉吾與方子蹤迹蓋未定也後吾遊者亦或有以感吾感正德七年春三月二日記賓陽樓記浙東數州栝最逺而天台而雁宕而三衢而金華周千里皆山栝最峻由栝東南遡湍流而上二百五十里曰青田山益峻地益逺民益野雖有學校之教才則鮮也朝廷考學官之成視人才之有無多寡以上下其績故得是地則怏怏然入是地則靡靡然至於殿堂之傾圮籩爼之廢缺禮樂之崩壞弗念也正德三年閩進士張子某為之至則大有憂曰是豈人才之不縣於教而故限於地耶是豈殿堂籩爼禮樂之類不足以飾教耶吾人敝之病也首治先師殿廡次葺泮宫次表鄉賢而祠之次新祭器次講諸禮儀乃復集多士議建宗文樓鈎材於梵因力於天衰資於衆厥日維良厥位維東厥堂維巽維三月樓成乃自命曰賓陽以為諸生問學之地名本諸書而義則取諸易也易曰日出地上晉君子以自昭明德士之登斯樓者顧名思義將有所激而興者乎夫其有思也必有興也人而思人而興則青田人才殆自兹樓富矣然則張子之為之也固在殿堂籩俎禮樂之外也少谷集卷十
