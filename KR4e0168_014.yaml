  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4e0168_WYG_014-1a, image: WYG1269/WYG1269-0183a.png}
body:
  text: 少谷集卷十四明鄭善夫撰疏乞歸疏念臣守官以來本無重疚只為過憂瘡瘍被庸醫所誤以為驅逐百邪必須金石之藥不擬沉積五內反成腹心之灾抵今雜症交攻形神沮喪臣切以病勢如斯而犬馬之勞豈能自效復恐失今不治而蒲栁之質詎免先零伏望陛下憫臣幸未即死敕吏部放歸調理萬一生全有地則未死之年皆報恩之日也諫東巡疏臣聞芻蕘荒野皆得獻於君臣待罪禮官奉法無罪竊迹職事不能匡正萬一愧死無地近奉明㫖有以威武大將軍鎮國公前往太山獻香者竊念此事雖芻蕘草野茍有一念愛君蓋有䝉死而言其必不可矣况臣身有官守職與奉行者哉臣聞天子端居外屏以示嚴也非郊社弗離其宗廟以承重也宫墻九重出則警蹕以防奸也夫以天下大器權邪側目而不敢發者無其便耳陛下逺不見曹欽不見劉瑾乎瑾固陛下狎昵之臣也陛下託以心膂委以機務時豈不以瑾為盡忠社稷且日在左右而一旦叛逆乃爾况今乘輿逺出內無儲君外有徑敵而驕貴弄臣專典禁兵萬一變作陛下誰保以無虞也陛下獨不聞英廟之事乎前車之覆後車之戒臣不敢斷其必無也且陛下逺舍宗廟以祀太山誠以為社稷人民邪臣聞雨露所滋無不孳息雷霆所壓無不摧折喣然而福肅然而威萬化時行百神率職者天也泰山之神其有尊於天乎故凡在天之下者祖宗相承之社稷人民也今以付之陛下誠欲陛下敬天之威和其人民保其社稷而能享其宗廟獻香之事其有重於郊社之禮與禘嘗之義乎今陛下郊不視牲齊不誓戒改卜者三出而馳道恐非所以事天享帝也禘嘗大禮率不親往恐非所以尊祖敬宗也是故圜丘之上烈風揚沙太皇太后祔廟之夕而七月雨雹此天戒也陛下顧不動心敬此天戒乃輟萬機冒重險以事於泰山何哉臣見五嶽之神不啻天之僕𨽻也暴慢於主翁而敬恭於僕𨽻不待智者而知其必不敢享也况今民窮財盡青齊淮楚之間水旱連年甚至父子相食者六飛一過勢必嘯匿山谷倘重傷心更何以徼福於社稷哉夫興亡之勢皆積漸而後成然不可不察也陛下連歲北巡而為陛下留行者抗言有害而未見其害非惟無害而反有利宜陛下厭言者之無稽而果於獨用其意也臣愚以陛下之漸成矣昔扁鵲再說齊君不用三見而遁去嘆曰昔公疾在腸胃湯爇可及也及在腠理針砭可及也今入骨髓矣雖有司命將奈之何哉臣恐失今不治而扁鵲遁矣天下名實方懼大怪春秋尊無二上制王公而下皆曰人臣今忍以天子之尊自貶而稱公此莫大之怪也非但大怪也然必有大憂今天下藩王皆陛下臣子也車駕所至萬一以公禮處陛下將安而受之耶抑責其不臣無禮耶明明祖訓臣恐彼有執詞矣且陛下之所欲自封者豈不以雄姿大略自足纍功將相耶然任金革暴霜露縱能手格單于身甚勞而功顧甚鄙也臣聞堯舜惟恭默無為而萬世言治不聞其擅一將之長今不師堯舜則亦已矣亦不聞有先帝乎先帝敬天勤民親賢逺色察佞幸絶游畋亦惟自正其心以為天下本實未嘗有所作為下親將相之事也然而文武效用身不勞而天下治此陛下與左右所習知者陛下夜氣清明之時獨不一思先帝之所為乎臣竊以治亂之機實在陛下一心心一正則百邪皆廢陛下試一轉移靜求先帝何故身不勞而反治今何故身獨勞而反亂則一切荒淫悖謬之事將自追悔不暇只此一念欲成堯舜事業不難也夫以陛下之聰明英武顧不惜勞瘁其身以求治而豈惜一念之轉移哉惜無明智者早為陛下陳之也臣本草茅久無仕進之志痛惟先帝祝天求才不忍以無用自棄抱此悃誠久欲獻之陛下明知職非言路寧觸忌諱以死誠惜陛下之英明而不忍視天下之日敝也隱死上聞候命闕下奏改厯元疏奏為歲差事照得正德十三年五月朔日食起復時刻不合數多該欽天監中官正周濓等奏驗交食以改厯元本部議得今後日月交食本監官仍依古法推步如或未當暫免參究即於官生內精選數人同周濓等講究新法彼此參驗等因本年十月十五日十四年四月十五日十月十六日凡三次月食本部劄臣前往觀象臺督同欽天監官生人等看驗其初虧復圓時刻分秒古法新法俱有得失經該奏報外竊以經緯天地治厯明時本聖賢事業而王政之首務也且天道幽𤣥其數精微今欲以人合天非明理達數之原者鮮克與此是故歲差之法自晉虞喜始定以歲策五十年差天運一度何承天復定以一百年隋劉焯取二家中數復定以七十五年唐一行復定以八十三年元許衡王怐郭守敬復定以六十六年有餘凡經數十人遞驗十數年至元授時厯似為精密矣只今新法據許衡等六十六年有餘之數推演仍又不合天道豈易言哉且如定歲之法積四朞餘一日一日分加於四朞是故二至之時只在絲忽之間自古難凖要須酌量以定者如定日之法一日百刻所以變為九百四十畫者以氣朔有不盡之數難分也凡每月三十日二氣盈四百一十一畫二十五秒一朔虛四百四十一畫積盈虛之數以成閏是故定朔必視四百四十一畫前後為朓朒只在一畫之間自古無有真知要亦須酌量以定者如日月交食惟日食為最難測月食分數惟以距交逺近别無四時加減蓋月小暗虛大月入暗虛而食故八方所見皆同也日為月體所掩而食蓋日大而月小日上而月下日逺而月近日行有四時之異月行有九道之異故旁觀者逺近自不得而同矣如北方食既南方才半虧南方食既北方才半虧是故食之時刻分秒必須據地定表因時求合而後凖也如正德九年八月朔日食厯官所報食八分六十七秒而閩廣之地遂至食既其時刻分秒安得而同今按交食以更厯元時分刻刻分分分分秒極精極細及至於半秒難分之處要亦須酌量以定者若差半秒積以歲月則躔離朓朒皆不合原算矣是故隨時考驗以求合於天者茍非其人豈易言哉謹按漢唐以來皆設算學與教習儒藝同科稱四門博士如宋錢藻孫覺諸儒皆為算學博士之官九章之法大明故定差法更厯元每得其人我朝算法既廢而户部考校數歲限取數人又止於算錢榖户口此在九章尚未得其一也况占天之書國法所禁而官生之徒明理實少必須理明然後數精方今海內儒術之中固有天資超邁究心天人之學者使得盡觀祕書加以歲月必能上按往古下推未來庶幾厯元可更也近訪得養病南京兵科給事中樂護工部主事華湘開州判官余珊南京國子監生蔡于榖杭州處士孫一元此數人者聰敏靜深頗明理數之學而精於九章之法者乞敕該部照依太常少卿童軒事例於本職上超升職銜其監生處士量加官爵使觀祕書與周濓等講究參驗數年然後責成其效於改造厯法庶克有濟為此具本親賫奏聞乞歸疏臣福建福州府閩縣人由𢎞治十八年進士正德六年十一月內除授户部廣西清吏司主事八年七月內養病回還十三年六月內起復到部改除禮部祠祭清吏司主事十四年九月內升授前職念臣生長南方禀受脆薄兼以自幼學問乖張不能以志帥氣也七情交攻多方受病向雖乞歸調治又以優游光景自廢瞑眩之藥實未曾拔去病根即不自揣遽出干祿備官以來故病復作竟未有㳙埃之報復蒙聖恩升臣以署員外郎職事臣念一介寒士一旦偃然與五品大夫同列計臣之德實不能稱其位萬一况今為寒邪所侵頭風肺氣喘息不安職業既荒慚悚無地臣今思耳目鼻口四肢百骸無非病痛寖及腹心殊非旦夕可治也必須畜數年之艾靜處山林安守歲月齊居洗念庶幾可望其瘳矣此實臣激切之言非有所假借焉者也伏望陛下憫臣愚衷乞敕吏部放歸調理倘或生全有日年力未暮以臣為可備一命之寄臣豈敢久耽逸豫而惜馳驅哉為此具本令家人某親齎謹具奏聞伏候敕㫖再疏念臣自幼多病且不善養比入仕途積成勞瘵今春以來加以寒邪相迸醫藥不得其理克伐太過遂傷其元氣只今年未四十而耳目昏瞶手足疲苶莫大羽然如下衰之人此先零之兆也今不得歸臣恐有陰陽之患一旦死填溝壑是亦聖世一夫之不得其所矣臣切惟受病之原實積勞所致然非勞於職業也居都㑹之間紛華恬淡之意二者交馳無所於定故日撓其心耳心火宜下降而今上行是以陽日虛而陰亦損百爾害身之疚來乘其敝也臣願自今入山以寧其心務使百骸得理然後出施之有政臣非不知既委質為臣便合致身也臣聞身修為家國之始修如修補之云也修補得此身完固方可以之殉國今臣之身尚猶敝屋四面破碎今日治病奚啻於禦冦爾也古人必四十而後仕蓋以此時精氣方始完滿志意方始堅定矣况臣尚非强仕之年百病未除而即試有政養之未厚安望其用之有禆哉伏望陛下放臣還山假臣數歲然後處以官守之地則臣方足以效勞於職業者敢不盡瘁於未死之年也乞歸疏念臣受資寡薄養生乖舛比年以來感患瘡瘍纍事醫治益以猖熾向者謬以驅辟百邪為須金石之藥不擬沉積五內反成心腹之灾抵今三月雜症交攻形神喪沮精氣虛竭臣切以病勢如斯而素食妨職實不自安復恐死期日迫而寡妻弱女何所於托如䝉陛下憫臣幸未即死乞敕吏部放臣回籍調理萬一有生全之日敢忘效犬馬之勞臣不勝感戴天恩之至少谷集卷十四
