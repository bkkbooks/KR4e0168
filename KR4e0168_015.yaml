body:
  text: 少谷集卷十五明鄭善夫撰雜著毖齊昔單靖公襲卿佐于周三十年宫室不崇器無彤鏤身聳而除潔外內齊給凡有宴享罔有踰其上賔有禮事動即咨如是而爵不上中大夫秩不庇宗晉羊舌肸過焉靖公享之不殽寅而無私送不越郊賔禮餞贈視其上而從之肸告人曰觀單子之况我也其有興乎昔尹佚有言曰動莫若敬居莫若儉德莫若讓事莫若咨今單子皆有焉而重之以無私加之以不殽能辟怨矣居儉動敬德讓事咨而能辟怨以為卿佐其有不興乎單若不興后必昌其後靖公之世大蕃𦙍於周鄭子曰單靖公古之良也羊舌肸古之名能知人也敬儉讓咨毖之道也古語有之曰毖于政者昌于人毖于履者昌于躬昌于躬者類昌于人者壼善乎見素子之言曰毖慎也侈對則約怠對則敬滿對則謙踈對則密夫約則能儉不怠則能敬謙則能讓密則能咨吾觀古人之裕於用毖也而信見素子之善繹也吾觀見素子之言之也得毖齊嫂叔喪服辨記曰嫂叔無服别嫌也又曰嫂叔之無服也推而逺之也傳曰禮本人情又曰禮以義起如親死子幼嫂有母之道情何嫌也有母之道而推而逺之義不可通也孔子曰周因於殷禮所損益可知也嫂叔之服也古禮或有之而在周公所損乎周公以前載籍不可考也或者秦燔之後漢儒增損謬失其真故記禮者非聖人之本書乎昔者子思之哭嫂也為位而服不絰見子思於嫂無母之道者服不服可通也而為位也情顧有所原而不可已與自子思而為位則前此之不為位可知也是故先王之制禮也其固無常與韓退之祭鄭夫人云昔在韶州之行受命於元兄曰汝幼鞠于嫂喪服必以期退之之為嫂服朞也以有母之道者也則前此之無服也後世之不服也又可知也按朱子家禮兄弟之妻小功報服同是固原情制義因周公之禮而損益之者與雖然論其常而未適於變也世有如退之者嫂有母之道而服亦以小功乎小功亦不稅乎小功不稅義之正也服而至於不稅則即疏矣嫂有母之道而可即疏乎夫情不可以即疏也義又不可以稅小功也然則朞正乎朞為祖父母為父兄弟為衆子為冢婦為嫡孫為姪皆聨屬至親自三年通喪之下至重焉者退之之為嫂服朞也無乃過情與夫禮義之經也非經天降非從地出人情而已矣嫂叔之變也其惟大功與大功降於兄弟且得稅也余二弟幼亦鞠於嫂乃命之服大功竊為論說以俟後之君子教學篇泰豆氏善御其攬六轡也內正心而外滑消然後以應馬志和其吻唇輯其銜勒是以回旋若一措輪蹄於容址之地忘其險也造父棄家而學焉三年不語術而示之趣又三年而後授之巧造父歸為周穆王御八駿西遊遵崑崙以抵瑤池斷山驟壑若履平地焉世傳造父善御而不知其自也蒲且子之弋也弱弓纎繳一振而連雙鶬用心專也動手均也詹何倣之以學釣處於漢沔之交剖粒為餌引魚盈舟楚令尹敖過而神之曰是有道者也進之問術焉師其意以治楚國平心易政三年而楚國大治鄭子曰余嘗讀子至泰豆氏竒其趣也噫妙矣哉其通於聖人之教乎至詹何諸人蓋亦嘆其善學也語曰雖小道必有可觀焉此類非耶射御固君子所器也古之君子㑹一以通萬是故模其迹而弗解其真名曰學梗容聲而振䝉名曰訓苴匪但是之然也紀渻子之養鬭雞也痀瘻丈人之承蜩也賤工曲技而上合乎至道之精而况其大哉作教學篇宗誓古人有言曰法勝則治恩勝則二家長恩者也故難睦族又家之甚者也故尤難睦凡人之心有七情六欲情欲汰則偏內而輕外見人而不見已心口益繁則情欲益汰承之以不肖之心大二之㑹也大族則尤其甚者特行適疏盡言尅恩捐其欲則訾極其忠則尤襮其咎則亂窮其歡則意衰人心之彀中也昔張公藝九世同居或問之不答惟書忍字百餘夫忍以養恩恩以輯情情同則通通則睦睦則久矣而又遡源以親之嚴分以安之學問以漸之柔孫以開之貧則賑之喪則賻之吉有慶善有勸小過則隱大過則讓不聽則止仁以和其情義以殺其欲所以正忍也鄙語曰大忍小忍和睦安穩鄭門祠堂之作以修睦也凡我族人敦此矢詞郁亮之三書題後郁亮之為裕州值中原盜起城陷死之朝廷以為光祿卿旌其忠也孔子曰士見危授命又曰察其所安亮之之授命以死也能安歟昔者山東之亂城破者十八九其間迎降竄伏者何限也雖然死難之徒或慷慨於一時或者偷生無路顛踣於鋒鏑之辱者其跡似矣其心之所安如何哉近觀亮之三書乃其平生所與處元忠者其義分通明心辭昭曠亦駸駸乎知道歟吾聞知道者决死生而不眩視義之可舉而安之故所惡有甚於死者不為茍得也於乎三書之存於亮之可無賴哉元忠史氏也他日汗簡之定要須以此推其心矣正德十二年閏月晉安鄭某東遊歷㑹稽吊其廬而書之贈陳惟濬易曰君子終日乾乾夕惕若厲無咎又曰不易乎世不成乎名遁世無悶不見是而無悶樂則行之憂則違之子思子曰君子素其位而行不願乎其外素富貴行乎富貴素貧賤行乎貧賤素夷狄行乎夷狄素患難行乎患難故君子無入而不自得焉孟子曰萬物皆備於我矣强恕而行求仁莫近焉夭夀不二修身以俟之所以立命也鄭子曰余嘗誦斯語竊見聖賢學問無時無處不洗濯此志故明晦夷險榮辱生死疑似之際斬然而不為之變聖賢作用深矣哉昔明道好獵自見茂叔之後云已無此好茂叔曰何言之易也但此心潛隱未發一日萌動復如初矣洗濯此志難矣哉惟濬從事聖賢者也兹得罪南歸歸將田于臨川蓋處乎貧賤患難之間也於其行也書此以相其志他日相逢於烟霞之表幸相與證其所得焉贈伯固二首易曰君子進德修業欲及時也聖人之志在於天下國家也語曰學而優則仕仕以行其所學也又曰隱居以求其志行義以達其道求者求所達之道也達者達所求之志也惟其志在於天下國家也故雖事變嬰於身而未嘗一日惡於志也古之所謂道德之士類如此故孟子曰豫豈若是小丈夫然哉諫於其君不用則怒悻悻然見於其面去則窮日之力後世諫臣率以詆訐而去為賢信如是則是為已尚有私意要其極豈真在於天下國家者耶伯固之學無所不究精思力踐志欲見可之行也嘗聞之素翁曰伯固殆如精金美玉要之非如世所謂功名之士者兹以所學有靖於君獲戾而去國咸竒其節而壯之此豈足以窺伯固之志哉使伯固有為名之念則平生所學皆是虛文其去悻悻丈夫也餘幾哉然公私人已之際相去絲縷之間矣是故憂患蹇剝何處非致力之地稍有一息悔吝即為私意即為為我即非學問即非志節其為功名亦即非功名矣自今以還尚相與勉之伯固平生苦志劬書博涉甚至成癖為文字亦莫不求拓其所極夫典籍文章實人間一大玩物然一向為之未免有尋流逐末之弊於身心上畢竟無益至於癖焉顧不反有害哉昔朱晦翁答潘叔昌云中年以後氣血精神能有幾何不如且學上天然後旋學識字也又云恨不早目盲者則夫典籍文章不真使人汨溺而弗能起耶伯固氣力强毅非復善夫脆弱者之匹然皆中年以後人矣倘更失此他日對淵尋筌尚何及哉贈馬子莘余嚮過建州讀陶園詩於辭氣間得子莘之為人要之必不止以文章鳴世者惕然存之到京論友於守中氏守中首舉子莘以為陽明之門立志最為精猛者翼日復為余曰子莘至矣遂與共昕夕上下議論談及幽𤣥見其卓談及利害見其守察其神色見其所安於是乎益信吾守中之不吾誣也余嘗以文章究人底裏今復自慶其得之子莘矣然人生百年猶石火之炯然易滅也中間惟二三十年與竟大業前此者智不及之後此者力不及之二三十年能有幾何然一念依違遂至沒世豈不為大可哀哉故曰君子疾沒世而名不稱焉今之豪傑之士不為少矣其能談聖人之道亦不為少矣及觀其隱微利害之際往往變其所守者何哉志不堅也志不堅者心不誠也心不誠者名不稱也子莘才力向往寧復有為名之病然誠之一字其實難識稍有一息汨沒一毫矜持皆謂之僞矣故佛書有云求禪定即非禪定求解脫即非解脫余無似早衰無以與乎道德之言然一曲之明實猶乎維摩大士之於釋也故為子莘盡之幸毋以笑交論交之為道古也交不可易易則無卒君子之交也難難則協協則卒其交也上亡諂下亡瀆猶之措膠之漆中雖有巧者莫可解也是故晏嬰之於友也世申其祗不遷於始固也向秀氏有友七人而善後居山陽亡有七人者每聽鄰笛輒泣下伯桃羊角哀之楚也窮雪於途袍廪不兼勢不可兩有桃曰吾不逮哀哀存逾吾有也於是乎以身存哀桃死空樹哀乃徇之數子者友也卒世而匪懈墮命而甘心者也故曰無率爾初有永其終交難矣古之人有終其身而蔑有交者寧蔑也蔑以易也匪易則匪泛匪泛則純純則固固則有相由之相成於善義成則卒泛則支支則解夫其分有所支也則意有所忽忽生疑疑生隙隙生嫉嫉生畔畔生仇仇生於易也夫物莫不畔于易莫不亡畔於難交至於畔而且仇焉寧蔑也余悲夫古之道不可返矣悲夫世之交者如雲之殊矣以利交也以勢交也交也者利差則散勢醜則嫌如以利以勢而或卒乎否哉吾見脆栁東枝協風至則枝靡以西不但葉也亦不但枝也如以利以勢則亦不但猶脆栁也作交論與黃后峰雜論土生物山嶽豈得為死物但山嶽小人心如天地元氣較大耳赤子之心但可云純一無僞若水火盜賊在前則必驚怖安得不動心聖人則不動耳天之理氣猶人之性情日月星辰之運江河之流山嶽之峙猶耳目口鼻四肢百骸五臟六腑人心只可對天天之神不專棲於日人之神亦不專棲於目也做官要行道不但位正也正便可行于三代聖賢之君之時三代而下便做不去故孔孟不偶程朱不容是已夫言者心之聲也文者言之精也大言炎炎小言詹詹淳言質仁亢言凌厲崇而飾者窮奇謔謔謞謞者搜慝斤斤者察詖者蔽淫者諂不蹟而康叨餮固也然有知詐似知好閉似亷漸毒頡滑堅白解垢之說諸言何以稱哉觀舟文少谷子將之燕觀舟于河見御風而疾濟見御力者見覆者見舍楫而返者少谷子瞿然若失客有揖而前曰先生面人而潛神役物而動志將有所思乎曰有齊其物而差其等猶是舟也因其順良其御而至之之謂至微其美而力其用而遲其所極之謂强反其至而戾其力之謂懦倒其施而弗悛其所往亡之謂暴暴則亡懦則棄可不畏哉亞中之資要于强强則成成則無慮無至也客曰大哉君子之觀物也吾知其所以樹身之操者矣再拜而退婚禮不用樂辨程子以婚禮為幽陰則是以不用樂為幽陰則非白虎通云婚禮以陽下陰用昏時行禮故謂之婚幽陰之義恐據此禮曰不舉樂思嗣親也白虎通謂親年衰老代至也若視死更可舉樂乎按先王作樂以飾喜也若昏禮思嗣親則殺喜耳故不同樂佛老辨風俗縣于氣運春秋時喪亂相乘列國皆有賢人且孔子道勝故邪說不為害列國之君雖相侵伐猶懼大義故邪說不得入至戰國時其君互相謀噬不懼大義國亦無賢人謀士興謀士邪說也孟子賢不及孔子道不能勝邪雖攻奚益然時無佛老之名也老子立論未嘗無用處但過正道一頭使其親行之天下必有可觀孔子終無一言詆之但學者用之過當故害事佛氏上乘亦合吾道但其作用殊耳是故佛老之禍非佛老之罪也佛老之學雖賢知君子往往有好而習之者惟程朱不然豈非世道之有邪有正猶天道之有陽必有陰乎就二教較之佛害猶大輪回之說雖萬世不能解衆生之惑耳書法答古人作真書如端人正士修容中立柔外剛內從容於禮法之場至於行草則似孔子之燕居申申夭夭而於禮法實未嘗離也張顛懷素如坐空山無人之境蔑禮法去形骸而仙者米元章黃魯直則戰國縱橫之流耳近世學此四家其弊愈甚衛辰蓋有志於書而未有於適者也因以相告然此就衛辰言耳故略延陵李太守禦冦事原或曰延陵太守城延陵江陰而冦至何其慮之神也守江陰而靖江無恐江南忘危蓋有餘威者耳或曰先事而周之謂知臨患而能折其衝之謂武能銷人之患之謂仁鄭善夫曰董子曰正其義不謀其利明其道不計其功城延陵城江陰道之經也守江陰義之感也且城且守而活江南數十郡之民民罔見德焉宣道義以成其仁者也故曰道知之符也義武之原也武仁之用也武帝不冠不見黯論昔人有言曰霍氏之禍自驂乘始愚則曰汲黯淮陽之遣自不冠不見始何則武帝待黯禮至而情不至也天下有厚之而薄者薄之而厚者觴酒豆肉必先諸鄉人而後諸子弟豈待子弟不若鄉人哉蓋鄉人與我疏者也禮至而情不至也子弟與我親者也情至而禮不至也故鄉人之敬不終日而子弟之愛可以終其身黯於武帝徒得其鄉人之敬而不獲其子弟之愛其敬烏得而不替哉夫禮固臣之所望于君者也有時而不愛其禮者不容于僞為也禮而僞為能無窮乎世之愛者有曰不冠者䙝也必冠者禮也帝之于黯不冠不見若在所禮矣况帝之待大將軍則踞厠待丞相則不冠槩之于此又殊禮也帝何負于黯邪噫非唯不知帝抑不知黯也夫人情有所忌而畏生焉有所畏而敬生焉敬生于畏且忌而使君不吾疑者未之有且黯何忌于帝邪忌之初生也黯之戇也夫帝之多欲其腹心之疾所自諱也黯不之諱而故暴之其不近帝之情一也且愛一公孫子既欲斥之愛一刀筆吏又欲斥之黯與二子之心暌而帝又與黯之心暌矣不得于君之心而惟禮之拘安知其非貌焉已邪故不冠不見非敬黯也陰懷猜忌而陽浮與之修飾邊幅之小亷而非握手撫背之真情也設立防畛之曲謹而非慷慨歌呼之雅意也不然淮陽之遣胡為乎來哉又否則大將軍黯為之矣何必青也丞相黯為之矣何必𢎞也向使移待青者以待黯雖踞厠可也淮陽必不遣移待𢎞者以待黯雖不冠可也淮陽亦不遣吾不獨怪夫素所䙝慢之臣如此而將如此而相而素所敬畏之臣所尊非所用所用非所寵至是而帝之心見矣然則臣之于君果願其冠而敬邪抑願其不冠而簡邪簡不如敬固也與其敬焉而無實母寧簡焉而情真無實則不可以為繼而情之真者愛之真也臣亦何利于君之為貌而自取其薄乎故曰淮陽之遣自不冠不見始少谷集卷十五
